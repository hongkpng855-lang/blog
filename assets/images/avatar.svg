<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
  <!-- 背景圓形 -->
  <circle cx="75" cy="75" r="75" fill="#f0f4f8"/>
  
  <!-- 漸變背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 頭像背景 -->
  <circle cx="75" cy="75" r="70" fill="url(#bgGradient)"/>
  
  <!-- 頭髮 -->
  <ellipse cx="75" cy="55" rx="40" ry="35" fill="url(#hairGradient)"/>
  <path d="M35 55 Q35 90 55 100 L55 70 Q35 60 35 55" fill="url(#hairGradient)"/>
  <path d="M115 55 Q115 90 95 100 L95 70 Q115 60 115 55" fill="url(#hairGradient)"/>
  
  <!-- 臉部 -->
  <ellipse cx="75" cy="75" rx="32" ry="35" fill="#fad4c0"/>
  
  <!-- 眼睛 -->
  <ellipse cx="63" cy="72" rx="5" ry="4" fill="#2d3748"/>
  <ellipse cx="87" cy="72" rx="5" ry="4" fill="#2d3748"/>
  <circle cx="64" cy="71" r="1.5" fill="white"/>
  <circle cx="88" cy="71" r="1.5" fill="white"/>
  
  <!-- 眉毛 -->
  <path d="M55 65 Q63 62 70 65" stroke="#2d3748" stroke-width="2" fill="none"/>
  <path d="M80 65 Q87 62 95 65" stroke="#2d3748" stroke-width="2" fill="none"/>
  
  <!-- 鼻子 -->
  <path d="M75 75 Q78 85 75 88" stroke="#d4a088" stroke-width="2" fill="none"/>
  
  <!-- 微笑 -->
  <path d="M65 92 Q75 100 85 92" stroke="#c97d6d" stroke-width="2.5" fill="none"/>
  
  <!-- 腮紅 -->
  <ellipse cx="55" cy="85" rx="6" ry="4" fill="#ffb3b3" opacity="0.5"/>
  <ellipse cx="95" cy="85" rx="6" ry="4" fill="#ffb3b3" opacity="0.5"/>
  
  <!-- 衣服 -->
  <path d="M45 130 Q60 110 75 115 Q90 110 105 130" fill="#4a5568"/>
  <path d="M55 115 Q75 105 95 115" fill="#4a5568"/>
  
  <!-- 領口 -->
  <path d="M65 115 Q75 108 85 115" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- 眼鏡 -->
  <rect x="53" y="67" rx="8" ry="7" width="22" height="14" fill="none" stroke="#4a5568" stroke-width="2"/>
  <rect x="78" y="67" rx="8" ry="7" width="22" height="14" fill="none" stroke="#4a5568" stroke-width="2"/>
  <path d="M75 74 L75 74" stroke="#4a5568" stroke-width="2"/>
  <line x1="53" y1="74" x2="45" y2="72" stroke="#4a5568" stroke-width="2"/>
  <line x1="100" y1="74" x2="108" y2="72" stroke="#4a5568" stroke-width="2"/>
  
  <!-- 裝飾圓點 -->
  <circle cx="25" cy="25" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="125" cy="30" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="130" cy="120" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="20" cy="110" r="3" fill="rgba(255,255,255,0.3)"/>
</svg>
