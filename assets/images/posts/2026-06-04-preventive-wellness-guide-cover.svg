<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a4a3a"/>
      <stop offset="100%" stop-color="#0d3328"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="380" cy="120" r="200" fill="url(#circle1)"/>
  <circle cx="120" cy="400" r="180" fill="url(#circle2)"/>
  <!-- Leaf icon (simplified) -->
  <g transform="translate(256, 150)" opacity="0.9">
    <!-- Leaf stem -->
    <line x1="0" y1="20" x2="0" y2="65" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M0,20 Q-35,0 -30,-25 Q-25,-40 -5,-30 Q-5,-15 0,0" fill="#4ade80" opacity="0.8"/>
    <!-- Right leaf -->
    <path d="M0,20 Q35,0 30,-25 Q25,-40 5,-30 Q5,-15 0,0" fill="#22d3ee" opacity="0.7"/>
    <!-- Top leaf -->
    <path d="M0,10 Q-15,-20 0,-40 Q15,-20 0,10" fill="#86efac" opacity="0.7"/>
    <!-- Small decorative dots -->
    <circle cx="-20" cy="-20" r="2" fill="#86efac" opacity="0.6"/>
    <circle cx="20" cy="-18" r="1.5" fill="#86efac" opacity="0.6"/>
  </g>
  <!-- Title -->
  <text x="256" y="270" text-anchor="middle" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="2">
    預防保養時代
  </text>
  <text x="256" y="305" text-anchor="middle" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="16" font-weight="400" fill="#86efac" letter-spacing="1">
    從疲勞解放到身心平衡
  </text>
  <!-- Divider -->
  <line x1="180" y1="330" x2="332" y2="330" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
  <!-- Tags -->
  <g transform="translate(120, 370)">
    <rect x="0" y="-12" width="90" height="28" rx="14" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="0.8"/>
    <text x="45" y="6" text-anchor="middle" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="11" fill="#4ade80"># 預防醫學</text>
  </g>
  <g transform="translate(228, 370)">
    <rect x="0" y="-12" width="70" height="28" rx="14" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="35" y="6" text-anchor="middle" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="11" fill="#22d3ee"># 身心平衡</text>
  </g>
  <g transform="translate(316, 370)">
    <rect x="0" y="-12" width="80" height="28" rx="14" fill="#86efac" opacity="0.15" stroke="#86efac" stroke-width="0.8"/>
    <text x="40" y="6" text-anchor="middle" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="11" fill="#86efac"># 2026趨勢</text>
  </g>
  <!-- Bottom indicator -->
  <line x1="196" y1="470" x2="316" y2="470" stroke="#4ade80" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <circle cx="256" cy="470" r="4" fill="#4ade80" opacity="0.6" filter="url(#glow)"/>
</svg>
