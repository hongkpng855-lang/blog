<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d4a7c"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0c000"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 頂部強調色條 -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#goldGradient)"/>
  
  <!-- 左側裝飾線 -->
  <rect x="60" y="150" width="8" height="280" fill="#ffd700" rx="4"/>
  
  <!-- 分類標籤 -->
  <rect x="85" y="160" width="120" height="36" fill="#ffd700" rx="18"/>
  <text x="145" y="185" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a365d" text-anchor="middle">#投資</text>
  
  <!-- 裝飾圓形 -->
  <circle cx="1050" cy="120" r="100" fill="#ffd700" opacity="0.1"/>
  <circle cx="1100" cy="500" r="150" fill="#22c55e" opacity="0.08"/>
  <circle cx="950" cy="550" r="80" fill="#ffd700" opacity="0.06"/>
  
  <!-- 股市走勢圖背景區塊 -->
  <rect x="750" y="180" width="400" height="250" fill="#0d1f3c" rx="12" opacity="0.6"/>
  
  <!-- 股市走勢圖 -->
  <polyline 
    points="780,350 830,320 880,340 930,280 980,250 1030,200 1080,230 1110,180" 
    fill="none" 
    stroke="#22c55e" 
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#shadow)"/>
  
  <!-- 走勢圖上的數據點 -->
  <circle cx="780" cy="350" r="5" fill="#22c55e"/>
  <circle cx="880" cy="340" r="5" fill="#22c55e"/>
  <circle cx="980" cy="250" r="5" fill="#22c55e"/>
  <circle cx="1110" cy="180" r="5" fill="#22c55e"/>
  
  <!-- 下跌線條 -->
  <polyline 
    points="780,380 830,395 880,390 930,410 980,420" 
    fill="none" 
    stroke="#ef4444" 
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.6"/>
  
  <!-- 上漲箭頭（大型） -->
  <g transform="translate(1000, 200)">
    <polygon points="0,60 -25,30 -10,30 -10,0 10,0 10,30 25,30" fill="#22c55e" filter="url(#shadow)"/>
  </g>
  
  <!-- 小型上漲箭頭裝飾 -->
  <g transform="translate(850, 280)">
    <polygon points="0,30 -12,15 -5,15 -5,0 5,0 5,15 12,15" fill="#22c55e" opacity="0.7"/>
  </g>
  
  <!-- 下跌箭頭（小型） -->
  <g transform="translate(920, 380)">
    <polygon points="0,-20 -10,0 -5,0 -5,20 5,20 5,0 10,0" fill="#ef4444" opacity="0.5"/>
  </g>
  
  <!-- 標題文字 -->
  <text x="85" y="300" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" filter="url(#shadow)">股票入門</text>
  
  <!-- 副標題 -->
  <text x="85" y="370" font-family="Arial, sans-serif" font-size="32" fill="#ffd700">從零開始學投資</text>
  
  <!-- 描述文字 -->
  <text x="85" y="420" font-family="Arial, sans-serif" font-size="18" fill="#a0aec0">建立正確觀念 · 掌握基本術語 · 開啟投資之路</text>
  
  <!-- 底部網站名稱區域 -->
  <rect x="0" y="570" width="1200" height="60" fill="#0d1f3c"/>
  <text x="60" y="608" font-family="Arial, sans-serif" font-size="20" fill="#718096">財經知識站</text>
  <text x="1140" y="608" font-family="Arial, sans-serif" font-size="16" fill="#4a5568" text-anchor="end">2026.03.26</text>
  
  <!-- 右下角裝飾元素 - K線圖示意 -->
  <g transform="translate(1130, 450)">
    <!-- K線 -->
    <line x1="0" y1="-30" x2="0" y2="50" stroke="#22c55e" stroke-width="2"/>
    <rect x="-12" y="-10" width="24" height="40" fill="#22c55e" rx="2"/>
  </g>
  
  <!-- 金色裝飾線條 -->
  <line x1="85" y1="440" x2="350" y2="440" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  
  <!-- 小型圖表裝飾 -->
  <g transform="translate(380, 430)">
    <rect x="0" y="0" width="8" height="25" fill="#22c55e" rx="1"/>
    <rect x="12" y="5" width="8" height="20" fill="#22c55e" rx="1"/>
    <rect x="24" y="-5" width="8" height="30" fill="#22c55e" rx="1"/>
    <rect x="36" y="2" width="8" height="23" fill="#ef4444" rx="1"/>
    <rect x="48" y="8" width="8" height="17" fill="#22c55e" rx="1"/>
  </g>
</svg>