<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628" />
      <stop offset="100%" style="stop-color:#1B2A4A" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C" />
      <stop offset="100%" style="stop-color:#E8D48B" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7" />
      <stop offset="100%" style="stop-color:#29B6F6" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#4FC3F7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#4FC3F7" stroke-width="0.5">
    <line x1="0" y1="85" x2="512" y2="85"/>
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="255" x2="512" y2="255"/>
    <line x1="0" y1="340" x2="512" y2="340"/>
    <line x1="0" y1="425" x2="512" y2="425"/>
    <line x1="85" y1="0" x2="85" y2="512"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="255" y1="0" x2="255" y2="512"/>
    <line x1="340" y1="0" x2="340" y2="512"/>
    <line x1="425" y1="0" x2="425" y2="512"/>
  </g>

  <!-- Central brain/neural network icon -->
  <g transform="translate(256, 200)" filter="url(#shadow)">

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.3" />
    <circle cx="0" cy="0" r="80" fill="none" stroke="#4FC3F7" stroke-width="1" opacity="0.15" stroke-dasharray="4,6" />

    <!-- Brain shape - simplified -->
    <ellipse cx="0" cy="0" rx="60" ry="50" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.9"/>

    <!-- Neural connections - left hemisphere -->
    <circle cx="-30" cy="-15" r="7" fill="#4FC3F7" opacity="0.8"/>
    <circle cx="-20" cy="15" r="5" fill="#4FC3F7" opacity="0.6"/>
    <circle cx="-40" cy="5" r="6" fill="#4FC3F7" opacity="0.7"/>

    <!-- Neural connections - right hemisphere -->
    <circle cx="30" cy="-15" r="7" fill="#4FC3F7" opacity="0.8"/>
    <circle cx="20" cy="15" r="5" fill="#4FC3F7" opacity="0.6"/>
    <circle cx="40" cy="5" r="6" fill="#4FC3F7" opacity="0.7"/>

    <!-- Central node -->
    <circle cx="0" cy="0" r="10" fill="url(#glow)" opacity="0.9"/>

    <!-- Neuron connection lines -->
    <line x1="-30" y1="-15" x2="0" y2="0" stroke="#4FC3F7" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="15" x2="0" y2="0" stroke="#4FC3F7" stroke-width="1" opacity="0.4"/>
    <line x1="-40" y1="5" x2="0" y2="0" stroke="#4FC3F7" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="-15" x2="0" y2="0" stroke="#4FC3F7" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="15" x2="0" y2="0" stroke="#4FC3F7" stroke-width="1" opacity="0.4"/>
    <line x1="40" y1="5" x2="0" y2="0" stroke="#4FC3F7" stroke-width="1" opacity="0.5"/>

    <!-- Cross connections -->
    <line x1="-30" y1="-15" x2="20" y2="15" stroke="#4FC3F7" stroke-width="0.8" opacity="0.3"/>
    <line x1="30" y1="-15" x2="-20" y2="15" stroke="#4FC3F7" stroke-width="0.8" opacity="0.3"/>

    <!-- Sparkle dots -->
    <circle cx="-50" cy="-25" r="2" fill="#C9A84C" opacity="0.7"/>
    <circle cx="50" cy="-20" r="2" fill="#C9A84C" opacity="0.7"/>
    <circle cx="0" cy="-40" r="2.5" fill="#C9A84C" opacity="0.8"/>
    <circle cx="-15" cy="30" r="1.5" fill="#C9A84C" opacity="0.5"/>
    <circle cx="15" cy="28" r="1.5" fill="#C9A84C" opacity="0.5"/>
  </g>

  <!-- AI tools icons around the brain -->

  <!-- Chat bubble icon (top-left) -->
  <g transform="translate(110, 120)" opacity="0.7">
    <rect x="0" y="0" width="28" height="22" rx="6" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <polygon points="8,22 12,28 16,22" fill="#0a1628" stroke="#4FC3F7" stroke-width="1"/>
    <line x1="6" y1="8" x2="22" y2="8" stroke="#4FC3F7" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="13" x2="18" y2="13" stroke="#4FC3F7" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Code icon (top-right) -->
  <g transform="translate(370, 115)" opacity="0.7">
    <rect x="0" y="0" width="24" height="32" rx="4" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <text x="6" y="16" fill="#4FC3F7" font-size="10" font-family="monospace" opacity="0.7">&lt;/&gt;</text>
    <line x1="8" y1="22" x2="16" y2="22" stroke="#4FC3F7" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Robot icon (bottom-left) -->
  <g transform="translate(120, 310)" opacity="0.7">
    <rect x="2" y="8" width="24" height="16" rx="4" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <circle cx="9" cy="16" r="2" fill="#4FC3F7" opacity="0.5"/>
    <circle cx="19" cy="16" r="2" fill="#4FC3F7" opacity="0.5"/>
    <rect x="6" y="24" width="4" height="6" rx="1" fill="none" stroke="#4FC3F7" stroke-width="1"/>
    <rect x="18" y="24" width="4" height="6" rx="1" fill="none" stroke="#4FC3F7" stroke-width="1"/>
    <line x1="10" y1="4" x2="10" y2="8" stroke="#4FC3F7" stroke-width="1.5"/>
    <line x1="18" y1="4" x2="18" y2="8" stroke="#4FC3F7" stroke-width="1.5"/>
  </g>

  <!-- Chart/Analysis icon (bottom-right) -->
  <g transform="translate(365, 305)" opacity="0.7">
    <rect x="0" y="0" width="28" height="28" rx="4" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <rect x="4" y="16" width="5" height="10" rx="1" fill="#4FC3F7" opacity="0.4"/>
    <rect x="11" y="10" width="5" height="16" rx="1" fill="#4FC3F7" opacity="0.5"/>
    <rect x="18" y="6" width="5" height="20" rx="1" fill="#4FC3F7" opacity="0.6"/>
  </g>

  <!-- Title text -->
  <text x="256" y="410" text-anchor="middle" fill="url(#glow)" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" letter-spacing="1">
    AI 工具應用指南
  </text>
  <text x="256" y="440" text-anchor="middle" fill="#8899AA" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="2" opacity="0.8">
    提升工作效率的實用技巧
  </text>

  <!-- Bottom accent line -->
  <rect x="180" y="455" width="152" height="2" rx="1" fill="url(#glow)" opacity="0.6"/>

  <!-- Floating particles -->
  <circle cx="80" cy="250" r="1.5" fill="#C9A84C" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="430" cy="200" r="1.5" fill="#4FC3F7" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="80" r="1" fill="#C9A84C" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="470" r="1" fill="#4FC3F7" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
