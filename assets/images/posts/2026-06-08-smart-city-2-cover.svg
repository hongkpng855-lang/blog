<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow1)"/>
  <rect width="512" height="512" fill="url(#glow2)"/>

  <!-- Grid pattern background -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="0.5" fill="none">
    <line x1="0" y1="50" x2="512" y2="50"/>
    <line x1="0" y1="100" x2="512" y2="100"/>
    <line x1="0" y1="150" x2="512" y2="150"/>
    <line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="250" x2="512" y2="250"/>
    <line x1="0" y1="300" x2="512" y2="300"/>
    <line x1="0" y1="350" x2="512" y2="350"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="0" y1="450" x2="512" y2="450"/>
    <line x1="50" y1="0" x2="50" y2="512"/>
    <line x1="100" y1="0" x2="100" y2="512"/>
    <line x1="150" y1="0" x2="150" y2="512"/>
    <line x1="200" y1="0" x2="200" y2="512"/>
    <line x1="250" y1="0" x2="250" y2="512"/>
    <line x1="300" y1="0" x2="300" y2="512"/>
    <line x1="350" y1="0" x2="350" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
    <line x1="450" y1="0" x2="450" y2="512"/>
  </g>

  <!-- City skyline silhouette -->
  <g fill="#1a3355" opacity="0.5">
    <rect x="30" y="280" width="30" height="100"/>
    <rect x="70" y="250" width="25" height="130"/>
    <rect x="105" y="290" width="35" height="90"/>
    <rect x="150" y="230" width="28" height="150"/>
    <rect x="188" y="270" width="22" height="110"/>
    <rect x="220" y="210" width="30" height="170"/>
    <rect x="260" y="260" width="25" height="120"/>
    <rect x="295" y="240" width="35" height="140"/>
    <rect x="340" y="280" width="28" height="100"/>
    <rect x="378" y="220" width="22" height="160"/>
    <rect x="410" y="260" width="30" height="120"/>
    <rect x="450" y="290" width="35" height="90"/>
  </g>

  <!-- Building highlights -->
  <g fill="#00d4ff" opacity="0.4">
    <rect x="152" y="235" width="4" height="4" rx="1"/>
    <rect x="160" y="245" width="4" height="4" rx="1"/>
    <rect x="168" y="240" width="4" height="4" rx="1"/>
    <rect x="222" y="215" width="4" height="4" rx="1"/>
    <rect x="230" y="225" width="4" height="4" rx="1"/>
    <rect x="222" y="235" width="4" height="4" rx="1"/>
    <rect x="380" y="225" width="4" height="4" rx="1"/>
    <rect x="388" y="235" width="4" height="4" rx="1"/>
    <rect x="380" y="245" width="4" height="4" rx="1"/>
    <rect x="388" y="255" width="4" height="4" rx="1"/>
  </g>

  <!-- Connection lines between buildings (IoT network) -->
  <g stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.3">
    <line x1="85" y1="260" x2="160" y2="240"/>
    <line x1="160" y1="240" x2="235" y2="220"/>
    <line x1="235" y1="220" x2="310" y2="250"/>
    <line x1="310" y1="250" x2="400" y2="230"/>
    <line x1="60" y1="380" x2="130" y2="380"/>
    <line x1="130" y1="380" x2="200" y2="380"/>
    <line x1="200" y1="380" x2="300" y2="380"/>
    <line x1="300" y1="380" x2="470" y2="380"/>
  </g>

  <!-- Network nodes -->
  <g fill="#00d4ff" filter="url(#neon)">
    <circle cx="85" cy="260" r="3"/>
    <circle cx="160" cy="240" r="3"/>
    <circle cx="235" cy="220" r="3"/>
    <circle cx="310" cy="250" r="3"/>
    <circle cx="400" cy="230" r="3"/>
    <circle cx="60" cy="380" r="2.5"/>
    <circle cx="130" cy="380" r="2.5"/>
    <circle cx="200" cy="380" r="2.5"/>
    <circle cx="300" cy="380" r="2.5"/>
    <circle cx="470" cy="380" r="2.5"/>
  </g>

  <!-- Central smart city icon - stylized building with WiFi/network symbol -->
  <g transform="translate(256,170)">
    <!-- Central hexagon -->
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#neon)"/>
    <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="#00d4ff" opacity="0.08"/>

    <!-- Inner data nodes -->
    <circle cx="0" cy="0" r="4" fill="#C9A84C" filter="url(#neon)"/>
    <circle cx="-12" cy="-10" r="2.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="12" cy="-8" r="2.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="-8" cy="12" r="2.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="10" cy="10" r="2.5" fill="#00d4ff" opacity="0.7"/>

    <!-- Connection lines inside hexagon -->
    <line x1="0" y1="0" x2="-12" y2="-10" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="0" x2="12" y2="-8" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="0" x2="-8" y2="12" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="0" x2="10" y2="10" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>

    <!-- WiFi arcs -->
    <g stroke="#00d4ff" fill="none" opacity="0.5" stroke-width="1.2">
      <path d="M-18,-25 Q0,-35 18,-25"/>
      <path d="M-25,-20 Q0,-32 25,-20"/>
    </g>
  </g>

  <!-- Data stream particles -->
  <g fill="#00d4ff" opacity="0.5">
    <circle cx="100" cy="140" r="1.5"/>
    <circle cx="400" cy="120" r="1.5"/>
    <circle cx="350" cy="160" r="1"/>
    <circle cx="150" cy="180" r="1"/>
    <circle cx="420" cy="180" r="1.2"/>
    <circle cx="80" cy="200" r="1"/>
  </g>

  <!-- AI brain symbol -->
  <g transform="translate(370,110)" opacity="0.6">
    <path d="M-15,-10 Q0,-20 15,-10 Q20,0 15,10 Q0,20 -15,10 Q-20,0 -15,-10Z" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <circle cx="0" cy="0" r="2" fill="#C9A84C"/>
  </g>

  <!-- 5G signal -->
  <g transform="translate(100,110)" opacity="0.6">
    <text x="0" y="0" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">5G</text>
    <g transform="translate(5,-12)" stroke="#00d4ff" fill="none" stroke-width="1">
      <path d="M-8,0 Q0,-6 8,0"/>
    </g>
  </g>

  <!-- Title area -->
  <g transform="translate(256,420)">
    <text text-anchor="middle" font-family="'Noto Sans TC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="2">
      香港智慧城市 2.0
    </text>
    <text text-anchor="middle" font-family="'Noto Sans TC','Microsoft YaHei',sans-serif" font-size="13" fill="#8899bb" letter-spacing="1" y="24">
      智慧交通 · 數字政府 · AI城市管理
    </text>
    <text text-anchor="middle" font-family="'Noto Sans TC','Microsoft YaHei',sans-serif" font-size="10" fill="#C9A84C" letter-spacing="1" y="44">
      2026 完整指南
    </text>
  </g>

  <!-- Decorative corner elements -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M15,15 L45,15 M15,15 L15,45"/>
    <path d="M497,15 L467,15 M497,15 L497,45"/>
    <path d="M15,497 L45,497 M15,497 L15,467"/>
    <path d="M497,497 L467,497 M497,497 L497,467"/>
  </g>
</svg>
