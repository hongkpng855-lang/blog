<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d3d"/>
      <stop offset="100%" style="stop-color:#1a6a5a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ddfa0"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
    <linearGradient id="lung" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd166"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="70" r="70" fill="rgba(255,255,255,0.03)"/>
  <circle cx="720" cy="390" r="90" fill="rgba(255,255,255,0.03)"/>
  <circle cx="680" cy="80" r="50" fill="rgba(255,255,255,0.05)"/>

  <!-- Breath wave lines -->
  <g opacity="0.08">
    <path d="M0 250 Q100 200 200 250 Q300 300 400 250 Q500 200 600 250 Q700 300 800 250" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M0 280 Q100 230 200 280 Q300 330 400 280 Q500 230 600 280 Q700 330 800 280" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M0 310 Q100 260 200 310 Q300 360 400 310 Q500 260 600 310 Q700 360 800 310" fill="none" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Lungs icon (stylized) -->
  <g transform="translate(240, 60)" filter="url(#glow)">
    <!-- Left lung -->
    <path d="M60 40 Q30 20 20 60 Q10 100 30 140 Q50 170 80 180 Q60 140 60 110 Q60 70 60 40Z" fill="url(#lung)" opacity="0.8"/>
    <path d="M60 40 Q90 20 100 60 Q110 100 90 140 Q70 170 40 180 Q60 140 60 110 Q60 70 60 40Z" fill="url(#lung)" opacity="0.5"/>

    <!-- Right lung -->
    <path d="M150 40 Q120 20 110 60 Q100 100 120 140 Q140 170 170 180 Q150 140 150 110 Q150 70 150 40Z" fill="url(#lung)" opacity="0.8"/>
    <path d="M150 40 Q180 20 190 60 Q200 100 180 140 Q160 170 130 180 Q150 140 150 110 Q150 70 150 40Z" fill="url(#lung)" opacity="0.5"/>

    <!-- Trachea -->
    <path d="M105 40 L105 10 Q105 0 115 0 L145 0 Q155 0 155 10 L155 40" fill="none" stroke="#ffd166" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

    <!-- Breath circles in lungs -->
    <circle cx="60" cy="100" r="12" fill="rgba(255,255,255,0.2)"/>
    <circle cx="80" cy="130" r="8" fill="rgba(255,255,255,0.15)"/>
    <circle cx="40" cy="80" r="6" fill="rgba(255,255,255,0.15)"/>
    <circle cx="150" cy="100" r="12" fill="rgba(255,255,255,0.2)"/>
    <circle cx="130" cy="130" r="8" fill="rgba(255,255,255,0.15)"/>
    <circle cx="170" cy="80" r="6" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Breath flow arrows -->
  <g stroke="#7ddfa0" stroke-width="2" fill="none" opacity="0.5" filter="url(#softGlow)">
    <!-- Inhale arrows (downward, left side) -->
    <path d="M190 50 L210 50 M200 40 L200 60" />
    <path d="M190 70 L210 70 M200 60 L200 80" />

    <!-- Exhale arrows (upward, right side) -->
    <path d="M220 50 L240 50 M230 40 L230 60" />
    <path d="M220 70 L240 70 M230 60 L230 80" />
  </g>

  <!-- Nose/mouth icon -->
  <g transform="translate(370, 60)" opacity="0.6">
    <!-- Nose -->
    <path d="M18 0 Q10 8 10 15 Q10 22 18 25 Q26 22 26 15 Q26 8 18 0Z" fill="none" stroke="#7ddfa0" stroke-width="2" opacity="0.5"/>
    <!-- Airflow from nose -->
    <path d="M5 15 L0 10 M5 18 L0 15" stroke="#7ddfa0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M31 15 L36 10 M31 18 L36 15" stroke="#7ddfa0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Breath cycle circles -->
  <g transform="translate(560, 120)" fill="none">
    <circle cx="0" cy="0" r="45" stroke="rgba(125,223,160,0.2)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="30" stroke="rgba(125,223,160,0.3)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="15" stroke="rgba(125,223,160,0.4)" stroke-width="1.5"/>
    <!-- Text labels around cycle -->
    <text x="0" y="-55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7ddfa0" opacity="0.6">吸氣</text>
    <text x="55" y="5" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#7ddfa0" opacity="0.6">止息</text>
    <text x="0" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7ddfa0" opacity="0.6">呼氣</text>
    <!-- Small dot rotating -->
    <circle cx="0" cy="-45" r="4" fill="#7ddfa0" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="1">
    呼吸科學與身心調節指南
  </text>
  <text x="400" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a0e8c0" letter-spacing="0.5">
    釋放焦慮 · 改善睡眠 · 提升表現
  </text>

  <!-- Bottom decorative line -->
  <line x1="200" y1="410" x2="600" y2="410" stroke="#7ddfa0" stroke-width="1.5" opacity="0.4"/>

  <!-- Small breath dots floating -->
  <g fill="#a0e8c0" opacity="0.3">
    <circle cx="100" cy="380" r="3"/>
    <circle cx="150" cy="400" r="2"/>
    <circle cx="650" cy="380" r="3"/>
    <circle cx="700" cy="400" r="2"/>
    <circle cx="300" cy="410" r="2.5"/>
    <circle cx="500" cy="415" r="2"/>
  </g>
</svg>