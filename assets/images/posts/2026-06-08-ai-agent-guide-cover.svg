<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#141b3d"/>
      <stop offset="100%" stop-color="#0d1333"/>
    </linearGradient>
    <linearGradient id="neonBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyberGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="450" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="450" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="450" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="450" stroke="#3b82f6" stroke-width="0.5"/>
  </g>

  <!-- Central AI Agent Brain / Neural Network -->
  <g transform="translate(400, 200)">

    <!-- Outer ring glow -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.12"/>

    <!-- Neural connections -->
    <g opacity="0.25" stroke="#06b6d4" stroke-width="0.8">
      <!-- Connection lines from center to nodes -->
      <line x1="0" y1="0" x2="65" y2="-45"/>
      <line x1="0" y1="0" x2="65" y2="40"/>
      <line x1="0" y1="0" x2="40" y2="65"/>
      <line x1="0" y1="0" x2="-40" y2="65"/>
      <line x1="0" y1="0" x2="-65" y2="40"/>
      <line x1="0" y1="0" x2="-65" y2="-45"/>
      <line x1="0" y1="0" x2="-30" y2="-70"/>
      <line x1="0" y1="0" x2="30" y2="-70"/>

      <!-- Cross connections -->
      <line x1="65" y1="-45" x2="65" y2="40"/>
      <line x1="65" y1="40" x2="40" y2="65"/>
      <line x1="40" y1="65" x2="-40" y2="65"/>
      <line x1="-40" y1="65" x2="-65" y2="40"/>
      <line x1="-65" y1="40" x2="-65" y2="-45"/>
      <line x1="-65" y1="-45" x2="-30" y2="-70"/>
      <line x1="-30" y1="-70" x2="30" y2="-70"/>
      <line x1="30" y1="-70" x2="65" y2="-45"/>
    </g>

    <!-- Node points -->
    <g>
      <circle cx="65" cy="-45" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
      <circle cx="65" cy="40" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
      <circle cx="40" cy="65" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
      <circle cx="-40" cy="65" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
      <circle cx="-65" cy="40" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
      <circle cx="-65" cy="-45" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
      <circle cx="-30" cy="-70" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
      <circle cx="30" cy="-70" r="4" fill="#06b6d4" filter="url(#glow)" opacity="0.8"/>
    </g>

    <!-- Central AI brain hexagon -->
    <g transform="translate(0, 0)">
      <!-- Hexagon background -->
      <polygon points="35,0 17.5,30.3 -17.5,30.3 -35,0 -17.5,-30.3 17.5,-30.3"
               fill="none" stroke="url(#neonBlue)" stroke-width="2" filter="url(#glow)"/>

      <!-- Inner hex -->
      <polygon points="25,0 12.5,21.7 -12.5,21.7 -25,0 -12.5,-21.7 12.5,-21.7"
               fill="#3b82f6" opacity="0.15" stroke="url(#neonPurple)" stroke-width="1"/>

      <!-- Center "AI" text -->
      <text x="0" y="8" fill="url(#neonBlue)" font-size="18" font-family="sans-serif" font-weight="bold" text-anchor="middle" filter="url(#softGlow)">AI</text>
    </g>

    <!-- Pulsing data dots -->
    <g opacity="0.4">
      <circle cx="80" cy="-20" r="2" fill="#8b5cf6"/>
      <circle cx="-75" cy="10" r="2" fill="#8b5cf6"/>
      <circle cx="20" cy="80" r="2" fill="#8b5cf6"/>
      <circle cx="-30" cy="-80" r="2" fill="#8b5cf6"/>
    </g>
  </g>

  <!-- Decorative Agent icons around -->

  <!-- Chat/Message Agent (top left) -->
  <g transform="translate(100, 110)" opacity="0.15">
    <rect x="0" y="0" width="45" height="35" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M0 25 L10 25 L15 33 L20 25 L45 25" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="15" cy="14" r="2" fill="#3b82f6"/>
    <circle cx="23" cy="14" r="2" fill="#3b82f6"/>
    <circle cx="31" cy="14" r="2" fill="#3b82f6"/>
  </g>

  <!-- Data/Chart Agent (bottom right) -->
  <g transform="translate(620, 300)" opacity="0.15">
    <rect x="0" y="20" width="50" height="35" rx="4" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="10" y1="42" x2="10" y2="30" stroke="#06b6d4" stroke-width="2"/>
    <line x1="20" y1="42" x2="20" y2="25" stroke="#06b6d4" stroke-width="2"/>
    <line x1="30" y1="42" x2="30" y2="32" stroke="#06b6d4" stroke-width="2"/>
    <line x1="40" y1="42" x2="40" y2="22" stroke="#06b6d4" stroke-width="2"/>
  </g>

  <!-- Code/Dev Agent (top right) -->
  <g transform="translate(640, 100)" opacity="0.12">
    <text x="0" y="15" fill="#06b6d4" font-size="14" font-family="monospace" font-weight="bold">&lt;/&gt;</text>
    <text x="5" y="38" fill="#3b82f6" font-size="10" font-family="monospace">def agent():</text>
  </g>

  <!-- Gear/Process Agent (bottom left) -->
  <g transform="translate(90, 300)" opacity="0.12">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="8" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="5" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="20" y1="35" x2="20" y2="40" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="5" y2="20" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="35" y1="20" x2="40" y2="20" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>

  <!-- Data flow lines (connecting nodes to brain) -->
  <g stroke="#06b6d4" stroke-width="0.5" opacity="0.08">
    <path d="M145 128 Q250 150 310 190" fill="none"/>
    <path d="M665 118 Q550 130 490 170" fill="none"/>
    <path d="M130 320 Q200 290 320 250" fill="none"/>
    <path d="M670 320 Q580 290 470 250" fill="none"/>
  </g>

  <!-- Divider -->
  <line x1="60" y1="88" x2="740" y2="88" stroke="url(#neonBlue)" stroke-width="1" opacity="0.2"/>

  <!-- Title -->
  <text x="60" y="52" fill="#ffffff" font-size="27" font-family="sans-serif" font-weight="bold">
    AI Agent 代理革命
  </text>

  <!-- Subtitle -->
  <text x="60" y="76" fill="#06b6d4" font-size="13" font-family="sans-serif" opacity="0.9">
    由日常工作到商業轉型嘅自主人工智能完整指南
  </text>

  <!-- Bottom badges -->
  <g transform="translate(60, 405)">
    <rect x="0" y="0" width="100" height="24" rx="12" fill="#3b82f6" opacity="0.15"/>
    <text x="50" y="16" fill="#3b82f6" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">🤖 Agentic AI</text>

    <rect x="110" y="0" width="100" height="24" rx="12" fill="#06b6d4" opacity="0.12"/>
    <text x="160" y="16" fill="#06b6d4" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">⚡ 自主工作流</text>

    <rect x="220" y="0" width="90" height="24" rx="12" fill="#8b5cf6" opacity="0.12"/>
    <text x="265" y="16" fill="#8b5cf6" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">🧠 多代理協作</text>

    <rect x="320" y="0" width="90" height="24" rx="12" fill="#22c55e" opacity="0.12"/>
    <text x="365" y="16" fill="#22c55e" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">📊 企業落地</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="448" width="800" height="2" fill="url(#neonBlue)" opacity="0.3"/>
</svg>
