<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#121b3d"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative globe/cycle lines -->
  <g opacity="0.04">
    <circle cx="400" cy="225" r="280" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <circle cx="400" cy="225" r="200" fill="none" stroke="#C9A84C" stroke-width="0.3"/>
    <circle cx="400" cy="225" r="120" fill="none" stroke="#C9A84C" stroke-width="0.2"/>
  </g>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="50" x2="800" y2="50" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="450" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- ===== Chart Area ===== -->
  <!-- Combined chart: two trend lines -->

  <!-- Axis -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="340" x2="80" y2="90" stroke="white" stroke-width="1" opacity="0.15"/>

  <!-- Trend Line 1: Strong Market (Green - AI/Market) -->
  <polyline points="80,300 160,290 240,250 320,210 400,150 480,115 560,95 640,75" 
            fill="none" stroke="url(#cyan)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.9"/>
  <!-- Area 1 -->
  <path d="M80,300 L80,300 L160,290 L240,250 L320,210 L400,150 L480,115 L560,95 L640,75 L640,340 L80,340 Z" 
        fill="url(#cyan)" opacity="0.06"/>

  <!-- Trend Line 2: Moderate Growth (Gold - Value/REITs) -->
  <polyline points="80,320 160,310 240,300 320,280 400,260 480,230 560,200 640,180" 
            fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,3" opacity="0.8"/>

  <!-- Data points - Line 1 -->
  <circle cx="160" cy="290" r="3" fill="#06b6d4"/>
  <circle cx="320" cy="210" r="4" fill="#06b6d4"/>
  <circle cx="480" cy="115" r="5" fill="#06b6d4"/>
  <circle cx="640" cy="75" r="6" fill="#06b6d4" filter="url(#glow)"/>

  <!-- Data points - Line 2 -->
  <circle cx="160" cy="310" r="3" fill="#C9A84C"/>
  <circle cx="320" cy="280" r="3" fill="#C9A84C"/>
  <circle cx="480" cy="230" r="4" fill="#C9A84C"/>
  <circle cx="640" cy="180" r="5" fill="#C9A84C" filter="url(#glow)"/>

  <!-- X-axis labels -->
  <text x="80" y="362" fill="white" opacity="0.25" font-size="9" font-family="sans-serif" text-anchor="middle">H1</text>
  <text x="200" y="362" fill="white" opacity="0.25" font-size="9" font-family="sans-serif" text-anchor="middle">Q1</text>
  <text x="330" y="362" fill="white" opacity="0.25" font-size="9" font-family="sans-serif" text-anchor="middle">Q2</text>
  <text x="460" y="362" fill="white" opacity="0.25" font-size="9" font-family="sans-serif" text-anchor="middle">H2</text>
  <text x="580" y="362" fill="white" opacity="0.25" font-size="9" font-family="sans-serif" text-anchor="middle">Q3</text>
  <text x="700" y="362" fill="url(#gold)" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Q4 2026</text>

  <!-- Legend -->
  <g transform="translate(500, 388)">
    <line x1="0" y1="5" x2="20" y2="5" stroke="#06b6d4" stroke-width="2.5"/>
    <text x="26" y="9" fill="#06b6d4" font-size="10" font-family="sans-serif" opacity="0.7">AI / 科技</text>
    <line x1="130" y1="5" x2="150" y2="5" stroke="#C9A84C" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="156" y="9" fill="#C9A84C" font-size="10" font-family="sans-serif" opacity="0.7">價值 / 收息</text>
  </g>

  <!-- ===== Left side: Sector icons ===== -->
  <!-- AI chip icon -->
  <g transform="translate(150, 120)" opacity="0.15">
    <rect x="-20" y="-15" width="40" height="30" rx="4" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#06b6d4" opacity="0.3"/>
    <line x1="-20" y1="-5" x2="-28" y2="-5" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="-20" y1="5" x2="-28" y2="5" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="20" y1="-5" x2="28" y2="-5" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="20" y1="5" x2="28" y2="5" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="-5" y1="-15" x2="-5" y2="-23" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="5" y1="-15" x2="5" y2="-23" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="-5" y1="15" x2="-5" y2="23" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="5" y1="15" x2="5" y2="23" stroke="#06b6d4" stroke-width="0.8"/>
  </g>

  <!-- Building icon (REITs/Property) -->
  <g transform="translate(300, 100)" opacity="0.12">
    <rect x="-12" y="5" width="24" height="30" rx="1" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
    <rect x="-8" y="15" width="6" height="8" rx="0.5" fill="#C9A84C" opacity="0.4"/>
    <rect x="2" y="15" width="6" height="8" rx="0.5" fill="#C9A84C" opacity="0.4"/>
    <rect x="-8" y="5" width="16" height="6" rx="0.5" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <polygon points="-15,5 0,-8 15,5" fill="none" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Dollar / Coin icon -->
  <g transform="translate(550, 160)" opacity="0.12">
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="0" y="6" fill="#C9A84C" font-size="16" font-family="sans-serif" text-anchor="middle" font-weight="bold">$</text>
  </g>

  <!-- Arrow up indicator -->
  <g transform="translate(660, 130)" opacity="0.2">
    <polygon points="0,15 -8,0 8,0" fill="#22c55e"/>
    <rect x="-2" y="-5" width="4" height="20" rx="1" fill="#22c55e"/>
  </g>

  <!-- ===== Title Section ===== -->
  <!-- Divider -->
  <line x1="60" y1="82" x2="740" y2="82" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- Main Title -->
  <text x="60" y="50" fill="#ffffff" font-size="26" font-family="sans-serif" font-weight="bold">
    2026 下半年投資展望
  </text>

  <!-- Subtitle -->
  <text x="60" y="72" fill="#C9A84C" font-size="13" font-family="sans-serif" opacity="0.9">
    息口見頂 · AI 浪潮 · 市場重估 — 香港散戶必讀策略
  </text>

  <!-- ===== Bottom Badges ===== -->
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="100" height="24" rx="12" fill="#06b6d4" opacity="0.12"/>
    <text x="50" y="16" fill="#06b6d4" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">📊 宏觀分析</text>

    <rect x="110" y="0" width="90" height="24" rx="12" fill="#C9A84C" opacity="0.12"/>
    <text x="155" y="16" fill="#C9A84C" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">🎯 配置建議</text>

    <rect x="210" y="0" width="85" height="24" rx="12" fill="#22c55e" opacity="0.1"/>
    <text x="252" y="16" fill="#22c55e" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">💼 組合策略</text>

    <rect x="305" y="0" width="110" height="24" rx="12" fill="#f59e0b" opacity="0.1"/>
    <text x="360" y="16" fill="#f59e0b" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">⚠️ 風險提示</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="448" width="800" height="2" fill="url(#gold)" opacity="0.35"/>
</svg>
