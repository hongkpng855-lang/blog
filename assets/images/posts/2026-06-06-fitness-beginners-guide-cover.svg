<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d2137;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B2A4A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#152d4e;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" rx="0"/>

  <!-- Decorative glow -->
  <ellipse cx="400" cy="200" rx="350" ry="180" fill="url(#glow)"/>

  <!-- Abstract fitness figures -->
  <!-- Running figure -->
  <g transform="translate(150, 120)" opacity="0.12">
    <circle cx="0" cy="-40" r="12" fill="#22c55e"/>
    <line x1="0" y1="-28" x2="5" y2="10" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="5" y1="10" x2="15" y2="50" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="5" y1="10" x2="-15" y2="40" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="5" y1="-10" x2="30" y2="15" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="-10" x2="-25" y2="5" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Weight lifting figure -->
  <g transform="translate(600, 130)" opacity="0.10">
    <circle cx="0" cy="-40" r="12" fill="#22c55e"/>
    <line x1="0" y1="-28" x2="5" y2="10" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="5" y1="10" x2="0" y2="45" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="-35" y2="-50" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="35" y2="-50" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <rect x="-40" y="-60" width="10" height="15" rx="2" fill="#22c55e" opacity="0.5"/>
    <rect x="30" y="-60" width="10" height="15" rx="2" fill="#22c55e" opacity="0.5"/>
  </g>

  <!-- Yoga/Stretch figure center -->
  <g transform="translate(400, 110)" opacity="0.08">
    <circle cx="0" cy="-40" r="14" fill="#22c55e"/>
    <line x1="0" y1="-26" x2="0" y2="15" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="-20" y2="50" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="20" y2="50" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="-40" y2="-25" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="40" y2="-25" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Dots pattern -->
  <g opacity="0.06">
    <circle cx="50" cy="50" r="3" fill="#22c55e"/>
    <circle cx="150" cy="80" r="2" fill="#22c55e"/>
    <circle cx="680" cy="60" r="3" fill="#22c55e"/>
    <circle cx="730" cy="150" r="2" fill="#22c55e"/>
    <circle cx="80" cy="350" r="2" fill="#22c55e"/>
    <circle cx="700" cy="380" r="3" fill="#22c55e"/>
    <circle cx="250" cy="380" r="2" fill="#22c55e"/>
    <circle cx="550" cy="400" r="2" fill="#22c55e"/>
  </g>

  <!-- Title area background card -->
  <rect x="60" y="140" width="680" height="220" rx="16" fill="url(#card)" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Category badge -->
  <rect x="80" y="160" width="100" height="30" rx="15" fill="#22c55e" opacity="0.2"/>
  <text x="130" y="180" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">🏃 健康</text>

  <!-- Main title -->
  <text x="400" y="225" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    運動健身入門指南
  </text>

  <!-- Subtitle -->
  <text x="400" y="265" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif" font-size="18" font-weight="500" fill="#94a3b8" text-anchor="middle">
    2026 科學化訓練・從零開始的全方位策略
  </text>

  <!-- Decorative line -->
  <line x1="320" y1="285" x2="480" y2="285" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Description -->
  <text x="400" y="315" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
    由一個辦公室坐足十年嘅打工仔親自經歷
  </text>
  <text x="400" y="335" font-family="system-ui, -apple-system, 'Noto Sans TC', sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
    到而家每週運動五天嘅真實轉變
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="430" width="800" height="20" fill="#22c55e" opacity="0.15"/>
</svg>
