<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="tech-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c9ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="device-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="neon-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c9ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00c9ff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="850" cy="180" r="420" fill="url(#tech-glow)"/>
  <circle cx="350" cy="450" r="300" fill="url(#device-glow)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#00c9ff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Decorative circuit lines -->
  <g opacity="0.12" stroke="#C9A84C" stroke-width="0.8" fill="none">
    <path d="M0 200 L80 200 L120 160 L200 160 L240 200 L350 200"/>
    <path d="M0 400 L100 400 L140 360 L280 360 L320 400 L400 400"/>
    <path d="M900 300 L960 300 L1000 260 L1100 260 L1140 300 L1200 300"/>
  </g>
  <g opacity="0.12" stroke="#00c9ff" stroke-width="0.8" fill="none">
    <path d="M850 200 L910 200 L950 240 L1050 240 L1090 200 L1200 200"/>
    <path d="M750 450 L810 450 L850 490 L950 490 L990 450 L1200 450"/>
  </g>

  <!-- Central icon: Phone + Chip + AI icon -->
  <g transform="translate(600, 260)" filter="url(#shadow)">
    <!-- Phone outline -->
    <rect x="-30" y="-60" width="60" height="120" rx="10" stroke="#00c9ff" stroke-width="2.5" fill="none" filter="url(#soft-glow)"/>
    <!-- Phone screen -->
    <rect x="-25" y="-52" width="50" height="95" rx="5" fill="url(#card-bg)"/>
    <!-- AI chip icon inside phone -->
    <rect x="-14" y="-20" width="28" height="28" rx="4" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="-6" r="4" fill="#C9A84C" opacity="0.8"/>
    <line x1="-18" y1="-6" x2="-14" y2="-6" stroke="#C9A84C" stroke-width="1"/>
    <line x1="14" y1="-6" x2="18" y2="-6" stroke="#C9A84C" stroke-width="1"/>
    <line x1="0" y1="-20" x2="0" y2="-24" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Edge computing nodes around the phone -->
  <g filter="url(#neon-glow)">
    <!-- Node 1: Top left -->
    <circle cx="480" cy="180" r="4" fill="#00c9ff"/>
    <line x1="480" y1="180" x2="570" y2="210" stroke="#00c9ff" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Node 2: Top right -->
    <circle cx="720" cy="180" r="4" fill="#00c9ff"/>
    <line x1="720" y1="180" x2="630" y2="210" stroke="#00c9ff" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Node 3: Bottom left -->
    <circle cx="480" cy="360" r="4" fill="#C9A84C"/>
    <line x1="480" y1="360" x2="570" y2="320" stroke="#C9A84C" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Node 4: Bottom right -->
    <circle cx="720" cy="360" r="4" fill="#C9A84C"/>
    <line x1="720" y1="360" x2="630" y2="320" stroke="#C9A84C" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  </g>

  <!-- 4 Info Cards -->
  <!-- Card 1: 離線運行 -->
  <g transform="translate(75, 420)" filter="url(#shadow)">
    <rect x="0" y="0" width="230" height="90" rx="8" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="25" cy="25" r="10" fill="#00c9ff" opacity="0.3"/>
    <text x="25" y="30" text-anchor="middle" fill="#00c9ff" font-size="12" font-family="system-ui, sans-serif">📴</text>
    <text x="50" y="28" fill="#ffffff" font-size="12" font-family="system-ui, sans-serif" font-weight="600">離線運行</text>
    <text x="50" y="48" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">冇網絡都用得</text>
    <text x="50" y="65" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">地鐵飛機都無問題</text>
  </g>

  <!-- Card 2: 零延遲 -->
  <g transform="translate(340, 420)" filter="url(#shadow)">
    <rect x="0" y="0" width="230" height="90" rx="8" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="25" cy="25" r="10" fill="#C9A84C" opacity="0.3"/>
    <text x="25" y="30" text-anchor="middle" fill="#C9A84C" font-size="12" font-family="system-ui, sans-serif">⚡</text>
    <text x="50" y="28" fill="#ffffff" font-size="12" font-family="system-ui, sans-serif" font-weight="600">零延遲回應</text>
    <text x="50" y="48" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">即問即答唔使等</text>
    <text x="50" y="65" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">毫秒級 AI 推理速度</text>
  </g>

  <!-- Card 3: 私隱保障 -->
  <g transform="translate(625, 420)" filter="url(#shadow)">
    <rect x="0" y="0" width="230" height="90" rx="8" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="25" cy="25" r="10" fill="#00c9ff" opacity="0.3"/>
    <text x="25" y="30" text-anchor="middle" fill="#00c9ff" font-size="12" font-family="system-ui, sans-serif">🔒</text>
    <text x="50" y="28" fill="#ffffff" font-size="12" font-family="system-ui, sans-serif" font-weight="600">私隱保障</text>
    <text x="50" y="48" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">資料留返喺你部機</text>
    <text x="50" y="65" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">唔怕外洩俾第三方</text>
  </g>

  <!-- Card 4: 免費使用 -->
  <g transform="translate(910, 420)" filter="url(#shadow)">
    <rect x="0" y="0" width="215" height="90" rx="8" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="25" cy="25" r="10" fill="#C9A84C" opacity="0.3"/>
    <text x="25" y="30" text-anchor="middle" fill="#C9A84C" font-size="12" font-family="system-ui, sans-serif">💰</text>
    <text x="50" y="28" fill="#ffffff" font-size="12" font-family="system-ui, sans-serif" font-weight="600">完全免費</text>
    <text x="50" y="48" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">冇月費冇隱藏收費</text>
    <text x="50" y="65" fill="#9fb3c8" font-size="10" font-family="system-ui, sans-serif">硬件一次過就搞掂</text>
  </g>

  <!-- Title -->
  <g filter="url(#shadow)">
    <text x="600" y="130" text-anchor="middle" fill="#C9A84C" font-size="36" font-family="system-ui, sans-serif" font-weight="800" letter-spacing="2">2026 Edge AI</text>
    <text x="600" y="175" text-anchor="middle" fill="#ffffff" font-size="28" font-family="system-ui, sans-serif" font-weight="700">邊緣人工智能實戰指南</text>
    <text x="600" y="210" text-anchor="middle" fill="#9fb3c8" font-size="14" font-family="system-ui, sans-serif">手機電腦直接運行 AI 嘅完整攻略</text>
  </g>

  <!-- Bottom decorative line -->
  <rect x="400" y="230" width="400" height="2" fill="url(#neon-line)" rx="1"/>

  <!-- Subtle tech data flow animation dots -->
  <g opacity="0.15" fill="#00c9ff">
    <circle cx="200" cy="480" r="1.5"/>
    <circle cx="500" cy="500" r="1.5"/>
    <circle cx="800" cy="480" r="1.5"/>
    <circle cx="1050" cy="500" r="1.5"/>
  </g>

  <!-- Brand -->
  <text x="600" y="600" text-anchor="middle" fill="#9fb3c8" font-size="11" font-family="system-ui, sans-serif" opacity="0.4">ESGov · 2026 科技攻略</text>
</svg>
