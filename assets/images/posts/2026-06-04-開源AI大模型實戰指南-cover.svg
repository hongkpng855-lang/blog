<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#1a1a4a"/>
      <stop offset="100%" style="stop-color:#0d1028"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff2d55"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#4a6cf7" stroke-width="0.5">
    <line x1="0" y1="85" x2="512" y2="85"/>
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="255" x2="512" y2="255"/>
    <line x1="0" y1="340" x2="512" y2="340"/>
    <line x1="0" y1="425" x2="512" y2="425"/>
    <line x1="85" y1="0" x2="85" y2="512"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="255" y1="0" x2="255" y2="512"/>
    <line x1="340" y1="0" x2="340" y2="512"/>
    <line x1="425" y1="0" x2="425" y2="512"/>
  </g>

  <!-- Neural network connections -->
  <g opacity="0.12">
    <line x1="80" y1="200" x2="256" y2="150" stroke="#00d4ff" stroke-width="1"/>
    <line x1="256" y1="150" x2="432" y2="200" stroke="#ff6b35" stroke-width="1"/>
    <line x1="80" y1="200" x2="432" y2="200" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="200" x2="256" y2="380" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="256" y1="150" x2="256" y2="380" stroke="#ff6b35" stroke-width="0.5"/>
    <line x1="432" y1="200" x2="256" y2="380" stroke="#c9a84c" stroke-width="0.5"/>
    <!-- Dots -->
    <circle cx="80" cy="200" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="256" cy="150" r="3" fill="#ff6b35" opacity="0.8"/>
    <circle cx="432" cy="200" r="3" fill="#c9a84c" opacity="0.8"/>
    <circle cx="256" cy="380" r="3" fill="#4a6cf7" opacity="0.8"/>
  </g>

  <!-- Three AI nodes -->
  <!-- Node 1: Llama -->
  <g filter="url(#neonGlow)">
    <circle cx="120" cy="260" r="50" fill="none" stroke="url(#glow1)" stroke-width="2" opacity="0.6"/>
    <circle cx="120" cy="260" r="50" fill="url(#glow1)" opacity="0.08"/>
  </g>
  <text x="120" y="255" font-family="system-ui, sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">Llama</text>
  <text x="120" y="273" font-family="system-ui, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.7">405B</text>

  <!-- Node 2: DeepSeek -->
  <g filter="url(#neonGlow)">
    <circle cx="256" cy="200" r="55" fill="none" stroke="url(#glow2)" stroke-width="2" opacity="0.6"/>
    <circle cx="256" cy="200" r="55" fill="url(#glow2)" opacity="0.08"/>
  </g>
  <text x="256" y="195" font-family="system-ui, sans-serif" font-size="14" fill="#ff6b35" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">DeepSeek</text>
  <text x="256" y="213" font-family="system-ui, sans-serif" font-size="9" fill="#ff6b35" text-anchor="middle" opacity="0.7">V4</text>

  <!-- Node 3: Mistral -->
  <g filter="url(#neonGlow)">
    <circle cx="392" cy="260" r="50" fill="none" stroke="url(#glow3)" stroke-width="2" opacity="0.6"/>
    <circle cx="392" cy="260" r="50" fill="url(#glow3)" opacity="0.08"/>
  </g>
  <text x="392" y="255" font-family="system-ui, sans-serif" font-size="14" fill="#c9a84c" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">Mistral</text>
  <text x="392" y="273" font-family="system-ui, sans-serif" font-size="9" fill="#c9a84c" text-anchor="middle" opacity="0.7">Large 3</text>

  <!-- Title -->
  <rect x="60" y="340" width="392" height="50" rx="8" fill="#1a202c" opacity="0.85" stroke="#4a6cf7" stroke-width="1"/>
  <text x="256" y="362" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">2026 開源 AI 大模型</text>
  <text x="256" y="380" font-family="system-ui, sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">企業自建 AI 完全評估指南</text>

  <!-- Decorative particles -->
  <circle cx="50" cy="100" r="1.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="200" cy="420" r="1" fill="#ff6b35" opacity="0.3"/>
  <circle cx="400" cy="450" r="1.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="480" cy="80" r="1" fill="#4a6cf7" opacity="0.3"/>
  <circle cx="350" cy="80" r="1.2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="70" cy="420" r="1" fill="#ff6b35" opacity="0.3"/>

  <!-- Bottom accent line -->
  <line x1="100" y1="490" x2="412" y2="490" stroke="#4a6cf7" stroke-width="0.5" opacity="0.3"/>
</svg>
