<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1929"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="cloud1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="edge1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 網格線 -->
  <g opacity="0.08" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="512" y2="100"/>
    <line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="300" x2="512" y2="300"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="512"/>
    <line x1="200" y1="0" x2="200" y2="512"/>
    <line x1="300" y1="0" x2="300" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>
  <!-- 邊緣裝置（左側三個節點） -->
  <g filter="url(#glow)">
    <!-- 邊緣節點 1 - IoT -->
    <circle cx="90" cy="220" r="22" fill="url(#edge1)" opacity="1"/>
    <rect x="75" y="205" width="6" height="6" rx="1" fill="#fff" opacity="0.3"/>
    <text x="90" y="190" text-anchor="middle" fill="#00e676" font-size="9" font-family="monospace" opacity="0.7">IoT</text>
    <!-- 邊緣節點 2 - Edge Server -->
    <rect x="55" y="320" width="70" height="35" rx="6" fill="url(#edge1)" opacity="0.9"/>
    <rect x="60" y="325" width="15" height="10" rx="2" fill="#fff" opacity="0.15"/>
    <rect x="60" y="338" width="15" height="10" rx="2" fill="#fff" opacity="0.15"/>
    <text x="90" y="375" text-anchor="middle" fill="#00e676" font-size="9" font-family="monospace" opacity="0.7">Edge Server</text>
    <!-- 邊緣節點 3 - Smart Device -->
    <circle cx="90" cy="130" r="18" fill="none" stroke="url(#edge1)" stroke-width="2" opacity="0.8"/>
    <circle cx="90" cy="130" r="8" fill="url(#edge1)" opacity="0.6"/>
    <text x="90" y="115" text-anchor="middle" fill="#00e676" font-size="9" font-family="monospace" opacity="0.7">Sensor</text>
  </g>
  <!-- 連線（邊緣到雲端） -->
  <g stroke="#4fc3f7" stroke-width="1.5" opacity="0.4" fill="none">
    <path d="M 112 220 Q 200 240 280 260"/>
    <path d="M 125 337 Q 200 300 280 260" stroke-dasharray="4,3"/>
    <path d="M 108 130 Q 200 180 280 260" stroke-dasharray="2,4"/>
  </g>
  <!-- 雲端節點（右側） -->
  <g filter="url(#glow)">
    <path d="M 340 270 Q 340 240 365 240 Q 370 220 395 220 Q 420 220 425 240 Q 450 240 450 270 Z" fill="url(#cloud1)" opacity="0.9"/>
    <rect x="370" y="270" width="30" height="20" rx="3" fill="url(#cloud1)" opacity="0.7"/>
    <text x="395" y="310" text-anchor="middle" fill="#4fc3f7" font-size="9" font-family="monospace" opacity="0.8">Cloud</text>
  </g>
  <!-- 雲端內部節點 -->
  <g opacity="0.6">
    <rect x="355" y="235" width="8" height="8" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="385" y="228" width="8" height="8" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="415" y="235" width="8" height="8" rx="2" fill="#fff" opacity="0.3"/>
  </g>
  <!-- 標題文字 -->
  <text x="256" y="430" text-anchor="middle" fill="#fff" font-size="22" font-family="monospace" font-weight="bold" letter-spacing="2">EDGE + CLOUD</text>
  <text x="256" y="455" text-anchor="middle" fill="#4fc3f7" font-size="11" font-family="monospace" letter-spacing="1" opacity="0.8">SYNERGY · 2026</text>
  <!-- 裝飾粒子 -->
  <g fill="#4fc3f7" opacity="0.2">
    <circle cx="200" cy="180" r="1.5"/>
    <circle cx="230" cy="300" r="1"/>
    <circle cx="180" cy="350" r="1.5"/>
    <circle cx="300" cy="200" r="1"/>
    <circle cx="320" cy="350" r="1.5"/>
  </g>
  <!-- 底部裝飾線 -->
  <line x1="156" y1="470" x2="356" y2="470" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="470" r="2" fill="#4fc3f7" opacity="0.5"/>
</svg>
