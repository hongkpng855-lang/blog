<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#121b3d"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid Pattern -->
  <g opacity="0.03">
    <line x1="0" y1="75" x2="800" y2="75" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="0" y1="225" x2="800" y2="225" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="0" y1="375" x2="800" y2="375" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="160" y1="0" x2="160" y2="450" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="320" y1="0" x2="320" y2="450" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="480" y1="0" x2="480" y2="450" stroke="#C9A84C" stroke-width="0.3"/>
    <line x1="640" y1="0" x2="640" y2="450" stroke="#C9A84C" stroke-width="0.3"/>
  </g>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="url(#gold)" font-family="sans-serif" font-size="32" font-weight="bold" filter="url(#glow)">全天候投資組合</text>
  <text x="400" y="90" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="15">All-Weather Portfolio · 任何經濟環境都頂得住</text>

  <!-- ===== Four Quadrant Cards ===== -->

  <!-- Card 1: 繁榮期 (左上) -->
  <rect x="30" y="115" width="170" height="130" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="115" y="142" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="13" font-weight="bold">📈 繁榮期</text>
  <text x="115" y="160" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">通脹↑ 增長↑</text>
  <line x1="50" y1="172" x2="180" y2="172" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="190" fill="#e2e8f0" font-family="sans-serif" font-size="11">股票 30%</text>
  <text x="50" y="208" fill="#e2e8f0" font-family="sans-serif" font-size="11">商品 12.5%</text>
  <text x="50" y="226" fill="#e2e8f0" font-family="sans-serif" font-size="11">黃金 12.5%</text>

  <!-- Card 2: 金髮女孩 (右上) -->
  <rect x="215" y="115" width="170" height="130" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
  <text x="300" y="142" text-anchor="middle" fill="#06b6d4" font-family="sans-serif" font-size="13" font-weight="bold">🌟 金髮女孩</text>
  <text x="300" y="160" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">通脹↓ 增長↑</text>
  <line x1="235" y1="172" x2="365" y2="172" stroke="#334155" stroke-width="0.5"/>
  <text x="235" y="190" fill="#e2e8f0" font-family="sans-serif" font-size="11">股票 30%</text>
  <text x="235" y="208" fill="#e2e8f0" font-family="sans-serif" font-size="11">長債 40%</text>
  <text x="235" y="226" fill="#e2e8f0" font-family="sans-serif" font-size="11">中期債 15%</text>

  <!-- Card 3: 滯脹 (左下) -->
  <rect x="30" y="260" width="170" height="130" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
  <text x="115" y="287" text-anchor="middle" fill="#f97316" font-family="sans-serif" font-size="13" font-weight="bold">🔥 滯脹</text>
  <text x="115" y="305" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">通脹↑ 增長↓</text>
  <line x1="50" y1="317" x2="180" y2="317" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="335" fill="#e2e8f0" font-family="sans-serif" font-size="11">黃金 12.5%</text>
  <text x="50" y="353" fill="#e2e8f0" font-family="sans-serif" font-size="11">商品 12.5%</text>
  <text x="50" y="371" fill="#e2e8f0" font-family="sans-serif" font-size="11">長債 40%</text>

  <!-- Card 4: 衰退期 (右下) -->
  <rect x="215" y="260" width="170" height="130" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
  <text x="300" y="287" text-anchor="middle" fill="#a855f7" font-family="sans-serif" font-size="13" font-weight="bold">🌧️ 衰退期</text>
  <text x="300" y="305" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">通脹↓ 增長↓</text>
  <line x1="235" y1="317" x2="365" y2="317" stroke="#334155" stroke-width="0.5"/>
  <text x="235" y="335" fill="#e2e8f0" font-family="sans-serif" font-size="11">長債 40%</text>
  <text x="235" y="353" fill="#e2e8f0" font-family="sans-serif" font-size="11">中期債 15%</text>
  <text x="235" y="371" fill="#e2e8f0" font-family="sans-serif" font-size="11">短債 / 現金</text>

  <!-- Right Side: Portfolio Pie Chart (抽象圓形) -->
  <g transform="translate(580, 225)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Pie segments (clockwise from top) -->
    <path d="M0,-110 L0,0 L79.6,-75.9 Z" fill="#C9A84C" opacity="0.85"/>
    <path d="M79.6,-75.9 L0,0 L110,0 Z" fill="#22c55e" opacity="0.85"/>
    <path d="M110,0 L0,0 L79.6,75.9 Z" fill="#3b82f6" opacity="0.85"/>
    <path d="M79.6,75.9 L0,0 L0,110 Z" fill="#a855f7" opacity="0.85"/>
    <path d="M0,110 L0,0 L-79.6,75.9 Z" fill="#f97316" opacity="0.85"/>
    <path d="M-79.6,75.9 L0,0 L-110,0 Z" fill="#06b6d4" opacity="0.85"/>
    <path d="M-110,0 L0,0 L-79.6,-75.9 Z" fill="#ef4444" opacity="0.65"/>
    <path d="M-79.6,-75.9 L0,0 L0,-110 Z" fill="#6366f1" opacity="0.65"/>

    <!-- Center circle -->
    <circle cx="0" cy="0" r="35" fill="#0a0e27" stroke="#C9A84C" stroke-width="1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#C9A84C" font-family="sans-serif" font-size="11" font-weight="bold">全天候</text>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">組合</text>
  </g>

  <!-- Legend (right side bottom) -->
  <g transform="translate(440, 340)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#C9A84C"/>
    <text x="18" y="10" fill="#94a3b8" font-family="sans-serif" font-size="10">長債 40%</text>
    <rect x="0" y="20" width="12" height="12" rx="2" fill="#22c55e"/>
    <text x="18" y="30" fill="#94a3b8" font-family="sans-serif" font-size="10">股票 30%</text>
    <rect x="0" y="40" width="12" height="12" rx="2" fill="#3b82f6"/>
    <text x="18" y="50" fill="#94a3b8" font-family="sans-serif" font-size="10">中期債 15%</text>
    <rect x="145" y="0" width="12" height="12" rx="2" fill="#a855f7"/>
    <text x="163" y="10" fill="#94a3b8" font-family="sans-serif" font-size="10">黃金 7.5%</text>
    <rect x="145" y="20" width="12" height="12" rx="2" fill="#f97316"/>
    <text x="163" y="30" fill="#94a3b8" font-family="sans-serif" font-size="10">商品 7.5%</text>
  </g>

  <!-- Bottom divider -->
  <line x1="30" y1="410" x2="770" y2="410" stroke="#334155" stroke-width="0.5"/>

  <!-- Bottom text -->
  <text x="400" y="432" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">Bridgewater Risk Parity · 4款ETF穿越牛熊 · 最大回撤 ~15%</text>
</svg>
