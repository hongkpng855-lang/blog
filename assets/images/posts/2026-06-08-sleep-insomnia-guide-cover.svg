<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="moonGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="120" cy="60" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="300" cy="40" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="500" cy="75" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="680" cy="50" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="750" cy="120" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="180" cy="130" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="620" cy="30" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="400" cy="90" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="50" cy="160" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="250" cy="100" r="1.3" fill="#fff" opacity="0.6"/>
  <circle cx="550" cy="110" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="700" cy="170" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="90" cy="200" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="450" cy="55" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="340" cy="160" r="0.9" fill="#fff" opacity="0.4"/>
  <circle cx="760" cy="200" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="160" cy="30" r="0.7" fill="#fff" opacity="0.4"/>
  <circle cx="590" cy="140" r="1" fill="#fff" opacity="0.3"/>

  <!-- Moon glow -->
  <circle cx="650" cy="100" r="60" fill="url(#moonGlow)" filter="url(#softGlow)"/>

  <!-- Moon -->
  <circle cx="650" cy="100" r="35" fill="url(#moon)" filter="url(#glow)"/>

  <!-- Moon craters -->
  <circle cx="640" cy="90" r="6" fill="#D97706" opacity="0.3"/>
  <circle cx="660" cy="105" r="4" fill="#D97706" opacity="0.2"/>
  <circle cx="645" cy="110" r="3" fill="#D97706" opacity="0.25"/>

  <!-- Bed/Human figure (simplified) -->
  <rect x="100" y="260" width="500" height="30" rx="15" fill="#334155" opacity="0.5"/>
  <rect x="120" y="280" width="460" height="140" rx="70" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>

  <!-- Pillow -->
  <ellipse cx="190" cy="310" rx="55" ry="20" fill="#475569" opacity="0.6"/>

  <!-- Person sleeping -->
  <ellipse cx="200" cy="315" rx="25" ry="15" fill="#64748B" opacity="0.5"/>
  <path d="M180 310 Q190 305 200 310" stroke="#94A3B8" fill="none" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M205 320 Q215 325 225 318" stroke="#64748B" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Zzz marks -->
  <text x="260" y="280" font-family="Arial, sans-serif" font-size="22" fill="#38BDF8" opacity="0.6" font-weight="bold">z</text>
  <text x="280" y="255" font-family="Arial, sans-serif" font-size="28" fill="#38BDF8" opacity="0.5" font-weight="bold">z</text>
  <text x="305" y="225" font-family="Arial, sans-serif" font-size="34" fill="#38BDF8" opacity="0.4" font-weight="bold">z</text>

  <!-- Clock -->
  <circle cx="580" cy="320" r="35" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <line x1="580" y1="320" x2="580" y2="298" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="580" y1="320" x2="598" y2="320" stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="580" cy="320" r="3" fill="#FDE68A"/>
  <text x="565" y="365" font-family="Arial, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">3:00 AM</text>

  <!-- Brain activity waves -->
  <path d="M420 310 Q440 295 460 310 Q480 325 500 310 Q520 295 540 310" stroke="#818CF8" fill="none" stroke-width="1.5" opacity="0.4"/>

  <!-- Left decorative element -->
  <circle cx="80" cy="380" r="4" fill="#38BDF8" opacity="0.3"/>
  <circle cx="95" cy="370" r="3" fill="#818CF8" opacity="0.2"/>
  <circle cx="70" cy="365" r="2" fill="#38BDF8" opacity="0.2"/>

  <!-- Title area -->
  <rect x="0" y="0" width="800" height="450" fill="url(#bg)" opacity="0"/>

  <!-- Main title -->
  <text x="80" y="170" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft YaHei', sans-serif" font-size="36" fill="#FFFFFF" font-weight="bold">
    2026 失眠自救指南
  </text>
  <text x="80" y="215" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#94A3B8">
    現代人睡眠科學修復嘅實證方案
  </text>

  <!-- Badge -->
  <rect x="80" y="240" width="160" height="30" rx="15" fill="#1E293B" stroke="#38BDF8" stroke-width="1"/>
  <text x="160" y="260" font-family="Arial, sans-serif" font-size="13" fill="#38BDF8" text-anchor="middle">🛌 健康睡眠指南</text>

  <!-- Tags/keywords at bottom -->
  <rect x="60" y="400" width="80" height="22" rx="11" fill="#334155" opacity="0.6"/>
  <text x="100" y="415" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">CBT-I</text>
  <rect x="150" y="400" width="80" height="22" rx="11" fill="#334155" opacity="0.6"/>
  <text x="190" y="415" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">褪黑激素</text>
  <rect x="240" y="400" width="100" height="22" rx="11" fill="#334155" opacity="0.6"/>
  <text x="290" y="415" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">睡眠衛生</text>
  <rect x="350" y="400" width="90" height="22" rx="11" fill="#334155" opacity="0.6"/>
  <text x="395" y="415" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">4-7-8呼吸</text>

  <!-- Gradient line separator -->
  <rect x="60" y="380" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>