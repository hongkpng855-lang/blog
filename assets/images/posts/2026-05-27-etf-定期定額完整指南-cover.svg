<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#e6b800"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d4ff"/>
      <stop offset="70%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.08" stroke="#4facfe" stroke-width="0.5">
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>

  <!-- Bar Chart -->
  <g transform="translate(60,280)">
    <rect x="0" y="80" width="40" height="120" rx="4" fill="#1a3a6a" opacity="0.6"/>
    <rect x="50" y="55" width="40" height="145" rx="4" fill="#2a5aaa" opacity="0.7"/>
    <rect x="100" y="30" width="40" height="170" rx="4" fill="#3a7aee" opacity="0.8"/>
    <rect x="150" y="10" width="40" height="190" rx="4" fill="#4facfe" opacity="0.9"/>
    <rect x="200" y="-20" width="40" height="220" rx="4" fill="url(#gold)" opacity="0.9"/>
  </g>

  <!-- Upward Trend Line -->
  <polyline points="50,370 120,340 200,290 280,240 350,170 430,100"
    fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>

  <!-- Arrow head -->
  <polygon points="430,100 440,120 420,115" fill="#00d4ff" filter="url(#glow)"/>

  <!-- Coin Icons -->
  <g transform="translate(280,350)">
    <circle cx="0" cy="0" r="18" fill="url(#gold)" stroke="#d4a800" stroke-width="1.5"/>
    <text x="0" y="5" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" text-anchor="middle">$</text>
    <circle cx="40" cy="-10" r="16" fill="url(#gold)" stroke="#d4a800" stroke-width="1.5" opacity="0.8"/>
    <text x="40" y="-6" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1a1a1a" text-anchor="middle">$</text>
    <circle cx="25" cy="20" r="14" fill="url(#gold)" stroke="#d4a800" stroke-width="1.5" opacity="0.6"/>
    <text x="25" y="24" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a" text-anchor="middle">$</text>
  </g>

  <!-- Title -->
  <text x="256" y="80" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">ETF 定期定額</text>
  <text x="256" y="118" font-family="sans-serif" font-size="18" fill="#aaccff" text-anchor="middle" opacity="0.9">完整投資指南</text>

  <!-- Subtitle -->
  <text x="256" y="460" font-family="sans-serif" font-size="12" fill="#6688aa" text-anchor="middle">小資族穩健累積財富的最佳策略</text>

  <!-- Decorative circles -->
  <circle cx="60" cy="50" r="3" fill="#4facfe" opacity="0.4"/>
  <circle cx="450" cy="200" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="30" cy="430" r="4" fill="#f0d060" opacity="0.2"/>
  <circle cx="480" cy="400" r="2.5" fill="#4facfe" opacity="0.3"/>
</svg>
