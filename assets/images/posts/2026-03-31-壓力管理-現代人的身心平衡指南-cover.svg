<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a9c4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87c787;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5dc;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e8e8c8;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 裝飾圓形 -->
  <circle cx="100" cy="100" r="80" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="530" r="100" fill="#ffffff" opacity="0.1"/>
  <circle cx="600" cy="500" r="150" fill="#ffffff" opacity="0.05"/>
  
  <!-- 葉子裝飾 - 左上 -->
  <g transform="translate(50, 80) rotate(-30)">
    <ellipse cx="60" cy="30" rx="50" ry="25" fill="url(#leafGradient)" opacity="0.8"/>
    <line x1="10" y1="30" x2="110" y2="30" stroke="#2d5a27" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- 葉子裝飾 - 右上 -->
  <g transform="translate(950, 60) rotate(20)">
    <ellipse cx="60" cy="30" rx="55" ry="28" fill="url(#leafGradient)" opacity="0.8"/>
    <line x1="5" y1="30" x2="115" y2="30" stroke="#2d5a27" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- 葉子裝飾 - 左下 -->
  <g transform="translate(80, 480) rotate(10)">
    <ellipse cx="50" cy="25" rx="45" ry="22" fill="url(#leafGradient)" opacity="0.7"/>
    <line x1="5" y1="25" x2="95" y2="25" stroke="#2d5a27" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- 中央人形冥想圖示 -->
  <g transform="translate(600, 280)" filter="url(#shadow)">
    <!-- 身體 -->
    <ellipse cx="0" cy="80" rx="60" ry="40" fill="#f5f5dc" opacity="0.9"/>
    <!-- 頭部 -->
    <circle cx="0" cy="0" r="35" fill="#f5f5dc" opacity="0.9"/>
    <!-- 光環 -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#f5f5dc" stroke-width="3" opacity="0.5"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#f5f5dc" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- 標題背景框 -->
  <rect x="150" y="420" width="900" height="160" rx="20" ry="20" fill="#ffffff" opacity="0.95" filter="url(#shadow)"/>
  
  <!-- 標題文字 -->
  <text x="600" y="480" font-family="Noto Sans TC, Microsoft YaHei, sans-serif" font-size="48" font-weight="bold" fill="#2d5a27" text-anchor="middle">壓力管理</text>
  <text x="600" y="540" font-family="Noto Sans TC, Microsoft YaHei, sans-serif" font-size="28" fill="#4a9c4a" text-anchor="middle">現代人的身心平衡指南</text>
  
  <!-- 分類標籤 -->
  <rect x="520" y="560" width="160" height="35" rx="17" ry="17" fill="#2d5a27"/>
  <text x="600" y="585" font-family="Noto Sans TC, Microsoft YaHei, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">健康生活</text>
  
  <!-- 底部波浪裝飾 -->
  <path d="M0 600 Q150 580 300 600 T600 600 T900 600 T1200 600 L1200 630 L0 630 Z" fill="#1a3d1a" opacity="0.3"/>
  
  <!-- 小裝飾元素 -->
  <circle cx="200" cy="350" r="8" fill="#f5f5dc" opacity="0.6"/>
  <circle cx="1000" cy="380" r="10" fill="#f5f5dc" opacity="0.6"/>
  <circle cx="350" cy="200" r="6" fill="#f5f5dc" opacity="0.5"/>
  <circle cx="850" cy="180" r="7" fill="#f5f5dc" opacity="0.5"/>
</svg>
