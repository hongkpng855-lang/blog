<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 網格線（科技感） -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- 裝飾圓圈 -->
  <circle cx="420" cy="80" r="60" fill="none" stroke="url(#accent)" stroke-width="0.8" opacity="0.15"/>
  <circle cx="420" cy="80" r="40" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>
  <circle cx="80" cy="420" r="50" fill="none" stroke="url(#accent2)" stroke-width="0.8" opacity="0.12"/>

  <!-- 中央晶片圖示 -->
  <g transform="translate(176, 130)">
    <!-- 晶片底座 -->
    <rect x="0" y="0" width="160" height="160" rx="12" fill="url(#accent)" opacity="0.15"/>
    <rect x="8" y="8" width="144" height="144" rx="8" fill="#0d1f3c" stroke="url(#accent)" stroke-width="1.5"/>

    <!-- 晶片核心 -->
    <rect x="40" y="40" width="80" height="80" rx="4" fill="url(#accent)" opacity="0.25"/>
    <rect x="48" y="48" width="64" height="64" rx="3" fill="url(#accent)" opacity="0.35"/>

    <!-- 晶片內紋路 -->
    <line x1="60" y1="56" x2="100" y2="56" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="66" x2="100" y2="66" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="76" x2="100" y2="76" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="86" x2="100" y2="86" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="96" x2="100" y2="96" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>

    <!-- 接腳 - 上 -->
    <line x1="40" y1="-12" x2="40" y2="8" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="60" y1="-12" x2="60" y2="8" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="80" y1="-12" x2="80" y2="8" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="100" y1="-12" x2="100" y2="8" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="120" y1="-12" x2="120" y2="8" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>

    <!-- 接腳 - 下 -->
    <line x1="40" y1="152" x2="40" y2="172" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="60" y1="152" x2="60" y2="172" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="80" y1="152" x2="80" y2="172" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="100" y1="152" x2="100" y2="172" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="120" y1="152" x2="120" y2="172" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>

    <!-- 接腳 - 左 -->
    <line x1="-12" y1="40" x2="8" y2="40" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="-12" y1="60" x2="8" y2="60" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="-12" y1="80" x2="8" y2="80" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="-12" y1="100" x2="8" y2="100" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="-12" y1="120" x2="8" y2="120" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>

    <!-- 接腳 - 右 -->
    <line x1="152" y1="40" x2="172" y2="40" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="152" y1="60" x2="172" y2="60" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="152" y1="80" x2="172" y2="80" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="152" y1="100" x2="172" y2="100" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="152" y1="120" x2="172" y2="120" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>

    <!-- AI 文字在晶片上 -->
    <text x="80" y="84" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">AI</text>
  </g>

  <!-- 繞晶片的電路軌跡 -->
  <g opacity="0.25" fill="none" stroke="#00d4ff" stroke-width="1">
    <!-- 左上 -->
    <path d="M100,120 L80,100 L40,100"/>
    <path d="M120,100 L140,80 L180,80"/>
    <!-- 右下 -->
    <path d="M120,180 L140,200 L180,200"/>
    <path d="M100,200 L80,220 L40,220"/>
  </g>

  <!-- 浮動數據點 -->
  <g opacity="0.3">
    <circle cx="80" cy="30" r="2" fill="#00d4ff">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="150" r="2" fill="#7c3aed">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="400" r="2" fill="#00d4ff">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="350" r="1.5" fill="#3b82f6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 連接線（資料流） -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="0.8">
    <path d="M200,210 Q250,180 300,210" fill="none"/>
    <path d="M200,230 Q260,200 320,230" fill="none"/>
    <path d="M200,250 Q270,220 340,250" fill="none"/>
  </g>

  <!-- 標題 -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow2)">CES 2026</text>
  <text x="256" y="370" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">AI · 晶片 · 智慧家庭</text>

  <!-- 底部裝飾線 -->
  <line x1="156" y1="385" x2="356" y2="385" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- 底部關鍵字標籤 -->
  <g transform="translate(256, 420)">
    <rect x="-75" y="-12" width="150" height="24" rx="12" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" opacity="0.7">科技趨勢總整理</text>
  </g>
</svg>