<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#0a0e27"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="blueGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- 背景光暈 -->
  <circle cx="256" cy="240" r="200" fill="url(#glow)" filter="url(#softGlow)"/>

  <!-- 網格線（科技感） -->
  <g stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5">
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>

  <!-- 六邊形外框 -->
  <g transform="translate(256,240)" fill="none" stroke="url(#accent)">
    <polygon points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50" stroke-width="1.5" filter="url(#blueGlow)"/>
    <polygon points="0,-80 69.3,-40 69.3,40 0,80 -69.3,40 -69.3,-40" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- AI 晶片圖示 -->
  <g transform="translate(256,240)" filter="url(#blueGlow)">
    <!-- 晶片主體 -->
    <rect x="-40" y="-40" width="80" height="80" rx="8" fill="url(#brainGrad)" opacity="0.9"/>
    <rect x="-32" y="-32" width="64" height="64" rx="4" fill="#0a0e27" opacity="0.6"/>
    
    <!-- 晶片線路 -->
    <g stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.8" fill="none">
      <rect x="-24" y="-24" width="48" height="48" rx="3"/>
      <line x1="0" y1="-24" x2="0" y2="24"/>
      <line x1="-24" y1="0" x2="24" y2="0"/>
      <circle cx="0" cy="0" r="6" fill="#00d4ff"/>
    </g>
    
    <!-- 連接點 -->
    <g fill="#00d4ff">
      <circle cx="-24" cy="-24" r="3"/>
      <circle cx="24" cy="-24" r="3"/>
      <circle cx="-24" cy="24" r="3"/>
      <circle cx="24" cy="24" r="3"/>
      <circle cx="0" cy="-24" r="3"/>
      <circle cx="0" cy="24" r="3"/>
    </g>

    <!-- 連接線（放射狀） -->
    <g stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.5">
      <line x1="-24" y1="-24" x2="-80" y2="-80"/>
      <line x1="24" y1="-24" x2="80" y2="-80"/>
      <line x1="-24" y1="24" x2="-80" y2="80"/>
      <line x1="24" y1="24" x2="80" y2="80"/>
      <line x1="0" y1="-24" x2="0" y2="-80"/>
      <line x1="0" y1="24" x2="0" y2="80"/>
      <line x1="-24" y1="0" x2="-80" y2="0"/>
      <line x1="24" y1="0" x2="80" y2="0"/>
    </g>

    <!-- 外圈節點 -->
    <g fill="#00d4ff" opacity="0.6">
      <circle cx="-80" cy="-80" r="2"/>
      <circle cx="80" cy="-80" r="2"/>
      <circle cx="-80" cy="80" r="2"/>
      <circle cx="80" cy="80" r="2"/>
      <circle cx="0" cy="-80" r="2"/>
      <circle cx="0" cy="80" r="2"/>
      <circle cx="-80" cy="0" r="2"/>
      <circle cx="80" cy="0" r="2"/>
    </g>
  </g>

  <!-- 浮動粒子 -->
  <g fill="#00d4ff" opacity="0.4">
    <circle cx="100" cy="100" r="1.5"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="120" r="1"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="380" r="1.5"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="400" r="1"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="240" r="0.8"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="260" r="0.8"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- 底部文字 -->
  <g transform="translate(256,420)">
    <text x="0" y="0" text-anchor="middle" fill="#00d4ff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" opacity="0.6">AI AGENT</text>
    <text x="0" y="20" text-anchor="middle" fill="#7b2ff7" font-family="Arial, sans-serif" font-size="10" opacity="0.4">2026 · ENTERPRISE GUIDE</text>
  </g>
</svg>