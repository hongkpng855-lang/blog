<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#11998e"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg3)"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="150" fill="#11998e" opacity="0.2"/>
  <circle cx="100" cy="500" r="200" fill="#2d1b69" opacity="0.3"/>
  
  <!-- Laptop -->
  <g transform="translate(750, 150)">
    <rect x="0" y="0" width="320" height="200" rx="15" fill="#1a1a2e" stroke="#fff" stroke-width="2"/>
    <rect x="15" y="15" width="290" height="170" rx="5" fill="#0f0f1a"/>
    <!-- Screen icons -->
    <rect x="25" y="30" width="80" height="60" rx="5" fill="#22c55e"/>
    <text x="65" y="70" text-anchor="middle" fill="#fff" font-size="24">$</text>
    <rect x="115" y="30" width="80" height="60" rx="5" fill="#f5576c"/>
    <text x="155" y="70" text-anchor="middle" fill="#fff" font-size="18">YT</text>
    <rect x="205" y="30" width="80" height="60" rx="5" fill="#ffd700"/>
    <text x="245" y="70" text-anchor="middle" fill="#1a1a2e" font-size="18">AI</text>
    <rect x="25" y="110" width="260" height="60" rx="5" fill="#415a77"/>
    <text x="155" y="150" text-anchor="middle" fill="#fff" font-size="16">多重收入來源</text>
    <!-- Keyboard -->
    <rect x="-20" y="210" width="360" height="20" rx="5" fill="#2d2d3a"/>
  </g>
  
  <!-- Money coins floating -->
  <g transform="translate(600, 100)">
    <circle cx="50" cy="50" r="35" fill="#ffd700"/>
    <text x="50" y="58" text-anchor="middle" fill="#2d1b69" font-size="28" font-weight="bold">$</text>
  </g>
  <g transform="translate(700, 50)">
    <circle cx="50" cy="50" r="30" fill="#22c55e"/>
    <text x="50" y="58" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">$</text>
  </g>
  <g transform="translate(750, 120)">
    <circle cx="30" cy="30" r="25" fill="#f5576c"/>
    <text x="30" y="38" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">$</text>
  </g>
  
  <!-- Title -->
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff">
    網路副業推薦
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="160" font-family="Arial, sans-serif" font-size="26" fill="#f093fb">
    上班族低成本增加收入的 10 種方法
  </text>
  
  <!-- Feature list -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="250" height="45" rx="8" fill="#1a1a2e" opacity="0.8"/>
    <circle cx="25" cy="22" r="15" fill="#22c55e"/>
    <text x="25" y="28" text-anchor="middle" fill="#fff" font-size="14">✓</text>
    <text x="50" y="28" fill="#fff" font-size="16">內容創作 (部落格/YouTube)</text>
  </g>
  
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="250" height="45" rx="8" fill="#1a1a2e" opacity="0.8"/>
    <circle cx="25" cy="22" r="15" fill="#f5576c"/>
    <text x="25" y="28" text-anchor="middle" fill="#fff" font-size="14">✓</text>
    <text x="50" y="28" fill="#fff" font-size="16">線上課程 / 電子書</text>
  </g>
  
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="250" height="45" rx="8" fill="#1a1a2e" opacity="0.8"/>
    <circle cx="25" cy="22" r="15" fill="#ffd700"/>
    <text x="25" y="28" text-anchor="middle" fill="#1a1a2e" font-size="14">✓</text>
    <text x="50" y="28" fill="#fff" font-size="16">聯盟行銷</text>
  </g>
  
  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="250" height="45" rx="8" fill="#1a1a2e" opacity="0.8"/>
    <circle cx="25" cy="22" r="15" fill="#11998e"/>
    <text x="25" y="28" text-anchor="middle" fill="#fff" font-size="14">✓</text>
    <text x="50" y="28" fill="#fff" font-size="16">自由接案</text>
  </g>
  
  <!-- Stats boxes -->
  <g transform="translate(350, 420)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="#f5576c"/>
    <text x="65" y="35" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold">10</text>
    <text x="65" y="55" text-anchor="middle" fill="#fff" font-size="12">種方法</text>
  </g>
  
  <g transform="translate(490, 420)">
    <rect x="0" y="0" width="130" height="70" rx="10" fill="#22c55e"/>
    <text x="65" y="35" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold">0</text>
    <text x="65" y="55" text-anchor="middle" fill="#fff" font-size="12">元門檻</text>
  </g>
  
  <!-- Keywords -->
  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="100" height="35" rx="17" fill="#11998e"/>
    <text x="50" y="24" text-anchor="middle" fill="#fff" font-size="14">被動收入</text>
    
    <rect x="110" y="0" width="100" height="35" rx="17" fill="#f093fb"/>
    <text x="160" y="24" text-anchor="middle" fill="#fff" font-size="14">網路賺錢</text>
    
    <rect x="220" y="0" width="100" height="35" rx="17" fill="#ffd700"/>
    <text x="270" y="24" text-anchor="middle" fill="#1a1a2e" font-size="14">財務自由</text>
    
    <rect x="330" y="0" width="100" height="35" rx="17" fill="#f5576c"/>
    <text x="380" y="24" text-anchor="middle" fill="#fff" font-size="14">斜槓人生</text>
