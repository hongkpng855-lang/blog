<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5E6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFE8CC;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ED321;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7ED321;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="circle3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="20"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="80" r="120" fill="url(#circle1)"/>
  <circle cx="80" cy="400" r="100" fill="url(#circle2)"/>
  <circle cx="400" cy="380" r="80" fill="url(#circle3)"/>

  <!-- Icons grid -->
  <!-- AI icon (top left) - robot face -->
  <g transform="translate(60, 80)">
    <rect x="0" y="10" width="50" height="40" rx="10" fill="#4A90D9" opacity="0.8"/>
    <circle cx="15" cy="22" r="5" fill="white"/>
    <circle cx="35" cy="22" r="5" fill="white"/>
    <rect x="18" y="32" width="14" height="3" rx="1.5" fill="white"/>
  </g>

  <!-- Leaf icon (top center) - green living -->
  <g transform="translate(230, 70)">
    <path d="M25 50 Q10 30 25 10 Q40 30 25 50Z" fill="#7ED321" opacity="0.8"/>
    <line x1="25" y1="50" x2="25" y2="55" stroke="#7ED321" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- House icon (top right) - home -->
  <g transform="translate(390, 80)">
    <polygon points="25,5 5,25 45,25" fill="#D0021B" opacity="0.6"/>
    <rect x="10" y="25" width="30" height="25" fill="#D0021B" opacity="0.6"/>
    <rect x="20" y="35" width="10" height="15" fill="white"/>
  </g>

  <!-- Clock icon (middle left) - time management -->
  <g transform="translate(50, 210)">
    <circle cx="25" cy="25" r="22" fill="#F5A623" opacity="0.7"/>
    <circle cx="25" cy="25" r="18" fill="none" stroke="white" stroke-width="2"/>
    <line x1="25" y1="25" x2="25" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="25" x2="35" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Heart icon (middle right) - mindfulness -->
  <g transform="translate(390, 210)">
    <path d="M25 40 C25 40 5 25 5 15 C5 8 12 5 18 10 L25 18 L32 10 C38 5 45 8 45 15 C45 25 25 40 25 40Z" fill="#E57373" opacity="0.7"/>
  </g>

  <!-- Food/plate icon (bottom left) -->
  <g transform="translate(60, 340)">
    <circle cx="25" cy="25" r="22" fill="#7ED321" opacity="0.5"/>
    <circle cx="25" cy="25" r="15" fill="none" stroke="white" stroke-width="2"/>
    <line x1="15" y1="18" x2="20" y2="23" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- People/connection icon (bottom center) -->
  <g transform="translate(220, 340)">
    <circle cx="15" cy="10" r="6" fill="#4A90D9" opacity="0.6"/>
    <circle cx="35" cy="10" r="6" fill="#4A90D9" opacity="0.6"/>
    <path d="M5 35 Q15 22 25 35 Q35 22 45 35" fill="none" stroke="#4A90D9" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- Star icon (bottom right) -->
  <g transform="translate(400, 345)">
    <polygon points="25,0 32,18 50,18 35,30 40,48 25,37 10,48 15,30 0,18 18,18" fill="#F5A623" opacity="0.7"/>
  </g>

  <!-- Connecting lines -->
  <line x1="110" y1="100" x2="230" y2="85" stroke="#F5A623" stroke-width="1.5" opacity="0.3"/>
  <line x1="280" y1="85" x2="390" y2="95" stroke="#F5A623" stroke-width="1.5" opacity="0.3"/>
  <line x1="75" y1="130" x2="75" y2="210" stroke="#F5A623" stroke-width="1.5" opacity="0.3"/>
  <line x1="440" y1="120" x2="440" y2="210" stroke="#F5A623" stroke-width="1.5" opacity="0.3"/>

  <!-- Title text -->
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#4A4A4A" letter-spacing="1">生活風格新規則</text>

  <!-- Decorative line under title -->
  <line x1="180" y1="482" x2="332" y2="482" stroke="#F5A623" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>

  <!-- Small dots decoration -->
  <circle cx="256" cy="495" r="3" fill="#7ED321" opacity="0.5"/>
  <circle cx="246" cy="495" r="2" fill="#F5A623" opacity="0.5"/>
  <circle cx="266" cy="495" r="2" fill="#4A90D9" opacity="0.5"/>
</svg>
