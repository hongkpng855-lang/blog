<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b714"/>
      <stop offset="100%" style="stop-color:#f0d060"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e2b714;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#e2b714;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow1)" opacity="0.4"/>
  <circle cx="450" cy="80" r="180" fill="url(#glow2)" opacity="0.5"/>
  
  <!-- Globe wireframe -->
  <g transform="translate(256,200)" opacity="0.08" stroke="#e2b714" stroke-width="1" fill="none">
    <circle cx="0" cy="0" r="80"/>
    <ellipse cx="0" cy="0" rx="80" ry="30"/>
    <ellipse cx="0" cy="0" rx="30" ry="80"/>
    <ellipse cx="0" cy="0" rx="80" ry="55" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="80" ry="55" transform="rotate(-30)"/>
  </g>
  
  <!-- Speech bubble (learning/conversation) -->
  <g transform="translate(256,180)" filter="url(#shadow)">
    <rect x="-100" y="-50" width="200" height="100" rx="20" fill="url(#accent)" opacity="0.9"/>
    <polygon points="-70,50 -60,65 -50,50" fill="url(#accent)" opacity="0.9"/>
    
    <!-- Speech lines -->
    <line x1="-60" y1="-15" x2="60" y2="-15" stroke="#e2b714" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-60" y1="5" x2="40" y2="5" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-60" y1="25" x2="50" y2="25" stroke="#4a6fa5" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Play button -->
    <circle cx="160" cy="40" r="22" fill="url(#gold)" opacity="0.85">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
    </circle>
    <polygon points="154,30 154,50 170,40" fill="#1a1a2e"/>
  </g>
  
  <!-- Book icon (left) -->
  <g transform="translate(130,340)" filter="url(#shadow)">
    <rect x="-30" y="-40" width="60" height="80" rx="4" fill="#0f3460" stroke="#e2b714" stroke-width="1.5" opacity="0.9"/>
    <line x1="-15" y1="-25" x2="15" y2="-25" stroke="#e2b714" stroke-width="1.5" opacity="0.7"/>
    <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#4a6fa5" stroke-width="1.5" opacity="0.5"/>
    <line x1="-15" y1="5" x2="10" y2="5" stroke="#4a6fa5" stroke-width="1.5" opacity="0.5"/>
    <circle cx="25" cy="-32" r="8" fill="url(#gold)" opacity="0.9">
      <animate attributeName="r" values="8;9;8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Headphones (right) -->
  <g transform="translate(382,340)" filter="url(#shadow)">
    <rect x="-30" y="-40" width="60" height="80" rx="4" fill="#0f3460" stroke="#e2b714" stroke-width="1.5" opacity="0.9"/>
    <line x1="-15" y1="-25" x2="15" y2="-25" stroke="#e2b714" stroke-width="1.5" opacity="0.7"/>
    <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#4a6fa5" stroke-width="1.5" opacity="0.5"/>
    <line x1="-15" y1="5" x2="10" y2="5" stroke="#4a6fa5" stroke-width="1.5" opacity="0.5"/>
    <circle cx="25" cy="-32" r="8" fill="url(#gold)" opacity="0.9">
      <animate attributeName="r" values="8;9;8" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
  
  <!-- Chat bubbles (bottom) -->
  <g transform="translate(256,380)" opacity="0.15" stroke="#e2b714" stroke-width="1" fill="none">
    <ellipse cx="-50" cy="-20" rx="35" ry="12"/>
    <ellipse cx="40" cy="-30" rx="25" ry="10"/>
    <ellipse cx="0" cy="20" rx="30" ry="10"/>
  </g>
  
  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="16" fill="#e2b714" letter-spacing="2">
    語言學習實戰指南
  </text>
  
  <!-- Subtitle -->
  <text x="256" y="482" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="10" fill="#8899aa" letter-spacing="1">
    由零開始 · 科學方法 · 掌握任何語言
  </text>
  
  <!-- Decorative dots -->
  <g opacity="0.08">
    <circle cx="30" cy="30" r="3" fill="#e2b714"/>
    <circle cx="50" cy="60" r="2" fill="#e2b714"/>
    <circle cx="80" cy="20" r="2" fill="#e2b714"/>
    <circle cx="440" cy="40" r="3" fill="#e2b714"/>
    <circle cx="470" cy="70" r="2" fill="#e2b714"/>
    <circle cx="460" cy="450" r="2" fill="#e2b714"/>
    <circle cx="40" cy="440" r="2" fill="#e2b714"/>
  </g>
</svg>
