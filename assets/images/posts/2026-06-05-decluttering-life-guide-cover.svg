<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a5a7a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c86a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="16"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="432" cy="432" r="160" fill="rgba(255,255,255,0.03)"/>
  <circle cx="400" cy="100" r="60" fill="rgba(201,168,76,0.08)"/>
  <!-- Room icon - simplified house outline -->
  <rect x="156" y="170" width="200" height="180" rx="8" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- Roof -->
  <polygon points="130,178 256,110 382,178" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Window on left -->
  <rect x="176" y="210" width="50" height="50" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="201" y1="210" x2="201" y2="260" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="176" y1="235" x2="226" y2="235" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Window on right -->
  <rect x="286" y="210" width="50" height="50" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="311" y1="210" x2="311" y2="260" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="286" y1="235" x2="336" y2="235" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="226" y="280" width="60" height="70" rx="3" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <circle cx="272" cy="318" r="3" fill="rgba(201,168,76,0.6)"/>
  <!-- Minimalist floating elements (decluttering symbols) -->
  <!-- Box being carried out -->
  <rect x="340" y="300" width="40" height="35" rx="3" fill="rgba(201,168,76,0.2)" stroke="url(#accent)" stroke-width="2"/>
  <line x1="360" y1="300" x2="360" y2="265" stroke="url(#accent)" stroke-width="2"/>
  <line x1="390" y1="265" x2="330" y2="265" stroke="url(#accent)" stroke-width="2"/>
  <!-- Checkmark -->
  <circle cx="256" cy="400" r="28" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="2.5"/>
  <polyline points="240,398 252,410 274,388" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <circle cx="120" cy="350" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="380" cy="180" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="150" cy="140" r="2" fill="#c9a84c" opacity="0.5"/>
  <!-- Title text -->
  <text x="256" y="92" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="2">🏠 斷捨離</text>
  <text x="256" y="452" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="1">居家整理與心靈減壓</text>
</svg>