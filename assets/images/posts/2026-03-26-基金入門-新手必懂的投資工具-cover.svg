<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 漸變背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金色漸變 -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 圓形陰影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 頂部金色條 -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#goldGradient)"/>
  
  <!-- 左側裝飾線 -->
  <rect x="60" y="80" width="8" height="230" fill="#ffd700" rx="4"/>
  
  <!-- 裝飾圓形 -->
  <circle cx="1050" cy="150" r="120" fill="#ffd700" opacity="0.08"/>
  <circle cx="980" cy="480" r="180" fill="#ffd700" opacity="0.06"/>
  <circle cx="150" cy="520" r="100" fill="#ffd700" opacity="0.05"/>
  
  <!-- 分類標籤 -->
  <rect x="68" y="95" width="120" height="36" rx="18" fill="#ffd700"/>
  <text x="128" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a365d" text-anchor="middle">#投資</text>
  
  <!-- 主標題 -->
  <text x="68" y="200" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">基金入門</text>
  
  <!-- 副標題 -->
  <text x="68" y="260" font-family="Arial, sans-serif" font-size="28" fill="#e2e8f0">新手必懂的投資工具</text>
  
  <!-- 錢幣圖示 -->
  <g transform="translate(750, 280)" filter="url(#shadow)">
    <!-- 大錢幣 -->
    <circle cx="0" cy="0" r="60" fill="#ffd700" stroke="#ffed4a" stroke-width="4"/>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a365d" text-anchor="middle">$</text>
    
    <!-- 小錢幣1 -->
    <circle cx="-80" cy="40" r="35" fill="#ffd700" opacity="0.8"/>
    <text x="-80" y="52" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a365d" text-anchor="middle">$</text>
    
    <!-- 小錢幣2 -->
    <circle cx="70" cy="60" r="30" fill="#ffd700" opacity="0.7"/>
    <text x="70" y="70" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a365d" text-anchor="middle">$</text>
  </g>
  
  <!-- 成長箭頭 -->
  <g transform="translate(900, 200)">
    <!-- 箭頭背景線 -->
    <path d="M 0 100 Q 40 80 80 60 Q 120 40 160 0" stroke="#ffd700" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- 箭頭頭部 -->
    <polygon points="160,0 140,-10 145,15" fill="#ffd700"/>
    <!-- 節點 -->
    <circle cx="0" cy="100" r="8" fill="#ffed4a"/>
    <circle cx="80" cy="60" r="8" fill="#ffed4a"/>
    <circle cx="160" cy="0" r="10" fill="#ffd700"/>
  </g>
  
  <!-- 圓餅圖 -->
  <g transform="translate(620, 420)">
    <!-- 圓餅背景 -->
    <circle cx="0" cy="0" r="70" fill="#2c5282"/>
    
    <!-- 圓餅切片 -->
    <path d="M 0 0 L 0 -70 A 70 70 0 0 1 60.6 35 Z" fill="#ffd700" opacity="0.9"/>
    <path d="M 0 0 L 60.6 35 A 70 70 0 0 1 -35 60.6 Z" fill="#48bb78" opacity="0.9"/>
    <path d="M 0 0 L -35 60.6 A 70 70 0 0 1 -60.6 -35 Z" fill="#4299e1" opacity="0.9"/>
    <path d="M 0 0 L -60.6 -35 A 70 70 0 0 1 0 -70 Z" fill="#ed8936" opacity="0.9"/>
    
    <!-- 中心圓 -->
    <circle cx="0" cy="0" r="25" fill="#1a365d"/>
  </g>
  
  <!-- 底部網站名稱區域 -->
  <rect x="0" y="560" width="1200" height="70" fill="#0d1b2a"/>
  <text x="68" y="602" font-family="Arial, sans-serif" font-size="18" fill="#a0aec0">理財知識庫</text>
  <text x="1132" y="602" font-family="Arial, sans-serif" font-size="16" fill="#718096" text-anchor="end">投資理財 · 智慧累積</text>
  
  <!-- 底部金色線 -->
  <rect x="68" y="580" width="60" height="3" fill="#ffd700" rx="1"/>
</svg>
