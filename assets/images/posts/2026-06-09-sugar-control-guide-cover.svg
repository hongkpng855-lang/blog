<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#e8c75a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Blood sugar chart background grid -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Blood sugar rollercoaster curve (RED spiky line) -->
  <!-- Base line around y=280, spikes going up to y=80 and down to y=380 -->
  <polyline points="0,280 30,290 60,270 90,100 120,60 140,80 170,200 200,240 230,220 260,80 290,55 310,75 340,210 370,250 400,230 430,90 460,65 480,85 510,220 540,260 570,240 600,85 630,60 650,80 680,215 710,255 740,235 770,105 800,70"
    fill="none" stroke="url(#redGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Stable blood sugar line (GREEN smooth line, slightly curvy but stable around y=210-230) -->
  <path d="M0,220 Q100,215 200,220 T400,225 T600,218 T800,222"
    fill="none" stroke="url(#greenGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>

  <!-- Sugar cube icons along the rollercoaster peaks -->
  <g opacity="0.3">
    <!-- Sugar cube at peak 1 -->
    <rect x="115" y="35" width="24" height="24" rx="3" fill="url(#goldGrad)" opacity="0.4"/>
    <line x1="115" y1="35" x2="139" y2="59" stroke="#e8c75a" stroke-width="0.8" opacity="0.4"/>
    <!-- Sugar cube at peak 2 -->
    <rect x="270" y="30" width="24" height="24" rx="3" fill="url(#goldGrad)" opacity="0.4"/>
    <line x1="270" y1="30" x2="294" y2="54" stroke="#e8c75a" stroke-width="0.8" opacity="0.4"/>
    <!-- Sugar cube at peak 3 -->
    <rect x="420" y="40" width="24" height="24" rx="3" fill="url(#goldGrad)" opacity="0.4"/>
    <!-- Sugar cube at peak 4 -->
    <rect x="580" y="35" width="24" height="24" rx="3" fill="url(#goldGrad)" opacity="0.4"/>
  </g>

  <!-- Left decorative elements - Blood drop -->
  <g transform="translate(60, 340)" opacity="0.12">
    <path d="M0,30 Q0,0 15,-20 Q30,0 30,30 Q30,50 15,55 Q0,50 0,30Z" fill="#ef4444"/>
  </g>

  <!-- Main title area - floating card -->
  <rect x="200" y="60" width="440" height="110" rx="16" fill="#ffffff" opacity="0.92" filter="url(#shadow)"/>
  
  <!-- Tag badge -->
  <rect x="215" y="72" width="80" height="26" rx="13" fill="url(#greenGrad)"/>
  <text x="255" y="89" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">健康生活</text>

  <!-- Title -->
  <text x="420" y="115" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#0f172a" text-anchor="middle">減糖控醣實戰指南</text>
  <text x="420" y="145" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="middle">科學戒糖、穩定血糖、告別 cravings</text>

  <!-- Subtitle bar -->
  <rect x="170" y="185" width="460" height="36" rx="18" fill="url(#goldGrad)" opacity="0.15"/>
  <text x="400" y="209" font-family="system-ui, sans-serif" font-size="15" fill="#e8c75a" text-anchor="middle" font-weight="600">穩定血糖 → 穩定情緒 → 穩定飲食選擇</text>

  <!-- Key stats boxes at bottom -->
  <!-- Box 1: 7-day -->
  <rect x="120" y="310" width="120" height="70" rx="10" fill="#1e3a5f" opacity="0.85" filter="url(#shadow)"/>
  <text x="180" y="340" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle">7日</text>
  <text x="180" y="362" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">逐步減糖計劃</text>

  <!-- Box 2: 30% -->
  <rect x="270" y="310" width="120" height="70" rx="10" fill="#1e3a5f" opacity="0.85" filter="url(#shadow)"/>
  <text x="330" y="340" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#3b82f6" text-anchor="middle">30-40%</text>
  <text x="330" y="362" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">降低血糖尖峰</text>

  <!-- Box 3: 14 days -->
  <rect x="420" y="310" width="120" height="70" rx="10" fill="#1e3a5f" opacity="0.85" filter="url(#shadow)"/>
  <text x="480" y="340" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#e8c75a" text-anchor="middle">14日</text>
  <text x="480" y="362" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">肚腩明顯變化</text>

  <!-- Box 4: 30 days -->
  <rect x="570" y="310" width="120" height="70" rx="10" fill="#1e3a5f" opacity="0.85" filter="url(#shadow)"/>
  <text x="630" y="340" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#ef4444" text-anchor="middle">30日</text>
  <text x="630" y="362" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">糖癮完全斷尾</text>

  <!-- Decorative icons -->
  <!-- Apple icon (left) -->
  <g transform="translate(45, 140)" opacity="0.15">
    <circle cx="20" cy="22" r="18" fill="#ef4444"/>
    <path d="M20,4 Q20,0 15,4" stroke="#4ade80" stroke-width="2" fill="none"/>
    <path d="M20,4 Q20,0 25,4" stroke="#4ade80" stroke-width="2" fill="none"/>
  </g>

  <!-- Donut icon (right) - the "bad" food -->
  <g transform="translate(710, 230)" opacity="0.1">
    <circle cx="25" cy="25" r="20" fill="#f59e0b"/>
    <circle cx="25" cy="25" r="6" fill="#0f172a"/>
    <rect x="8" y="10" width="8" height="4" rx="2" fill="#ef4444" transform="rotate(-20,12,12)"/>
    <rect x="30" y="8" width="8" height="4" rx="2" fill="#ef4444" transform="rotate(10,34,10)"/>
    <rect x="36" y="18" width="8" height="4" rx="2" fill="#3b82f6" transform="rotate(30,40,20)"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="300" y="420" width="200" height="3" rx="1.5" fill="url(#goldGrad)" opacity="0.4"/>
</svg>
