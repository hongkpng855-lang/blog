<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="140" fill="url(#glow)"/>
  
  <!-- Brain/head profile icon -->
  <g transform="translate(256,200)" filter="url(#shadow)">
    <!-- Head silhouette -->
    <path d="M-60,-20 C-60,-70 -30,-95 0,-95 C30,-95 60,-70 60,-20 C60,10 50,30 40,40 L30,55 L-30,55 L-40,40 C-50,30 -60,10 -60,-20Z" fill="#1a1a2e" stroke="url(#accent)" stroke-width="2"/>
    <!-- Brain waves -->
    <path d="M-30,-40 Q-15,-55 0,-40 Q15,-25 30,-40" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
    <path d="M-25,-25 Q-12,-38 0,-25 Q12,-12 25,-25" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.8"/>
    <path d="M-20,-10 Q-10,-22 0,-10 Q10,2 20,-10" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
    <!-- Eye -->
    <circle cx="-8" cy="-50" r="4" fill="#e94560" opacity="0.7"/>
    <circle cx="8" cy="-50" r="4" fill="#e94560" opacity="0.7"/>
    <!-- Glasses -->
    <rect x="-18" y="-56" width="16" height="12" rx="3" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.6"/>
    <rect x="2" y="-56" width="16" height="12" rx="3" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.6"/>
    <line x1="-2" y1="-50" x2="2" y2="-50" stroke="#f5a623" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Question marks / critical thinking elements -->
  <g transform="translate(180,130)" fill="#f5a623" opacity="0.8">
    <text font-size="28" font-family="sans-serif" font-weight="bold">?</text>
  </g>
  <g transform="translate(340,140)" fill="#e94560" opacity="0.6">
    <text font-size="22" font-family="sans-serif" font-weight="bold">?</text>
  </g>

  <!-- Analysis elements - magnifying glass -->
  <g transform="translate(320,270)" stroke="#f5a623" fill="none" stroke-width="2.5" opacity="0.7">
    <circle cx="0" cy="0" r="20"/>
    <line x1="14" y1="14" x2="30" y2="30" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Logic symbols -->
  <g transform="translate(150,300)" opacity="0.6">
    <text font-size="16" font-family="sans-serif" fill="#f5a623" font-weight="bold">A→B</text>
  </g>
  <g transform="translate(340,310)" opacity="0.5">
    <text font-size="14" font-family="sans-serif" fill="#e94560" font-weight="bold">∃</text>
  </g>

  <!-- Gear / analytical process -->
  <g transform="translate(220,310)" opacity="0.4">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#f5a623" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#f5a623" stroke-width="1"/>
    <line x1="-14" y1="0" x2="-8" y2="0" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="14" y2="0" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="0" y1="-14" x2="0" y2="-8" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="0" y2="14" stroke="#f5a623" stroke-width="1.5"/>
  </g>

  <!-- Bottom title area -->
  <g transform="translate(256,430)">
    <text text-anchor="middle" font-size="22" font-family="sans-serif" font-weight="bold" fill="#f5a623" filter="url(#shadow)">
      批判性思考
    </text>
    <text text-anchor="middle" font-size="14" font-family="sans-serif" fill="#8899aa" y="28">
      提升決策品質的思維框架
    </text>
  </g>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="2" fill="#f5a623" opacity="0.3"/>
  <circle cx="440" cy="400" r="2" fill="#e94560" opacity="0.3"/>
  <circle cx="400" cy="100" r="1.5" fill="#f5a623" opacity="0.2"/>
  <circle cx="100" cy="420" r="1.5" fill="#e94560" opacity="0.2"/>
  
  <!-- Light beams from brain -->
  <line x1="200" y1="140" x2="170" y2="110" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="140" x2="340" y2="110" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="130" x2="256" y2="100" stroke="#f5a623" stroke-width="1" opacity="0.25"/>
</svg>
