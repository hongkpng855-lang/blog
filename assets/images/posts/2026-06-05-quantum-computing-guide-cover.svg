<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#0d0d3d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2ff7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff6ec7;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Background glow circles -->
  <circle cx="200" cy="280" r="180" fill="url(#glow)" filter="url(#blur2)" opacity="0.15"/>
  <circle cx="320" cy="220" r="150" fill="url(#glow2)" filter="url(#blur2)" opacity="0.12"/>

  <!-- Quantum circuit lines (horizontal) -->
  <line x1="80" y1="160" x2="432" y2="160" stroke="#1a3a6e" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#1a3a6e" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="#1a3a6e" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="400" x2="432" y2="400" stroke="#1a3a6e" stroke-width="1.5" opacity="0.6"/>

  <!-- Quantum gates on the circuit -->
  <!-- Hadamard gate -->
  <rect x="130" y="145" width="30" height="30" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <text x="145" y="164" text-anchor="middle" fill="#00d4ff" font-size="12" font-family="monospace" opacity="0.7">H</text>

  <!-- CNOT control and target -->
  <circle cx="200" cy="160" r="4" fill="#7b2ff7" filter="url(#glowFilter)"/>
  <line x1="200" y1="160" x2="200" y2="240" stroke="#7b2ff7" stroke-width="1.5"/>
  <circle cx="200" cy="240" r="5" fill="none" stroke="#7b2ff7" stroke-width="1.5"/>
  <text x="200" y="244" text-anchor="middle" fill="#ff6ec7" font-size="10" font-family="monospace">⊕</text>

  <!-- T gate -->
  <rect x="260" y="225" width="30" height="30" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <text x="275" y="244" text-anchor="middle" fill="#00d4ff" font-size="12" font-family="monospace" opacity="0.7">T</text>

  <!-- SWAP -->
  <line x1="330" y1="160" x2="360" y2="240" stroke="#7b2ff7" stroke-width="1" opacity="0.6"/>
  <line x1="360" y1="160" x2="330" y2="240" stroke="#7b2ff7" stroke-width="1" opacity="0.6"/>
  <circle cx="330" cy="160" r="3" fill="#7b2ff7"/>
  <circle cx="360" cy="160" r="3" fill="#7b2ff7"/>
  <circle cx="330" cy="240" r="3" fill="#7b2ff7"/>
  <circle cx="360" cy="240" r="3" fill="#7b2ff7"/>
  <text x="345" y="208" text-anchor="middle" fill="#ff6ec7" font-size="10" font-family="monospace">×</text>

  <!-- Bloch sphere representation (center-right area, large) -->
  <g transform="translate(256, 310)">
    <!-- Sphere outline -->
    <ellipse cx="0" cy="0" rx="60" ry="60" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="25" ry="60" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>

    <!-- Bloch vector (arrow pointing at an angle) -->
    <line x1="0" y1="0" x2="35" y2="-42" stroke="#ff6ec7" stroke-width="2.5" filter="url(#glowFilter)"/>
    <polygon points="35,-42 40,-32 28,-34" fill="#ff6ec7" filter="url(#glowFilter)"/>

    <!-- Labels -->
    <text x="0" y="-68" text-anchor="middle" fill="#ff6ec7" font-size="11" font-family="monospace" opacity="0.8">|0⟩</text>
    <text x="0" y="76" text-anchor="middle" fill="#ff6ec7" font-size="11" font-family="monospace" opacity="0.8">|1⟩</text>
    <text x="-72" y="4" text-anchor="end" fill="#00d4ff" font-size="11" font-family="monospace" opacity="0.6">|+⟩</text>
    <text x="72" y="4" text-anchor="start" fill="#00d4ff" font-size="11" font-family="monospace" opacity="0.6">|-⟩</text>

    <!-- Qubit dot at center -->
    <circle cx="0" cy="0" r="4" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Measurement symbols (right side) -->
  <g transform="translate(395, 160)">
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#00d4ff" font-size="10" font-family="monospace" opacity="0.5">M</text>
  </g>
  <g transform="translate(395, 240)">
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#00d4ff" font-size="10" font-family="monospace" opacity="0.5">M</text>
  </g>
  <g transform="translate(395, 320)">
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#00d4ff" font-size="10" font-family="monospace" opacity="0.5">M</text>
  </g>

  <!-- Entanglement glow between two qubits -->
  <ellipse cx="256" cy="200" rx="120" ry="100" fill="none" stroke="#7b2ff7" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,6">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Decorative particles -->
  <circle cx="100" cy="100" r="1.5" fill="#00d4ff" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="80" r="1" fill="#ff6ec7" opacity="0.5">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="420" r="1.2" fill="#7b2ff7" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="400" r="1.5" fill="#00d4ff" opacity="0.5">
    <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="120" r="1" fill="#fff" opacity="0.3">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle entanglement lines -->
  <path d="M 130 160 Q 180 130 200 160" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <path d="M 200 240 Q 230 270 260 240" fill="none" stroke="#7b2ff7" stroke-width="0.8" opacity="0.3"/>

  <!-- Title area at bottom - overlay -->
  <rect x="0" y="430" width="512" height="82" fill="#0a0a2e" opacity="0.85"/>
  <text x="256" y="462" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">量子計算入門指南</text>
  <text x="256" y="488" text-anchor="middle" fill="#00d4ff" font-size="12" font-family="system-ui, sans-serif" opacity="0.8">2026 量子霸權時代的關鍵應用</text>
</svg>
