<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a4a7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a6aaa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="8"/>
  <!-- Grid lines (subtle) -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="512" y2="100"/>
    <line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="300" x2="512" y2="300"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="512"/>
    <line x1="200" y1="0" x2="200" y2="512"/>
    <line x1="300" y1="0" x2="300" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>
  <!-- Chart area -->
  <rect x="40" y="100" width="432" height="220" rx="8" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
  <!-- Chart line (uptrend) -->
  <polyline points="60,280 120,260 180,240 240,200 300,170 360,140 420,120"
            fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Chart fill gradient -->
  <defs>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#d4a84b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#d4a84b;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <polygon points="60,280 120,260 180,240 240,200 300,170 360,140 420,120 420,300 60,300"
           fill="url(#chartFill)" opacity="0.3"/>
  <!-- Up arrow on chart -->
  <polygon points="430,110 445,135 415,135" fill="url(#green)" opacity="0.8"/>
  <!-- Dividend coins -->
  <g filter="url(#glow)">
    <!-- Coin 1 -->
    <circle cx="90" cy="380" r="22" fill="url(#gold)" opacity="0.9"/>
    <text x="90" y="386" text-anchor="middle" fill="#1a2332" font-size="14" font-weight="bold" font-family="Arial">$</text>
    <!-- Coin 2 -->
    <circle cx="145" cy="365" r="20" fill="url(#gold)" opacity="0.85"/>
    <text x="145" y="371" text-anchor="middle" fill="#1a2332" font-size="13" font-weight="bold" font-family="Arial">$</text>
    <!-- Coin 3 -->
    <circle cx="195" cy="375" r="18" fill="url(#gold)" opacity="0.8"/>
    <text x="195" y="381" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="bold" font-family="Arial">$</text>
    <!-- Coin 4 -->
    <circle cx="240" cy="355" r="16" fill="url(#gold)" opacity="0.75"/>
    <text x="240" y="361" text-anchor="middle" fill="#1a2332" font-size="11" font-weight="bold" font-family="Arial">$</text>
    <!-- Coin 5 -->
    <circle cx="280" cy="370" r="14" fill="url(#gold)" opacity="0.7"/>
    <text x="280" y="376" text-anchor="middle" fill="#1a2332" font-size="10" font-weight="bold" font-family="Arial">$</text>
  </g>
  <!-- Building/REIT icon -->
  <g transform="translate(340, 340)" opacity="0.7">
    <rect x="0" y="15" width="30" height="40" rx="2" fill="url(#blue)" stroke="#4a7abb" stroke-width="1"/>
    <rect x="5" y="20" width="8" height="8" rx="1" fill="#ffffff20"/>
    <rect x="17" y="20" width="8" height="8" rx="1" fill="#ffffff20"/>
    <rect x="5" y="32" width="8" height="8" rx="1" fill="#ffffff20"/>
    <rect x="17" y="32" width="8" height="8" rx="1" fill="#ffffff20"/>
    <rect x="10" y="45" width="10" height="10" rx="1" fill="#d4a84b60"/>
  </g>
  <!-- Bond icon -->
  <g transform="translate(390, 350)" opacity="0.7">
    <rect x="0" y="0" width="40" height="25" rx="3" fill="#ffffff10" stroke="#ffffff30" stroke-width="1"/>
    <text x="4" y="11" fill="#22c55e" font-size="6" font-family="monospace">BOND</text>
    <line x1="0" y1="14" x2="40" y2="14" stroke="#ffffff15" stroke-width="0.5"/>
    <text x="4" y="22" fill="#f0d080" font-size="6" font-family="monospace">4.5%</text>
  </g>
  <!-- Title -->
  <text x="256" y="58" text-anchor="middle" fill="url(#gold)" font-size="24" font-weight="bold" font-family="Arial, sans-serif" filter="url(#glow)">被動收入組合</text>
  <text x="256" y="80" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, sans-serif">Passive Income Portfolio</text>
  <!-- Subtitle -->
  <text x="256" y="470" text-anchor="middle" fill="#64748b" font-size="11" font-family="Arial, sans-serif">股息 · REITs · 債券 · 選擇權</text>
  <!-- Decorative dots -->
  <circle cx="200" cy="472" r="2" fill="#d4a84b" opacity="0.5"/>
  <circle cx="256" cy="472" r="2" fill="#d4a84b" opacity="0.5"/>
  <circle cx="312" cy="472" r="2" fill="#d4a84b" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="490" width="512" height="22" fill="url(#gold)" opacity="0.15"/>
  <text x="256" y="504" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial, sans-serif">GOVFLOW · 投資指南</text>
</svg>
