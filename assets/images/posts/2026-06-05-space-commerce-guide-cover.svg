<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a18;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1f3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nebula" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff3366;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" />

  <!-- Nebula effect -->
  <ellipse cx="400" cy="225" rx="350" ry="200" fill="url(#nebula)" />

  <!-- Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="50" cy="30" r="1.5"/><circle cx="120" cy="80" r="1"/><circle cx="200" cy="20" r="1.2"/>
    <circle cx="300" cy="50" r="0.8"/><circle cx="450" cy="30" r="1.5"/><circle cx="550" cy="70" r="1"/>
    <circle cx="650" cy="25" r="1.3"/><circle cx="720" cy="90" r="0.8"/><circle cx="780" cy="40" r="1.2"/>
    <circle cx="80" cy="150" r="0.8"/><circle cx="180" cy="180" r="1"/><circle cx="30" cy="280" r="1.2"/>
    <circle cx="680" cy="150" r="1"/><circle cx="750" cy="200" r="1.5"/><circle cx="700" cy="300" r="0.8"/>
    <circle cx="100" cy="380" r="1"/><circle cx="760" cy="380" r="1.2"/><circle cx="600" cy="400" r="0.8"/>
    <circle cx="250" cy="100" r="0.6"/><circle cx="500" cy="120" r="0.7"/><circle cx="380" cy="80" r="1"/>
  </g>

  <!-- Bright stars with glow -->
  <g filter="url(#glow)">
    <circle cx="150" cy="60" r="2" fill="#a5f3fc"/>
    <circle cx="600" cy="50" r="2.5" fill="#fbbf24"/>
    <circle cx="700" cy="350" r="2" fill="#a5f3fc"/>
    <circle cx="100" cy="350" r="2" fill="#a5b4fc"/>
  </g>

  <!-- Orbit rings -->
  <ellipse cx="200" cy="350" rx="80" ry="20" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1" />
  <ellipse cx="200" cy="350" rx="60" ry="15" fill="none" stroke="rgba(59,130,246,0.10)" stroke-width="1" />
  <ellipse cx="600" cy="320" rx="120" ry="25" fill="none" stroke="rgba(124,58,237,0.12)" stroke-width="1" />

  <!-- Earth -->
  <circle cx="160" cy="380" r="50" fill="#1a3a5c" />
  <circle cx="160" cy="380" r="50" fill="url(#earthGrad)" opacity="0" />
  <!-- continents -->
  <g fill="#2563eb" opacity="0.4">
    <ellipse cx="145" cy="365" rx="15" ry="20"/>
    <ellipse cx="175" cy="375" rx="12" ry="8"/>
    <ellipse cx="150" cy="395" rx="10" ry="6"/>
  </g>
  <!-- atmosphere glow -->
  <circle cx="160" cy="380" r="52" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="4" filter="url(#glowBig)" />

  <!-- Starship Rocket -->
  <g transform="translate(600, 200) rotate(25)">
    <!-- Exhaust trail -->
    <ellipse cx="0" cy="120" rx="8" ry="35" fill="url(#flame)" filter="url(#glowBig)" opacity="0.7"/>
    <ellipse cx="0" cy="100" rx="12" ry="25" fill="#ff8844" opacity="0.5" filter="url(#glow)"/>
    <ellipse cx="0" cy="80" rx="15" ry="20" fill="#ffaa44" opacity="0.3" filter="url(#glow)"/>

    <!-- Rocket body (Starship style - stainless steel) -->
    <rect x="-20" y="-60" width="40" height="100" rx="8" fill="url(#rocketBody)" />
    <!-- Nose cone -->
    <path d="M -20 -60 Q 0 -110 20 -60" fill="#a0a0a0" />
    <!-- Fuselage line -->
    <ellipse cx="0" cy="-60" rx="20" ry="5" fill="#909090" />
    <!-- Window -->
    <circle cx="0" cy="-45" r="5" fill="#06b6d4" filter="url(#glow)" opacity="0.8" />
    <!-- Grid fins -->
    <rect x="-28" y="-20" width="8" height="15" rx="2" fill="#707070" />
    <rect x="20" y="-20" width="8" height="15" rx="2" fill="#707070" />
    <!-- Landing leg hint -->
    <rect x="-25" y="30" width="5" height="10" rx="2" fill="#606060" />
    <rect x="20" y="30" width="5" height="10" rx="2" fill="#606060" />
  </g>

  <!-- Small satellites in orbit -->
  <g transform="translate(350, 300)">
    <rect x="-8" y="-3" width="16" height="6" rx="2" fill="#a5f3fc" opacity="0.6"/>
    <rect x="-12" y="-1" width="24" height="2" rx="1" fill="#3b82f6" opacity="0.4"/>
  </g>

  <g transform="translate(500, 280)">
    <rect x="-6" y="-2" width="12" height="4" rx="1.5" fill="#a5f3fc" opacity="0.5"/>
    <rect x="-10" y="-1" width="20" height="1.5" rx="1" fill="#3b82f6" opacity="0.3"/>
  </g>

  <!-- Shooting star -->
  <line x1="680" y1="80" x2="630" y2="120" stroke="white" stroke-width="2" opacity="0.6" stroke-dasharray="3,4" />
  <circle cx="625" cy="124" r="2" fill="white" opacity="0.4" filter="url(#glow)" />

  <!-- Title text area -->
  <rect x="40" y="280" width="720" height="160" rx="12" fill="rgba(5,10,24,0.6)" />
  <rect x="40" y="280" width="720" height="160" rx="12" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1" />

  <!-- Title accent bar -->
  <rect x="60" y="295" width="60" height="4" rx="2" fill="url(#accent)" />

  <!-- Main title -->
  <text x="400" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">
    2026 太空科技商業化指南
  </text>

  <!-- Subtitle -->
  <text x="400" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="middle">
    從衛星網路到太空旅遊，宇宙經濟時代全面來臨
  </text>

  <!-- Tags -->
  <g transform="translate(400, 405)">
    <rect x="-85" y="-12" width="80" height="24" rx="12" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="-45" y="5" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">🚀 太空經濟</text>

    <rect x="5" y="-12" width="80" height="24" rx="12" fill="rgba(6,182,212,0.3)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
    <text x="45" y="5" font-family="system-ui, sans-serif" font-size="11" fill="#67e8f9" text-anchor="middle">🛰️ 衛星網路</text>
  </g>
</svg>
