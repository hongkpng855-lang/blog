<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="120" cy="60" r="1.5"/>
    <circle cx="200" cy="35" r="1"/>
    <circle cx="350" cy="50" r="1.8"/>
    <circle cx="480" cy="40" r="1.2"/>
    <circle cx="600" cy="65" r="1"/>
    <circle cx="700" cy="30" r="1.5"/>
    <circle cx="150" cy="120" r="1"/>
    <circle cx="650" cy="100" r="1.3"/>
    <circle cx="300" cy="20" r="1"/>
    <circle cx="520" cy="90" r="0.8"/>
    <circle cx="80" cy="150" r="0.8"/>
    <circle cx="730" cy="140" r="1"/>
    <circle cx="420" cy="25" r="1.2"/>
    <circle cx="550" cy="110" r="0.7"/>
    <circle cx="250" cy="95" r="0.9"/>
    <circle cx="670" cy="55" r="1.1"/>
    <circle cx="30" cy="90" r="1"/>
    <circle cx="760" cy="80" r="0.8"/>
  </g>

  <!-- Moon -->
  <circle cx="620" cy="100" r="45" fill="url(#moon)" filter="url(#glow)"/>
  <circle cx="640" cy="95" r="38" fill="#0f172a"/>

  <!-- Moon light glow -->
  <ellipse cx="550" cy="120" rx="120" ry="80" fill="url(#light)"/>

  <!-- Hills / landscape silhouette -->
  <path d="M0 380 Q100 320 200 350 Q280 310 350 340 Q420 290 500 330 Q560 300 620 320 Q680 280 750 310 Q800 290 800 320 L800 450 L0 450Z" fill="#1a2a3a" opacity="0.8"/>
  <path d="M0 410 Q150 360 250 390 Q320 350 400 380 Q480 340 560 370 Q630 350 720 380 Q780 360 800 380 L800 450 L0 450Z" fill="#0f172a"/>

  <!-- Person sleeping on bed (simplified) -->
  <g transform="translate(130, 330)">
    <!-- Bed/blanket -->
    <rect x="0" y="20" width="160" height="80" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
    <rect x="0" y="20" width="160" height="20" rx="8" fill="#475569"/>
    <!-- Pillow -->
    <rect x="10" y="15" width="50" height="20" rx="10" fill="#64748b"/>
    <!-- Head -->
    <circle cx="40" cy="15" r="16" fill="#d4a574"/>
    <!-- Hair -->
    <path d="M24 10 Q30 2 40 4 Q50 2 56 8 Q52 14 40 14 Q28 14 24 10Z" fill="#1e293b"/>
    <!-- Body under blanket -->
    <path d="M30 30 Q50 28 80 30 Q110 28 140 30 L140 100 L30 100Z" fill="#334155"/>
    <!-- ZZZ -->
    <text x="170" y="10" font-family="system-ui, sans-serif" font-weight="bold" font-size="20" fill="#fde68a" opacity="0.6">Z</text>
    <text x="185" y="-5" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#fde68a" opacity="0.4">Z</text>
    <text x="196" y="-17" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#fde68a" opacity="0.3">Z</text>
  </g>

  <!-- Alarm clock (simplified, showing digital numbers) -->
  <g transform="translate(400, 340)">
    <rect x="0" y="0" width="70" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="35" y="18" font-family="monospace" font-size="12" fill="#fde68a" text-anchor="middle">AM</text>
    <text x="35" y="42" font-family="monospace" font-weight="bold" font-size="24" fill="#38bdf8" text-anchor="middle">10:30</text>
  </g>

  <!-- Title area -->
  <g transform="translate(400, 240)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-weight="bold" font-size="34" fill="#f8fafc" text-anchor="middle">睡眠革命</text>
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">科學改善睡眠質素完整指南</text>
  </g>

  <!-- Decorative line -->
  <g transform="translate(260, 280)">
    <line x1="0" y1="0" x2="280" y2="0" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <circle cx="140" cy="0" r="3" fill="#fbbf24"/>
  </g>

  <!-- Bottom decorative moon crescent -->
  <g transform="translate(680, 400)" opacity="0.15">
    <circle cx="0" cy="0" r="15" fill="#fbbf24"/>
    <circle cx="6" cy="-3" r="12" fill="#0f172a"/>
  </g>
</svg>
