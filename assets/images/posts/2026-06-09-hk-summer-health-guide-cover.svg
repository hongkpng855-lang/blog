<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="50%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="tempBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="40%" stop-color="#FFA500"/>
      <stop offset="70%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Sun -->
  <circle cx="400" cy="80" r="50" fill="url(#sunGrad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.4">
    <line x1="400" y1="15" x2="400" y2="5"/>
    <line x1="400" y1="145" x2="400" y2="155"/>
    <line x1="335" y1="80" x2="325" y2="80"/>
    <line x1="465" y1="80" x2="475" y2="80"/>
    <line x1="350" y1="30" x2="343" y2="23"/>
    <line x1="450" y1="130" x2="457" y2="137"/>
    <line x1="350" y1="130" x2="343" y2="137"/>
    <line x1="450" y1="30" x2="457" y2="23"/>
  </g>

  <!-- Thermometer bar -->
  <rect x="80" y="90" width="40" height="240" rx="20" fill="#1E3A5A" stroke="#3A5A8A" stroke-width="2"/>
  <rect x="85" y="295" width="30" height="30" rx="15" fill="#C9A84C"/>
  <rect x="85" y="95" width="30" height="195" rx="15" fill="url(#tempBar)"/>
  <!-- Thermometer markings -->
  <g fill="#8AB4F8" font-size="10" font-family="system-ui">
    <text x="135" y="105">50°C</text>
    <text x="135" y="155">40°C</text>
    <text x="135" y="205">30°C</text>
    <text x="135" y="255">20°C</text>
    <text x="135" y="300">10°C</text>
  </g>

  <!-- 4 info cards -->
  <!-- Card 1: Heat stroke prevention -->
  <rect x="200" y="100" width="135" height="50" rx="10" fill="#2A1A1A" stroke="#FF4500" stroke-width="1.5" opacity="0.95"/>
  <text x="215" y="122" fill="#FF6B6B" font-size="11" font-family="system-ui" font-weight="bold">⚠️ 熱傷害</text>
  <text x="215" y="138" fill="#FFA07A" font-size="9" font-family="system-ui">中暑預防・熱衰竭</text>

  <!-- Card 2: AC syndrome -->
  <rect x="200" y="165" width="135" height="50" rx="10" fill="#1A2A3A" stroke="#00BFFF" stroke-width="1.5" opacity="0.95"/>
  <text x="215" y="187" fill="#4FC3F7" font-size="11" font-family="system-ui" font-weight="bold">❄️ 冷氣病</text>
  <text x="215" y="203" fill="#81D4FA" font-size="9" font-family="system-ui">頸痛・鼻塞・疲勞</text>

  <!-- Card 3: Summer diet -->
  <rect x="200" y="230" width="135" height="50" rx="10" fill="#1A2A1A" stroke="#4CAF50" stroke-width="1.5" opacity="0.95"/>
  <text x="215" y="252" fill="#66BB6A" font-size="11" font-family="system-ui" font-weight="bold">🍉 降溫飲食</text>
  <text x="215" y="268" fill="#A5D6A7" font-size="9" font-family="system-ui">消暑食譜・電解質</text>

  <!-- Card 4: Humidity -->
  <rect x="200" y="295" width="135" height="50" rx="10" fill="#1A1A2A" stroke="#AB47BC" stroke-width="1.5" opacity="0.95"/>
  <text x="215" y="317" fill="#CE93D8" font-size="11" font-family="system-ui" font-weight="bold">💧 潮濕管理</text>
  <text x="215" y="333" fill="#E1BEE7" font-size="9" font-family="system-ui">除濕・塵蟎・皮膚</text>

  <!-- Humidity icon -->
  <g opacity="0.3">
    <text x="370" y="260" fill="#8AB4F8" font-size="60" font-family="system-ui">💧</text>
    <text x="385" y="300" fill="#8AB4F8" font-size="16" font-family="system-ui">RH 88%</text>
  </g>

  <!-- Temperature markers on top -->
  <g opacity="0.15">
    <text x="30" y="45" fill="#fff" font-size="14" font-family="system-ui">35°C</text>
    <text x="30" y="65" fill="#fff" font-size="10" font-family="system-ui">體感 42°C</text>
  </g>

  <!-- Bottom title bar -->
  <rect x="0" y="370" width="512" height="142" fill="#0A1525" opacity="0.9"/>
  
  <!-- Title -->
  <text x="256" y="405" fill="#C9A84C" font-size="18" font-family="system-ui" font-weight="bold" text-anchor="middle">香港夏季健康生存指南</text>
  <text x="256" y="428" fill="#8AB4F8" font-size="12" font-family="system-ui" text-anchor="middle">中暑預防・降溫飲食・冷氣病・潮濕管理</text>

  <!-- Decorative line -->
  <line x1="120" y1="442" x2="392" y2="442" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>

  <!-- Key stats -->
  <g font-family="system-ui">
    <text x="90" y="468" fill="#FFA07A" font-size="13" font-weight="bold" text-anchor="middle">24-26°C</text>
    <text x="90" y="485" fill="#8AB4F8" font-size="9" text-anchor="middle">理想冷氣溫度</text>

    <text x="256" y="468" fill="#66BB6A" font-size="13" font-weight="bold" text-anchor="middle">2.5-3L</text>
    <text x="256" y="485" fill="#8AB4F8" font-size="9" text-anchor="middle">每日飲水量</text>

    <text x="422" y="468" fill="#FFD700" font-size="13" font-weight="bold" text-anchor="middle">06-09</text>
    <text x="422" y="485" fill="#8AB4F8" font-size="9" text-anchor="middle">安全運動時段</text>
  </g>
</svg>
