<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#40916c;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Green leaf icon -->
  <g transform="translate(180,140)">
    <path d="M76 8 C76 8 96 48 96 88 C96 128 76 168 76 168 C76 168 56 128 56 88 C56 48 76 8 76 8Z" fill="#95d5b2" opacity="0.8"/>
    <path d="M76 48 C76 48 86 68 86 88 C86 108 76 128 76 128 C76 128 66 108 66 88 C66 68 76 48 76 48Z" fill="#d8f3dc"/>
  </g>
  <!-- Human figure -->
  <g transform="translate(200,240)">
    <!-- Head -->
    <circle cx="56" cy="20" r="20" fill="#d8f3dc" opacity="0.6"/>
    <!-- Body -->
    <rect x="36" y="40" width="40" height="60" rx="10" fill="#95d5b2" opacity="0.6"/>
    <!-- Arms spread -->
    <rect x="10" y="50" width="26" height="10" rx="5" fill="#b7e4c7" opacity="0.5"/>
    <rect x="76" y="50" width="26" height="10" rx="5" fill="#b7e4c7" opacity="0.5"/>
  </g>
  <!-- Energy wave -->
  <g transform="translate(120,320)" opacity="0.3">
    <path d="M0 40 Q 40 0 80 40 Q 120 80 160 40 Q 200 0 240 40" stroke="#d8f3dc" stroke-width="3" fill="none"/>
    <path d="M10 55 Q 50 15 90 55 Q 130 95 170 55 Q 210 15 250 55" stroke="#95d5b2" stroke-width="2" fill="none"/>
  </g>
  <!-- Small sun/energy circle -->
  <circle cx="390" cy="100" r="35" fill="#fefae0" opacity="0.3"/>
  <circle cx="390" cy="100" r="25" fill="#fff" opacity="0.15"/>
  <!-- Light particles -->
  <circle cx="100" cy="120" r="4" fill="#d8f3dc" opacity="0.5"/>
  <circle cx="400" cy="380" r="3" fill="#d8f3dc" opacity="0.4"/>
  <circle cx="80" cy="400" r="5" fill="#95d5b2" opacity="0.3"/>
  <circle cx="440" cy="200" r="3" fill="#d8f3dc" opacity="0.4"/>
</svg>
