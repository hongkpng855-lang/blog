<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1B2A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0D68A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#F0D68A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#22c55e;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:0.9" />
      <stop offset="80%" style="stop-color:#F0D68A;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="60" y1="80" x2="720" y2="80"/>
    <line x1="60" y1="140" x2="720" y2="140"/>
    <line x1="60" y1="200" x2="720" y2="200"/>
    <line x1="60" y1="260" x2="720" y2="260"/>
    <line x1="60" y1="320" x2="720" y2="320"/>
  </g>

  <!-- Y-axis labels -->
  <g fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">
    <text x="50" y="84">$175萬</text>
    <text x="50" y="144">$140萬</text>
    <text x="50" y="204">$105萬</text>
    <text x="50" y="264">$70萬</text>
    <text x="50" y="324">$35萬</text>
    <text x="50" y="375">$0</text>
  </g>

  <!-- Chart bars (showing compounding growth over years) - Year 0 to Year 20 -->
  <rect x="90" y="365" width="22" height="10" fill="url(#bar1)" rx="2" opacity="0.7"/>
  <rect x="125" y="358" width="22" height="17" fill="url(#bar1)" rx="2" opacity="0.7"/>
  <rect x="160" y="348" width="22" height="27" fill="url(#bar1)" rx="2" opacity="0.7"/>
  <rect x="195" y="335" width="22" height="40" fill="url(#bar2)" rx="2" opacity="0.8"/>
  <rect x="230" y="318" width="22" height="57" fill="url(#bar2)" rx="2" opacity="0.8"/>
  <rect x="265" y="296" width="22" height="79" fill="url(#bar2)" rx="2" opacity="0.85"/>
  <rect x="300" y="265" width="22" height="110" fill="url(#bar2)" rx="2" opacity="0.85"/>
  <rect x="335" y="235" width="22" height="140" fill="url(#bar3)" rx="2" opacity="0.85"/>
  <rect x="370" y="200" width="22" height="175" fill="url(#bar3)" rx="2" opacity="0.9"/>
  <rect x="405" y="158" width="22" height="217" fill="url(#bar3)" rx="2" opacity="0.9"/>
  <rect x="440" y="110" width="22" height="265" fill="url(#goldGrad)" rx="2" opacity="0.7"/>
  <rect x="475" y="55" width="22" height="320" fill="url(#goldGrad)" rx="2" opacity="0.7"/>
  <rect x="510" y="42" width="22" height="333" fill="url(#goldGrad)" rx="2" opacity="0.8"/>
  <rect x="545" y="30" width="22" height="345" fill="#C9A84C" rx="2" opacity="0.8"/>
  <rect x="580" y="20" width="22" height="355" fill="#C9A84C" rx="2" opacity="0.85"/>
  <rect x="615" y="15" width="22" height="360" fill="#F0D68A" rx="2" opacity="0.85"/>
  <rect x="650" y="10" width="22" height="365" fill="#F0D68A" rx="2" opacity="0.9"/>

  <!-- Compounding curve overlay -->
  <path d="M90,370 Q160,360 230,340 Q300,290 370,220 Q440,130 510,60 Q580,20 650,12"
        stroke="url(#lineGrad)" stroke-width="3.5" fill="none" filter="url(#glow)" opacity="0.9"/>

  <!-- Coin icons at bottom -->
  <g fill="url(#goldGrad)" opacity="0.6">
    <ellipse cx="95" cy="385" rx="12" ry="5"/>
    <ellipse cx="130" cy="388" rx="10" ry="4"/>
    <ellipse cx="160" cy="390" rx="8" ry="3.5"/>
    <circle cx="95" cy="382" r="12" fill="url(#goldGrad)" opacity="0.4"/>
    <circle cx="130" cy="385" r="10" fill="url(#goldGrad)" opacity="0.3"/>
    <circle cx="160" cy="387" r="8" fill="url(#goldGrad)" opacity="0.2"/>
  </g>

  <!-- Small coins growing along the curve -->
  <circle cx="230" cy="338" r="4" fill="#C9A84C" opacity="0.5"/>
  <circle cx="300" cy="290" r="5" fill="#C9A84C" opacity="0.5"/>
  <circle cx="370" cy="220" r="6" fill="#F0D68A" opacity="0.5"/>
  <circle cx="440" cy="130" r="7" fill="#F0D68A" opacity="0.6"/>
  <circle cx="510" cy="60" r="8" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" filter="url(#softGlow)">
    複利效應實戰指南
  </text>

  <!-- Highlight dollar sign -->
  <text x="400" y="428" text-anchor="middle" fill="url(#goldGrad)" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" filter="url(#softGlow)">
    $3,000/月 → 20年後 $176萬
  </text>

  <!-- Key milestones -->
  <g filter="url(#glow)">
    <rect x="205" y="270" width="95" height="22" rx="11" fill="#C9A84C" opacity="0.2"/>
    <text x="252" y="285" text-anchor="middle" fill="#F0D68A" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">10年: $55萬</text>

    <rect x="420" y="85" width="105" height="22" rx="11" fill="#C9A84C" opacity="0.2"/>
    <text x="472" y="100" text-anchor="middle" fill="#F0D68A" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">15年: $100萬 ✓</text>

    <rect x="555" y="0" width="100" height="22" rx="11" fill="#C9A84C" opacity="0.25"/>
    <text x="605" y="15" text-anchor="middle" fill="#F0D68A" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">20年: $176萬</text>
  </g>

  <!-- Bar labels -->
  <g fill="rgba(255,255,255,0.35)" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">
    <text x="101" y="420">0</text>
    <text x="195" y="420">5</text>
    <text x="300" y="420">10</text>
    <text x="405" y="420">15</text>
    <text x="510" y="420">20</text>
    <text x="615" y="420">25年</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="730" cy="60" r="40" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
  <circle cx="730" cy="60" r="25" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
  <circle cx="730" cy="60" r="10" fill="#C9A84C" opacity="0.15"/>
</svg>
