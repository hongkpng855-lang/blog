<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#40916c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="60" fill="#ffffff" opacity="0.05"/>
  <circle cx="450" cy="420" r="80" fill="#ffffff" opacity="0.04"/>
  <circle cx="400" cy="100" r="40" fill="#ffffff" opacity="0.06"/>
  <!-- Water glass -->
  <rect x="180" y="180" width="150" height="200" rx="15" fill="url(#glass)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="195" y="195" width="120" height="100" rx="5" fill="#7ec8e3" opacity="0.4"/>
  <!-- Water line -->
  <line x1="195" y1="290" x2="315" y2="290" stroke="#7ec8e3" stroke-width="1.5" opacity="0.6"/>
  <!-- Lemon slice -->
  <circle cx="255" cy="220" r="25" fill="#f6e05e" opacity="0.7"/>
  <circle cx="255" cy="220" r="18" fill="#fefcbf" opacity="0.5"/>
  <!-- Leaf -->
  <path d="M310 195 Q330 175 340 190 Q330 200 310 195Z" fill="#95d5b2" opacity="0.8"/>
  <!-- Small hearts/wellness symbols -->
  <text x="400" y="280" font-size="30" fill="#ffffff" opacity="0.3">♥</text>
  <text x="130" y="350" font-size="24" fill="#ffffff" opacity="0.25">✦</text>
  <text x="370" y="390" font-size="20" fill="#ffffff" opacity="0.2">☀</text>
  <!-- Title text -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold" text-anchor="middle" letter-spacing="2">
    2026 健康趨勢
  </text>
  <text x="256" y="458" font-family="Arial, sans-serif" font-size="14" fill="#d8f3dc" text-anchor="middle" letter-spacing="1">
    主動經營生命質量
  </text>
</svg>