<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="512" y2="50"/><line x1="0" y1="100" x2="512" y2="100"/>
    <line x1="0" y1="150" x2="512" y2="150"/><line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="250" x2="512" y2="250"/><line x1="0" y1="300" x2="512" y2="300"/>
    <line x1="0" y1="350" x2="512" y2="350"/><line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="0" y1="450" x2="512" y2="450"/>
    <line x1="50" y1="0" x2="50" y2="512"/><line x1="100" y1="0" x2="100" y2="512"/>
    <line x1="150" y1="0" x2="150" y2="512"/><line x1="200" y1="0" x2="200" y2="512"/>
    <line x1="250" y1="0" x2="250" y2="512"/><line x1="300" y1="0" x2="300" y2="512"/>
    <line x1="350" y1="0" x2="350" y2="512"/><line x1="400" y1="0" x2="400" y2="512"/>
    <line x1="450" y1="0" x2="450" y2="512"/>
  </g>
  <!-- Floating circles -->
  <circle cx="100" cy="80" r="60" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="420" cy="400" r="80" fill="none" stroke="url(#accent2)" stroke-width="0.5" opacity="0.15"/>
  <!-- Neural network nodes -->
  <g filter="url(#glow)">
    <circle cx="120" cy="200" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="200" cy="160" r="4" fill="#06b6d4" opacity="0.6"/>
    <circle cx="160" cy="280" r="4" fill="#a855f7" opacity="0.6"/>
    <circle cx="300" cy="180" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="340" cy="300" r="4" fill="#06b6d4" opacity="0.6"/>
    <circle cx="260" cy="350" r="4" fill="#a855f7" opacity="0.6"/>
    <circle cx="380" cy="220" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="180" cy="380" r="4" fill="#06b6d4" opacity="0.6"/>
    <!-- Connecting lines -->
    <line x1="120" y1="200" x2="200" y2="160" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <line x1="120" y1="200" x2="160" y2="280" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <line x1="200" y1="160" x2="300" y2="180" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <line x1="160" y1="280" x2="260" y2="350" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <line x1="300" y1="180" x2="340" y2="300" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
    <line x1="300" y1="180" x2="380" y2="220" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <line x1="340" y1="300" x2="260" y2="350" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
    <line x1="160" y1="280" x2="340" y2="300" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <line x1="260" y1="350" x2="180" y2="380" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Central AI icon - brain/network symbol -->
  <g transform="translate(256, 240)" filter="url(#softGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#accent2)" stroke-width="1" opacity="0.3"/>
    <!-- Hexagon core -->
    <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="none" stroke="url(#accent2)" stroke-width="1" opacity="0.5"/>
    <!-- AI triangle symbols -->
    <polygon points="0,-12 8,6 -8,6" fill="url(#accent)" opacity="0.8"/>
    <polygon points="-20,-8 -14,-18 -26,-18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <polygon points="20,-8 26,-18 14,-18" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <polygon points="0,20 8,14 -8,14" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Code brackets -->
  <g transform="translate(256, 240)" filter="url(#glow)">
    <text x="-70" y="-10" font-family="monospace" font-size="36" fill="#06b6d4" opacity="0.15" text-anchor="end">&lt;/&gt;</text>
    <text x="40" y="-10" font-family="monospace" font-size="36" fill="#06b6d4" opacity="0.15" text-anchor="start">{ }</text>
  </g>
  <!-- Small data flow particles -->
  <g filter="url(#glow)">
    <circle cx="200" cy="200" r="2" fill="#06b6d4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="280" r="2" fill="#a855f7" opacity="0.8">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="180" r="2" fill="#6366f1" opacity="0.8">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="340" r="2" fill="#06b6d4" opacity="0.8">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Title -->
  <g filter="url(#glow)">
    <text x="256" y="370" font-family="'Noto Sans TC', system-ui, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle" letter-spacing="2">
      開源 AI 模型
    </text>
    <text x="256" y="400" font-family="'Noto Sans TC', system-ui, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle" letter-spacing="1">
      自建實戰完全指南
    </text>
  </g>
  <!-- Tech badges -->
  <g>
    <rect x="130" y="430" width="110" height="24" rx="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
    <text x="185" y="446" font-family="monospace" font-size="11" fill="#6366f1" text-anchor="middle">Llama 4</text>
    <rect x="250" y="430" width="100" height="24" rx="12" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <text x="300" y="446" font-family="monospace" font-size="11" fill="#06b6d4" text-anchor="middle">Stable Diffusion</text>
    <rect x="190" y="462" width="130" height="24" rx="12" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
    <text x="255" y="478" font-family="monospace" font-size="11" fill="#a855f7" text-anchor="middle">Completely Free</text>
  </g>
  <!-- Bottom accent line -->
  <rect x="156" y="500" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
