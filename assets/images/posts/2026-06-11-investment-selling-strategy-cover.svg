<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#0F1A33"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#B8952E"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="16"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="512" y2="80" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="512" y2="160" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="512" y2="240" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="512" y2="400" stroke="#C9A84C" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="256" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#C9A84C" letter-spacing="1">賣出策略</text>
  <text x="256" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8899BB" letter-spacing="0.5">SELLING STRATEGY · 完整決策系統</text>

  <!-- Key stats bar -->
  <rect x="20" y="78" width="472" height="28" rx="6" fill="#ffffff" opacity="0.06"/>
  <text x="256" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#AABBCC">止蝕保護 · 獲利了結 · 再平衡 · 心理管理</text>

  <!-- Card 1: 止蝕策略 -->
  <rect x="20" y="120" width="225" height="100" rx="10" fill="url(#cardBg)" opacity="0.1"/>
  <rect x="20" y="120" width="225" height="100" rx="10" fill="none" stroke="url(#redGrad)" stroke-width="1.5" opacity="0.7"/>
  <text x="36" y="148" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#E74C3C">🛡️ 止蝕策略</text>
  <text x="36" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#AABBCC">固定% · 移動止蝕 · 基本面止蝕</text>
  <text x="36" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#8899BB">保護本金第一原則</text>
  <text x="36" y="202" font-family="system-ui, sans-serif" font-size="9" fill="#667788">跌穿20%或基本面變 → 即走</text>

  <!-- Card 2: 獲利策略 -->
  <rect x="265" y="120" width="225" height="100" rx="10" fill="url(#cardBg)" opacity="0.1"/>
  <rect x="265" y="120" width="225" height="100" rx="10" fill="none" stroke="url(#greenGrad)" stroke-width="1.5" opacity="0.7"/>
  <text x="281" y="148" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#2ECC71">💰 獲利了結</text>
  <text x="281" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#AABBCC">目標價法 · 分批賣出法</text>
  <text x="281" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#8899BB">唔好估頂，分批鎖定利潤</text>
  <text x="281" y="202" font-family="system-ui, sans-serif" font-size="9" fill="#667788">保守+進取雙目標法最穩</text>

  <!-- Card 3: 系統賣出 -->
  <rect x="20" y="238" width="225" height="100" rx="10" fill="url(#cardBg)" opacity="0.1"/>
  <rect x="20" y="238" width="225" height="100" rx="10" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" opacity="0.7"/>
  <text x="36" y="266" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#3498DB">🔄 系統型賣出</text>
  <text x="36" y="286" font-family="system-ui, sans-serif" font-size="10" fill="#AABBCC">再平衡 · 人生階段 · 現金需求</text>
  <text x="36" y="303" font-family="system-ui, sans-serif" font-size="10" fill="#8899BB">唔靠感覺，靠系統</text>
  <text x="36" y="320" font-family="system-ui, sans-serif" font-size="9" fill="#667788">每年 1-2 次再平衡</text>

  <!-- Card 4: 心理管理 -->
  <rect x="265" y="238" width="225" height="100" rx="10" fill="url(#cardBg)" opacity="0.1"/>
  <rect x="265" y="238" width="225" height="100" rx="10" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
  <text x="281" y="266" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#C9A84C">🧠 心理管理</text>
  <text x="281" y="286" font-family="system-ui, sans-serif" font-size="10" fill="#AABBCC">處置效應 · FOMO應對</text>
  <text x="281" y="303" font-family="system-ui, sans-serif" font-size="10" fill="#8899BB">賣出日記記錄每次決定</text>
  <text x="281" y="320" font-family="system-ui, sans-serif" font-size="9" fill="#667788">每季 review 改善 pattern</text>

  <!-- Bottom decision tree mini -->
  <rect x="20" y="358" width="472" height="48" rx="8" fill="#ffffff" opacity="0.05"/>
  <rect x="20" y="358" width="472" height="48" rx="8" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <text x="256" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#C9A84C">賣出決策樹</text>
  
  <!-- Flow arrows -->
  <text x="50" y="397" font-family="system-ui, sans-serif" font-size="8" fill="#E74C3C" opacity="0.7">止蝕</text>
  <text x="28" y="398" font-family="system-ui, sans-serif" font-size="10" fill="#667788">→</text>
  <text x="110" y="397" font-family="system-ui, sans-serif" font-size="8" fill="#2ECC71" opacity="0.7">獲利</text>
  <text x="102" y="398" font-family="system-ui, sans-serif" font-size="10" fill="#667788">→</text>
  <text x="180" y="397" font-family="system-ui, sans-serif" font-size="8" fill="#3498DB" opacity="0.7">再平衡</text>
  <text x="178" y="398" font-family="system-ui, sans-serif" font-size="10" fill="#667788">→</text>
  <text x="272" y="397" font-family="system-ui, sans-serif" font-size="8" fill="#C9A84C" opacity="0.7">心理管理</text>
  <text x="288" y="398" font-family="system-ui, sans-serif" font-size="10" fill="#667788">→</text>
  <text x="390" y="397" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff" opacity="0.5">持有/Monitor</text>

  <!-- Bottom stats bar -->
  <rect x="130" y="420" width="80" height="22" rx="4" fill="#ffffff" opacity="0.06"/>
  <text x="170" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#667788">🛡️ 4 大策略</text>
  
  <rect x="220" y="420" width="80" height="22" rx="4" fill="#ffffff" opacity="0.06"/>
  <text x="260" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#667788">✅ 4 步行動清單</text>

  <rect x="310" y="420" width="80" height="22" rx="4" fill="#ffffff" opacity="0.06"/>
  <text x="350" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#667788">📝 賣出日記</text>

  <!-- Footer watermark -->
  <text x="256" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#556677">hongkpng855-lang.github.io/blog/investment/2026/06/11/investment-selling-strategy-guide-hk.html</text>

  <!-- Corner decorative elements -->
  <circle cx="480" cy="30" r="4" fill="#C9A84C" opacity="0.15"/>
  <circle cx="490" cy="25" r="2" fill="#C9A84C" opacity="0.1"/>
  <circle cx="30" cy="30" r="3" fill="#C9A84C" opacity="0.15"/>
</svg>
