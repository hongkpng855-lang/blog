<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="playBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.08">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="white"/>
    </pattern>
    <rect width="512" height="512" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="430" cy="80" r="120" fill="url(#accent2)" opacity="0.15"/>
  <circle cx="80" cy="420" r="100" fill="url(#accent)" opacity="0.08"/>

  <!-- Filmstrip frame icon -->
  <g transform="translate(256, 175)" filter="url(#softGlow)">
    <!-- Film strip frame -->
    <rect x="-95" y="-55" width="190" height="110" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <!-- Sprocket holes top -->
    <rect x="-80" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="-60" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="-40" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="-20" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="0" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="20" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="40" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="60" y="-60" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <!-- Sprocket holes bottom -->
    <rect x="-80" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="-60" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="-40" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="-20" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="0" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="20" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="40" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>
    <rect x="60" y="54" width="6" height="6" rx="1" fill="white" opacity="0.4"/>

    <!-- Scene within frame - landscape -->
    <rect x="-85" y="-48" width="170" height="96" rx="4" fill="#1a1a2e" opacity="0.6"/>

    <!-- Mountain/landscape inside scene -->
    <polygon points="-85,10 -55,-10 -25,5 5,-5 35,15 65,-15 85,5 85,48 -85,48" fill="#533483" opacity="0.4"/>
    <polygon points="-85,20 -45,5 -15,15 15,0 45,20 75,5 85,15 85,48 -85,48" fill="#0f3460" opacity="0.5"/>

    <!-- Stars in scene -->
    <circle cx="-60" cy="-30" r="1" fill="white" opacity="0.6"/>
    <circle cx="-30" cy="-35" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="10" cy="-28" r="1" fill="white" opacity="0.5"/>
    <circle cx="40" cy="-32" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="60" cy="-25" r="1" fill="white" opacity="0.6"/>

    <!-- Sun/moon -->
    <circle cx="55" cy="-35" r="10" fill="#e94560" opacity="0.3"/>

    <!-- Play button overlay -->
    <circle cx="0" cy="0" r="22" fill="url(#playBtn)" opacity="0.9"/>
    <polygon points="-8,-12 -8,12 14,0" fill="white"/>
  </g>

  <!-- Audio visualizer bars -->
  <g transform="translate(256, 310)" opacity="0.6">
    <rect x="-60" y="-30" width="8" height="30" rx="2" fill="url(#bar1)">
      <animate attributeName="height" values="30;50;20;40;30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-30;-50;-20;-40;-30" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-46" y="-40" width="8" height="40" rx="2" fill="url(#bar2)">
      <animate attributeName="height" values="40;25;55;35;40" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-40;-25;-55;-35;-40" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-32" y="-25" width="8" height="25" rx="2" fill="url(#bar3)">
      <animate attributeName="height" values="25;45;30;50;25" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-25;-45;-30;-50;-25" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-18" y="-45" width="8" height="45" rx="2" fill="url(#bar1)">
      <animate attributeName="height" values="45;30;50;20;45" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-45;-30;-50;-20;-45" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-4" y="-35" width="8" height="35" rx="2" fill="url(#bar2)">
      <animate attributeName="height" values="35;55;25;45;35" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-35;-55;-25;-45;-35" dur="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="-28" width="8" height="28" rx="2" fill="url(#bar3)">
      <animate attributeName="height" values="28;38;48;18;28" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-28;-38;-48;-18;-28" dur="2.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="-42" width="8" height="42" rx="2" fill="url(#bar1)">
      <animate attributeName="height" values="42;22;52;32;42" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-42;-22;-52;-32;-42" dur="1.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="38" y="-30" width="8" height="30" rx="2" fill="url(#bar2)">
      <animate attributeName="height" values="30;48;20;38;30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-30;-48;-20;-38;-30" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="52" y="-38" width="8" height="38" rx="2" fill="url(#bar3)">
      <animate attributeName="height" values="38;28;45;35;38" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-38;-28;-45;-35;-38" dur="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Title -->
  <text x="256" y="380" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">
    AI 影片生成
  </text>
  <text x="256" y="408" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" text-anchor="middle" opacity="0.8">
    2026 實戰指南
  </text>

  <!-- Sora / Runway / Pika labels -->
  <g transform="translate(256, 445)" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" text-anchor="middle">
    <rect x="-130" y="-10" width="80" height="20" rx="10" fill="#e94560" opacity="0.2"/>
    <text x="-90" y="4" fill="#ff6b6b" opacity="0.9">Sora</text>

    <rect x="-40" y="-10" width="80" height="20" rx="10" fill="#533483" opacity="0.2"/>
    <text x="0" y="4" fill="#c084fc" opacity="0.9">Runway</text>

    <rect x="50" y="-10" width="80" height="20" rx="10" fill="#0f3460" opacity="0.2"/>
    <text x="90" y="4" fill="#60a5fa" opacity="0.9">Pika</text>
  </g>

  <!-- Bottom decoration -->
  <line x1="180" y1="480" x2="332" y2="480" stroke="#e94560" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="200" y1="485" x2="312" y2="485" stroke="#533483" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
