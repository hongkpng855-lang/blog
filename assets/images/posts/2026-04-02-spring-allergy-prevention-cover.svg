<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 春天花朵 -->
  <g fill="#ffc107" opacity="0.8">
    <circle cx="150" cy="150" r="40"/>
    <circle cx="200" cy="120" r="30"/>
    <circle cx="100" cy="180" r="25"/>
  </g>
  <g fill="#ff9800" opacity="0.7">
    <circle cx="1050" cy="480" r="35"/>
    <circle cx="1100" cy="450" r="28"/>
    <circle cx="1000" cy="510" r="22"/>
  </g>
  <!-- 口罩圖示 -->
  <g transform="translate(500,200)">
    <rect x="0" y="50" width="200" height="100" rx="20" fill="#64b5f6"/>
    <rect x="20" y="70" width="160" height="60" rx="10" fill="#90caf9"/>
    <line x1="0" y1="80" x2="0" y2="120" stroke="#1976d2" stroke-width="3"/>
    <line x1="200" y1="80" x2="200" y2="120" stroke="#1976d2" stroke-width="3"/>
  </g>
  <!-- 標題 -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2e7d32">春季過敏預防指南</text>
  <text x="600" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#558b2f">保護自己，遠離過敏原</text>
  <!-- 裝飾元素 -->
  <g fill="#81c784" opacity="0.5">
    <ellipse cx="300" cy="550" rx="80" ry="30"/>
    <ellipse cx="900" cy="100" rx="100" ry="40"/>
  </g>
</svg>