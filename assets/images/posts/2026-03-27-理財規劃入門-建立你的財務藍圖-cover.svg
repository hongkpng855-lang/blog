<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f6ad55"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- 頂部強調色條 -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent-gradient)"/>
  
  <!-- 左側裝飾線 -->
  <rect x="50" y="120" width="8" height="230" fill="#ffd700"/>
  
  <!-- 分類標籤 -->
  <rect x="80" y="120" width="100" height="36" rx="18" fill="#ffd700" fill-opacity="0.2"/>
  <text x="130" y="145" font-family="Microsoft YaHei, PingFang TC, sans-serif" font-size="18" fill="#ffd700" text-anchor="middle">#投資</text>
  
  <!-- 主標題 -->
  <text x="80" y="220" font-family="Microsoft YaHei, PingFang TC, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">理財規劃入門</text>
  <text x="80" y="290" font-family="Microsoft YaHei, PingFang TC, sans-serif" font-size="36" fill="#e2e8f0">建立你的財務藍圖</text>
  
  <!-- 副標題 -->
  <text x="80" y="360" font-family="Microsoft YaHei, PingFang TC, sans-serif" font-size="24" fill="#a0aec0">設定目標 × 盤點資產 × 制定預算</text>
  
  <!-- 裝飾圓形 -->
  <circle cx="1000" cy="400" r="180" fill="#ffd700" fill-opacity="0.08"/>
  <circle cx="1100" cy="200" r="120" fill="#4299e1" fill-opacity="0.1"/>
  <circle cx="900" cy="150" r="80" fill="#ffd700" fill-opacity="0.05"/>
  
  <!-- 圖示 - 金幣堆疊 -->
  <ellipse cx="950" cy="480" rx="80" ry="20" fill="#ffd700" fill-opacity="0.3"/>
  <ellipse cx="950" cy="450" rx="70" ry="18" fill="#ffd700" fill-opacity="0.5"/>
  <ellipse cx="950" cy="420" rx="60" ry="15" fill="#ffd700" fill-opacity="0.7"/>
  
  <!-- 底部網站名稱 -->
  <rect x="0" y="570" width="1200" height="60" fill="#1a202c"/>
  <text x="80" y="608" font-family="Microsoft YaHei, PingFang TC, sans-serif" font-size="20" fill="#a0aec0">Sun ny 的部落格</text>
  
  <!-- 統計數據裝飾 -->
  <text x="1050" y="608" font-family="Arial, sans-serif" font-size="16" fill="#718096" text-anchor="end">2026.03.27</text>
</svg>
