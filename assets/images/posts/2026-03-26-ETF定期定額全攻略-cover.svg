<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg2)"/>
  
  <!-- Coins stack -->
  <g transform="translate(850, 150)">
    <ellipse cx="100" cy="350" rx="80" ry="20" fill="#1a3a5c"/>
    <rect x="20" y="300" width="160" height="50" rx="10" fill="url(#gold)"/>
    <ellipse cx="100" cy="300" rx="80" ry="20" fill="#ffe066"/>
    <rect x="20" y="230" width="160" height="50" rx="10" fill="url(#gold)"/>
    <ellipse cx="100" cy="230" rx="80" ry="20" fill="#ffe066"/>
    <rect x="20" y="160" width="160" height="50" rx="10" fill="url(#gold)"/>
    <ellipse cx="100" cy="160" rx="80" ry="20" fill="#ffe066"/>
    <rect x="20" y="90" width="160" height="50" rx="10" fill="url(#gold)"/>
    <ellipse cx="100" cy="90" rx="80" ry="20" fill="#ffe066"/>
    <!-- Dollar sign -->
    <text x="100" y="130" text-anchor="middle" fill="#0d1b2a" font-size="36" font-weight="bold">$</text>
  </g>
  
  <!-- Growth arrows -->
  <g transform="translate(700, 200)">
    <polygon points="50,0 100,50 75,50 75,150 25,150 25,50 0,50" fill="#22c55e" opacity="0.8"/>
    <text x="50" y="200" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="bold">成長</text>
  </g>
  
  <!-- Calendar icon -->
  <g transform="translate(100, 350)">
    <rect x="0" y="20" width="120" height="100" rx="10" fill="#415a77"/>
    <rect x="0" y="0" width="120" height="40" rx="10" fill="#e94560"/>
    <rect x="10" y="10" width="20" height="30" fill="#fff" rx="3"/>
    <rect x="90" y="10" width="20" height="30" fill="#fff" rx="3"/>
    <text x="60" y="70" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">每月</text>
    <text x="60" y="100" text-anchor="middle" fill="#ffd700" font-size="20">定期定額</text>
  </g>
  
  <!-- Title -->
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    ETF 定期定額全攻略
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="160" font-family="Arial, sans-serif" font-size="28" fill="#ffd700">
    小資族穩健致富的秘訣
  </text>
  
  <!-- Feature boxes -->
  <g transform="translate(80, 250)">
    <rect x="0" y="0" width="180" height="80" rx="10" fill="#415a77"/>
    <text x="90" y="35" text-anchor="middle" fill="#ffd700" font-size="36" font-weight="bold">1000</text>
    <text x="90" y="60" text-anchor="middle" fill="#fff" font-size="14">元就能開始</text>
  </g>
  
  <g transform="translate(280, 250)">
    <rect x="0" y="0" width="180" height="80" rx="10" fill="#415a77"/>
    <text x="90" y="35" text-anchor="middle" fill="#22c55e" font-size="36" font-weight="bold">8%</text>
    <text x="90" y="60" text-anchor="middle" fill="#fff" font-size="14">年化報酬率</text>
  </g>
  
  <!-- ETF labels -->
  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="#e94560"/>
    <text x="40" y="28" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">0050</text>
    
    <rect x="100" y="0" width="80" height="40" rx="20" fill="#22c55e"/>
    <text x="140" y="28" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">0056</text>
    
    <rect x="200" y="0" width="80" height="40" rx="20" fill="#ffd700"/>
    <text x="240" y="28" text-anchor="middle" fill="#0d1b2a" font-size="16" font-weight="bold">00878</text>
    
    <rect x="300" y="0" width="80" height="40" rx="20" fill="#415a77"/>
    <text x="340" y="28" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">00919</text>
  </g>
  
  <!-- Piggy bank -->
  <g transform="translate(500, 400)">
    <ellipse cx="60" cy="80" rx="50" ry="40" fill="#e94560"/>
    <ellipse cx="60" cy="60" rx="50" ry="35" fill="#ff6b6b"/>
    <circle cx="100" cy="50" r="15" fill="#ff6b6b"/>
    <rect x="105" y="45" width="20" height="10" rx="2" fill="#e94560"/>
    <ellipse cx="30" cy="90" rx="15" ry="8" fill="#e94560"/>
    <ellipse cx="90" cy="90" rx="15" ry="8" fill="#e94560"/>
    <circle cx="45" cy="55" r="5" fill="#0d1b2a"/>
    <circle cx="70" cy="55" r="5" fill="#0d1b2a"/>
    <!-- Coin slot -->
    <rect x="50" y="25" width="20" height="5" rx="2" fill="#0d1b2a"/>
  </g>
</svg>