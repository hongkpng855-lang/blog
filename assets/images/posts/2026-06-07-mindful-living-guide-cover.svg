<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="0"/>
  <!-- Background circles -->
  <circle cx="420" cy="100" r="180" fill="#1b2a4a" opacity="0.3"/>
  <circle cx="80" cy="400" r="140" fill="#0f3460" opacity="0.2"/>
  <!-- Decorative dots pattern -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="2" fill="#c9a84c"/>
    <circle cx="120" cy="80" r="1.5" fill="#c9a84c"/>
    <circle cx="80" cy="150" r="2" fill="#c9a84c"/>
    <circle cx="180" cy="40" r="1.5" fill="#c9a84c"/>
    <circle cx="400" cy="60" r="2" fill="#c9a84c"/>
    <circle cx="450" cy="130" r="1.5" fill="#c9a84c"/>
    <circle cx="480" cy="200" r="2" fill="#c9a84c"/>
    <circle cx="30" cy="280" r="1.5" fill="#c9a84c"/>
    <circle cx="60" cy="350" r="2" fill="#c9a84c"/>
    <circle cx="440" cy="350" r="1.5" fill="#c9a84c"/>
    <circle cx="470" cy="420" r="2" fill="#c9a84c"/>
    <circle cx="380" cy="470" r="1.5" fill="#c9a84c"/>
    <circle cx="150" cy="460" r="2" fill="#c9a84c"/>
    <circle cx="250" cy="490" r="1.5" fill="#c9a84c"/>
    <circle cx="340" cy="30" r="1.5" fill="#c9a84c"/>
  </g>
  <!-- Main icon: simplified lotus/mindfulness symbol -->
  <g transform="translate(256, 200)" filter="url(#softGlow)">
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.3"/>
    <!-- Zen circle (enso) - broken circle -->
    <path d="M 0,-75 A 75,75 0 1,1 -55,50" fill="none" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Simplified leaves -->
    <ellipse cx="-30" cy="-30" rx="20" ry="8" transform="rotate(-40 -30 -30)" fill="#c9a84c" opacity="0.15"/>
    <ellipse cx="30" cy="-20" rx="18" ry="7" transform="rotate(30 30 -20)" fill="#c9a84c" opacity="0.15"/>
    <!-- Small star/sparkle -->
    <circle cx="35" cy="-55" r="3" fill="#e8d5b7" opacity="0.6"/>
    <circle cx="-40" cy="-50" r="2" fill="#e8d5b7" opacity="0.4"/>
    <circle cx="10" cy="-65" r="2" fill="#e8d5b7" opacity="0.3"/>
  </g>
  <!-- Title text -->
  <text x="256" y="320" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="24" font-weight="700" fill="#e8d5b7" text-anchor="middle" letter-spacing="2">
    城市人心靈整理術
  </text>
  <text x="256" y="355" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="15" fill="#c9a84c" text-anchor="middle" opacity="0.8" letter-spacing="1">
    從空間到內在的減法生活指南
  </text>
  <!-- Bottom line decoration -->
  <line x1="156" y1="380" x2="356" y2="380" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  <line x1="206" y1="388" x2="306" y2="388" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <!-- Tags -->
  <text x="256" y="420" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="11" fill="#8899aa" text-anchor="middle" letter-spacing="1">
    斷捨離 · 正念 · 極簡生活
  </text>
  <!-- Bottom decorative bar -->
  <rect x="0" y="490" width="512" height="22" fill="#c9a84c" opacity="0.08"/>
  <text x="256" y="506" font-family="system-ui, 'Noto Sans TC', sans-serif" font-size="9" fill="#c9a84c" text-anchor="middle" opacity="0.15" letter-spacing="3">減少・簡化・回歸</text>
</svg>
