<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4f3b"/>
      <stop offset="100%" style="stop-color:#1a7a5a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ddfa0"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd166"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="rgba(255,255,255,0.03)"/>
  <circle cx="700" cy="380" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="650" cy="100" r="40" fill="rgba(255,255,255,0.05)"/>

  <!-- Shield icon - immunity -->
  <g transform="translate(120, 150)" filter="url(#glow)">
    <path d="M100 0 L200 50 L200 140 Q200 200 100 230 Q0 200 0 140 L0 50 Z" fill="url(#shield)" opacity="0.85"/>
    <path d="M100 20 L180 60 L180 135 Q180 185 100 210 Q20 185 20 135 L20 60 Z" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <!-- Check mark inside shield -->
    <path d="M60 130 L85 155 L140 100" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Gut icon - stylized intestines -->
  <g transform="translate(350, 120)" fill="none" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" opacity="0.9">
    <path d="M20 40 Q50 10 80 40 Q110 70 140 40 Q170 10 200 40 Q230 70 250 50" />
    <path d="M20 80 Q50 50 80 80 Q110 110 140 80 Q170 50 200 80 Q230 110 250 90" />
    <path d="M20 120 Q50 90 80 120 Q110 150 140 120 Q170 90 200 120 Q230 150 250 130" />
    <path d="M20 160 Q50 130 80 160 Q110 190 140 160 Q170 130 200 160 Q230 190 250 170" />
  </g>

  <!-- Friendly bacteria dots -->
  <g fill="#7ddfa0" opacity="0.6">
    <circle cx="60" cy="260" r="5"/>
    <circle cx="90" cy="280" r="3.5"/>
    <circle cx="130" cy="270" r="4.5"/>
    <circle cx="160" cy="290" r="3"/>
    <circle cx="200" cy="265" r="4"/>
    <circle cx="230" cy="285" r="3.5"/>
    <circle cx="310" cy="275" r="4"/>
    <circle cx="340" cy="260" r="3"/>
    <circle cx="370" cy="290" r="4.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="1">
    夏天腸道健康指南
  </text>
  <text x="400" y="398" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a0e8c0" letter-spacing="0.5">
    提升免疫力 · 踢走腸胃敏感
  </text>

  <!-- Bottom decorative line -->
  <line x1="200" y1="420" x2="600" y2="420" stroke="#7ddfa0" stroke-width="1.5" opacity="0.4"/>
</svg>
