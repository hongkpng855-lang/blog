<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#2d4a6a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c87a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="8"/>
  <!-- Simplified room before -->
  <rect x="40" y="60" width="200" height="160" rx="4" fill="#3a5a7a" opacity="0.4"/>
  <rect x="50" y="70" width="40" height="50" rx="2" fill="#5a7a9a" opacity="0.6"/>
  <rect x="100" y="80" width="30" height="60" rx="2" fill="#5a7a9a" opacity="0.5"/>
  <rect x="150" y="75" width="35" height="55" rx="2" fill="#5a7a9a" opacity="0.6"/>
  <rect x="50" y="135" width="60" height="30" rx="2" fill="#5a7a9a" opacity="0.5"/>
  <rect x="130" y="140" width="45" height="25" rx="2" fill="#5a7a9a" opacity="0.4"/>
  <rect x="55" y="175" width="170" height="35" rx="2" fill="#5a7a9a" opacity="0.3"/>
  <!-- Arrow -->
  <text x="256" y="150" text-anchor="middle" font-size="48" fill="#e8c87a" font-family="sans-serif">→</text>
  <!-- Simplified room after (minimal) -->
  <rect x="270" y="60" width="200" height="160" rx="4" fill="#3a5a7a" opacity="0.4"/>
  <rect x="290" y="80" width="60" height="80" rx="2" fill="#5a7a9a" opacity="0.5"/>
  <circle cx="420" cy="110" r="25" fill="#5a7a9a" opacity="0.4"/>
  <!-- Plant -->
  <rect x="410" y="150" width="8" height="25" rx="3" fill="#6a9a6a"/>
  <circle cx="414" cy="145" r="12" fill="#6a9a6a" opacity="0.7"/>
  <circle cx="408" cy="138" r="8" fill="#7aaa7a" opacity="0.6"/>
  <circle cx="420" cy="140" r="9" fill="#7aaa7a" opacity="0.6"/>
  <!-- Title text -->
  <text x="256" y="280" text-anchor="middle" font-size="28" fill="#ffffff" font-family="sans-serif" font-weight="700">斷捨離</text>
  <text x="256" y="315" text-anchor="middle" font-size="32" fill="url(#accent)" font-family="sans-serif" font-weight="700">極簡生活</text>
  <text x="256" y="350" text-anchor="middle" font-size="18" fill="#aabbcc" font-family="sans-serif">擺脫物質束縛・釋放空間心靈</text>
  <!-- Bottom decoration -->
  <rect x="150" y="380" width="212" height="3" rx="2" fill="url(#accent)"/>
  <text x="256" y="415" text-anchor="middle" font-size="14" fill="#8899aa" font-family="sans-serif">LIFESTYLE · 生活指南</text>
  <!-- Small icons -->
  <circle cx="180" cy="460" r="8" fill="#5a7a9a" opacity="0.5"/>
  <circle cx="230" cy="460" r="8" fill="#5a7a9a" opacity="0.5"/>
  <circle cx="256" cy="460" r="8" fill="#e8c87a" opacity="0.8"/>
  <circle cx="282" cy="460" r="8" fill="#5a7a9a" opacity="0.5"/>
  <circle cx="332" cy="460" r="8" fill="#5a7a9a" opacity="0.5"/>
</svg>
