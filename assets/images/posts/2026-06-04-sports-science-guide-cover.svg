<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#44b09e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="16"/>
  <!-- Running figure -->
  <g transform="translate(140, 180)">
    <!-- Head -->
    <circle cx="0" cy="-50" r="16" fill="none" stroke="#4ecdc4" stroke-width="2.5"/>
    <!-- Body -->
    <line x1="0" y1="-34" x2="-8" y2="10" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left arm (forward) -->
    <line x1="-8" y1="0" x2="-30" y2="-25" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right arm (back) -->
    <line x1="-8" y1="0" x2="10" y2="-18" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left leg (forward) -->
    <line x1="-8" y1="10" x2="-28" y2="40" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-28" y1="40" x2="-22" y2="60" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right leg (back) -->
    <line x1="-8" y1="10" x2="12" y2="35" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="35" x2="18" y2="60" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Motion lines -->
    <line x1="-45" y1="-10" x2="-35" y2="-10" stroke="#4ecdc4" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="-50" y1="5" x2="-38" y2="5" stroke="#4ecdc4" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <line x1="-43" y1="20" x2="-35" y2="20" stroke="#4ecdc4" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  </g>
  <!-- Heart rate line -->
  <polyline points="240,240 260,240 270,200 280,280 290,160 300,280 310,220 320,240 340,240"
    fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Dumbbell left -->
  <g transform="translate(60, 340)">
    <rect x="-8" y="-3" width="16" height="6" rx="3" fill="#4ecdc4" opacity="0.5"/>
    <rect x="-3" y="-22" width="6" height="44" rx="2" fill="#4ecdc4" opacity="0.6"/>
    <rect x="-8" y="-25" width="16" height="6" rx="3" fill="#4ecdc4" opacity="0.5"/>
  </g>
  <!-- Dumbbell right -->
  <g transform="translate(450, 340) scale(-1,1)">
    <rect x="-8" y="-3" width="16" height="6" rx="3" fill="#4ecdc4" opacity="0.5"/>
    <rect x="-3" y="-22" width="6" height="44" rx="2" fill="#4ecdc4" opacity="0.6"/>
    <rect x="-8" y="-25" width="16" height="6" rx="3" fill="#4ecdc4" opacity="0.5"/>
  </g>
  <!-- Circles decoration -->
  <circle cx="60" cy="140" r="20" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.15"/>
  <circle cx="60" cy="140" r="12" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.1"/>
  <circle cx="460" cy="140" r="20" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.15"/>
  <circle cx="460" cy="140" r="12" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.1"/>
  <!-- Title -->
  <text x="256" y="420" text-anchor="middle" fill="#4ecdc4" font-family="system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="1">運動科學完全指南</text>
  <text x="256" y="450" text-anchor="middle" fill="#8899aa" font-family="system-ui, sans-serif" font-size="13" opacity="0.8">功能訓練 · 心肺強化 · 科學恢復</text>
  <!-- Bottom bar -->
  <rect x="180" y="472" width="152" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
