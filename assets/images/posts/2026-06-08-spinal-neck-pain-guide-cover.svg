<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#2d4a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#44bd8a"/>
    </linearGradient>
    <linearGradient id="spine-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4" stop-opacity="0.8"/>
      <stop offset="100%" style="stop-color:#44bd8a" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#44bd8a" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="200" r="280" fill="url(#glow)"/>
  <circle cx="1000" cy="450" r="220" fill="url(#glow)"/>
  <circle cx="600" cy="315" r="350" fill="#4ecdc4" opacity="0.03"/>

  <!-- Decorative dots -->
  <g fill="#4ecdc4" opacity="0.06">
    <circle cx="80" cy="80" r="3"/><circle cx="160" cy="150" r="2"/>
    <circle cx="300" cy="60" r="4"/><circle cx="500" cy="100" r="2"/>
    <circle cx="700" cy="50" r="3"/><circle cx="900" cy="90" r="2"/>
    <circle cx="1050" cy="70" r="4"/><circle cx="1120" cy="180" r="2"/>
    <circle cx="1100" cy="550" r="3"/><circle cx="950" cy="580" r="2"/>
    <circle cx="750" cy="560" r="4"/><circle cx="400" cy="570" r="2"/>
    <circle cx="150" cy="540" r="3"/><circle cx="60" cy="450" r="2"/>
  </g>

  <!-- Human figure outline - side profile with highlighted spine -->
  <g transform="translate(420, 50)" filter="url(#shadow)">
    <!-- Body outline (side profile silhouette) -->
    <!-- Head -->
    <path d="M 180,100 C 180,70 200,50 225,50 C 250,50 270,65 270,90 C 270,115 255,130 240,140 L 230,155 L 215,155 L 210,140 C 195,130 180,120 180,100 Z" 
          fill="#1a2a4a" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.4"/>
    
    <!-- Neck -->
    <rect x="215" y="155" width="20" height="40" rx="5" fill="#1a2a4a" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.3"/>
    
    <!-- Torso -->
    <path d="M 200,195 Q 195,230 190,290 Q 185,340 195,380 L 210,380 L 240,380 L 250,380 Q 255,340 250,290 Q 245,230 240,195 Z" 
          fill="#1a2a4a" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.4"/>
    
    <!-- Spine highlight -->
    <path d="M 225,160 L 222,200 Q 220,240 218,280 Q 216,320 220,360 L 222,380" 
          stroke="url(#spine-grad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glow-filter)"/>
    
    <!-- Spine segments (vertebrae dots) -->
    <g fill="#4ecdc4" opacity="0.9">
      <circle cx="224" cy="170" r="3.5"/><circle cx="223" cy="185" r="3.5"/>
      <circle cx="222" cy="200" r="4"/><circle cx="221" cy="215" r="4"/>
      <circle cx="220" cy="230" r="4.5"/><circle cx="219" cy="245" r="4.5"/>
      <circle cx="218" cy="260" r="5"/><circle cx="218" cy="275" r="5"/>
      <circle cx="218" cy="290" r="5"/><circle cx="219" cy="305" r="5"/>
      <circle cx="219" cy="320" r="4.5"/><circle cx="220" cy="335" r="4"/>
      <circle cx="221" cy="350" r="4"/><circle cx="222" cy="365" r="3.5"/>
    </g>

    <!-- Glowing pulse on neck area -->
    <circle cx="225" cy="165" r="12" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="225" cy="165" r="8" fill="none" stroke="#44bd8a" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="8;14;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Healing wave lines -->
  <g stroke="#4ecdc4" stroke-width="1.5" fill="none" opacity="0.15" transform="translate(500, 80)">
    <path d="M 30,150 Q 50,130 70,150 Q 90,170 110,150 Q 130,130 150,150"/>
    <path d="M 30,165 Q 50,145 70,165 Q 90,185 110,165 Q 130,145 150,165"/>
    <path d="M 30,180 Q 50,160 70,180 Q 90,200 110,180 Q 130,160 150,180"/>
  </g>

  <!-- Right side: exercise illustration icons -->
  <g transform="translate(780, 100)" opacity="0.25" stroke="#4ecdc4" stroke-width="2" fill="none">
    <!-- Chin tuck icon -->
    <g transform="translate(0, 0)">
      <ellipse cx="40" cy="20" rx="25" ry="20" stroke-width="1.5"/>
      <line x1="50" y1="40" x2="50" y2="60" stroke-width="1.5"/>
      <line x1="20" y1="60" x2="80" y2="60" stroke-width="1.5"/>
      <path d="M 55,12 Q 50,15 45,12" stroke-width="1"/>
      <path d="M 55,18 Q 50,21 45,18" stroke-width="1"/>
    </g>
    <!-- Stand icon -->
    <g transform="translate(130, 0)">
      <line x1="40" y1="10" x2="40" y2="70" stroke-width="1.5"/>
      <line x1="25" y1="25" x2="55" y2="10" stroke-width="1.5"/>
      <line x1="25" y1="40" x2="55" y2="25" stroke-width="1.5"/>
      <line x1="10" y1="70" x2="70" y2="70" stroke-width="1.5"/>
    </g>
    <!-- Neck stretch icon -->
    <g transform="translate(0, 110)">
      <ellipse cx="40" cy="15" rx="20" ry="16" stroke-width="1.5"/>
      <line x1="40" y1="31" x2="40" y2="50" stroke-width="1.5"/>
      <line x1="15" y1="50" x2="65" y2="50" stroke-width="1.5"/>
      <line x1="35" y1="50" x2="25" y2="75" stroke-width="1.5"/>
      <line x1="45" y1="50" x2="55" y2="75" stroke-width="1.5"/>
      <path d="M 60,10 Q 70,15 65,22" stroke-width="1" opacity="0.6"/>
    </g>
    <!-- Desk ergonomics icon -->
    <g transform="translate(130, 110)">
      <rect x="15" y="5" width="80" height="5" rx="2" stroke-width="1.5"/>
      <rect x="35" y="10" width="15" height="25" rx="2" stroke-width="1.5"/>
      <rect x="20" y="20" width="10" height="15" rx="1" stroke-width="1"/>
      <rect x="55" y="15" width="25" height="20" rx="2" stroke-width="1.5"/>
      <line x1="25" y1="45" x2="25" y2="65" stroke-width="1"/>
      <line x1="55" y1="45" x2="55" y2="65" stroke-width="1"/>
      <line x1="15" y1="65" x2="95" y2="65" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Text area -->
  <g transform="translate(60, 350)">
    <!-- Category badge -->
    <rect x="0" y="0" width="90" height="30" rx="15" fill="#4ecdc4" opacity="0.15"/>
    <text x="45" y="20" text-anchor="middle" fill="#4ecdc4" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="1">健康指南</text>

    <!-- Main title -->
    <text x="0" y="75" fill="#ffffff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="0.5">
      香港打工仔脊骨與
    </text>
    <text x="0" y="125" fill="#4ecdc4" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="0.5">
      肩頸痛自救指南
    </text>

    <!-- Subtitle -->
    <text x="0" y="170" fill="#8ba0b0" font-family="system-ui, sans-serif" font-size="18" font-weight="400">
      2026 科學實證辦公室健康恢復方案
    </text>

    <!-- Description line -->
    <text x="0" y="210" fill="#6a8a9a" font-family="system-ui, sans-serif" font-size="14" font-weight="300">
      姿勢矯正 · 辦公室微運動 · 物理治療級自救方案
    </text>

    <!-- Separator -->
    <line x1="0" y1="240" x2="80" y2="240" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

    <!-- Stats tag -->
    <rect x="0" y="265" width="200" height="28" rx="14" fill="#1a2a4a" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.3"/>
    <text x="100" y="284" text-anchor="middle" fill="#4ecdc4" font-family="system-ui, sans-serif" font-size="12" font-weight="500">
      68% 香港打工仔有慢性肩頸痛
    </text>
  </g>

  <!-- Bottom decorative bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.3" rx="5"/>
</svg>
