<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1B2A4A"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#E8C86A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <linearGradient id="circleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1B2A4A;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#C9A84C;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#C9A84C;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Background circle glow -->
  <circle cx="256" cy="240" r="200" fill="url(#circleGlow)"/>

  <!-- Mountain silhouette -->
  <path d="M0 400 L80 280 L150 340 L220 220 L290 300 L350 190 L420 280 L512 240 L512 512 L0 512Z" fill="#1B2A4A" opacity="0.5"/>
  <path d="M0 430 L100 320 L180 370 L250 260 L320 330 L380 240 L440 310 L512 280 L512 512 L0 512Z" fill="#1B2A4A" opacity="0.6"/>

  <!-- Sun / horizon circle -->
  <circle cx="256" cy="200" r="60" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="200" r="45" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <circle cx="256" cy="200" r="30" fill="#C9A84C" opacity="0.15"/>
  <circle cx="256" cy="200" r="15" fill="#C9A84C" opacity="0.25"/>

  <!-- Path / road representing life stages -->
  <path d="M80 380 Q160 340 200 300 Q240 260 256 240 Q272 220 300 200 Q340 180 400 200 L440 210" stroke="url(#pathGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Milestone dots on path -->
  <circle cx="120" cy="358" r="6" fill="#C9A84C" opacity="0.6"/>
  <text x="100" y="348" fill="#C9A84C" font-size="11" font-family="system-ui,sans-serif" opacity="0.7" text-anchor="middle">30</text>

  <circle cx="200" cy="298" r="6" fill="#C9A84C" opacity="0.7"/>
  <text x="182" y="286" fill="#C9A84C" font-size="11" font-family="system-ui,sans-serif" opacity="0.7" text-anchor="middle">40</text>

  <circle cx="272" cy="238" r="8" fill="#E8C86A" opacity="0.9" filter="url(#softGlow)"/>
  <text x="256" y="220" fill="#E8C86A" font-size="12" font-family="system-ui,sans-serif" font-weight="bold" text-anchor="middle">50</text>

  <circle cx="340" cy="188" r="6" fill="#C9A84C" opacity="0.7"/>
  <text x="326" y="176" fill="#C9A84C" font-size="11" font-family="system-ui,sans-serif" opacity="0.7" text-anchor="middle">60</text>

  <!-- Sun rays -->
  <g opacity="0.12">
    <line x1="256" y1="170" x2="256" y2="130" stroke="#E8C86A" stroke-width="2"/>
    <line x1="286" y1="176" x2="310" y2="148" stroke="#E8C86A" stroke-width="2"/>
    <line x1="296" y1="200" x2="330" y2="200" stroke="#E8C86A" stroke-width="2"/>
    <line x1="226" y1="176" x2="202" y2="148" stroke="#E8C86A" stroke-width="2"/>
    <line x1="216" y1="200" x2="182" y2="200" stroke="#E8C86A" stroke-width="2"/>
  </g>

  <!-- Icon: coin stack (bottom left) -->
  <g transform="translate(85, 420)" opacity="0.5">
    <ellipse cx="25" cy="5" rx="25" ry="5" fill="#C9A84C"/>
    <rect x="0" y="5" width="50" height="8" fill="#C9A84C"/>
    <ellipse cx="25" cy="13" rx="25" ry="5" fill="#B8963A"/>
    <rect x="0" y="13" width="50" height="8" fill="#B8963A"/>
    <ellipse cx="25" cy="21" rx="25" ry="5" fill="#A0782A"/>
  </g>

  <!-- Icon: growing chart (bottom right) -->
  <g transform="translate(360, 415)" opacity="0.5">
    <rect x="5" y="25" width="10" height="30" rx="2" fill="#C9A84C" opacity="0.6"/>
    <rect x="20" y="15" width="10" height="40" rx="2" fill="#C9A84C" opacity="0.8"/>
    <rect x="35" y="5" width="10" height="50" rx="2" fill="#E8C86A"/>
    <polyline points="8,35 18,30 28,25 40,12" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="256" y="460" fill="#E8C86A" font-size="22" font-family="system-ui,sans-serif" font-weight="bold" text-anchor="middle" filter="url(#softGlow)">退休理財規劃</text>
  <text x="256" y="488" fill="#FFFFFF" font-size="13" font-family="system-ui,sans-serif" opacity="0.7" text-anchor="middle">30 → 60 歲財務自由路線圖</text>

  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="400" cy="60" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="180" cy="50" r="1" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="350" cy="100" r="1" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="130" cy="130" r="1" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="430" cy="140" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="300" cy="70" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="70" cy="170" r="1" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="450" cy="180" r="1" fill="#FFFFFF" opacity="0.2"/>
</svg>
