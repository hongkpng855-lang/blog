<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1A2E"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#0D1520"/>
    </linearGradient>
    <linearGradient id="btc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#E87A00"/>
    </linearGradient>
    <linearGradient id="eth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#627EEA"/>
      <stop offset="100%" style="stop-color:#3B4FBF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A68B2E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Grid lines for tech feel -->
  <g opacity="0.06" stroke="#C9A84C" stroke-width="0.5">
    <line x1="0" y1="85" x2="512" y2="85"/>
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="255" x2="512" y2="255"/>
    <line x1="0" y1="340" x2="512" y2="340"/>
    <line x1="0" y1="425" x2="512" y2="425"/>
    <line x1="85" y1="0" x2="85" y2="512"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="255" y1="0" x2="255" y2="512"/>
    <line x1="340" y1="0" x2="340" y2="512"/>
    <line x1="425" y1="0" x2="425" y2="512"/>
  </g>

  <!-- Bitcoin symbol (simplified ₿) -->
  <g transform="translate(110,200)" filter="url(#glow2)">
    <circle cx="0" cy="0" r="45" fill="url(#btc)" opacity="0.15"/>
    <text x="0" y="18" font-family="Arial,Helvetica,sans-serif" font-size="48" font-weight="bold" fill="url(#btc)" text-anchor="middle">₿</text>
  </g>

  <!-- Ethereum symbol (simplified) -->
  <g transform="translate(256,180)" filter="url(#glow2)">
    <circle cx="0" cy="0" r="40" fill="url(#eth)" opacity="0.12"/>
    <polygon points="0,-28 -18,8 0,0 18,8" fill="url(#eth)" opacity="0.8"/>
    <polygon points="0,14 -18,8 0,28 18,8" fill="url(#eth)" opacity="0.6"/>
  </g>

  <!-- Dollar/stablecoin symbol -->
  <g transform="translate(390,200)" filter="url(#glow2)">
    <circle cx="0" cy="0" r="35" fill="url(#gold)" opacity="0.12"/>
    <text x="0" y="14" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="bold" fill="url(#gold)" text-anchor="middle">$</text>
  </g>

  <!-- Connecting lines between symbols -->
  <g stroke="#C9A84C" stroke-width="1" opacity="0.25">
    <line x1="155" y1="200" x2="216" y2="195"/>
    <line x1="296" y1="195" x2="355" y2="200"/>
  </g>

  <!-- Shield / security icon -->
  <g transform="translate(256,310)" fill="url(#gold)" opacity="0.2" filter="url(#glow)">
    <path d="M0,-40 L40,-20 L40,10 Q40,35 0,50 Q-40,35 -40,10 L-40,-20 Z"/>
    <polyline points="-15,5 -5,18 15,-8" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Chart line -->
  <g opacity="0.3">
    <polyline points="70,380 120,360 170,365 220,330 270,340 320,300 370,310 420,260" stroke="#4CAF50" stroke-width="2" fill="none"/>
    <circle cx="420" cy="260" r="3" fill="#4CAF50"/>
  </g>

  <!-- Second chart line -->
  <g opacity="0.2">
    <polyline points="70,400 120,380 170,390 220,370 270,375 320,350 370,355 420,310" stroke="#FF9800" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Title -->
  <text x="256" y="440" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
    加密貨幣與數位資產
  </text>
  <text x="256" y="470" font-family="'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif" font-size="14" font-weight="400" fill="#C9A84C" text-anchor="middle" letter-spacing="3">
    投 資 指 南
  </text>

  <!-- Year badge -->
  <rect x="210" y="480" width="92" height="22" rx="11" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <text x="256" y="495" font-family="Arial,sans-serif" font-size="11" fill="#C9A84C" text-anchor="middle" opacity="0.8">2026 合規時代</text>

  <!-- Decorative corner elements -->
  <path d="M30,30 L30,50 M30,30 L50,30" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <path d="M482,30 L482,50 M482,30 L462,30" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <path d="M30,482 L30,462 M30,482 L50,482" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <path d="M482,482 L482,462 M482,482 L462,482" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
</svg>
