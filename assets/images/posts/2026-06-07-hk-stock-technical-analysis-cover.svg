<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#e8c85a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g stroke="#2a3a4a" stroke-width="0.5" opacity="0.4">
    <line x1="40" y1="80" x2="40" y2="400"/>
    <line x1="40" y1="120" x2="472" y2="120"/>
    <line x1="40" y1="160" x2="472" y2="160"/>
    <line x1="40" y1="200" x2="472" y2="200"/>
    <line x1="40" y1="240" x2="472" y2="240"/>
    <line x1="40" y1="280" x2="472" y2="280"/>
    <line x1="40" y1="320" x2="472" y2="320"/>
    <line x1="40" y1="360" x2="472" y2="360"/>
    <line x1="40" y1="400" x2="472" y2="400"/>
    <line x1="80" y1="80" x2="80" y2="400"/>
    <line x1="120" y1="80" x2="120" y2="400"/>
    <line x1="160" y1="80" x2="160" y2="400"/>
    <line x1="200" y1="80" x2="200" y2="400"/>
    <line x1="240" y1="80" x2="240" y2="400"/>
    <line x1="280" y1="80" x2="280" y2="400"/>
    <line x1="320" y1="80" x2="320" y2="400"/>
    <line x1="360" y1="80" x2="360" y2="400"/>
    <line x1="400" y1="80" x2="400" y2="400"/>
    <line x1="440" y1="80" x2="440" y2="400"/>
  </g>
  
  <!-- Candlesticks (up) -->
  <g filter="url(#glow)">
    <rect x="60" y="340" width="6" height="60" fill="url(#barGreen)" rx="1"/>
    <rect x="62" y="330" width="2" height="10" fill="#2ecc71"/>
    
    <rect x="110" y="310" width="6" height="50" fill="url(#barGreen)" rx="1"/>
    <rect x="112" y="300" width="2" height="10" fill="#2ecc71"/>
    
    <rect x="200" y="280" width="6" height="40" fill="url(#barGreen)" rx="1"/>
    <rect x="202" y="270" width="2" height="10" fill="#2ecc71"/>
    
    <rect x="260" y="250" width="6" height="35" fill="url(#barGreen)" rx="1"/>
    <rect x="262" y="240" width="2" height="10" fill="#2ecc71"/>
    
    <rect x="370" y="220" width="6" height="30" fill="url(#barGreen)" rx="1"/>
    <rect x="372" y="210" width="2" height="10" fill="#2ecc71"/>
    
    <rect x="410" y="200" width="6" height="25" fill="url(#barGreen)" rx="1"/>
    <rect x="412" y="190" width="2" height="10" fill="#2ecc71"/>
    
    <!-- Down candlesticks -->
    <rect x="150" y="240" width="6" height="40" fill="url(#barRed)" rx="1"/>
    <rect x="152" y="280" width="2" height="8" fill="#e74c3c"/>
    
    <rect x="300" y="210" width="6" height="30" fill="url(#barRed)" rx="1"/>
    <rect x="302" y="240" width="2" height="8" fill="#e74c3c"/>
  </g>
  
  <!-- Moving Average Line 1 (20-day) -->
  <path d="M 60 370 Q 85 350 110 335 Q 135 320 150 310 Q 175 325 200 290 Q 225 275 260 260 Q 280 255 300 250 Q 330 240 370 230 Q 390 220 410 210 Q 430 200 460 195" 
        stroke="#c9a84c" stroke-width="2.5" fill="none" filter="url(#softGlow)" opacity="0.9"/>
  
  <!-- Moving Average Line 2 (50-day) -->
  <path d="M 60 380 Q 90 365 120 345 Q 150 335 180 325 Q 210 315 240 300 Q 270 290 300 280 Q 330 275 370 265 Q 400 258 430 250 Q 450 245 470 242" 
        stroke="#3498db" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="4,3"/>
  
  <!-- RSI Indicator mini bar at bottom -->
  <g transform="translate(40, 425)">
    <rect x="0" y="0" width="430" height="40" rx="4" fill="#1a2a3a" stroke="#2a3a4a" stroke-width="0.5"/>
    <text x="10" y="15" fill="#7a8a9a" font-size="7" font-family="monospace">RSI(14): 62.5</text>
    <rect x="10" y="22" width="200" height="8" rx="4" fill="#2a3a4a"/>
    <rect x="10" y="22" width="140" height="8" rx="4" fill="#2ecc71" opacity="0.7"/>
    <!-- Overbought/oversold zones -->
    <text x="10" y="38" fill="#7a8a9a" font-size="6" font-family="monospace">0</text>
    <text x="53" y="38" fill="#7a8a9a" font-size="6" font-family="monospace">30</text>
    <text x="123" y="38" fill="#7a8a9a" font-size="6" font-family="monospace">70</text>
    <text x="200" y="38" fill="#7a8a9a" font-size="6" font-family="monospace">100</text>
    <!-- Overbought line -->
    <line x1="113" y1="22" x2="113" y2="30" stroke="#e74c3c" stroke-width="0.5" opacity="0.5"/>
    <!-- Oversold line -->
    <line x1="43" y1="22" x2="43" y2="30" stroke="#2ecc71" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- MACD mini indicator -->
  <g transform="translate(40, 470)">
    <rect x="0" y="0" width="430" height="30" rx="4" fill="#1a2a3a" stroke="#2a3a4a" stroke-width="0.5"/>
    <text x="10" y="11" fill="#7a8a9a" font-size="7" font-family="monospace">MACD(12,26,9)</text>
    <!-- MACD bars -->
    <rect x="80" y="20" width="15" height="5" rx="1" fill="#2ecc71" opacity="0.8"/>
    <rect x="100" y="18" width="15" height="7" rx="1" fill="#2ecc71" opacity="0.8"/>
    <rect x="120" y="20" width="15" height="5" rx="1" fill="#e74c3c" opacity="0.6"/>
    <rect x="140" y="22" width="15" height="3" rx="1" fill="#e74c3c" opacity="0.6"/>
    <rect x="160" y="18" width="15" height="7" rx="1" fill="#2ecc71" opacity="0.8"/>
    <rect x="180" y="16" width="15" height="9" rx="1" fill="#2ecc71" opacity="0.9"/>
    <rect x="200" y="17" width="15" height="8" rx="1" fill="#2ecc71" opacity="0.9"/>
    <rect x="220" y="20" width="15" height="5" rx="1" fill="#2ecc71" opacity="0.7"/>
    <!-- Zero line -->
    <line x1="80" y1="22" x2="240" y2="22" stroke="#5a6a7a" stroke-width="0.3"/>
  </g>
  
  <!-- Title -->
  <text x="256" y="50" text-anchor="middle" fill="#c9a84c" font-size="14" font-family="system-ui, sans-serif" font-weight="bold" filter="url(#glow)">技術分析</text>
  <text x="256" y="65" text-anchor="middle" fill="#5a7a9a" font-size="8" font-family="system-ui, sans-serif">TECHNICAL ANALYSIS</text>
  
  <!-- Corner accent -->
  <circle cx="470" cy="70" r="20" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.15"/>
  <circle cx="470" cy="70" r="30" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.08"/>
  
  <!-- Up/Down arrows -->
  <polygon points="85,325 80,310 90,310" fill="#2ecc71" opacity="0.6"/>
  <polygon points="145,275 140,290 150,290" fill="#e74c3c" opacity="0.6"/>
</svg>
