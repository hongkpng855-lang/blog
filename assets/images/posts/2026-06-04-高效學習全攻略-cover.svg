<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="#334155" opacity="0.4">
    <circle cx="40" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/>
    <circle cx="200" cy="40" r="1.5"/><circle cx="280" cy="40" r="1.5"/>
    <circle cx="360" cy="40" r="1.5"/><circle cx="440" cy="40" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="440" cy="120" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/><circle cx="440" cy="200" r="1.5"/>
    <circle cx="40" cy="280" r="1.5"/><circle cx="440" cy="280" r="1.5"/>
    <circle cx="40" cy="360" r="1.5"/><circle cx="440" cy="360" r="1.5"/>
    <circle cx="40" cy="440" r="1.5"/><circle cx="440" cy="440" r="1.5"/>
    <circle cx="120" cy="480" r="1.5"/><circle cx="200" cy="480" r="1.5"/>
    <circle cx="280" cy="480" r="1.5"/><circle cx="360" cy="480" r="1.5"/>
  </g>
  <!-- Light bulb icon -->
  <g transform="translate(256,140)" fill="none">
    <!-- Bulb -->
    <ellipse cx="0" cy="-20" rx="42" ry="50" fill="url(#gold)" opacity="0.15"/>
    <ellipse cx="0" cy="-20" rx="42" ry="50" fill="url(#gold)" opacity="0.3" filter="url(#softGlow)"/>
    <ellipse cx="0" cy="-20" rx="35" ry="42" fill="url(#gold)" opacity="0.5"/>
    <path d="M-28,-15 Q-28,-60 0,-62 Q28,-60 28,-15 Q28,-5 20,5 Q15,12 12,25 L-12,25 Q-15,12 -20,5 Q-28,-5 -28,-15Z" fill="url(#gold)"/>
    <!-- Inner glow -->
    <ellipse cx="0" cy="-35" rx="12" ry="18" fill="#fef3c7" opacity="0.6"/>
    <!-- Base -->
    <rect x="-10" y="25" width="20" height="8" rx="2" fill="#64748b"/>
    <rect x="-12" y="33" width="24" height="3" rx="1" fill="#475569"/>
    <!-- Rays -->
    <g stroke="#fbbf24" stroke-width="2" opacity="0.5">
      <line x1="-55" y1="-10" x2="-65" y2="-10"/>
      <line x1="-50" y1="-35" x2="-58" y2="-42"/>
      <line x1="55" y1="-10" x2="65" y2="-10"/>
      <line x1="50" y1="-35" x2="58" y2="-42"/>
      <line x1="-40" y1="-55" x2="-45" y2="-63"/>
      <line x1="40" y1="-55" x2="45" y2="-63"/>
      <line x1="0" y1="-70" x2="0" y2="-78"/>
    </g>
  </g>
  <!-- Open book at bottom -->
  <g transform="translate(256,280)">
    <path d="M-100,60 L-100,-20 Q-100,-40 -80,-40 L0,-20 L80,-40 Q100,-40 100,-20 L100,60 Q80,50 50,55 Q25,58 0,50 Q-25,58 -50,55 Q-80,50 -100,60Z" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <!-- Book pages -->
    <path d="M0,-20 L0,50" stroke="#64748b" stroke-width="1" opacity="0.5"/>
    <path d="M-80,-30 L0,-12" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M80,-30 L0,-12" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <!-- Text lines on pages -->
    <g stroke="#475569" stroke-width="1.5" stroke-linecap="round" opacity="0.3">
      <line x1="-65" y1="-10" x2="-15" y2="-2"/>
      <line x1="-65" y1="0" x2="-15" y2="8"/>
      <line x1="-65" y1="10" x2="-15" y2="18"/>
      <line x1="15" y1="-2" x2="65" y2="-10"/>
      <line x1="15" y1="8" x2="65" y2="0"/>
      <line x1="15" y1="18" x2="65" y2="10"/>
    </g>
  </g>
  <!-- Small floating particles (knowledge sparks) -->
  <g fill="#818cf8" opacity="0.5">
    <circle cx="100" cy="200" r="2"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="180" r="1.5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="350" r="2"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="330" r="1.5"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Title text -->
  <text x="256" y="380" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle" letter-spacing="1">高效學習全攻略</text>
  <text x="256" y="410" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">告別死記硬背・科學方法掌握任何技能</text>
  <!-- Decorative line -->
  <line x1="156" y1="425" x2="356" y2="425" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <!-- Tags -->
  <text x="256" y="445" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">學習・記憶法・自學・生產力</text>
</svg>