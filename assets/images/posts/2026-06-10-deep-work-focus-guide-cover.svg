<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#e2c570"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0d1b36;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="85" x2="512" y2="85" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="170" x2="512" y2="170" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="255" x2="512" y2="255" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="340" x2="512" y2="340" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="425" x2="512" y2="425" stroke="#C9A84C" stroke-width="0.5"/>
  </g>

  <!-- Central Icon: Focus target / brain -->
  <g transform="translate(256,100)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
    <!-- Crosshair lines -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
    <!-- Brain icon simplified -->
    <path d="M-14,-12 Q-18,-20 -10,-22 Q2,-26 0,-14 Q2,-6 -4,-2 M14,-12 Q18,-20 10,-22 Q-2,-26 0,-14 Q-2,-6 4,-2 M0,2 Q-8,4 -12,14 Q-14,22 -6,18 Q0,14 0,6 M0,2 Q8,4 12,14 Q14,22 6,18 Q0,14 0,6" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow2)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#C9A84C" filter="url(#glow)"/>
  </g>

  <!-- Distraction sparks around brain -->
  <g opacity="0.35">
    <text x="180" y="70" font-size="10" fill="#C9A84C" font-family="system-ui">📱</text>
    <text x="310" y="65" font-size="9" fill="#C9A84C" font-family="system-ui">💬</text>
    <text x="200" y="105" font-size="8" fill="#C9A84C" font-family="system-ui">📧</text>
    <text x="300" y="110" font-size="8" fill="#C9A84C" font-family="system-ui">🔔</text>
  </g>

  <!-- Title -->
  <text x="256" y="188" text-anchor="middle" fill="#C9A84C" font-size="20" font-weight="bold" font-family="system-ui" filter="url(#glow)">深度工作實戰指南</text>
  <text x="256" y="210" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">注意力時代嘅生存技能</text>

  <!-- 4 Info Cards -->
  <!-- Card 1: Time Blocking -->
  <g transform="translate(40,250)">
    <rect width="100" height="95" rx="10" fill="url(#card1)" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="50" y="24" text-anchor="middle" font-size="18">⏰</text>
    <text x="50" y="44" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="bold" font-family="system-ui">時間區塊</text>
    <text x="50" y="56" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Time Blocking</text>
    <line x1="20" y1="62" x2="80" y2="62" stroke="#C9A84C" stroke-width="0.3" opacity="0.4"/>
    <text x="50" y="74" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">45-90 min</text>
    <text x="50" y="86" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">單任務區塊</text>
  </g>

  <!-- Card 2: Digital Minimalism -->
  <g transform="translate(158,250)">
    <rect width="100" height="95" rx="10" fill="url(#card2)" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="50" y="24" text-anchor="middle" font-size="18">🔕</text>
    <text x="50" y="44" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="bold" font-family="system-ui">通知管理</text>
    <text x="50" y="56" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Digital Minimalism</text>
    <line x1="20" y1="62" x2="80" y2="62" stroke="#C9A84C" stroke-width="0.3" opacity="0.4"/>
    <text x="50" y="74" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">每日 Check 4次</text>
    <text x="50" y="86" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">閂非必要通知</text>
  </g>

  <!-- Card 3: Flow State -->
  <g transform="translate(276,250)">
    <rect width="100" height="95" rx="10" fill="url(#card1)" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="50" y="24" text-anchor="middle" font-size="18">🌀</text>
    <text x="50" y="44" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="bold" font-family="system-ui">心流觸發</text>
    <text x="50" y="56" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">Flow State</text>
    <line x1="20" y1="62" x2="80" y2="62" stroke="#C9A84C" stroke-width="0.3" opacity="0.4"/>
    <text x="50" y="74" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">清晰目標</text>
    <text x="50" y="86" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">即時回饋</text>
  </g>

  <!-- Card 4: Environment Design -->
  <g transform="translate(394,250)">
    <rect width="78" height="95" rx="10" fill="url(#card2)" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="39" y="24" text-anchor="middle" font-size="18">🎧</text>
    <text x="39" y="44" text-anchor="middle" fill="#C9A84C" font-size="10" font-weight="bold" font-family="system-ui">環境設計</text>
    <line x1="12" y1="50" x2="66" y2="50" stroke="#C9A84C" stroke-width="0.3" opacity="0.4"/>
    <text x="39" y="65" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">NC 耳機</text>
    <text x="39" y="77" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">Playlist</text>
    <text x="39" y="89" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">儀式感</text>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(40,370)">
    <rect width="432" height="50" rx="8" fill="#0f172a" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="72" y="22" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold" font-family="system-ui">96</text>
    <text x="72" y="38" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">日均 check 電話</text>
    <line x1="130" y1="8" x2="130" y2="42" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>
    <text x="190" y="22" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold" font-family="system-ui">23</text>
    <text x="190" y="38" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">min 重返專注</text>
    <line x1="248" y1="8" x2="248" y2="42" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>
    <text x="308" y="22" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold" font-family="system-ui">40%</text>
    <text x="308" y="38" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">多工效率損失</text>
    <line x1="366" y1="8" x2="366" y2="42" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>
    <text x="426" y="22" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold" font-family="system-ui">10-15</text>
    <text x="426" y="38" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">hr / 週深度工作</text>
  </g>

  <!-- Bottom text -->
  <text x="256" y="460" text-anchor="middle" fill="#475569" font-size="9" font-family="system-ui">#auto-publish · 學習 · 第七輪</text>

  <!-- Decorative corner elements -->
  <circle cx="20" cy="492" r="3" fill="#C9A84C" opacity="0.2"/>
  <circle cx="492" cy="20" r="3" fill="#C9A84C" opacity="0.2"/>
  <circle cx="10" cy="10" r="2" fill="#C9A84C" opacity="0.15"/>
  <circle cx="502" cy="502" r="2" fill="#C9A84C" opacity="0.15"/>
</svg>
