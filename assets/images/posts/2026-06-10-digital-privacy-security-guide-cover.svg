<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#e2c96e"/>
    </linearGradient>
    <linearGradient id="green1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="red1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e17055"/>
      <stop offset="100%" style="stop-color:#d63031"/>
    </linearGradient>
    <linearGradient id="card1g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#152238;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="card2g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#152238;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#C9A84C" stroke-width="0.5"/>
  </g>

  <!-- Shield icon (center-top) -->
  <g transform="translate(400, 75)" filter="url(#glow)">
    <path d="M0 -50 L55 -30 L55 20 Q55 60 0 80 Q-55 60 -55 20 L-55 -30 Z" fill="none" stroke="url(#gold1)" stroke-width="3"/>
    <path d="M0 -35 L42 -18 L42 15 Q42 48 0 65 Q-42 48 -42 15 L-42 -18 Z" fill="none" stroke="url(#green1)" stroke-width="2.5" opacity="0.6"/>
    <!-- Checkmark inside shield -->
    <path d="M-12 10 L-4 22 L15 -5" fill="none" stroke="#00cec9" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="400" y="140" text-anchor="middle" fill="url(#gold1)" font-family="system-ui,sans-serif" font-size="22" font-weight="bold">數碼私隱與網絡安全</text>
  <text x="400" y="165" text-anchor="middle" fill="#e2e2e2" font-family="system-ui,sans-serif" font-size="14">VPN · 密碼管理 · 防詐騙 · 數據備份</text>

  <!-- Card 1: 密碼管理 -->
  <g transform="translate(30, 195)" filter="url(#shadow)">
    <rect width="170" height="110" rx="8" fill="url(#card1g)" stroke="#0f3460" stroke-width="1"/>
    <rect x="0" y="0" width="170" height="4" rx="2" fill="url(#green1)"/>
    <text x="85" y="28" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">🔐 密碼管理</text>
    <text x="85" y="46" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">Bitwarden / 1Password</text>
    <text x="85" y="62" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">Master Password</text>
    <text x="85" y="78" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">密碼生成器</text>
    <text x="85" y="94" text-anchor="middle" fill="#00cec9" font-family="system-ui,sans-serif" font-size="9">跨平台同步</text>
  </g>

  <!-- Card 2: 2FA -->
  <g transform="translate(215, 195)" filter="url(#shadow)">
    <rect width="170" height="110" rx="8" fill="url(#card1g)" stroke="#0f3460" stroke-width="1"/>
    <rect x="0" y="0" width="170" height="4" rx="2" fill="url(#gold1)"/>
    <text x="85" y="28" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">🔑 雙重驗證</text>
    <text x="85" y="46" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">Authenticator App</text>
    <text x="85" y="62" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">YubiKey 硬件金鑰</text>
    <text x="85" y="78" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">Recovery Code</text>
    <text x="85" y="94" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="9">第二道防線</text>
  </g>

  <!-- Card 3: VPN -->
  <g transform="translate(400, 195)" filter="url(#shadow)">
    <rect width="170" height="110" rx="8" fill="url(#card1g)" stroke="#0f3460" stroke-width="1"/>
    <rect x="0" y="0" width="170" height="4" rx="2" fill="url(#red1)"/>
    <text x="85" y="28" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">🛡️ VPN 防護</text>
    <text x="85" y="46" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">Mullvad / ProtonVPN</text>
    <text x="85" y="62" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">公共 Wi-Fi 加密</text>
    <text x="85" y="78" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">Kill Switch</text>
    <text x="85" y="94" text-anchor="middle" fill="#e17055" font-family="system-ui,sans-serif" font-size="9">免 Log 政策</text>
  </g>

  <!-- Card 4: 備份 -->
  <g transform="translate(585, 195)" filter="url(#shadow)">
    <rect width="185" height="110" rx="8" fill="url(#card1g)" stroke="#0f3460" stroke-width="1"/>
    <rect x="0" y="0" width="185" height="4" rx="2" fill="url(#green1)"/>
    <text x="92" y="28" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">💾 數據備份</text>
    <text x="92" y="46" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">3-2-1 備份法則</text>
    <text x="92" y="62" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">NAS / 外置硬碟</text>
    <text x="92" y="78" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">雲端備份</text>
    <text x="92" y="94" text-anchor="middle" fill="#00cec9" font-family="system-ui,sans-serif" font-size="9">定期測試 Restore</text>
  </g>

  <!-- Bottom info bar -->
  <g transform="translate(30, 325)" filter="url(#shadow)">
    <rect width="740" height="50" rx="8" fill="#1e3a5f" stroke="#0f3460" stroke-width="1" opacity="0.9"/>
    <text x="370" y="340" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="10" font-weight="bold">2026 香港人數碼安全行動清單</text>
    <text x="140" y="358" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">🔴 今晚：密碼管理器 + 2FA</text>
    <text x="400" y="358" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">🟡 本週：VPN + 備份</text>
    <text x="640" y="358" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9">🟢 本月：硬件金鑰</text>
  </g>

  <!-- Fake stats badges -->
  <circle cx="60" cy="395" r="18" fill="#00b894" opacity="0.15"/>
  <text x="60" y="399" text-anchor="middle" fill="#00cec9" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">3.2</text>
  <text x="60" y="415" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="7">釣魚/日</text>

  <circle cx="200" cy="395" r="18" fill="#C9A84C" opacity="0.15"/>
  <text x="200" y="399" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">60%</text>
  <text x="200" y="415" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="7">弱密碼外洩</text>

  <circle cx="400" cy="395" r="18" fill="#e17055" opacity="0.15"/>
  <text x="400" y="399" text-anchor="middle" fill="#e17055" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">37%</text>
  <text x="400" y="415" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="7">攻擊增年</text>

  <circle cx="600" cy="395" r="18" fill="#00b894" opacity="0.15"/>
  <text x="600" y="399" text-anchor="middle" fill="#00cec9" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">400%</text>
  <text x="600" y="415" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="7">Deepfake 增</text>

  <!-- Bottom label -->
  <text x="400" y="440" text-anchor="middle" fill="#555" font-family="system-ui,sans-serif" font-size="8">ESGov Blog · 科技類 #auto-publish</text>
</svg>
