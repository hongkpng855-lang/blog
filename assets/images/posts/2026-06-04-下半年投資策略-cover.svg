<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#009624"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5252"/>
      <stop offset="100%" style="stop-color:#d50000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  <!-- Chart simplification -->
  <g transform="translate(50, 280)" opacity="0.15">
    <polyline points="0,80 40,60 80,70 120,40 160,50 200,20 240,30 280,10" stroke="url(#green)" stroke-width="3" fill="none"/>
    <polyline points="0,100 40,90 80,95 120,70 160,80 200,60 240,65 280,50" stroke="url(#gold)" stroke-width="2" fill="none"/>
  </g>
  <!-- Title -->
  <text x="400" y="120" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" filter="url(#glow)">2026 下半年</text>
  <text x="400" y="170" text-anchor="middle" fill="url(#gold)" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">投資策略全解析</text>
  <!-- Subtitle -->
  <text x="400" y="220" text-anchor="middle" fill="#aab" font-family="system-ui, sans-serif" font-size="16">從聯準會政策到 AI 熱潮</text>
  <text x="400" y="250" text-anchor="middle" fill="#aab" font-family="system-ui, sans-serif" font-size="16">掌握市場新動向</text>
  <!-- Decorative elements -->
  <g transform="translate(140, 290)" opacity="0.3">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="url(#green)"/>
    <text x="11" y="16" text-anchor="middle" fill="#fff" font-size="12" font-family="system-ui">▲</text>
  </g>
  <g transform="translate(640, 290)" opacity="0.3">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="url(#red)"/>
    <text x="11" y="16" text-anchor="middle" fill="#fff" font-size="12" font-family="system-ui">▼</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="430" width="800" height="20" fill="url(#gold)" opacity="0.8"/>
  <text x="400" y="444" text-anchor="middle" fill="#0f3460" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Sun ny 的部落格 · 投資理財</text>
  <!-- Stats badges -->
  <g transform="translate(250, 330)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    <text x="65" y="20" text-anchor="middle" fill="#ffd700" font-family="system-ui" font-size="12">📊 資產配置</text>
  </g>
  <g transform="translate(420, 330)">
    <rect x="0" y="0" width="130" height="30" rx="15" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    <text x="65" y="20" text-anchor="middle" fill="#ffd700" font-family="system-ui" font-size="12">🤖 AI 產業</text>
  </g>
  <g transform="translate(300, 370)">
    <rect x="0" y="0" width="200" height="30" rx="15" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffd700" font-family="system-ui" font-size="12">🏦 聯準會政策分析</text>
  </g>
</svg>
