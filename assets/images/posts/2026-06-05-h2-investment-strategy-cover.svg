<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#d4a017"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Abstract chart lines -->
  <g opacity="0.15" stroke="#60a5fa" stroke-width="1.5" fill="none">
    <polyline points="30,380 80,350 130,360 180,280 230,300 280,220 330,240 380,160 430,180 480,120"/>
    <polyline points="30,400 80,390 130,405 180,370 230,380 280,340 330,350 380,310 430,320 480,280"/>
  </g>

  <!-- Downtrend line (representing interest rates) -->
  <g opacity="0.2" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" fill="none">
    <polyline points="30,100 80,120 130,115 180,150 230,145 280,180 330,175 380,210 430,205 480,240"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="60" fill="none" stroke="#f0c040" stroke-width="0.5" opacity="0.1"/>
  <circle cx="430" cy="400" r="80" fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.1"/>

  <!-- Main title background card -->
  <rect x="60" y="180" width="392" height="170" rx="16" fill="#ffffff" opacity="0.08"/>
  <rect x="60" y="180" width="392" height="170" rx="16" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- Title: 2026 -->
  <text x="256" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="url(#gold)" filter="url(#glow)">2026</text>

  <!-- Title: 下半年投資布局全攻略 -->
  <text x="256" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">下半年投資布局全攻略</text>

  <!-- Subtitle -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">降息循環下的資產配置策略</text>

  <!-- Tags bar -->
  <rect x="120" y="330" width="272" height="28" rx="14" fill="url(#gold)" opacity="0.15"/>
  <text x="256" y="349" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="url(#gold)">#降息循環 #資產配置 #ETF #債券</text>

  <!-- Bottom decorative elements -->
  <g opacity="0.6">
    <!-- Up arrow representing market growth -->
    <polygon points="256,400 246,420 250,420 250,440 262,440 262,420 266,420" fill="url(#green)"/>
    <!-- Small chart bars -->
    <rect x="180" y="425" width="8" height="25" rx="2" fill="#60a5fa" opacity="0.5"/>
    <rect x="195" y="415" width="8" height="35" rx="2" fill="#60a5fa" opacity="0.6"/>
    <rect x="210" y="430" width="8" height="20" rx="2" fill="#60a5fa" opacity="0.5"/>
    <rect x="290" y="420" width="8" height="30" rx="2" fill="#60a5fa" opacity="0.5"/>
    <rect x="305" y="410" width="8" height="40" rx="2" fill="#60a5fa" opacity="0.6"/>
    <rect x="320" y="425" width="8" height="25" rx="2" fill="#60a5fa" opacity="0.5"/>
  </g>

  <!-- Dollar sign -->
  <text x="134" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#4ade80" opacity="0.3">$</text>
  <text x="378" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#f0c040" opacity="0.3">↗</text>

  <!-- Bottom border -->
  <rect x="60" y="475" width="392" height="2" rx="1" fill="url(#gold)" opacity="0.3"/>
</svg>
