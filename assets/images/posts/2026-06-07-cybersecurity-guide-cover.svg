<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#142842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#00d4ff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="50" y1="0" x2="50" y2="450"/>
    <line x1="150" y1="0" x2="150" y2="450"/>
    <line x1="250" y1="0" x2="250" y2="450"/>
    <line x1="350" y1="0" x2="350" y2="450"/>
    <line x1="450" y1="0" x2="450" y2="450"/>
    <line x1="550" y1="0" x2="550" y2="450"/>
    <line x1="650" y1="0" x2="650" y2="450"/>
    <line x1="750" y1="0" x2="750" y2="450"/>
  </g>

  <!-- Glow circle -->
  <circle cx="400" cy="225" r="200" fill="url(#glow)"/>

  <!-- Shield icon -->
  <g transform="translate(140, 100)">
    <path d="M260 0 L520 120 L520 240 C520 340 390 420 390 420 C390 420 260 340 260 240 L260 120 Z"
          fill="url(#shieldGrad)" opacity="0.9" filter="url(#shadow)"/>
    <path d="M260 0 L520 120 L520 240 C520 340 390 420 390 420 C390 420 260 340 260 240 L260 120 Z"
          fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <!-- Checkmark inside shield -->
    <polyline points="320,220 370,270 460,170"
              fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
              filter="url(#neon)"/>
    <!-- Lock icon on shield -->
    <rect x="350" y="115" width="80" height="60" rx="8" fill="url(#lockGrad)" opacity="0.9"/>
    <path d="M370 115 L370 95 C370 80 385 70 390 70 C395 70 410 80 410 95 L410 115"
          fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="390" cy="145" r="10" fill="#fff" opacity="0.9"/>
    <rect x="386" y="140" width="8" height="20" rx="2" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Decorative binary code -->
  <g fill="#00d4ff" opacity="0.12" font-family="monospace" font-size="12">
    <text x="30" y="30">01010100 01101000 01110010 01100101 01100001 01110100</text>
    <text x="30" y="420">01010011 01100101 01100011 01110101 01110010 01100101</text>
    <text x="550" y="35">01000100 01100101 01100110 01100101 01101110 01110011 01100101</text>
    <text x="560" y="420">01010000 01110010 01101111 01110100 01100101 01100011 01110100</text>
  </g>

  <!-- Decorative circuit lines -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.15" fill="none">
    <circle cx="680" cy="80" r="20"/>
    <line x1="700" y1="80" x2="750" y2="80"/>
    <circle cx="680" cy="80" r="4" fill="#00d4ff"/>
    <circle cx="120" cy="380" r="15"/>
    <line x1="120" y1="365" x2="120" y2="330"/>
    <circle cx="120" cy="380" r="3" fill="#00d4ff"/>
    <circle cx="700" cy="370" r="18"/>
    <line x1="700" y1="352" x2="700" y2="320"/>
    <circle cx="700" cy="370" r="4" fill="#00d4ff"/>
    <circle cx="80" cy="150" r="12"/>
    <line x1="80" y1="162" x2="80" y2="190"/>
  </g>

  <!-- Title text -->
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff" filter="url(#neonStrong)">
    2026 網絡安全自保指南
  </text>
  <text x="400" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#80d4ff" opacity="0.9">
    AI 深度偽造詐騙 · 釣魚攻擊 · 個人資料保護
  </text>

  <!-- Subtitle highlight box -->
  <rect x="180" y="320" width="440" height="70" rx="12" fill="#0d1f3c" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <text x="400" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#e0e0e0">
    就算見到真人樣、聽到真人聲
  </text>
  <text x="400" y="374" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#ff6b6b" font-weight="600">
    都未必係真。2026 必備嘅數位生存技能。
  </text>

  <!-- Bottom decorative dots -->
  <g fill="#00d4ff" opacity="0.3">
    <circle cx="350" cy="420" r="3"/>
    <circle cx="370" cy="420" r="3"/>
    <circle cx="390" cy="420" r="3"/>
    <circle cx="410" cy="420" r="3"/>
    <circle cx="430" cy="420" r="3"/>
    <circle cx="450" cy="420" r="3"/>
  </g>
</svg>
