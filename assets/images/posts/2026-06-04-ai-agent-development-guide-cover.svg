<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0a0e27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0099ff"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- 背景網格 -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>

  <!-- Agent 節點網絡圖 -->
  <!-- 中央大節點 -->
  <circle cx="256" cy="220" r="50" fill="url(#node)" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="256" cy="220" r="35" fill="url(#node)" opacity="0.3"/>
  <circle cx="256" cy="220" r="20" fill="url(#node)" opacity="0.6"/>
  <circle cx="256" cy="220" r="8" fill="#00d4aa" filter="url(#glow)"/>

  <!-- 衛星節點 -->
  <g filter="url(#glow)">
    <!-- 左上 -->
    <circle cx="150" cy="130" r="12" fill="url(#node2)" opacity="0.7"/>
    <circle cx="150" cy="130" r="4" fill="#3b82f6"/>
    <!-- 右上 -->
    <circle cx="362" cy="130" r="12" fill="url(#node2)" opacity="0.7"/>
    <circle cx="362" cy="130" r="4" fill="#3b82f6"/>
    <!-- 左下 -->
    <circle cx="150" cy="310" r="12" fill="url(#node2)" opacity="0.7"/>
    <circle cx="150" cy="310" r="4" fill="#3b82f6"/>
    <!-- 右下 -->
    <circle cx="362" cy="310" r="12" fill="url(#node2)" opacity="0.7"/>
    <circle cx="362" cy="310" r="4" fill="#3b82f6"/>
    <!-- 上 -->
    <circle cx="256" cy="100" r="10" fill="url(#node)" opacity="0.7"/>
    <circle cx="256" cy="100" r="3" fill="#00d4aa"/>
    <!-- 下 -->
    <circle cx="256" cy="340" r="10" fill="url(#node)" opacity="0.7"/>
    <circle cx="256" cy="340" r="3" fill="#00d4aa"/>
    <!-- 左 -->
    <circle cx="120" cy="220" r="8" fill="url(#node2)" opacity="0.5"/>
    <!-- 右 -->
    <circle cx="392" cy="220" r="8" fill="url(#node2)" opacity="0.5"/>
  </g>

  <!-- 連接線 -->
  <g stroke="#00d4aa" stroke-opacity="0.25" stroke-width="1.5" fill="none">
    <line x1="256" y1="220" x2="150" y2="130"/>
    <line x1="256" y1="220" x2="362" y2="130"/>
    <line x1="256" y1="220" x2="150" y2="310"/>
    <line x1="256" y1="220" x2="362" y2="310"/>
    <line x1="256" y1="220" x2="256" y2="100"/>
    <line x1="256" y1="220" x2="256" y2="340"/>
    <line x1="256" y1="220" x2="120" y2="220"/>
    <line x1="256" y1="220" x2="392" y2="220"/>
  </g>

  <!-- 環狀軌道 -->
  <ellipse cx="256" cy="220" rx="130" ry="90" stroke="url(#accent)" stroke-opacity="0.12" stroke-width="1" fill="none" stroke-dasharray="4,6"/>
  <ellipse cx="256" cy="220" rx="160" ry="115" stroke="url(#accent)" stroke-opacity="0.06" stroke-width="1" fill="none" stroke-dasharray="2,8"/>

  <!-- 浮動粒子 -->
  <g fill="#00d4aa" opacity="0.3">
    <circle cx="80" cy="70" r="1.5"/>
    <circle cx="432" cy="450" r="1.5"/>
    <circle cx="350" cy="60" r="1"/>
    <circle cx="60" cy="400" r="1"/>
    <circle cx="440" cy="180" r="1.2"/>
    <circle cx="100" cy="450" r="1"/>
  </g>

  <!-- 硬體/晶片線條裝飾 -->
  <rect x="48" y="380" width="30" height="20" rx="2" fill="none" stroke="#0099ff" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="434" y="100" width="28" height="18" rx="2" fill="none" stroke="#0099ff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- 標題 -->
  <text x="256" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">自主 AI Agent 開發實戰</text>
  
  <text x="256" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#a0aec0" text-anchor="middle" letter-spacing="3">AI AGENT DEVELOPMENT GUIDE</text>

  <!-- 裝飾分隔線 -->
  <line x1="180" y1="456" x2="332" y2="456" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- 標籤 -->
  <text x="256" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle" letter-spacing="2">2026 完整實戰指南</text>
</svg>
