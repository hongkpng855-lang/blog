<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#e8cc6a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.8" fill="#C9A84C"/>
    </pattern>
    <rect width="512" height="512" fill="url(#grid)"/>
  </g>

  <!-- Decorative gradient circles -->
  <circle cx="420" cy="80" r="140" fill="#C9A84C" opacity="0.04"/>
  <circle cx="80" cy="420" r="120" fill="#22c55e" opacity="0.04"/>

  <!-- Chart area background -->
  <rect x="76" y="80" width="360" height="200" rx="12" fill="#0d2137" opacity="0.6"/>
  <rect x="76" y="80" width="360" height="200" rx="12" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>

  <!-- Grid lines on chart -->
  <g stroke="white" stroke-width="0.5" opacity="0.08">
    <line x1="100" y1="120" x2="412" y2="120"/>
    <line x1="100" y1="160" x2="412" y2="160"/>
    <line x1="100" y1="200" x2="412" y2="200"/>
    <line x1="100" y1="240" x2="412" y2="240"/>
  </g>

  <!-- Y-axis labels -->
  <g font-family="monospace" font-size="8" fill="white" opacity="0.2" text-anchor="end">
    <text x="95" y="123">高</text>
    <text x="95" y="243">低</text>
  </g>

  <!-- DCA step line - green (goes up and down, then up) -->
  <polyline points="100,240 120,220 140,230 160,190 180,200 200,170 220,180 240,150 260,160 280,135 300,145 320,120 340,130 360,110 380,118 400,100"
            fill="none" stroke="url(#green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)" opacity="0.9"/>

  <!-- Lump sum line - red (more volatile) -->
  <polyline points="100,240 120,250 140,200 160,210 180,160 200,170 220,130 240,140 260,100 280,110 300,90 320,95 340,85 360,80 380,78 400,75"
            fill="none" stroke="url(#red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Data points on DCA line -->
  <g filter="url(#glow)">
    <circle cx="160" cy="190" r="3" fill="url(#gold)"/>
    <circle cx="200" cy="170" r="3" fill="url(#gold)"/>
    <circle cx="240" cy="150" r="3" fill="url(#gold)"/>
    <circle cx="280" cy="135" r="3" fill="url(#gold)"/>
    <circle cx="320" cy="120" r="3" fill="url(#gold)"/>
    <circle cx="360" cy="110" r="3" fill="url(#gold)"/>
    <circle cx="400" cy="100" r="4" fill="url(#gold)"/>
  </g>

  <!-- Coin stack icon (bottom left of chart area) -->
  <g transform="translate(130, 175)" opacity="0.4">
    <!-- Coins stacking -->
    <ellipse cx="0" cy="0" rx="12" ry="4" fill="#C9A84C" opacity="0.6"/>
    <ellipse cx="0" cy="-3" rx="12" ry="4" fill="#C9A84C" opacity="0.5"/>
    <ellipse cx="0" cy="-6" rx="12" ry="4" fill="#C9A84C" opacity="0.4"/>
    <text x="0" y="-2" font-family="system-ui" font-size="8" fill="#1B2A4A" text-anchor="middle" font-weight="bold">$</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 300)" font-family="system-ui, sans-serif" font-size="11">
    <circle cx="0" cy="0" r="4" fill="url(#green)"/>
    <text x="12" y="3" fill="white" opacity="0.8">月供 DCA</text>
    <circle cx="120" cy="0" r="4" fill="url(#red)"/>
    <text x="132" y="3" fill="white" opacity="0.8">一筆過</text>
  </g>

  <!-- Main title -->
  <g filter="url(#glow)">
    <text x="256" y="365" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" letter-spacing="1">
      平均成本法
    </text>
    <text x="256" y="398" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="normal" text-anchor="middle" opacity="0.85">
      DCA 月供投資實戰指南
    </text>
  </g>

  <!-- Callout pills -->
  <g transform="translate(256, 440)" font-family="system-ui, sans-serif">
    <rect x="-90" y="-12" width="180" height="24" rx="12" fill="#C9A84C" opacity="0.15"/>
    <text x="0" y="3" fill="#C9A84C" font-size="11" text-anchor="middle" font-weight="600">📊 時間分散風險</text>

    <rect x="-90" y="16" width="180" height="24" rx="12" fill="#22c55e" opacity="0.12"/>
    <text x="0" y="31" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="500">🔄 低位買多 · 高位買少</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="156" y1="482" x2="356" y2="482" stroke="url(#gold)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="186" y1="488" x2="326" y2="488" stroke="white" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
</svg>
