      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#2d4059"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547"/>
      <stop offset="100%" style="stop-color:#D4A82A"/>
    </linearGradient>
    <linearGradient id="building1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d5a80"/>
      <stop offset="100%" style="stop-color:#293b5a"/>
    </linearGradient>
    <linearGradient id="building2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a8c6f"/>
      <stop offset="100%" style="stop-color:#357a5c"/>
