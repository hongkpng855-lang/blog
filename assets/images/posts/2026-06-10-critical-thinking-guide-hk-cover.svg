<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="50%" stop-color="#1F3A5F"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2196F3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2196F3" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C860"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#C9A84C" stroke-width="0.5">
    <line x1="0" y1="50" x2="512" y2="50"/><line x1="0" y1="100" x2="512" y2="100"/>
    <line x1="0" y1="150" x2="512" y2="150"/><line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="250" x2="512" y2="250"/><line x1="0" y1="300" x2="512" y2="300"/>
    <line x1="0" y1="350" x2="512" y2="350"/><line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="0" y1="450" x2="512" y2="450"/>
  </g>

  <!-- Section Title -->
  <text x="256" y="38" text-anchor="middle" fill="url(#goldText)" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="3" opacity="0.8">✦ 批判性思維 ✦</text>

  <!-- Central Brain/Lightbulb Icon (Abstract) -->
  <g transform="translate(256,95)">
    <!-- Brain shape - simplified neuron network -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
    <!-- Neuron nodes -->
    <circle cx="-18" cy="-12" r="5" fill="#C9A84C" opacity="0.7"/>
    <circle cx="18" cy="-10" r="4" fill="#4CAF50" opacity="0.7"/>
    <circle cx="-8" cy="18" r="4.5" fill="#2196F3" opacity="0.7"/>
    <circle cx="14" cy="14" r="3.5" fill="#FF9800" opacity="0.7"/>
    <circle cx="0" cy="-22" r="3" fill="#E91E63" opacity="0.6"/>
    <circle cx="24" cy="4" r="3" fill="#9C27B0" opacity="0.6"/>
    <circle cx="-24" cy="6" r="3.5" fill="#00BCD4" opacity="0.6"/>
    <!-- Connections -->
    <line x1="-18" y1="-12" x2="18" y2="-10" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="-18" y1="-12" x2="-8" y2="18" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="-18" y1="-12" x2="0" y2="-22" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="18" y1="-10" x2="14" y2="14" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="18" y1="-10" x2="24" y2="4" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="-8" y1="18" x2="14" y2="14" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="-8" y1="18" x2="-24" y2="6" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-22" x2="-24" y2="6" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-22" x2="18" y2="-10" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="24" y1="4" x2="14" y2="14" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <line x1="-24" y1="6" x2="-8" y2="18" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
    <!-- Question mark in center -->
    <text x="0" y="5" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" filter="url(#glow)">?</text>
  </g>

  <!-- 4 Info Cards -->
  <!-- Card 1: 論證分析 -->
  <g transform="translate(16,170)">
    <rect width="230" height="72" rx="8" fill="url(#card1)" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="12" y="22" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">🔍 論證分析</text>
    <text x="12" y="40" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9">主張・前提・結論</text>
    <text x="12" y="54" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8">拆解每一個 argument</text>
    <text x="12" y="67" fill="#64748B" font-family="system-ui, sans-serif" font-size="7">阻截無效說服</text>
  </g>

  <!-- Card 2: 邏輯謬誤 -->
  <g transform="translate(266,170)">
    <rect width="230" height="72" rx="8" fill="url(#card2)" stroke="#4CAF50" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="12" y="22" fill="#81C784" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">⚠️ 邏輯謬誤</text>
    <text x="12" y="40" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9">稻草人・滑坡・人身攻擊</text>
    <text x="12" y="54" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8">12 種常見邏輯陷阱</text>
    <text x="12" y="67" fill="#64748B" font-family="system-ui, sans-serif" font-size="7">香港實例逐個拆</text>
  </g>

  <!-- Card 3: 證據驗證 -->
  <g transform="translate(16,260)">
    <rect width="230" height="72" rx="8" fill="url(#card3)" stroke="#2196F3" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="12" y="22" fill="#64B5F6" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">📊 證據驗證</text>
    <text x="12" y="40" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9">來源・樣本・相關性</text>
    <text x="12" y="54" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8">數據批判 5 步檢查</text>
    <text x="12" y="67" fill="#64748B" font-family="system-ui, sans-serif" font-size="7">破解偽科學研究</text>
  </g>

  <!-- Card 4: 日常習慣 -->
  <g transform="translate(266,260)">
    <rect width="230" height="72" rx="8" fill="url(#card4)" stroke="#FF9800" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="12" y="22" fill="#FFB74D" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">🔄 日常習慣</text>
    <text x="12" y="40" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9">每日3問・Monday Review</text>
    <text x="12" y="54" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8">30 日思維升級挑戰</text>
    <text x="12" y="67" fill="#64748B" font-family="system-ui, sans-serif" font-size="7">由被動接收變主動思考</text>
  </g>

  <!-- Bottom Stats Bar -->
  <g transform="translate(16,360)">
    <rect width="480" height="44" rx="8" fill="#0D1B2A" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- Stat 1 -->
    <text x="80" y="20" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">74%</text>
    <text x="80" y="36" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="7">港人遇假消息</text>
    <!-- Divider -->
    <line x1="160" y1="8" x2="160" y2="36" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>
    <!-- Stat 2 -->
    <text x="240" y="20" text-anchor="middle" fill="#4CAF50" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">12</text>
    <text x="240" y="36" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="7">Logic Fallacies</text>
    <!-- Divider -->
    <line x1="320" y1="8" x2="320" y2="36" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>
    <!-- Stat 3 -->
    <text x="400" y="20" text-anchor="middle" fill="#2196F3" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">5步</text>
    <text x="400" y="36" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="7">批判檢查系統</text>
  </g>

  <!-- Main Title -->
  <text x="256" y="430" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">批判性思維實戰指南</text>
  <text x="256" y="452" text-anchor="middle" fill="url(#goldText)" font-family="system-ui, sans-serif" font-size="10" font-weight="600">資訊爆炸時代嘅獨立思考系統</text>

  <!-- Subtitle -->
  <text x="256" y="478" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8">告別假消息・邏輯謬誤・人云亦云</text>

  <!-- Bottom accent line -->
  <line x1="150" y1="490" x2="362" y2="490" stroke="url(#goldText)" stroke-width="1.5" opacity="0.4"/>

  <!-- Corner decorations -->
  <text x="490" y="498" text-anchor="end" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="7" opacity="0.4">ESGov</text>
</svg>
