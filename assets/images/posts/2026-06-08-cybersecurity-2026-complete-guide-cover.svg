<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="40%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#050a1a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ff3366;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow1)"/>
  <rect width="512" height="512" fill="url(#glow2)"/>

  <!-- Matrix-style data stream lines -->
  <g stroke="#00ff88" stroke-width="0.5" fill="none" opacity="0.12">
    <path d="M30,0 Q40,128 20,256 Q0,384 30,512"/>
    <path d="M90,0 Q80,128 100,256 Q120,384 90,512"/>
    <path d="M420,0 Q430,128 410,256 Q390,384 420,512"/>
    <path d="M480,0 Q470,128 490,256 Q510,384 480,512"/>
  </g>

  <!-- Hexagonal grid background -->
  <g stroke="#00ff88" stroke-width="0.5" fill="none" opacity="0.08">
    <polygon points="256,30 286,50 286,90 256,110 226,90 226,50"/>
    <polygon points="166,70 196,90 196,130 166,150 136,130 136,90"/>
    <polygon points="346,70 376,90 376,130 346,150 316,130 316,90"/>
    <polygon points="61,130 91,150 91,190 61,210 31,190 31,150"/>
    <polygon points="451,130 481,150 481,190 451,210 421,190 421,150"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(256,195)">
    <!-- Shield outer glow -->
    <path d="M0,-85 L75,-55 L75,5 Q75,75 0,100 Q-75,75 -75,5 L-75,-55 Z" fill="url(#shieldGrad)" stroke="#00ff88" stroke-width="2" filter="url(#neonGlow)"/>
    <path d="M0,-75 L63,-48 L63,5 Q63,68 0,90 Q-63,68 -63,5 L-63,-48 Z" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    <!-- Lock icon inside shield -->
    <rect x="-18" y="-18" width="36" height="28" rx="4" fill="none" stroke="#00ff88" stroke-width="2.5"/>
    <path d="M-12,-18 L-12,-28 Q-12,-40 0,-40 Q12,-40 12,-28 L12,-18" fill="none" stroke="#00ff88" stroke-width="2.5"/>
    <circle cx="0" cy="-5" r="4" fill="#00ff88" opacity="0.8"/>
    <!-- Checkmark -->
    <path d="M-8,8 L-2,16 L10,-2" fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)"/>
  </g>

  <!-- Floating binary particles -->
  <g fill="#00ff88" opacity="0.4">
    <circle cx="100" cy="120" r="1.5"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="412" cy="130" r="1.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="320" r="1.5"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="310" r="1.5"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Binary code decorations -->
  <g font-family="monospace" font-size="8" fill="#00ff88" opacity="0.15">
    <text x="30" y="80">01001010</text>
    <text x="410" y="75">10010110</text>
    <text x="35" y="400">11010010</text>
    <text x="400" y="410">00101101</text>
  </g>

  <!-- Title -->
  <text x="256" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#00ff88" filter="url(#softGlow)">資訊安全 2026</text>
  <text x="256" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8b9dc3">AI 時代的個人與企業防禦實戰指南</text>

  <!-- Bottom accent bar -->
  <rect x="160" y="375" width="192" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Security feature tags -->
  <g font-family="system-ui, sans-serif" font-size="8" fill="#4a7a5a" opacity="0.6">
    <text x="70" y="430" text-anchor="middle">🔐 密碼管理</text>
    <text x="150" y="430" text-anchor="middle">🛡️ 釣魚防範</text>
    <text x="256" y="430" text-anchor="middle">🔑 雙因素認證</text>
    <text x="360" y="430" text-anchor="middle">👁️ 私隱保護</text>
    <text x="442" y="430" text-anchor="middle">🤖 AI 安全</text>
  </g>
</svg>
