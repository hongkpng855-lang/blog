<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 格線背景 -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 左上角裝飾圓 -->
  <circle cx="80" cy="80" r="120" fill="url(#accent1)" opacity="0.08"/>
  <circle cx="110" cy="100" r="60" fill="url(#accent2)" opacity="0.06"/>

  <!-- 右下角裝飾圓 -->
  <circle cx="1120" cy="550" r="150" fill="url(#accent1)" opacity="0.05"/>
  <circle cx="1050" cy="500" r="80" fill="url(#accent2)" opacity="0.04"/>

  <!-- 棒形圖區域 -->
  <g transform="translate(80, 160)">
    <!-- Figure caption -->
    <text x="0" y="-10" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="500">數據可視化範例</text>

    <!-- Y軸 -->
    <line x1="0" y1="0" x2="0" y2="320" stroke="#334155" stroke-width="2"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#334155" stroke-width="2"/>

    <!-- Y軸標籤 -->
    <text x="-10" y="320" fill="#475569" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">0</text>
    <text x="-10" y="240" fill="#475569" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">25</text>
    <text x="-10" y="160" fill="#475569" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">50</text>
    <text x="-10" y="80" fill="#475569" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">75</text>
    <text x="-10" y="0" fill="#475569" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">100</text>

    <!-- 格線 -->
    <line x1="0" y1="80" x2="400" y2="80" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- 棒形圖柱 -->
    <!-- Bar 1 -->
    <rect x="25" y="192" width="60" height="128" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="25" y="192" width="60" height="128" rx="4" fill="url(#bar1)" opacity="0.3" filter="url(#glowLight)"/>
    <text x="55" y="180" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">60%</text>
    <text x="55" y="350" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Q1</text>

    <!-- Bar 2 -->
    <rect x="115" y="144" width="60" height="176" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <rect x="115" y="144" width="60" height="176" rx="4" fill="url(#bar2)" opacity="0.3" filter="url(#glowLight)"/>
    <text x="145" y="132" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">75%</text>
    <text x="145" y="350" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Q2</text>

    <!-- Bar 3 -->
    <rect x="205" y="80" width="60" height="240" rx="4" fill="url(#bar3)" opacity="0.9"/>
    <rect x="205" y="80" width="60" height="240" rx="4" fill="url(#bar3)" opacity="0.3" filter="url(#glowLight)"/>
    <text x="235" y="68" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">92%</text>
    <text x="235" y="350" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Q3</text>

    <!-- Bar 4 -->
    <rect x="295" y="128" width="60" height="192" rx="4" fill="url(#bar4)" opacity="0.9"/>
    <rect x="295" y="128" width="60" height="192" rx="4" fill="url(#bar4)" opacity="0.3" filter="url(#glowLight)"/>
    <text x="325" y="116" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">68%</text>
    <text x="325" y="350" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Q4</text>

    <!-- 趨勢線 -->
    <polyline points="55,192 145,144 235,80 325,128" stroke="#f472b6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" stroke-dasharray="6,3"/>
  </g>

  <!-- 圓餅圖 -->
  <g transform="translate(600, 120)">
    <text x="150" y="-10" fill="#64748b" font-family="system-ui, sans-serif" font-size="13" font-weight="500" text-anchor="middle">數據分佈（示例）</text>

    <!-- Pie chart segments -->
    <circle cx="150" cy="160" r="130" fill="none" stroke="#1e293b" stroke-width="40"/>

    <!-- Segment 1: Blue -->
    <circle cx="150" cy="160" r="110" fill="none" stroke="url(#bar1)" stroke-width="45"
      stroke-dasharray="172 520" stroke-dashoffset="0" transform="rotate(-90, 150, 160)"/>

    <!-- Segment 2: Cyan -->
    <circle cx="150" cy="160" r="110" fill="none" stroke="url(#bar2)" stroke-width="45"
      stroke-dasharray="138 520" stroke-dashoffset="-172" transform="rotate(-90, 150, 160)"/>

    <!-- Segment 3: Purple -->
    <circle cx="150" cy="160" r="110" fill="none" stroke="url(#bar3)" stroke-width="45"
      stroke-dasharray="103 520" stroke-dashoffset="-310" transform="rotate(-90, 150, 160)"/>

    <!-- Segment 4: Amber -->
    <circle cx="150" cy="160" r="110" fill="none" stroke="url(#bar4)" stroke-width="45"
      stroke-dasharray="69 520" stroke-dashoffset="-413" transform="rotate(-90, 150, 160)"/>

    <!-- Center circle -->
    <circle cx="150" cy="160" r="55" fill="#0f172a"/>

    <!-- Center text -->
    <text x="150" y="155" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Data</text>
    <text x="150" y="175" fill="#64748b" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Literacy</text>

    <!-- 圖例 -->
    <circle cx="40" cy="310" r="6" fill="#3b82f6"/>
    <text x="52" y="314" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">讀取數據</text>
    <circle cx="155" cy="310" r="6" fill="#06b6d4"/>
    <text x="167" y="314" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">質疑數據</text>
    <circle cx="40" cy="335" r="6" fill="#8b5cf6"/>
    <text x="52" y="339" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">分析數據</text>
    <circle cx="155" cy="335" r="6" fill="#f59e0b"/>
    <text x="167" y="339" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">溝通數據</text>
  </g>

  <!-- 底部主標題區域 -->
  <g transform="translate(0, 460)">
    <rect x="0" y="0" width="1200" height="170" fill="url(#grid)"/>

    <!-- 分類標籤 -->
    <rect x="540" y="15" width="120" height="28" rx="14" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="600" y="34" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">科技類</text>

    <!-- 主標題 -->
    <text x="600" y="85" fill="#ffffff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" text-anchor="middle" letter-spacing="1" filter="url(#glow)">數據素養 2026 完整指南</text>
    <text x="600" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle" letter-spacing="0.5">唔識寫程式都識用數據講故事</text>

    <!-- 分隔線 -->
    <line x1="420" y1="140" x2="780" y2="140" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>

    <!-- Footer details -->
    <text x="600" y="160" fill="#475569" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">GovFlow · 2026 必備軟技能 · 由零開始建立數據思維</text>
  </g>
</svg>
