<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative growth chart -->
  <g opacity="0.12" stroke="#4ade80" stroke-width="1.5" fill="none">
    <polyline points="20,350 70,340 120,310 170,280 220,260 270,210 320,180 370,140 420,110 470,80"/>
    <polyline points="20,370 70,365 120,345 170,325 220,310 270,275 320,250 370,220 420,195 470,170"/>
  </g>

  <!-- Dollar sign background pattern -->
  <g opacity="0.04" fill="#fbbf24">
    <text x="40" y="120" font-size="30" font-family="sans-serif" font-weight="bold">$</text>
    <text x="440" y="450" font-size="40" font-family="sans-serif" font-weight="bold">$</text>
    <text x="100" y="470" font-size="20" font-family="sans-serif" font-weight="bold">$</text>
    <text x="380" y="90" font-size="24" font-family="sans-serif" font-weight="bold">$</text>
  </g>

  <!-- Main card background -->
  <rect x="45" y="160" width="422" height="200" rx="18" fill="#ffffff" opacity="0.07"/>
  <rect x="45" y="160" width="422" height="200" rx="18" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>

  <!-- Coins illustration -->
  <g transform="translate(256, 200)">
    <!-- Stack coins -->
    <circle cx="-30" cy="10" r="14" fill="url(#coin)" opacity="0.9"/>
    <circle cx="-30" cy="-8" r="14" fill="url(#coin)" opacity="0.85"/>
    <circle cx="-30" cy="-26" r="14" fill="url(#coin)" opacity="0.8"/>
    <text x="-30" y="-22" text-anchor="middle" font-size="12" fill="#7c2d12" font-weight="bold">$</text>
    <text x="-30" y="-4" text-anchor="middle" font-size="12" fill="#7c2d12" font-weight="bold">$</text>
    <text x="-30" y="14" text-anchor="middle" font-size="12" fill="#7c2d12" font-weight="bold">$</text>

    <!-- Single coins -->
    <circle cx="20" cy="10" r="12" fill="url(#coin)" opacity="0.7"/>
    <circle cx="45" cy="0" r="10" fill="url(#coin)" opacity="0.6"/>
    <circle cx="60" cy="10" r="8" fill="url(#coin)" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="256" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff">被動收入投資組合</text>
  <text x="256" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="url(#gold)">建立指南</text>

  <!-- Subtitle -->
  <text x="256" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">股息現金流 × 複利效應 × 降息策略</text>

  <!-- Tags -->
  <rect x="105" y="345" width="302" height="28" rx="14" fill="url(#gold)" opacity="0.12"/>
  <text x="256" y="363" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="url(#gold)">#被動收入 #股息投資 #現金流 #REITs #ETF</text>

  <!-- Year badge -->
  <rect x="216" y="390" width="80" height="28" rx="14" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
  <text x="256" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#4ade80" opacity="0.7">2026</text>

  <!-- Bottom decorative line -->
  <line x1="60" y1="470" x2="452" y2="470" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
</svg>
