<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c37b"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 背景圓圈 -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="#ffffff08" stroke-width="1"/>
  <circle cx="256" cy="240" r="140" fill="none" stroke="#ffffff06" stroke-width="1"/>
  <!-- 收納櫃輪廓 -->
  <rect x="140" y="160" width="232" height="200" rx="6" fill="#1e2d50" stroke="#e8c37b" stroke-width="1.5"/>
  <!-- 層板 -->
  <line x1="140" y1="227" x2="372" y2="227" stroke="#e8c37b44" stroke-width="1"/>
  <line x1="140" y1="293" x2="372" y2="293" stroke="#e8c37b44" stroke-width="1"/>
  <!-- 上層物品：書本 -->
  <rect x="160" y="175" width="20" height="50" rx="2" fill="#e8c37b" opacity="0.7"/>
  <rect x="184" y="180" width="18" height="45" rx="2" fill="#c9a84c" opacity="0.6"/>
  <rect x="206" y="173" width="22" height="52" rx="2" fill="#d4a853" opacity="0.5"/>
  <rect x="232" y="178" width="16" height="47" rx="2" fill="#e8c37b" opacity="0.6"/>
  <rect x="252" y="176" width="20" height="49" rx="2" fill="#b8943e" opacity="0.5"/>
  <!-- 小花盆 -->
  <ellipse cx="320" cy="205" rx="18" ry="14" fill="#2d5a2a" opacity="0.7"/>
  <ellipse cx="320" cy="196" rx="10" ry="6" fill="#4a8a3f" opacity="0.6"/>
  <!-- 中層：摺好嘅衫 -->
  <rect x="155" y="235" width="50" height="12" rx="3" fill="#6b8fa3" opacity="0.6"/>
  <rect x="155" y="250" width="50" height="12" rx="3" fill="#5a7d8f" opacity="0.5"/>
  <rect x="155" y="265" width="50" height="12" rx="3" fill="#7a9cb0" opacity="0.4"/>
  <rect x="220" y="238" width="45" height="10" rx="3" fill="#8fa86b" opacity="0.5"/>
  <rect x="220" y="252" width="45" height="10" rx="3" fill="#7a9458" opacity="0.4"/>
  <rect x="220" y="266" width="45" height="10" rx="3" fill="#9bb878" opacity="0.3"/>
  <!-- 收納盒 -->
  <rect x="290" y="235" width="65" height="50" rx="4" fill="none" stroke="#e8c37b66" stroke-width="1"/>
  <line x1="290" y1="260" x2="355" y2="260" stroke="#e8c37b44" stroke-width="1"/>
  <!-- 下層：收納籃 -->
  <rect x="160" y="302" width="55" height="50" rx="5" fill="#2a1f14" stroke="#c9a84c33" stroke-width="1"/>
  <line x1="160" y1="325" x2="215" y2="325" stroke="#c9a84c22" stroke-width="1"/>
  <rect x="230" y="302" width="55" height="50" rx="5" fill="#1e2d50" stroke="#c9a84c33" stroke-width="1"/>
  <line x1="230" y1="325" x2="285" y2="325" stroke="#c9a84c22" stroke-width="1"/>
  <rect x="300" y="302" width="55" height="50" rx="5" fill="#2a1f14" stroke="#c9a84c33" stroke-width="1"/>
  <line x1="300" y1="325" x2="355" y2="325" stroke="#c9a84c22" stroke-width="1"/>
  <!-- 標題文字 -->
  <text x="256" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#e8c37b" text-anchor="middle" font-weight="bold" letter-spacing="1">居家生活整理術</text>
  <text x="256" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff88" text-anchor="middle" letter-spacing="0.5">八個小改變 · 空間與心情同時變好</text>
  <!-- 裝飾點 -->
  <circle cx="130" cy="420" r="2" fill="#c9a84c44"/>
  <circle cx="382" cy="420" r="2" fill="#c9a84c44"/>
  <circle cx="118" cy="430" r="1.5" fill="#c9a84c33"/>
  <circle cx="394" cy="430" r="1.5" fill="#c9a84c33"/>
</svg>
