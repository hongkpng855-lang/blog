<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b735"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="rgba(226,183,53,0.05)"/>
  <circle cx="440" cy="420" r="150" fill="rgba(226,183,53,0.03)"/>
  
  <!-- Sun icon (top right) -->
  <circle cx="380" cy="100" r="30" fill="rgba(226,183,53,0.15)" stroke="rgba(226,183,53,0.4)" stroke-width="1.5"/>
  <line x1="380" y1="55" x2="380" y2="40" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="380" y1="145" x2="380" y2="160" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="335" y1="100" x2="320" y2="100" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="425" y1="100" x2="440" y2="100" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="348" y1="68" x2="338" y2="58" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="412" y1="132" x2="422" y2="142" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="412" y1="68" x2="422" y2="58" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="348" y1="132" x2="338" y2="142" stroke="rgba(226,183,53,0.4)" stroke-width="2" stroke-linecap="round"/>

  <!-- Moon icon (top left) -->
  <circle cx="130" cy="100" r="25" fill="rgba(200,200,230,0.1)" stroke="rgba(200,200,230,0.3)" stroke-width="1.5"/>
  <circle cx="120" cy="92" r="20" fill="url(#bg)"/>

  <!-- Vertical timeline line -->
  <line x1="120" y1="180" x2="120" y2="420" stroke="rgba(226,183,53,0.3)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Clock/timeline nodes -->
  <!-- Morning (06:00) -->
  <circle cx="120" cy="200" r="8" fill="url(#accent)"/>
  <text x="145" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e2b735" font-weight="bold">晨間儀式</text>

  <!-- Focus (09:00) -->
  <circle cx="120" cy="260" r="8" fill="url(#accent)"/>
  <text x="145" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e2b735" font-weight="bold">深度專注</text>

  <!-- Afternoon (13:00) -->
  <circle cx="120" cy="320" r="8" fill="url(#accent)"/>
  <text x="145" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e2b735" font-weight="bold">午後修復</text>

  <!-- Evening (18:00) -->
  <circle cx="120" cy="380" r="8" fill="url(#accent)"/>
  <text x="145" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e2b735" font-weight="bold">夜間修復</text>

  <!-- Dashed line connecting nodes on the timeline -->

  <!-- Main title -->
  <text x="256" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="2">理想生活設計指南</text>
  <text x="256" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="1">晨間儀式 · 深度專注 · 午後修復 · 夜間充電</text>

  <!-- Bottom decorative bar -->
  <rect x="180" y="440" width="152" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  
  <!-- Small decorative dots -->
  <circle cx="256" cy="460" r="3" fill="rgba(226,183,53,0.3)"/>
</svg>
