<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0077b6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="glow2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7209b7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4361ee" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="gridLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow1)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g opacity="0.3">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="450" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="450" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="450" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="450" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="0.5"/>
  </g>

  <!-- City skyline silhouette -->
  <g fill="#1a3a5c" opacity="0.5">
    <rect x="50" y="280" width="40" height="120"/>
    <rect x="100" y="240" width="30" height="160"/>
    <rect x="140" y="260" width="35" height="140"/>
    <rect x="185" y="220" width="25" height="180"/>
    <rect x="220" y="250" width="45" height="150"/>
    <rect x="275" y="200" width="30" height="200"/>
    <rect x="315" y="230" width="50" height="170"/>
    <rect x="375" y="270" width="35" height="130"/>
    <rect x="420" y="210" width="28" height="190"/>
    <rect x="458" y="245" width="40" height="155"/>
    <rect x="508" y="260" width="32" height="140"/>
    <rect x="550" y="225" width="45" height="175"/>
    <rect x="605" y="250" width="30" height="150"/>
    <rect x="645" y="270" width="40" height="130"/>
    <rect x="695" y="235" width="35" height="165"/>
    <rect x="740" y="260" width="40" height="140"/>
  </g>

  <!-- Data network connections (dots and lines) -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="120" y1="180" x2="200" y2="140"/>
    <line x1="200" y1="140" x2="300" y2="160"/>
    <line x1="300" y1="160" x2="400" y2="120"/>
    <line x1="400" y1="120" x2="500" y2="150"/>
    <line x1="500" y1="150" x2="600" y2="130"/>
    <line x1="600" y1="130" x2="680" y2="170"/>
    <line x1="200" y1="140" x2="250" y2="100"/>
    <line x1="400" y1="120" x2="380" y2="80"/>
    <line x1="500" y1="150" x2="550" y2="95"/>
    <line x1="300" y1="160" x2="320" y2="200"/>
    <line x1="120" y1="180" x2="100" y2="210"/>
    <line x1="680" y1="170" x2="700" y2="200"/>
  </g>

  <!-- Data nodes -->
  <g fill="#00d4ff" filter="url(#glow)">
    <circle cx="120" cy="180" r="4"/>
    <circle cx="200" cy="140" r="5"/>
    <circle cx="300" cy="160" r="4"/>
    <circle cx="400" cy="120" r="6"/>
    <circle cx="500" cy="150" r="5"/>
    <circle cx="600" cy="130" r="4"/>
    <circle cx="680" cy="170" r="4"/>
    <circle cx="250" cy="100" r="3"/>
    <circle cx="380" cy="80" r="3"/>
    <circle cx="550" cy="95" r="3"/>
    <circle cx="320" cy="200" r="3"/>
    <circle cx="100" cy="210" r="3"/>
    <circle cx="700" cy="200" r="3"/>
  </g>

  <!-- Wireless signal arcs -->
  <g stroke="#4361ee" stroke-width="1.2" fill="none" opacity="0.4">
    <path d="M 400 160 Q 420 140 440 160"/>
    <path d="M 400 150 Q 430 120 460 150"/>
    <path d="M 400 140 Q 440 100 480 140"/>
  </g>

  <!-- Small wireless towers -->
  <g stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.4">
    <line x1="330" y1="195" x2="330" y2="175"/>
    <line x1="322" y1="185" x2="338" y2="185"/>
    <line x1="460" y1="205" x2="460" y2="185"/>
    <line x1="452" y1="195" x2="468" y2="195"/>
    <line x1="600" y1="200" x2="600" y2="180"/>
    <line x1="592" y1="190" x2="608" y2="190"/>
  </g>

  <!-- AI brain icon (center top) -->
  <g transform="translate(400, 55)" filter="url(#glow)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#7209b7" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#4361ee" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="#4361ee" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#00d4ff"/>
    <!-- Neural connections -->
    <line x1="-14" y1="-14" x2="-8" y2="-8" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="14" y1="-14" x2="8" y2="-8" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="-14" y1="14" x2="-8" y2="8" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="14" y1="14" x2="8" y2="8" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- AI text label -->
  <text x="400" y="90" text-anchor="middle" fill="#7209b7" font-family="monospace" font-size="10" opacity="0.6">AI CITY BRAIN</text>

  <!-- Ground line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="url(#gridLine)" stroke-width="1"/>

  <!-- Foreground glowing dots -->
  <g fill="#00d4ff" opacity="0.3">
    <circle cx="80" cy="380" r="1.5"/>
    <circle cx="250" cy="370" r="1"/>
    <circle cx="450" cy="385" r="1.5"/>
    <circle cx="620" cy="375" r="1"/>
    <circle cx="750" cy="380" r="1.5"/>
  </g>

  <!-- Title text -->
  <text x="400" y="340" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="2">智慧城市科技</text>
  <text x="400" y="370" text-anchor="middle" fill="#00d4ff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" letter-spacing="3" opacity="0.9">SMART CITY TECHNOLOGY</text>
  <text x="400" y="390" text-anchor="middle" fill="#8899aa" font-family="system-ui, -apple-system, sans-serif" font-size="12" opacity="0.7">由 AI 驅動嘅未來都市生活藍圖 · 2026</text>

</svg>
