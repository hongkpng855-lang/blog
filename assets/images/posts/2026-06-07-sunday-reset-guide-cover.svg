<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c27f"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="240" r="100" fill="none" stroke="#e8a87c" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="240" r="85" fill="none" stroke="#e8a87c" stroke-width="1.5" opacity="0.2"/>
  <!-- Clock hands - showing ~7PM (Sunday reset time) -->
  <line x1="256" y1="240" x2="256" y2="180" stroke="#f0c27f" stroke-width="4" stroke-linecap="round" transform="rotate(-30 256 240)"/>
  <line x1="256" y1="240" x2="256" y2="195" stroke="#ffd700" stroke-width="3" stroke-linecap="round" transform="rotate(105 256 240)"/>
  <circle cx="256" cy="240" r="5" fill="#ffd700"/>
  <!-- Tick marks -->
  <g stroke="#e8a87c" stroke-width="1.5" opacity="0.4">
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(0 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(30 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(60 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(90 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(120 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(150 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(180 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(210 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(240 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(270 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(300 256 240)"/>
    <line x1="256" y1="145" x2="256" y2="155" transform="rotate(330 256 240)"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="120" cy="380" r="2" fill="#e8a87c" opacity="0.3"/>
  <circle cx="400" cy="390" r="2.5" fill="#e8a87c" opacity="0.25"/>
  <circle cx="380" cy="100" r="1.5" fill="#e8a87c" opacity="0.2"/>
  <circle cx="100" cy="130" r="2" fill="#e8a87c" opacity="0.3"/>
  <circle cx="350" cy="350" r="1.5" fill="#e8a87c" opacity="0.2"/>
  <circle cx="160" cy="390" r="1.5" fill="#e8a87c" opacity="0.15"/>
  <!-- Leaf/plant element - nature/calm -->
  <g transform="translate(160,360) scale(0.8)" opacity="0.25">
    <path d="M0 0 Q20 -30 40 -20 Q30 -5 20 0 Z" fill="#4a9e6b"/>
    <path d="M10 -5 Q30 -35 50 -25 Q40 -10 25 -5 Z" fill="#3d8b5e"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#4a9e6b" stroke-width="1.5"/>
  </g>
  <!-- Title text -->
  <text x="256" y="370" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Sunday Reset</text>
  <text x="256" y="400" text-anchor="middle" fill="#e8a87c" font-family="system-ui,sans-serif" font-size="15" opacity="0.85">週日重置儀式</text>
  <text x="256" y="425" text-anchor="middle" fill="#999" font-family="system-ui,sans-serif" font-size="12" opacity="0.6">2 小時準備好新一周</text>
  <!-- Small star decorations -->
  <g fill="#ffd700" opacity="0.4">
    <polygon points="80,200 83,208 92,208 85,213 87,222 80,217 73,222 75,213 68,208 77,208" transform="scale(0.6) translate(60,100)"/>
    <polygon points="80,200 83,208 92,208 85,213 87,222 80,217 73,222 75,213 68,208 77,208" transform="scale(0.4) translate(800,200)"/>
  </g>
</svg>
