<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#6b5bff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6b5bff;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 背景光暈 -->
  <circle cx="170" cy="200" r="160" fill="url(#glow1)" filter="url(#softGlow)"/>
  <circle cx="340" cy="320" r="140" fill="url(#glow2)" filter="url(#softGlow)"/>

  <!-- AI 神經網絡風格線條 -->
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.15" fill="none">
    <path d="M256,80 L180,160 L200,280 L160,380"/>
    <path d="M256,80 L330,160 L310,280 L350,380"/>
    <path d="M256,80 L256,160 L256,280 L256,380"/>
    <path d="M180,160 L330,160"/>
    <path d="M200,280 L310,280"/>
    <path d="M160,380 L350,380"/>
    <circle cx="256" cy="80" r="12" fill="#00d4ff" opacity="0.3"/>
    <circle cx="180" cy="160" r="8" fill="#6b5bff" opacity="0.3"/>
    <circle cx="330" cy="160" r="8" fill="#6b5bff" opacity="0.3"/>
    <circle cx="256" cy="160" r="8" fill="#6b5bff" opacity="0.3"/>
    <circle cx="200" cy="280" r="6" fill="#ff6b6b" opacity="0.3"/>
    <circle cx="310" cy="280" r="6" fill="#ff6b6b" opacity="0.3"/>
  </g>

  <!-- 立體幾何形狀 -->
  <g transform="translate(256,240)">
    <!-- 正面 - 抽象臉/畫像 -->
    <rect x="-80" y="-80" width="160" height="160" rx="16" fill="none" stroke="#6b5bff" stroke-width="2" opacity="0.6"/>
    <rect x="-70" y="-70" width="140" height="140" rx="12" fill="none" stroke="#6b5bff" stroke-width="1" opacity="0.3"/>
    
    <!-- 抽象畫筆 - AI 繪畫 -->
    <g transform="translate(-40,-30)">
      <rect x="0" y="0" width="100" height="8" rx="4" fill="#ff6b6b" opacity="0.7"/>
      <rect x="0" y="12" width="80" height="8" rx="4" fill="#6b5bff" opacity="0.7"/>
      <rect x="0" y="24" width="90" height="8" rx="4" fill="#00d4ff" opacity="0.7"/>
      <rect x="0" y="36" width="70" height="8" rx="4" fill="#ff6b6b" opacity="0.5"/>
      <rect x="0" y="48" width="85" height="8" rx="4" fill="#6b5bff" opacity="0.5"/>
      <rect x="0" y="60" width="60" height="8" rx="4" fill="#00d4ff" opacity="0.5"/>
    </g>
  </g>

  <!-- 火花/星星點綴 -->
  <g fill="#ffffff">
    <circle cx="120" cy="120" r="1.5" opacity="0.8"/>
    <circle cx="400" cy="100" r="1" opacity="0.6"/>
    <circle cx="380" cy="400" r="1.5" opacity="0.8"/>
    <circle cx="100" cy="380" r="1" opacity="0.6"/>
    <circle cx="450" cy="250" r="1" opacity="0.4"/>
    <circle cx="60" cy="260" r="1.2" opacity="0.5"/>
    <circle cx="300" cy="80" r="1" opacity="0.7"/>
    <circle cx="200" cy="440" r="1" opacity="0.5"/>
  </g>

  <!-- 標題文字 -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#neon)">
    AI 繪圖與生成式設計
  </text>
  <text x="256" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff" opacity="0.9">
    2026 實戰完全指南
  </text>

  <!-- 裝飾線 -->
  <line x1="176" y1="478" x2="336" y2="478" stroke="#6b5bff" stroke-width="1" opacity="0.4"/>
</svg>
