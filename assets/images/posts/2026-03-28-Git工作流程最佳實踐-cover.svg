<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#1a202c"/>
  
  <!-- 漸層背景效果 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#63b3ed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- 裝飾性網格 -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#4299e1" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#4299e1" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#4299e1" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#4299e1" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#4299e1" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#4299e1" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#4299e1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#4299e1" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#4299e1" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#4299e1" stroke-width="1"/>
  </g>
  
  <!-- Git 分支圖示 -->
  <g transform="translate(900, 150)">
    <!-- 主分支 -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#4299e1" stroke-width="4" stroke-linecap="round"/>
    
    <!-- feature 分支 -->
    <path d="M 0 60 Q 60 60, 80 100" stroke="#63b3ed" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="80" y1="100" x2="80" y2="180" stroke="#63b3ed" stroke-width="3" stroke-linecap="round"/>
    <path d="M 80 180 Q 60 220, 0 220" stroke="#63b3ed" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 另一個分支 -->
    <path d="M 0 140 Q -40 140, -60 180" stroke="#90cdf4" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="-60" y1="180" x2="-60" y2="240" stroke="#90cdf4" stroke-width="3" stroke-linecap="round"/>
    <path d="M -60 240 Q -40 280, 0 280" stroke="#90cdf4" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 節點 -->
    <circle cx="0" cy="0" r="8" fill="#4299e1"/>
    <circle cx="0" cy="60" r="8" fill="#4299e1"/>
    <circle cx="0" cy="140" r="8" fill="#4299e1"/>
    <circle cx="0" cy="220" r="8" fill="#4299e1"/>
    <circle cx="0" cy="280" r="8" fill="#4299e1"/>
    <circle cx="0" cy="300" r="8" fill="#4299e1"/>
    
    <circle cx="80" cy="100" r="6" fill="#63b3ed"/>
    <circle cx="80" cy="180" r="6" fill="#63b3ed"/>
    
    <circle cx="-60" cy="180" r="6" fill="#90cdf4"/>
    <circle cx="-60" cy="240" r="6" fill="#90cdf4"/>
  </g>
  
  <!-- 左側裝飾元素 -->
  <rect x="50" y="200" width="8" height="230" fill="url(#accentGradient)" rx="4"/>
  
  <!-- 標題 -->
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    Git 工作流程
  </text>
  <text x="100" y="350" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#4299e1">
    最佳實踐
  </text>
  
  <!-- 副標題 -->
  <text x="100" y="410" font-family="Arial, sans-serif" font-size="24" fill="#a0aec0">
    讓團隊協作更順暢
  </text>
  
  <!-- 標籤 -->
  <g transform="translate(100, 460)">
    <rect x="0" y="0" width="80" height="32" rx="16" fill="#4299e1" opacity="0.2"/>
    <text x="40" y="22" font-family="Arial, sans-serif" font-size="14" fill="#4299e1" text-anchor="middle">Git</text>
    
    <rect x="100" y="0" width="100" height="32" rx="16" fill="#4299e1" opacity="0.2"/>
    <text x="150" y="22" font-family="Arial, sans-serif" font-size="14" fill="#4299e1" text-anchor="middle">版本控制</text>
    
    <rect x="220" y="0" width="100" height="32" rx="16" fill="#4299e1" opacity="0.2"/>
    <text x="270" y="22" font-family="Arial, sans-serif" font-size="14" fill="#4299e1" text-anchor="middle">團隊協作</text>
  </g>
  
  <!-- 右下角裝飾圓環 -->
  <circle cx="1100" cy="530" r="80" fill="none" stroke="#4299e1" stroke-width="2" opacity="0.2"/>
  <circle cx="1100" cy="530" r="60" fill="none" stroke="#4299e1" stroke-width="1" opacity="0.15"/>
  <circle cx="1100" cy="530" r="40" fill="none" stroke="#4299e1" stroke-width="1" opacity="0.1"/>
</svg>