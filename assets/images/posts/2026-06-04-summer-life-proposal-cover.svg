<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#FFE4B5"/>
      <stop offset="100%" stop-color="#FFA07A"/>
    </linearGradient>
    <linearGradient id="sun" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <!-- 天空背景 -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- 山巒 -->
  <path d="M0 400 Q80 280 180 340 Q250 300 320 320 Q380 270 450 310 Q490 290 512 310 L512 512 L0 512 Z" fill="#5B8C5A" opacity="0.6"/>
  <path d="M0 430 Q100 360 200 390 Q280 350 380 370 Q440 340 512 360 L512 512 L0 512 Z" fill="#4A7C48" opacity="0.8"/>
  <!-- 草地 -->
  <path d="M0 460 Q120 430 250 445 Q380 425 512 450 L512 512 L0 512 Z" fill="#3D6B3A"/>
  <!-- 太陽 -->
  <circle cx="380" cy="110" r="45" fill="url(#sun)" opacity="0.9"/>
  <!-- 陽光光暈 -->
  <circle cx="380" cy="110" r="60" fill="#FFD700" opacity="0.15"/>
  <circle cx="380" cy="110" r="75" fill="#FFD700" opacity="0.08"/>
  <!-- 樹木 -->
  <g fill="#2D5A2E">
    <ellipse cx="80" cy="370" rx="40" ry="50"/>
    <rect x="77" y="410" width="6" height="25" fill="#5C4033"/>
    <ellipse cx="430" cy="350" rx="35" ry="45"/>
    <rect x="427" y="385" width="6" height="25" fill="#5C4033"/>
  </g>
  <!-- 雲朵 -->
  <g fill="white" opacity="0.8">
    <ellipse cx="120" cy="100" rx="50" ry="20"/>
    <ellipse cx="150" cy="90" rx="35" ry="18"/>
    <ellipse cx="90" cy="95" rx="30" ry="15"/>
  </g>
  <g fill="white" opacity="0.6">
    <ellipse cx="280" cy="150" rx="40" ry="15"/>
    <ellipse cx="310" cy="143" rx="30" ry="13"/>
  </g>
  <!-- 人物：散步的人 -->
  <g transform="translate(240, 430)">
    <circle cx="0" cy="-15" r="6" fill="#E8C39E"/>
    <line x1="0" y1="-9" x2="0" y2="8" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-10" y2="12" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="10" y2="12" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 人物 2 -->
  <g transform="translate(280, 435)">
    <circle cx="0" cy="-13" r="5" fill="#D4A574"/>
    <line x1="0" y1="-8" x2="0" y2="7" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-8" y2="10" stroke="#E74C3C" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="8" y2="10" stroke="#E74C3C" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 標題文字 -->
  <rect x="30" y="20" width="452" height="60" rx="10" fill="white" opacity="0.85"/>
  <text x="256" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">夏日生活提案</text>
  <rect x="60" y="440" width="392" height="50" rx="10" fill="white" opacity="0.8"/>
  <text x="256" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#34495E">從數位排毒到戶外療癒的六個練習</text>
  <text x="256" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7F8C8D">☀️ 2026 夏天，重新定義你的生活節奏</text>
</svg>
