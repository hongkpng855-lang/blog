      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- 成長曲線柱狀圖 -->
  <rect x="60" y="320" width="60" height="100" fill="#DAA520"/>
  <rect x="140" y="280" width="60" height="140" fill="#DAA520"/>
  <rect x="220" y="240" width="60" height="180" fill="#DAA520"/>
  <rect x="300" y="180" width="60" height="240" fill="#DAA520"/>
  <rect x="380" y="120" width="60" height="300" fill="#DAA520"/>
  
  <!-- 上升箭頭 -->
  <polygon points="450,80 480,130 460,130 460,200 440,200 440,130 420,130" fill="#ffffff"/>
  
  <!-- 標題 -->
  <text x="256" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">PASSIVE</text>
  <text x="256" y="100" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#DAA520" text-anchor="middle">INVESTING</text>
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">ETF 101</text>
  
  <!-- 底部裝飾線 -->
