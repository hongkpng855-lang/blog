<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    <filter id="neoGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 電路網格背景 -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>

  <!-- 發光背景 -->
  <circle cx="256" cy="230" r="160" fill="url(#glow)"/>

  <!-- 神經網絡節點（背景） -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="0.8" fill="none">
    <circle cx="140" cy="170" r="3" fill="#00d4ff"/>
    <circle cx="210" cy="130" r="4" fill="#00d4ff"/>
    <circle cx="310" cy="140" r="3" fill="#00d4ff"/>
    <circle cx="370" cy="190" r="4" fill="#00d4ff"/>
    <line x1="140" y1="170" x2="210" y2="130"/>
    <line x1="210" y1="130" x2="310" y2="140"/>
    <line x1="310" y1="140" x2="370" y2="190"/>
    <line x1="140" y1="170" x2="310" y2="140"/>
    <line x1="210" y1="130" x2="370" y2="190"/>
  </g>

  <!-- AI 晶片主體 -->
  <rect x="176" y="160" width="160" height="140" rx="12" fill="url(#chip)" stroke="#2a4a8e" stroke-width="1.5"/>

  <!-- 晶片內部結構 -->
  <!-- 核心區域 -->
  <rect x="196" y="180" width="120" height="100" rx="6" fill="#111d44" stroke="#1a3a6e" stroke-width="1"/>

  <!-- AI 核心方塊 -->
  <g filter="url(#neoGlow)">
    <rect x="216" y="200" width="80" height="60" rx="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- 核心運算區塊 -->
  <g fill="#00d4ff" opacity="0.6">
    <rect x="226" y="210" width="12" height="12" rx="2"/>
    <rect x="244" y="210" width="12" height="12" rx="2"/>
    <rect x="262" y="210" width="12" height="12" rx="2"/>
    <rect x="226" y="228" width="12" height="12" rx="2"/>
    <rect x="244" y="228" width="12" height="12" rx="2"/>
    <rect x="262" y="228" width="12" height="12" rx="2"/>
    <rect x="226" y="246" width="12" height="12" rx="2"/>
    <rect x="244" y="246" width="12" height="12" rx="2"/>
    <rect x="262" y="246" width="12" height="12" rx="2"/>
  </g>

  <!-- 晶片連接腳位 -->
  <g stroke="#3a5a9e" stroke-width="1.5">
    <!-- 頂部腳位 -->
    <line x1="196" y1="160" x2="196" y2="145"/>
    <line x1="216" y1="160" x2="216" y2="145"/>
    <line x1="236" y1="160" x2="236" y2="145"/>
    <line x1="256" y1="160" x2="256" y2="145"/>
    <line x1="276" y1="160" x2="276" y2="145"/>
    <line x1="296" y1="160" x2="296" y2="145"/>
    <line x1="316" y1="160" x2="316" y2="145"/>
    <!-- 底部腳位 -->
    <line x1="196" y1="300" x2="196" y2="315"/>
    <line x1="216" y1="300" x2="216" y2="315"/>
    <line x1="236" y1="300" x2="236" y2="315"/>
    <line x1="256" y1="300" x2="256" y2="315"/>
    <line x1="276" y1="300" x2="276" y2="315"/>
    <line x1="296" y1="300" x2="296" y2="315"/>
    <line x1="316" y1="300" x2="316" y2="315"/>
    <!-- 左側腳位 -->
    <line x1="176" y1="180" x2="161" y2="180"/>
    <line x1="176" y1="200" x2="161" y2="200"/>
    <line x1="176" y1="220" x2="161" y2="220"/>
    <line x1="176" y1="240" x2="161" y2="240"/>
    <line x1="176" y1="260" x2="161" y2="260"/>
    <line x1="176" y1="280" x2="161" y2="280"/>
    <!-- 右側腳位 -->
    <line x1="336" y1="180" x2="351" y2="180"/>
    <line x1="336" y1="200" x2="351" y2="200"/>
    <line x1="336" y1="220" x2="351" y2="220"/>
    <line x1="336" y1="240" x2="351" y2="240"/>
    <line x1="336" y1="260" x2="351" y2="260"/>
    <line x1="336" y1="280" x2="351" y2="280"/>
  </g>

  <!-- 右上角發光數據流箭頭 -->
  <g filter="url(#softGlow)">
    <path d="M380 140 L420 110" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6"/>
    <polygon points="420,110 410,120 425,115" fill="#00d4ff" opacity="0.6"/>
  </g>

  <!-- 數據粒子上行 -->
  <g fill="#00d4ff" opacity="0.4">
    <circle cx="390" cy="155" r="2">
      <animate attributeName="cy" from="160" to="130" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="410" cy="160" r="1.5">
      <animate attributeName="cy" from="165" to="135" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.4" to="0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 底部裝置圖示 - 手機 -->
  <g opacity="0.3">
    <rect x="100" y="340" width="30" height="50" rx="5" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <rect x="112" y="380" width="6" height="4" rx="1" fill="#00d4ff"/>
  </g>
  <!-- 底部裝置圖示 - 筆電 -->
  <g opacity="0.3">
    <rect x="190" y="345" width="50" height="32" rx="3" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <rect x="185" y="377" width="60" height="4" rx="1" fill="#00d4ff" opacity="0.5"/>
  </g>
  <!-- 底部裝置圖示 - IoT -->
  <g opacity="0.3">
    <rect x="310" y="350" width="25" height="25" rx="4" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="322" cy="362" r="3" fill="#00d4ff" opacity="0.5"/>
  </g>
  <!-- 底部裝置圖示 - 車 -->
  <g opacity="0.3">
    <rect x="390" y="355" width="35" height="18" rx="4" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="400" cy="375" r="4" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="418" cy="375" r="4" fill="none" stroke="#00d4ff" stroke-width="1"/>
  </g>

  <!-- 連接線（晶片到裝置） -->
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.2">
    <line x1="176" y1="260" x2="115" y2="340"/>
    <line x1="256" y1="300" x2="220" y2="345"/>
    <line x1="336" y1="250" x2="322" y2="350"/>
    <line x1="336" y1="280" x2="407" y2="355"/>
  </g>

  <!-- 標題文字 -->
  <g filter="url(#neoGlow)">
    <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2">EDGE AI</text>
  </g>
  <text x="256" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6a8abe" letter-spacing="3">裝置端智慧運算革命</text>
  <text x="256" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a6a9e" letter-spacing="2">從雲端到終端 · 2026</text>

  <!-- 右下角裝飾點 -->
  <g fill="#00d4ff" opacity="0.3">
    <circle cx="480" cy="40" r="1.5"/>
    <circle cx="490" cy="55" r="1"/>
    <circle cx="475" cy="62" r="0.8"/>
  </g>
  <!-- 左上角裝飾點 -->
  <g fill="#00d4ff" opacity="0.2">
    <circle cx="30" cy="30" r="2"/>
    <circle cx="50" cy="20" r="1"/>
    <circle cx="25" cy="50" r="1.2"/>
  </g>
</svg>
