<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="book1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="book2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81d4fa"/>
      <stop offset="100%" style="stop-color:#29b6f6"/>
    </linearGradient>
    <linearGradient id="aiCirc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#536dfe"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="80" r="60" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.2"/>
  <circle cx="100" cy="420" r="80" fill="none" stroke="#7c4dff" stroke-width="0.5" opacity="0.15"/>

  <!-- AI/Brain node network -->
  <g opacity="0.3">
    <circle cx="120" cy="100" r="3" fill="#4fc3f7"/>
    <circle cx="380" cy="140" r="3" fill="#7c4dff"/>
    <circle cx="200" cy="400" r="3" fill="#4fc3f7"/>
    <circle cx="350" cy="360" r="3" fill="#7c4dff"/>
    <line x1="120" y1="100" x2="380" y2="140" stroke="#4fc3f7" stroke-width="0.5" opacity="0.4"/>
    <line x1="380" y1="140" x2="350" y2="360" stroke="#7c4dff" stroke-width="0.5" opacity="0.4"/>
    <line x1="350" y1="360" x2="200" y2="400" stroke="#4fc3f7" stroke-width="0.5" opacity="0.4"/>
    <line x1="200" y1="400" x2="120" y2="100" stroke="#7c4dff" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Central AI circle -->
  <circle cx="256" cy="200" r="48" fill="none" stroke="#7c4dff" stroke-width="2" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="256" cy="200" r="36" fill="url(#aiCirc)" opacity="0.15"/>
  <text x="256" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="18" fill="#7c4dff" filter="url(#softGlow)">AI</text>

  <!-- Connection lines from AI to books -->
  <line x1="256" y1="248" x2="180" y2="320" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="248" x2="332" y2="320" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>

  <!-- Book 1 (left) -->
  <g transform="translate(130, 310)">
    <rect x="0" y="0" width="95" height="70" rx="4" fill="url(#book1)" opacity="0.9"/>
    <rect x="8" y="10" width="79" height="3" rx="1.5" fill="#fff" opacity="0.5"/>
    <rect x="8" y="20" width="60" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="8" y="30" width="70" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="8" y="40" width="45" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <!-- Spine -->
    <rect x="0" y="0" width="6" height="70" rx="2" fill="#0277bd" opacity="0.5"/>
  </g>

  <!-- Book 2 (right) -->
  <g transform="translate(287, 320)">
    <rect x="0" y="0" width="85" height="60" rx="4" fill="url(#book2)" opacity="0.9"/>
    <rect x="7" y="8" width="71" height="3" rx="1.5" fill="#fff" opacity="0.5"/>
    <rect x="7" y="17" width="55" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="7" y="26" width="65" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <!-- Spine -->
    <rect x="0" y="0" width="5" height="60" rx="2" fill="#0288d1" opacity="0.5"/>
  </g>

  <!-- Open book at bottom center -->
  <g transform="translate(201, 388)">
    <path d="M0,0 Q27,8 55,0 L55,35 Q27,43 0,35 Z" fill="#4fc3f7" opacity="0.25"/>
    <path d="M55,0 Q82,-8 110,0 L110,35 Q82,43 55,35 Z" fill="#7c4dff" opacity="0.25"/>
  </g>

  <!-- Floating particles (data/bits) -->
  <g opacity="0.4">
    <circle cx="180" cy="170" r="1.5" fill="#4fc3f7">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="190" r="1.5" fill="#7c4dff">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="260" r="1" fill="#4fc3f7">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="370" cy="250" r="1" fill="#7c4dff">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="130" r="1.5" fill="#4fc3f7">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title text at bottom -->
  <text x="256" y="478" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="#4fc3f7" letter-spacing="3" opacity="0.7">AI · 自主學習</text>
</svg>
