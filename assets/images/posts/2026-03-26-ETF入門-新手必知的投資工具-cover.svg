<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffed4a"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 頂部強調色條 -->
  <rect width="1200" height="8" fill="url(#goldBar)"/>
  
  <!-- 左側裝飾線 -->
  <rect x="40" y="50" width="8" height="230" fill="#ffd700" rx="4"/>
  
  <!-- 裝飾圓形 -->
  <circle cx="1050" cy="150" r="120" fill="#ffd700" opacity="0.1"/>
  <circle cx="1100" cy="480" r="80" fill="#ffd700" opacity="0.08"/>
  <circle cx="150" cy="550" r="100" fill="#4299e1" opacity="0.1"/>
  
  <!-- 分類標籤 -->
  <rect x="68" y="60" width="100" height="32" fill="#ffd700" rx="16"/>
  <text x="118" y="82" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a365d" text-anchor="middle">#投資</text>
  
  <!-- 文章標題 -->
  <text x="68" y="170" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">ETF 入門</text>
  <text x="68" y="230" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">新手必知的投資工具</text>
  
  <!-- 副標題 -->
  <text x="68" y="290" font-family="Arial, sans-serif" font-size="24" fill="#a0aec0">簡單、低成本、分散風險的投資方式</text>
  
  <!-- 圖示：向上趨勢箭頭 -->
  <g transform="translate(900, 280)">
    <polyline points="0,150 50,100 100,120 150,50" fill="none" stroke="#ffd700" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="150,50 140,60 155,65" fill="#ffd700"/>
  </g>
  
  <!-- 圖示：錢幣符號 -->
  <g transform="translate(750, 350)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#ffd700" stroke-width="3"/>
    <text x="30" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffd700" text-anchor="middle">$</text>
  </g>
  
  <!-- 圖示：長條圖 -->
  <g transform="translate(950, 380)">
    <rect x="0" y="80" width="20" height="60" fill="#4299e1" opacity="0.7"/>
    <rect x="30" y="50" width="20" height="90" fill="#4299e1" opacity="0.8"/>
    <rect x="60" y="20" width="20" height="120" fill="#ffd700"/>
  </g>
  
  <!-- 底部網站名稱區域 -->
  <rect x="0" y="570" width="1200" height="60" fill="#0d1f3c"/>
  <text x="68" y="608" font-family="Arial, sans-serif" font-size="20" fill="#a0aec0">Sun ny 的投資筆記</text>
  <text x="1132" y="608" font-family="Arial, sans-serif" font-size="16" fill="#718096" text-anchor="end">2026.03.26</text>
</svg>