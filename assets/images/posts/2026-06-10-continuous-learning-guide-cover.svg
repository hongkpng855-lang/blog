<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#e2c96e"/>
    </linearGradient>
    <linearGradient id="green1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0984e3"/>
      <stop offset="100%" style="stop-color:#74b9ff"/>
    </linearGradient>
    <linearGradient id="cardg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#152238;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Circuit / learning pattern -->
  <g opacity="0.06">
    <line x1="0" y1="60" x2="800" y2="60" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="800" y2="420" stroke="#C9A84C" stroke-width="0.5"/>
  </g>

  <!-- Central icon: Open book with lightbulb -->
  <g transform="translate(400, 75)" filter="url(#glow)">
    <!-- Open book -->
    <path d="M-45 -5 Q-50 -35 -25 -40 L0 -42 L0 35 Q-25 33 -45 15 Z" fill="none" stroke="url(#gold1)" stroke-width="2.5"/>
    <path d="M45 -5 Q50 -35 25 -40 L0 -42 L0 35 Q25 33 45 15 Z" fill="none" stroke="url(#gold1)" stroke-width="2.5"/>
    <!-- Book spine glow -->
    <line x1="0" y1="-42" x2="0" y2="35" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
    <!-- Lightbulb above book -->
    <circle cx="0" cy="-52" r="14" fill="none" stroke="url(#blue1)" stroke-width="2.5"/>
    <line x1="0" y1="-38" x2="0" y2="-32" stroke="url(#blue1)" stroke-width="2.5"/>
    <line x1="-9" y1="-30" x2="9" y2="-30" stroke="url(#blue1)" stroke-width="2" stroke-linecap="round"/>
    <!-- Light rays -->
    <line x1="-22" y1="-52" x2="-30" y2="-52" stroke="url(#blue1)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="22" y1="-52" x2="30" y2="-52" stroke="url(#blue1)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-18" y1="-68" x2="-24" y2="-74" stroke="url(#blue1)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="18" y1="-68" x2="24" y2="-74" stroke="url(#blue1)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <!-- Arrow going up-right from book (growth) -->
    <path d="M30 -10 Q50 -25 60 -45" fill="none" stroke="url(#green1)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00cec9"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="135" text-anchor="middle" fill="url(#gold1)" font-family="system-ui, sans-serif" font-size="24" font-weight="bold">香港人持續學習實戰指南</text>
  <text x="400" y="160" text-anchor="middle" fill="#a0b4c8" font-family="system-ui, sans-serif" font-size="14">返工湊仔都要進步嘅高效自學系統</text>

  <!-- Progress bar visual (learning journey) -->
  <g transform="translate(200, 180)">
    <rect x="0" y="0" width="400" height="6" rx="3" fill="#1e3a5f" opacity="0.6"/>
    <rect x="0" y="0" width="160" height="6" rx="3" fill="url(#gold1)" opacity="0.8"/>
    <circle cx="160" cy="3" r="6" fill="#C9A84C"/>
    <circle cx="160" cy="3" r="3" fill="#1a1a2e"/>
    <text x="160" y="20" text-anchor="middle" fill="#8899aa" font-size="10">30日啟動計劃</text>
  </g>

  <!-- Info cards - Row of 4 -->
  <!-- Card 1: 15分鐘學習 -->
  <g transform="translate(30, 210)" filter="url(#shadow)">
    <rect width="170" height="100" rx="8" fill="url(#cardg)" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="22" cy="22" r="12" fill="none" stroke="url(#gold1)" stroke-width="1.5"/>
    <text x="22" y="27" text-anchor="middle" fill="#C9A84C" font-size="12" font-weight="bold">15</text>
    <text x="40" y="27" fill="#C9A84C" font-size="11">分鐘學習單位</text>
    <text x="12" y="48" fill="#a0b4c8" font-size="10">每日 15 分鐘</text>
    <text x="12" y="64" fill="#a0b4c8" font-size="10">低門檻開始</text>
    <text x="12" y="80" fill="#a0b4c8" font-size="10">一年 = 91 小時</text>
    <text x="12" y="94" fill="#00cec9" font-size="9">Micro Habits ✓</text>
  </g>

  <!-- Card 2: 輸出驅動 -->
  <g transform="translate(220, 210)" filter="url(#shadow)">
    <rect width="170" height="100" rx="8" fill="url(#cardg)" stroke="#00b894" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Target icon -->
    <circle cx="22" cy="22" r="11" fill="none" stroke="url(#green1)" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="5" fill="none" stroke="url(#green1)" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="2" fill="url(#green1)"/>
    <text x="40" y="27" fill="#00cec9" font-size="11">輸出驅動輸入</text>
    <text x="12" y="48" fill="#a0b4c8" font-size="10">為「做」而學</text>
    <text x="12" y="64" fill="#a0b4c8" font-size="10">具體輸出目標</text>
    <text x="12" y="80" fill="#a0b4c8" font-size="10">即時 feedback</text>
    <text x="12" y="94" fill="#00cec9" font-size="9">Output-Driven ✓</text>
  </g>

  <!-- Card 3: 習慣綑綁 -->
  <g transform="translate(410, 210)" filter="url(#shadow)">
    <rect width="170" height="100" rx="8" fill="url(#cardg)" stroke="#0984e3" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Chain icon -->
    <path d="M12 15 Q12 8 18 8 Q24 8 24 15 L24 22 Q24 30 18 30 Q12 30 12 22" fill="none" stroke="url(#blue1)" stroke-width="1.5"/>
    <path d="M32 30 Q32 37 26 37 Q20 37 20 30 L20 23 Q20 15 26 15 Q32 15 32 23" fill="none" stroke="url(#blue1)" stroke-width="1.5"/>
    <text x="40" y="27" fill="#74b9ff" font-size="11">習慣綑綁</text>
    <text x="12" y="48" fill="#a0b4c8" font-size="10">黐落現有習慣</text>
    <text x="12" y="64" fill="#a0b4c8" font-size="10">通勤/飯後學習</text>
    <text x="12" y="80" fill="#a0b4c8" font-size="10">唔使額外時間</text>
    <text x="12" y="94" fill="#74b9ff" font-size="9">Habit Stacking ✓</text>
  </g>

  <!-- Card 4: Accountability -->
  <g transform="translate(600, 210)" filter="url(#shadow)">
    <rect width="170" height="100" rx="8" fill="url(#cardg)" stroke="#e17055" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- People/partner icon -->
    <circle cx="22" cy="18" r="7" fill="none" stroke="#e17055" stroke-width="1.5"/>
    <circle cx="22" cy="18" r="2" fill="#e17055"/>
    <circle cx="22" cy="35" r="7" fill="none" stroke="#e17055" stroke-width="1.5"/>
    <circle cx="22" cy="35" r="2" fill="#e17055"/>
    <text x="40" y="27" fill="#e17055" font-size="11">Accoun-ability</text>
    <text x="12" y="48" fill="#a0b4c8" font-size="10">學習夥伴 check-in</text>
    <text x="12" y="64" fill="#a0b4c8" font-size="10">公開承諾效果</text>
    <text x="12" y="80" fill="#a0b4c8" font-size="10">日曆封鎖時段</text>
    <text x="12" y="94" fill="#e17055" font-size="9">Accountability ✓</text>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(30, 325)">
    <rect width="740" height="55" rx="8" fill="#1e3a5f" fill-opacity="0.5" stroke="#C9A84C" stroke-width="0.3" stroke-opacity="0.2"/>
    <text x="370" y="25" text-anchor="middle" fill="#a0b4c8" font-size="11">90-day Cycle Review ｜ 核心 20% 先學法 ｜ 間隔重複 Anki ｜ 6 步持續學習系統</text>
    <text x="370" y="45" text-anchor="middle" fill="#C9A84C" font-size="10">#持續學習 #自學系統 #終身學習 #香港打工仔 #自我增值</text>
  </g>

  <!-- Decorative dots bottom-right -->
  <g opacity="0.15">
    <circle cx="750" cy="400" r="3" fill="#C9A84C"/>
    <circle cx="760" cy="415" r="2" fill="#C9A84C"/>
    <circle cx="740" cy="415" r="2" fill="#C9A84C"/>
    <circle cx="780" cy="405" r="1.5" fill="#C9A84C"/>
  </g>

</svg>
