<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a4a6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4b85c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="20"/>
  
  <!-- Decorative circles -->
  <circle cx="400" cy="100" r="120" fill="#ffffff" opacity="0.03"/>
  <circle cx="80" cy="400" r="100" fill="#ffffff" opacity="0.02"/>
  
  <!-- Bone icon (simplified femur/leg bone) -->
  <g transform="translate(100, 160)" filter="url(#shadow)">
    <!-- Joint ball top -->
    <circle cx="80" cy="30" r="28" fill="#e8d8b8" stroke="#c9a84c" stroke-width="2"/>
    <!-- Shaft -->
    <rect x="68" y="55" width="24" height="120" rx="10" fill="#e8d8b8" stroke="#c9a84c" stroke-width="2"/>
    <!-- Joint bottom -->
    <ellipse cx="80" cy="175" rx="30" ry="20" fill="#e8d8b8" stroke="#c9a84c" stroke-width="2"/>
    <!-- Bone ridge details -->
    <line x1="68" y1="75" x2="68" y2="120" stroke="#d4c49a" stroke-width="2" opacity="0.5"/>
    <line x1="92" y1="75" x2="92" y2="120" stroke="#d4c49a" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Joint icon (knee joint representation) -->
  <g transform="translate(280, 150)" filter="url(#shadow)">
    <!-- Upper bone -->
    <rect x="60" y="10" width="22" height="70" rx="8" fill="#e8d8b8" stroke="#c9a84c" stroke-width="2"/>
    <ellipse cx="71" cy="80" rx="30" ry="16" fill="#e8d8b8" stroke="#c9a84c" stroke-width="2"/>
    <!-- Cartilage (gap) -->
    <ellipse cx="71" cy="100" rx="26" ry="6" fill="#b8d8e8" stroke="#84b8d8" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- Lower bone -->
    <ellipse cx="71" cy="118" rx="28" ry="14" fill="#e8d8b8" stroke="#c9a84c" stroke-width="2"/>
    <rect x="60" y="132" width="22" height="70" rx="8" fill="#e8d8b8" stroke="#c9a84c" stroke-width="2"/>
    <!-- Muscle lines -->
    <path d="M 40 50 Q 30 80 40 110" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 102 50 Q 112 80 102 110" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>
  
  <!-- Spine icon -->
  <g transform="translate(190, 300)" filter="url(#shadow)">
    <!-- Vertebrae stack -->
    <rect x="30" y="0" width="30" height="10" rx="3" fill="#e8d8b8" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="28" y="14" width="34" height="10" rx="3" fill="#e8d8b8" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="26" y="28" width="38" height="10" rx="3" fill="#e8d8b8" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="28" y="42" width="34" height="10" rx="3" fill="#e8d8b8" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="30" y="56" width="30" height="10" rx="3" fill="#e8d8b8" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="32" y="70" width="26" height="10" rx="3" fill="#e8d8b8" stroke="#c9a84c" stroke-width="1.5"/>
  </g>

  <!-- Title text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" filter="url(#shadow)">
    骨骼與關節健康
  </text>
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#c9a84c" opacity="0.9">
    完整養護方案
  </text>
  
  <!-- Decorative line -->
  <line x1="140" y1="482" x2="372" y2="482" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  
  <!-- Tag badges -->
  <g transform="translate(0, 490)">
    <rect x="160" y="0" width="80" height="18" rx="9" fill="#c9a84c" opacity="0.2"/>
    <text x="200" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9a84c">久坐修復</text>
    <rect x="250" y="0" width="60" height="18" rx="9" fill="#c9a84c" opacity="0.2"/>
    <text x="280" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9a84c">運動防護</text>
    <rect x="320" y="0" width="50" height="18" rx="9" fill="#c9a84c" opacity="0.2"/>
    <text x="345" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9a84c">骨質密度</text>
  </g>
</svg>
