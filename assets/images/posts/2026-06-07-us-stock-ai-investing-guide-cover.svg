<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e"/>
      <stop offset="100%" style="stop-color:#e17055"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#00b894;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="512" y2="100"/>
    <line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="300" x2="512" y2="300"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="512"/>
    <line x1="200" y1="0" x2="200" y2="512"/>
    <line x1="300" y1="0" x2="300" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>
  <!-- Chart line - upward trend -->
  <polyline points="60,350 120,320 180,280 240,290 300,220 360,160 420,140 460,110"
    fill="none" stroke="url(#green)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Chart area fill -->
  <polygon points="60,350 120,320 180,280 240,290 300,220 360,160 420,140 460,110 460,380 60,380"
    fill="url(#green)" opacity="0.15"/>
  <!-- Second line - steeper -->
  <polyline points="60,380 140,350 200,300 260,310 320,200 370,120 430,80"
    fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4" filter="url(#glow)"/>
  <!-- AI chip icon -->
  <g transform="translate(380, 280)" opacity="0.3">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#00b894" stroke-width="2"/>
    <line x1="30" y1="8" x2="30" y2="52" stroke="#00b894" stroke-width="1"/>
    <line x1="8" y1="30" x2="52" y2="30" stroke="#00b894" stroke-width="1"/>
    <rect x="18" y="18" width="24" height="24" rx="4" fill="none" stroke="#fdcb6e" stroke-width="1.5"/>
  </g>
  <!-- Dollar sign -->
  <g transform="translate(100, 140)" opacity="0.15">
    <text x="0" y="0" font-family="Arial,sans-serif" font-size="80" font-weight="bold" fill="#00b894">$</text>
  </g>
  <!-- Circles (data points) -->
  <circle cx="300" cy="220" r="6" fill="#00b894"/>
  <circle cx="360" cy="160" r="5" fill="#00b894"/>
  <circle cx="420" cy="140" r="4" fill="#00b894"/>
  <!-- Title -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="24" font-weight="bold" fill="#ffffff">美股投資實戰指南</text>
  <text x="256" y="475" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" fill="#a0aec0">AI 時代嘅選股邏輯與風險管理</text>
  <!-- Subtle label -->
  <text x="60" y="96" font-family="Arial, sans-serif" font-size="12" fill="#636e72" letter-spacing="2">INVESTMENT</text>
  <!-- Year -->
  <text x="460" y="96" font-family="Arial, sans-serif" font-size="14" fill="#00b894" font-weight="bold" text-anchor="end">2026</text>
</svg>
