<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="80" r="120" fill="url(#accent)" opacity="0.08"/>
  <circle cx="100" cy="400" r="100" fill="url(#glow)" opacity="0.06"/>
  <circle cx="450" cy="350" r="60" fill="url(#accent)" opacity="0.05"/>

  <!-- Book icon (open book shape) -->
  <g transform="translate(156, 120)">
    <!-- Left page -->
    <path d="M10 40 L10 10 Q10 0 25 0 L90 0 L90 40 Q50 50 10 40Z" fill="none" stroke="#667eea" stroke-width="3" opacity="0.6"/>
    <path d="M10 40 L10 10 Q10 0 25 0 L90 0 L90 40 Q50 50 10 40Z" fill="url(#accent)" opacity="0.15"/>
    <!-- Right page -->
    <path d="M110 40 L110 10 Q110 0 95 0 L30 0 L30 40 Q70 50 110 40Z" fill="none" stroke="#764ba2" stroke-width="3" opacity="0.6"/>
    <path d="M110 40 L110 10 Q110 0 95 0 L30 0 L30 40 Q70 50 110 40Z" fill="#764ba2" opacity="0.15"/>
    <!-- Spine -->
    <line x1="100" y1="0" x2="100" y2="40" stroke="#f5576c" stroke-width="2" opacity="0.6"/>
    <!-- Line on left page -->
    <line x1="30" y1="18" x2="75" y2="18" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
    <line x1="30" y1="26" x2="70" y2="26" stroke="#667eea" stroke-width="1.5" opacity="0.3"/>
    <!-- Lines on right page -->
    <line x1="120" y1="18" x2="85" y2="18" stroke="#764ba2" stroke-width="1.5" opacity="0.4"/>
    <line x1="120" y1="26" x2="90" y2="26" stroke="#764ba2" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Lightbulb / idea icon -->
  <g transform="translate(200, 180)">
    <path d="M60 0 Q60 20 50 30 Q40 40 40 50 L40 55 L80 55 L80 50 Q80 40 70 30 Q60 20 60 0Z" fill="none" stroke="#f093fb" stroke-width="2.5" opacity="0.7"/>
    <path d="M60 0 Q60 20 50 30 Q40 40 40 50 L40 55 L80 55 L80 50 Q80 40 70 30 Q60 20 60 0Z" fill="#f093fb" opacity="0.1"/>
    <line x1="48" y1="62" x2="72" y2="62" stroke="#f5576c" stroke-width="2" opacity="0.5"/>
    <line x1="52" y1="68" x2="68" y2="68" stroke="#f5576c" stroke-width="1.5" opacity="0.4"/>
    <!-- Light rays -->
    <line x1="60" y1="-8" x2="60" y2="-18" stroke="#f093fb" stroke-width="2" opacity="0.4"/>
    <line x1="40" y1="0" x2="32" y2="-8" stroke="#f093fb" stroke-width="1.5" opacity="0.3"/>
    <line x1="80" y1="0" x2="88" y2="-8" stroke="#f093fb" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Brain / thinking icon (simplified) -->
  <g transform="translate(320, 200)">
    <path d="M30 0 Q50 -10 70 0 Q80 10 75 25 Q80 35 70 45 Q50 55 30 50 Q15 45 10 35 Q5 25 10 15 Q5 5 15 0Z" fill="none" stroke="#667eea" stroke-width="2" opacity="0.5"/>
    <!-- Neural connections -->
    <circle cx="30" cy="15" r="3" fill="#f093fb" opacity="0.6"/>
    <circle cx="50" cy="10" r="3" fill="#667eea" opacity="0.6"/>
    <circle cx="55" cy="30" r="3" fill="#764ba2" opacity="0.6"/>
    <circle cx="35" cy="35" r="3" fill="#f5576c" opacity="0.6"/>
    <circle cx="20" cy="25" r="3" fill="#667eea" opacity="0.5"/>
    <line x1="30" y1="15" x2="50" y2="10" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="10" x2="55" y2="30" stroke="#764ba2" stroke-width="1" opacity="0.4"/>
    <line x1="55" y1="30" x2="35" y2="35" stroke="#f5576c" stroke-width="1" opacity="0.4"/>
    <line x1="35" y1="35" x2="20" y2="25" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="25" x2="30" y2="15" stroke="#f093fb" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Graduation cap -->
  <g transform="translate(100, 320)">
    <path d="M0 15 L40 0 L80 15 L40 30Z" fill="none" stroke="#667eea" stroke-width="2.5" opacity="0.5"/>
    <path d="M0 15 L40 0 L80 15 L40 30Z" fill="url(#accent)" opacity="0.1"/>
    <line x1="40" y1="30" x2="40" y2="45" stroke="#667eea" stroke-width="2" opacity="0.4"/>
    <path d="M25 45 L55 45" stroke="#667eea" stroke-width="1.5" opacity="0.3"/>
    <path d="M65 12 L75 8 L85 12 L75 16Z" fill="none" stroke="#f093fb" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- AI chip icon -->
  <g transform="translate(330, 310)">
    <rect x="10" y="10" width="50" height="50" rx="5" fill="none" stroke="#f093fb" stroke-width="2" opacity="0.5"/>
    <rect x="10" y="10" width="50" height="50" rx="5" fill="url(#glow)" opacity="0.1"/>
    <rect x="20" y="20" width="30" height="30" rx="3" fill="none" stroke="#f5576c" stroke-width="1.5" opacity="0.4"/>
    <text x="35" y="40" font-family="monospace" font-size="10" fill="#f093fb" text-anchor="middle" opacity="0.6">AI</text>
    <!-- Pins -->
    <line x1="20" y1="10" x2="20" y2="5" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
    <line x1="35" y1="10" x2="35" y2="5" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
    <line x1="50" y1="10" x2="50" y2="5" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="60" x2="20" y2="65" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
    <line x1="35" y1="60" x2="35" y2="65" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
    <line x1="50" y1="60" x2="50" y2="65" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Connecting dots pattern -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="2" fill="#667eea"/>
    <circle cx="450" cy="50" r="2" fill="#f093fb"/>
    <circle cx="250" cy="480" r="2" fill="#764ba2"/>
    <circle cx="400" cy="150" r="2" fill="#667eea"/>
    <circle cx="100" cy="250" r="2" fill="#f5576c"/>
  </g>

  <!-- Main Title -->
  <text x="256" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">AI 時代</text>
  <text x="256" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#f093fb" text-anchor="middle" letter-spacing="1">自主學習法</text>
  <text x="256" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8899aa" text-anchor="middle" letter-spacing="0.5">LEARNING IN THE AI ERA</text>
</svg>
