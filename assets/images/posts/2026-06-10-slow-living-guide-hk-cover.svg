<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="50%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D4A6A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8D48B"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Sun/calm circle -->
  <circle cx="256" cy="140" r="60" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="140" r="45" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="140" r="30" fill="url(#gold)" fill-opacity="0.08" stroke="url(#gold)" stroke-width="2" filter="url(#glow)"/>

  <!-- Slow living icon - snail/slow symbol -->
  <g transform="translate(256, 130)" filter="url(#shadow)">
    <!-- Snail shell spiral -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="url(#gold)" fill-opacity="0.3" stroke="url(#gold)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="url(#gold)"/>
  </g>

  <!-- Tea/coffee cup -->
  <g transform="translate(200, 220)">
    <rect x="-12" y="-8" width="24" height="20" rx="3" fill="none" stroke="#FBBF24" stroke-width="2"/>
    <path d="M12-2 Q20-2 20 5 Q20 12 12 12" fill="none" stroke="#FBBF24" stroke-width="2"/>
    <line x1="-6" y1="4" x2="6" y2="4" stroke="#FBBF24" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Book -->
  <g transform="translate(310, 220)">
    <rect x="-14" y="-10" width="28" height="22" rx="2" fill="none" stroke="#34D399" stroke-width="2"/>
    <line x1="0" y1="-10" x2="0" y2="12" stroke="#34D399" stroke-width="1.5"/>
    <line x1="-8" y1="-4" x2="-3" y2="-4" stroke="#34D399" stroke-width="1" opacity="0.6"/>
    <line x1="-8" y1="1" x2="-3" y2="1" stroke="#34D399" stroke-width="1" opacity="0.6"/>
    <line x1="3" y1="-4" x2="8" y2="-4" stroke="#34D399" stroke-width="1" opacity="0.6"/>
    <line x1="3" y1="1" x2="8" y2="1" stroke="#34D399" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Leaf/nature -->
  <g transform="translate(256, 190)">
    <path d="M0 0 Q-15 -20 0 -35 Q15 -20 0 0" fill="none" stroke="url(#green-grad)" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="0" x2="0" y2="8" stroke="url(#green-grad)" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- 4 info cards -->
  <!-- Card 1: 放慢 -->
  <g transform="translate(80, 290)">
    <rect x="-50" y="-28" width="100" height="56" rx="8" fill="#1E3A5F" stroke="#FBBF24" stroke-width="1.5" opacity="0.9"/>
    <rect x="-40" y="-20" width="80" height="18" rx="4" fill="#FBBF24" opacity="0.15"/>
    <text x="0" y="-8" text-anchor="middle" fill="#FBBF24" font-size="10" font-family="sans-serif" font-weight="bold">放慢步調</text>
    <line x1="-40" y1="-2" x2="40" y2="-2" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" fill="#FDE68A" font-size="8" font-family="sans-serif">告別 multitask</text>
    <text x="0" y="21" text-anchor="middle" fill="#FCD34D" font-size="7" font-family="sans-serif">單一任務專注</text>
  </g>

  <!-- Card 2: 感受 -->
  <g transform="translate(256, 280)">
    <rect x="-50" y="-28" width="100" height="56" rx="8" fill="#1E3A5F" stroke="#34D399" stroke-width="1.5" opacity="0.9"/>
    <rect x="-40" y="-20" width="80" height="18" rx="4" fill="#34D399" opacity="0.15"/>
    <text x="0" y="-8" text-anchor="middle" fill="#34D399" font-size="10" font-family="sans-serif" font-weight="bold">感受當下</text>
    <line x1="-40" y1="-2" x2="40" y2="-2" stroke="#34D399" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" fill="#A7F3D0" font-size="8" font-family="sans-serif">五感練習</text>
    <text x="0" y="21" text-anchor="middle" fill="#6EE7B7" font-size="7" font-family="sans-serif">正念生活</text>
  </g>

  <!-- Card 3: 減法 -->
  <g transform="translate(432, 290)">
    <rect x="-50" y="-28" width="100" height="56" rx="8" fill="#1E3A5F" stroke="#A78BFA" stroke-width="1.5" opacity="0.9"/>
    <rect x="-40" y="-20" width="80" height="18" rx="4" fill="#A78BFA" opacity="0.15"/>
    <text x="0" y="-8" text-anchor="middle" fill="#A78BFA" font-size="10" font-family="sans-serif" font-weight="bold">減法生活</text>
    <line x1="-40" y1="-2" x2="40" y2="-2" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" fill="#DDD6FE" font-size="8" font-family="sans-serif">斷捨離社交</text>
    <text x="0" y="21" text-anchor="middle" fill="#C4B5FD" font-size="7" font-family="sans-serif">簡化日常</text>
  </g>

  <!-- Card 4: 平衡 -->
  <g transform="translate(256, 360)">
    <rect x="-55" y="-24" width="110" height="48" rx="8" fill="#1E3A5F" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>
    <rect x="-45" y="-16" width="90" height="16" rx="4" fill="url(#gold)" opacity="0.12"/>
    <text x="0" y="-5" text-anchor="middle" fill="url(#gold)" font-size="10" font-family="sans-serif" font-weight="bold">工作與生活平衡</text>
    <text x="0" y="12" text-anchor="middle" fill="#FDE68A" font-size="8" font-family="sans-serif">建立界線・me time</text>
  </g>

  <!-- Title -->
  <text x="256" y="248" text-anchor="middle" fill="url(#gold)" font-size="18" font-family="sans-serif" font-weight="bold" filter="url(#glow)">
    慢活生活指南
  </text>
  <text x="256" y="265" text-anchor="middle" fill="#93C5FD" font-size="10" font-family="sans-serif" opacity="0.9">
    香港人在急速城市找回生活節奏
  </text>

  <!-- Decorative dots -->
  <circle cx="40" cy="40" r="2" fill="#FBBF24" opacity="0.2"/>
  <circle cx="470" cy="50" r="1.5" fill="#34D399" opacity="0.2"/>
  <circle cx="30" cy="460" r="2" fill="#A78BFA" opacity="0.2"/>
  <circle cx="485" cy="480" r="1.5" fill="#FBBF24" opacity="0.15"/>

  <!-- Bottom bar -->
  <line x1="180" y1="420" x2="332" y2="420" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <rect x="235" y="425" width="42" height="16" rx="3" fill="url(#gold)" opacity="0.15"/>
  <text x="256" y="436" text-anchor="middle" fill="url(#gold)" font-size="7" font-family="sans-serif">LIFE</text>
</svg>
