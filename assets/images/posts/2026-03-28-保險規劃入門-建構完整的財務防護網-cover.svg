<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffec8b"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- 頂部金色強調條 -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#goldGradient)"/>
  
  <!-- 左側裝飾線 -->
  <rect x="50" y="100" width="8" height="230" fill="url(#goldGradient)" rx="4"/>
  
  <!-- 裝飾圓形（半透明） -->
  <circle cx="1050" cy="150" r="120" fill="#ffd700" opacity="0.1"/>
  <circle cx="1100" cy="480" r="80" fill="#ffd700" opacity="0.08"/>
  <circle cx="150" cy="520" r="60" fill="#ffd700" opacity="0.06"/>
  
  <!-- 分類標籤 -->
  <rect x="70" y="130" width="100" height="36" fill="#ffd700" rx="18"/>
  <text x="120" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a365d" text-anchor="middle">#投資</text>
  
  <!-- 主標題 -->
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">保險規劃入門</text>
  
  <!-- 副標題 -->
  <text x="70" y="310" font-family="Arial, sans-serif" font-size="28" fill="#e2e8f0">建構完整的財務防護網</text>
  
  <!-- 裝飾圖示 - 盾牌代表防護 -->
  <g transform="translate(900, 280)">
    <path d="M60 0 L120 20 L120 80 C120 120 60 150 60 150 C60 150 0 120 0 80 L0 20 Z" fill="none" stroke="#ffd700" stroke-width="4" opacity="0.6"/>
    <path d="M60 25 L100 40 L100 80 C100 105 60 125 60 125 C60 125 20 105 20 80 L20 40 Z" fill="#ffd700" opacity="0.15"/>
    <!-- 勾選符號 -->
    <path d="M40 75 L55 90 L85 55" fill="none" stroke="#ffd700" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 底部網站名稱區域 -->
  <rect x="0" y="570" width="1200" height="60" fill="#0d1f3c"/>
  <text x="70" y="608" font-family="Arial, sans-serif" font-size="18" fill="#a0aec0">財經智慧 | 穩健投資</text>
  <text x="1130" y="608" font-family="Arial, sans-serif" font-size="16" fill="#718096" text-anchor="end">2026-03-28</text>
  
  <!-- 金色點綴裝飾 -->
  <circle cx="250" y="420" r="4" fill="#ffd700" opacity="0.5"/>
  <circle cx="270" y="440" r="3" fill="#ffd700" opacity="0.4"/>
  <circle cx="290" y="420" r="5" fill="#ffd700" opacity="0.3"/>
</svg>