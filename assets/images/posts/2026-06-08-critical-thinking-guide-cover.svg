<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="85" x2="512" y2="85" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="170" x2="512" y2="170" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="255" x2="512" y2="255" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="340" x2="512" y2="340" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="425" x2="512" y2="425" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="85" y1="0" x2="85" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="170" y1="0" x2="170" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="255" y1="0" x2="255" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="340" y1="0" x2="340" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="425" y1="0" x2="425" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
  </g>

  <!-- Glow circle behind brain -->
  <circle cx="256" cy="200" r="120" fill="url(#glow)" filter="url(#glowFilter)"/>

  <!-- Brain shape (simplified) -->
  <g filter="url(#neon)">
    <path d="M256 110 
             c-70 0 -120 40 -120 95 
             c0 35 20 60 45 75 
             c-5 20 -15 40 -35 50 
             c15 -5 30 -15 40 -30 
             c10 5 20 8 30 10 
             v30 
             c0 0 15 -25 40 -30 
             c25 5 40 30 40 30 
             v-30 
             c10 -2 20 -5 30 -10 
             c10 15 25 25 40 30 
             c-20 -10 -30 -30 -35 -50 
             c25 -15 45 -40 45 -75 
             c0 -55 -50 -95 -120 -95z" 
          fill="none" stroke="url(#brain)" stroke-width="3"/>
    <!-- Brain inner lines -->
    <path d="M220 140 c-30 20 -40 50 -35 75" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
    <path d="M256 130 c-15 30 -20 60 -15 85" fill="none" stroke="#7c4dff" stroke-width="2" opacity="0.6"/>
    <path d="M290 140 c30 20 40 50 35 75" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
    <path d="M230 160 c-20 15 -25 35 -20 50" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
    <path d="M282 160 c20 15 25 35 20 50" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Filter/sieve above brain -->
  <g filter="url(#neon)">
    <!-- Funnel shape -->
    <path d="M180 85 L220 120" stroke="#c9a84c" stroke-width="2.5" opacity="0.8"/>
    <path d="M332 85 L292 120" stroke="#c9a84c" stroke-width="2.5" opacity="0.8"/>
    <path d="M180 85 L332 85" stroke="#c9a84c" stroke-width="2.5" opacity="0.8"/>
    <!-- Filter lines -->
    <line x1="195" y1="90" x2="230" y2="115" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <line x1="210" y1="87" x2="245" y2="112" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <line x1="225" y1="85" x2="260" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <line x1="240" y1="85" x2="275" y2="112" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <line x1="255" y1="85" x2="290" y2="115" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <!-- Checkmark in filter -->
    <path d="M248 95 L258 105 L278 88" fill="none" stroke="#4caf50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Floating data particles being filtered -->
  <g opacity="0.7">
    <circle cx="160" cy="70" r="3" fill="#ff5252" filter="url(#neon)"/>
    <circle cx="190" cy="60" r="2" fill="#ff5252"/>
    <circle cx="350" cy="55" r="3" fill="#ff5252"/>
    <circle cx="370" cy="75" r="2" fill="#ff5252" filter="url(#neon)"/>
    <circle cx="140" cy="90" r="2" fill="#ff5252"/>
    <circle cx="380" cy="65" r="2.5" fill="#ff5252"/>
    <!-- Cross marks on bad data -->
    <line x1="157" y1="67" x2="163" y2="73" stroke="#ff5252" stroke-width="1.5"/>
    <line x1="163" y1="67" x2="157" y2="73" stroke="#ff5252" stroke-width="1.5"/>
    <line x1="347" y1="52" x2="353" y2="58" stroke="#ff5252" stroke-width="1.5"/>
    <line x1="353" y1="52" x2="347" y2="58" stroke="#ff5252" stroke-width="1.5"/>
  </g>

  <!-- Question mark elements -->
  <g opacity="0.3" filter="url(#neon)">
    <text x="140" y="200" fill="#c9a84c" font-size="24" font-family="serif">?</text>
    <text x="370" y="230" fill="#c9a84c" font-size="20" font-family="serif">?</text>
    <text x="130" y="280" fill="#c9a84c" font-size="18" font-family="serif">?</text>
    <text x="360" y="310" fill="#c9a84c" font-size="16" font-family="serif">?</text>
  </g>

  <!-- Shield with checkmark (bottom right) -->
  <g transform="translate(370, 340)" filter="url(#neon)">
    <path d="M0 0 L25 -15 L50 0 L45 25 L25 40 L5 25 Z" fill="none" stroke="#4caf50" stroke-width="2.5"/>
    <path d="M15 20 L22 28 L35 12" fill="none" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Magnifying glass (bottom left) -->
  <g transform="translate(100, 340)" filter="url(#neon)">
    <circle cx="20" cy="20" r="16" fill="none" stroke="#4fc3f7" stroke-width="2.5"/>
    <line x1="32" y1="32" x2="45" y2="45" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Title text -->
  <text x="256" y="430" text-anchor="middle" fill="#c9a84c" font-size="18" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" filter="url(#neon)">
    批判性思維訓練
  </text>
  <text x="256" y="458" text-anchor="middle" fill="#8899aa" font-size="12" font-family="system-ui, -apple-system, sans-serif">
    分辨真相 · 拒絕假資訊
  </text>

  <!-- Decorative bottom line -->
  <line x1="180" y1="470" x2="332" y2="470" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>

  <!-- Subtle pulsing dots -->
  <circle cx="50" cy="50" r="1.5" fill="#4fc3f7" opacity="0.3"/>
  <circle cx="462" cy="462" r="1.5" fill="#7c4dff" opacity="0.3"/>
</svg>
