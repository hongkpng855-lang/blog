<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b714"/>
      <stop offset="100%" style="stop-color:#f0d060"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e2b714;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#e2b714;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="roomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow1)" opacity="0.3"/>
  <circle cx="420" cy="80" r="180" fill="url(#glow2)" opacity="0.4"/>
  
  <!-- Room outline / open space -->
  <g transform="translate(256,200)" opacity="0.12" stroke="#e2b714" stroke-width="1" fill="none">
    <!-- Floor -->
    <rect x="-140" y="10" width="280" height="120" rx="2"/>
    <!-- Left wall -->
    <line x1="-140" y1="10" x2="-140" y2="-70"/>
    <!-- Right wall -->
    <line x1="140" y1="10" x2="140" y2="-70"/>
    <!-- Ceiling -->
    <line x1="-140" y1="-70" x2="140" y2="-70"/>
    <!-- Window -->
    <rect x="45" y="-55" width="50" height="45" rx="2"/>
    <line x1="70" y1="-55" x2="70" y2="-10"/>
    <line x1="45" y1="-32" x2="95" y2="-32"/>
  </g>
  
  <!-- Before: Cluttered room (left side, fading) -->
  <g transform="translate(120,195)" opacity="0.25" filter="url(#shadow)">
    <!-- Clutter boxes -->
    <rect x="-45" y="10" width="30" height="30" rx="3" fill="#0f3460" stroke="#4a6fa5" stroke-width="1"/>
    <rect x="-20" y="5" width="25" height="35" rx="3" fill="#0f3460" stroke="#4a6fa5" stroke-width="1"/>
    <rect x="-50" y="-15" width="20" height="25" rx="3" fill="#0f3460" stroke="#4a6fa5" stroke-width="1"/>
    <rect x="-30" y="-25" width="22" height="22" rx="3" fill="#0f3460" stroke="#4a6fa5" stroke-width="1"/>
    <rect x="-55" y="5" width="18" height="20" rx="2" fill="#0f3460" stroke="#4a6fa5" stroke-width="1"/>
    <!-- Cross mark -->
    <line x1="-65" y1="-35" x2="-25" y2="5" stroke="#e74c3c" stroke-width="2" opacity="0.6"/>
    <line x1="-25" y1="-35" x2="-65" y2="5" stroke="#e74c3c" stroke-width="2" opacity="0.6"/>
    <!-- Label -->
    <text x="-35" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e74c3c" opacity="0.7">Before</text>
  </g>
  
  <!-- After: Clean room (right side) -->
  <g transform="translate(392,195)" filter="url(#shadow)">
    <!-- Single clean box -->
    <rect x="-22" y="-20" width="44" height="44" rx="4" fill="url(#accent)" stroke="#e2b714" stroke-width="1.5" opacity="0.9"/>
    <!-- Checkmark inside -->
    <polyline points="-10,0 -4,8 12,-8" stroke="#2ecc71" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Minimal decor -->
    <circle cx="0" cy="35" r="12" fill="none" stroke="#e2b714" stroke-width="1" opacity="0.4"/>
    <!-- Label -->
    <text x="0" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#2ecc71" opacity="0.8">After</text>
  </g>
  
  <!-- Arrow transition -->
  <g transform="translate(256,195)" opacity="0.4">
    <line x1="-35" y1="0" x2="35" y2="0" stroke="#e2b714" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="35,-5 45,0 35,5" fill="#e2b714"/>
    <text x="0" y="-15" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8899aa">斷捨離</text>
  </g>
  
  <!-- Decorative minimal icons -->
  <!-- Hanger icon -->
  <g transform="translate(80,330)" filter="url(#shadow)" opacity="0.85">
    <rect x="-20" y="-28" width="40" height="56" rx="4" fill="#0f3460" stroke="#e2b714" stroke-width="1.2" opacity="0.85"/>
    <circle cx="0" cy="-10" r="6" fill="none" stroke="#e2b714" stroke-width="1.5"/>
    <line x1="-12" y1="-10" x2="12" y2="-10" stroke="#e2b714" stroke-width="1.5"/>
    <line x1="-8" y1="-5" x2="-8" y2="15" stroke="#4a6fa5" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="-5" x2="8" y2="15" stroke="#4a6fa5" stroke-width="1" opacity="0.6"/>
    <text x="0" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8899aa">衣櫃</text>
  </g>
  
  <!-- Box icon -->
  <g transform="translate(256,340)" filter="url(#shadow)" opacity="0.85">
    <rect x="-20" y="-28" width="40" height="56" rx="4" fill="#0f3460" stroke="#e2b714" stroke-width="1.2" opacity="0.85"/>
    <rect x="-12" y="-12" width="24" height="24" rx="3" fill="none" stroke="#e2b714" stroke-width="1.2"/>
    <line x1="-12" y1="-6" x2="12" y2="-6" stroke="#4a6fa5" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#4a6fa5" stroke-width="1" opacity="0.6"/>
    <text x="0" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8899aa">減物</text>
  </g>
  
  <!-- Heart icon -->
  <g transform="translate(432,340)" filter="url(#shadow)" opacity="0.85">
    <rect x="-20" y="-28" width="40" height="56" rx="4" fill="#0f3460" stroke="#e2b714" stroke-width="1.2" opacity="0.85"/>
    <path d="M0,2 C-10,-8 -18,-2 -18,6 C-18,14 -2,24 0,26 C2,24 18,14 18,6 C18,-2 10,-8 0,2Z" fill="none" stroke="#e74c3c" stroke-width="1.2" opacity="0.7"/>
    <text x="0" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#8899aa">生活</text>
  </g>
  
  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="17" fill="#e2b714" letter-spacing="1.5">
    斷捨離與極簡生活實戰指南
  </text>
  
  <!-- Subtitle -->
  <text x="256" y="483" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="9.5" fill="#8899aa" letter-spacing="1">
    喺蝸居搵返空間同自由 · 香港適用 · 逐個步驟攻略
  </text>
  
  <!-- Decorative dots -->
  <g opacity="0.08">
    <circle cx="30" cy="30" r="3" fill="#e2b714"/>
    <circle cx="50" cy="60" r="2" fill="#e2b714"/>
    <circle cx="80" cy="20" r="2" fill="#e2b714"/>
    <circle cx="440" cy="40" r="3" fill="#e2b714"/>
    <circle cx="470" cy="70" r="2" fill="#e2b714"/>
    <circle cx="460" cy="450" r="2" fill="#e2b714"/>
    <circle cx="40" cy="440" r="2" fill="#e2b714"/>
  </g>
</svg>
