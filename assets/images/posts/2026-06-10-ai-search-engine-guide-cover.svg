    <rect x="40" y="346" width="105" height="4" rx="2" fill="url(#blue1)"/>
    <rect x="230" y="346" width="100" height="4" rx="2" fill="#0f3460"/>
    <rect x="230" y="346" width="70" height="4" rx="2" fill="url(#gold1)"/>
    <rect x="440" y="346" width="100" height="4" rx="2" fill="#0f3460"/>
    <rect x="440" y="346" width="90" height="4" rx="2" fill="url(#green1)"/>
    <rect x="630" y="346" width="100" height="4" rx="2" fill="#0f3460"/>
    <rect x="630" y="346" width="95" height="4" rx="2" fill="url(#purple1)"/>
