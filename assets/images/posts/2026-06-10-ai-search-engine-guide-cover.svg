    <text x="90" y="73" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9.5">File Upload 分析</text>
    <text x="90" y="90" text-anchor="middle" fill="#48cae4" font-family="system-ui,sans-serif" font-size="9.5">每日自動 Monitor</text>
