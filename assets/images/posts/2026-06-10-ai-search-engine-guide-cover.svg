    <text x="90" y="58" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9.5">多步驟推理</text>
    <text x="90" y="73" text-anchor="middle" fill="#a0a0a0" font-family="system-ui,sans-serif" font-size="9.5">完全免費</text>
    <text x="90" y="90" text-anchor="middle" fill="#C9A84C" font-family="system-ui,sans-serif" font-size="9.5">中文支援有限</text>
