    <circle cx="120" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="200" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="280" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="360" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="440" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="520" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="600" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="680" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="760" cy="40" r="1" fill="#C9A84C"/>
    <circle cx="40" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="120" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="200" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="280" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="360" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="440" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="520" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="600" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="680" cy="110" r="1" fill="#C9A84C"/>
    <circle cx="760" cy="110" r="1" fill="#C9A84C"/>
