    <text x="100" y="24" text-anchor="middle" fill="#4a90d9" font-family="system-ui,sans-serif" font-size="11" font-weight="bold">5x</text>
    <text x="100" y="40" text-anchor="middle" fill="#777" font-family="system-ui,sans-serif" font-size="7.5">搜尋效率</text>
