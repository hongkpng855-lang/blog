    <circle cx="0" cy="0" r="38" fill="none" stroke="url(#blue1)" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#cyan1)" stroke-width="2.5" opacity="0.6"/>
