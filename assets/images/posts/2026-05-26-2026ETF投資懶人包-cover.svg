<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#f0d060"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="450" cy="80" r="120" fill="#1e3a6e" opacity="0.3"/>
  <circle cx="60" cy="450" r="100" fill="#1a3050" opacity="0.2"/>
  <!-- Line graph -->
  <polyline points="60,380 120,350 180,360 240,310 300,280 360,230 420,200" stroke="url(#gold)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <polyline points="60,380 120,370 180,340 240,330 300,290 360,260 420,230" stroke="#4a7cff" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Bar chart -->
  <rect x="80" y="320" width="30" height="60" fill="#4a7cff" opacity="0.6" rx="3"/>
  <rect x="130" y="290" width="30" height="90" fill="#4a7cff" opacity="0.6" rx="3"/>
  <rect x="180" y="260" width="30" height="120" fill="#d4a843" opacity="0.7" rx="3"/>
  <rect x="230" y="240" width="30" height="140" fill="#4a7cff" opacity="0.6" rx="3"/>
  <rect x="280" y="200" width="30" height="180" fill="#d4a843" opacity="0.7" rx="3"/>
  <rect x="330" y="180" width="30" height="200" fill="#4a7cff" opacity="0.6" rx="3"/>
  <rect x="380" y="150" width="30" height="230" fill="#d4a843" opacity="0.7" rx="3"/>
  <!-- Coin circles -->
  <circle cx="400" cy="400" r="25" fill="#d4a843" opacity="0.15"/>
  <circle cx="400" cy="400" r="18" fill="#d4a843" opacity="0.15"/>
  <text x="400" y="404" text-anchor="middle" font-size="14" fill="#d4a843" font-family="Arial" opacity="0.6">$</text>
  <circle cx="440" cy="370" r="15" fill="#4a7cff" opacity="0.15"/>
  <text x="440" y="374" text-anchor="middle" font-size="10" fill="#4a7cff" font-family="Arial" opacity="0.5">$</text>
  <!-- Title -->
  <text x="256" y="80" text-anchor="middle" font-size="48" font-weight="bold" fill="url(#gold)" font-family="Arial" filter="url(#glow)">ETF</text>
  <text x="256" y="115" text-anchor="middle" font-size="13" fill="#8899bb" font-family="Arial" letter-spacing="3">INVESTMENT 2026</text>
  <text x="256" y="140" text-anchor="middle" font-size="11" fill="#667799" font-family="Arial">高股息 · 市值型 · 美股</text>
  <!-- Bottom -->
  <line x1="80" y1="460" x2="432" y2="460" stroke="#d4a843" stroke-width="1" opacity="0.3"/>
  <text x="256" y="480" text-anchor="middle" font-size="9" fill="#556688" font-family="Arial">ETF INVESTMENT GUIDE 2026</text>
</svg>
