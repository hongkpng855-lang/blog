<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="blueglow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="#1a1a3e" opacity="0.5"/>
  <circle cx="440" cy="420" r="150" fill="#0f2040" opacity="0.4"/>
  
  <!-- Grid dots pattern -->
  <g fill="#2a2a4e" opacity="0.3">
    <circle cx="50" cy="50" r="1.5"/><circle cx="100" cy="50" r="1.5"/>
    <circle cx="150" cy="50" r="1.5"/><circle cx="200" cy="50" r="1.5"/>
    <circle cx="250" cy="50" r="1.5"/><circle cx="300" cy="50" r="1.5"/>
    <circle cx="350" cy="50" r="1.5"/><circle cx="400" cy="50" r="1.5"/>
    <circle cx="450" cy="50" r="1.5"/><circle cx="50" cy="100" r="1.5"/>
    <circle cx="100" cy="100" r="1.5"/><circle cx="350" cy="400" r="1.5"/>
    <circle cx="400" cy="400" r="1.5"/><circle cx="450" cy="400" r="1.5"/>
    <circle cx="50" cy="450" r="1.5"/><circle cx="100" cy="450" r="1.5"/>
    <circle cx="150" cy="450" r="1.5"/><circle cx="400" cy="450" r="1.5"/>
    <circle cx="450" cy="450" r="1.5"/>
  </g>
  
  <!-- Book icon - open book -->
  <g transform="translate(256, 260)" filter="url(#shadow)">
    <!-- Left page -->
    <path d="M-70,-40 L-10,-40 L-10,40 L-70,40 Z" fill="#3b82f6" opacity="0.8" rx="3"/>
    <path d="M-65,-35 L-15,-35 L-15,35 L-65,35 Z" fill="#e2e8f0" rx="2"/>
    <!-- Right page -->
    <path d="M10,-40 L70,-40 L70,40 L10,40 Z" fill="#3b82f6" opacity="0.8" rx="3"/>
    <path d="M15,-35 L65,-35 L65,35 L15,35 Z" fill="#f8fafc" rx="2"/>
    <!-- Spine -->
    <rect x="-10" y="-42" width="20" height="84" rx="3" fill="url(#blueglow)"/>
    <!-- Text lines left -->
    <line x1="-55" y1="-20" x2="-25" y2="-20" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-55" y1="-10" x2="-25" y2="-10" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-55" y1="0" x2="-30" y2="0" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-55" y1="10" x2="-25" y2="10" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-55" y1="20" x2="-35" y2="20" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Text lines right -->
    <line x1="25" y1="-20" x2="55" y2="-20" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="-10" x2="55" y2="-10" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="0" x2="50" y2="0" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="10" x2="55" y2="10" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="20" x2="45" y2="20" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Lightbulb above book -->
  <g transform="translate(256, 170)" filter="url(#shadow)">
    <path d="M0,-40 Q-25,-40 -25,-18 Q-25,0 -10,8 L10,8 Q25,0 25,-18 Q25,-40 0,-40 Z" fill="#f5a623" opacity="0.9"/>
    <rect x="-6" y="8" width="12" height="8" rx="2" fill="#f5a623" opacity="0.9"/>
    <rect x="-4" y="16" width="8" height="6" rx="1" fill="#f5a623" opacity="0.7"/>
    <line x1="-8" y1="24" x2="8" y2="24" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
    <!-- Glow lines -->
    <line x1="30" y1="-25" x2="40" y2="-25" stroke="#f5a623" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="28" y1="-35" x2="38" y2="-38" stroke="#f5a623" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="32" y1="-15" x2="42" y2="-12" stroke="#f5a623" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="-30" y1="-25" x2="-40" y2="-25" stroke="#f5a623" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="-28" y1="-35" x2="-38" y2="-38" stroke="#f5a623" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="-32" y1="-15" x2="-42" y2="-12" stroke="#f5a623" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <!-- Inner glow -->
    <circle cx="0" cy="-20" r="8" fill="#fef3c7" opacity="0.4"/>
  </g>
  
  <!-- AI brain icon (neural network nodes) -->
  <g transform="translate(380, 130)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="4" fill="#3b82f6"/>
    <circle cx="20" cy="-15" r="3" fill="#e94560"/>
    <circle cx="-15" cy="20" r="3" fill="#f5a623"/>
    <circle cx="15" cy="18" r="3" fill="#3b82f6"/>
    <circle cx="-18" cy="-12" r="3" fill="#10b981"/>
    <line x1="0" y1="0" x2="20" y2="-15" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-15" y2="20" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="15" y2="18" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-18" y2="-12" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="-15" x2="15" y2="18" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="-15" y1="20" x2="-18" y2="-12" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
  </g>
  
  <!-- Graduation cap -->
  <g transform="translate(130, 150)" filter="url(#shadow)">
    <path d="M-30,-5 L0,-25 L30,-5 L15,-5 L15,5 Q10,8 5,5 L5,2 L-5,2 L-5,5 Q-10,8 -15,5 L-15,-5 Z" fill="url(#accent)" opacity="0.85"/>
    <rect x="-3" y="2" width="6" height="10" rx="1" fill="#e94560" opacity="0.7"/>
    <line x1="0" y1="-25" x2="0" y2="-30" stroke="#f5a623" stroke-width="1.5"/>
    <circle cx="0" cy="-32" r="2" fill="#f5a623"/>
  </g>
  
  <!-- Floating icons -->
  <!-- Gear/learning icon -->
  <g transform="translate(390, 370)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#3b82f6" opacity="0.5"/>
  </g>
  
  <!-- Star icon -->
  <g transform="translate(120, 360)" filter="url(#shadow)">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,5 -7,10 -5,2 -12,-4 -3,-4" fill="#f5a623" opacity="0.7"/>
  </g>
  
  <!-- Pencil icon -->
  <g transform="translate(80, 280)" filter="url(#shadow)">
    <rect x="-3" y="-20" width="6" height="30" rx="2" fill="#e94560" opacity="0.7"/>
    <polygon points="-3,10 0,18 3,10" fill="#e94560" opacity="0.9"/>
    <rect x="-1" y="-22" width="2" height="4" fill="#f5a623" opacity="0.8"/>
  </g>
  
  <!-- Title area -->
  <g transform="translate(256, 380)">
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" letter-spacing="2">
      高效學習全攻略
    </text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="1">
      AI 時代必學的 5 種學習方法
    </text>
  </g>
  
  <!-- Bottom accent line -->
  <line x1="150" y1="445" x2="362" y2="445" stroke="url(#accent)" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- 2026 badge -->
  <g transform="translate(256, 470)">
    <rect x="-25" y="-10" width="50" height="20" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" opacity="0.7">2026</text>
  </g>
</svg>