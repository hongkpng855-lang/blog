<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 漸變背景：深藍色對角線漸層 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金色漸變 -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 裝飾圓形漸變 -->
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.05" />
    </radialGradient>
  </defs>
  
  <!-- 漸變背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- 頂部強調色條（8px 高） -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#goldGradient)" />
  
  <!-- 左側裝飾線（8px x 230px） -->
  <rect x="60" y="140" width="8" height="230" fill="url(#goldGradient)" rx="4" />
  
  <!-- 裝飾圓形（半透明） -->
  <circle cx="1050" cy="150" r="120" fill="url(#circleGradient)" />
  <circle cx="1100" cy="480" r="80" fill="url(#circleGradient)" />
  <circle cx="150" cy="520" r="60" fill="url(#circleGradient)" />
  
  <!-- 分類標籤背景 -->
  <rect x="80" y="100" width="100" height="32" fill="#ffd700" rx="16" />
  
  <!-- 分類標籤文字 -->
  <text x="130" y="122" font-family="'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="16" fill="#1a365d" text-anchor="middle" font-weight="600">#投資</text>
  
  <!-- 文章標題（48-52px 粗體） -->
  <text x="100" y="250" font-family="'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="52" fill="#ffffff" font-weight="700">
    <tspan x="100" dy="0">債券入門：</tspan>
    <tspan x="100" dy="65">穩健投資的基石</tspan>
  </text>
  
  <!-- 副標題（28px） -->
  <text x="100" y="380" font-family="'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="28" fill="#a0aec0">
    固定收益 × 風險管理 × 資產配置
  </text>
  
  <!-- 底部網站名稱區域背景 -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)" />
  
  <!-- 底部網站名稱 -->
  <text x="100" y="612" font-family="'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="18" fill="#a0aec0">
    Sun ny 的投資筆記
  </text>
  
  <!-- 右下角日期 -->
  <text x="1100" y="612" font-family="'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="16" fill="#718096" text-anchor="end">
    2026.03.28
  </text>
  
  <!-- 債券圖示裝飾 -->
  <g transform="translate(950, 280)">
    <!-- 債券文件圖示 -->
    <rect x="0" y="0" width="100" height="130" fill="rgba(255,215,0,0.1)" rx="8" stroke="#ffd700" stroke-width="2"/>
    <line x1="20" y1="30" x2="80" y2="30" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="80" y2="70" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="90" x2="60" y2="90" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <!-- 百分比符號 -->
    <text x="50" y="120" font-family="Arial, sans-serif" font-size="20" fill="#ffd700" text-anchor="middle" font-weight="bold">%</text>
  </g>
</svg>