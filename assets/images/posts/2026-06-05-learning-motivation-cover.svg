<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="100" r="180" fill="url(#accent1)"/>
  <circle cx="80" cy="400" r="150" fill="url(#accent2)"/>
  <circle cx="256" cy="256" r="200" fill="url(#brainGrad)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Main illustration: Brain with book -->

  <!-- Brain shape (simplified) -->
  <g transform="translate(256,230)" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3">
    <ellipse cx="-30" cy="0" rx="45" ry="55" stroke-dasharray="3,3"/>
    <ellipse cx="30" cy="0" rx="45" ry="55" stroke-dasharray="3,3"/>
    <ellipse cx="0" cy="-20" rx="40" ry="35" stroke-dasharray="3,3"/>
  </g>

  <!-- Book icon -->
  <g transform="translate(256, 220)">
    <!-- Book spine -->
    <rect x="-8" y="-40" width="16" height="80" rx="2" fill="url(#bookGrad)" filter="url(#glow)"/>
    <!-- Left page -->
    <path d="M-8,-38 Q-40,-40 -45,-35 L-45,35 Q-40,40 -8,38 Z" fill="#e94560" opacity="0.6"/>
    <!-- Right page -->
    <path d="M8,-38 Q40,-40 45,-35 L45,35 Q40,40 8,38 Z" fill="#533483" opacity="0.6"/>
    <!-- Center line -->
    <line x1="0" y1="-38" x2="0" y2="38" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Sparkles around the book -->
  <g filter="url(#glow)">
    <circle cx="180" cy="180" r="3" fill="#ffd700" opacity="0.8"/>
    <circle cx="330" cy="160" r="2.5" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="160" cy="280" r="2" fill="#ffd700" opacity="0.6"/>
    <circle cx="350" cy="300" r="2.5" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="200" cy="140" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="310" cy="130" r="1.5" fill="#fff" opacity="0.4"/>
    <circle cx="150" cy="220" r="2" fill="#ffd700" opacity="0.5"/>
    <circle cx="360" cy="240" r="1.5" fill="#ff6b6b" opacity="0.5"/>
  </g>

  <!-- Arrow going up (progress/growth) -->
  <g transform="translate(256, 340)" stroke="#e94560" stroke-width="2.5" fill="none" filter="url(#softGlow)">
    <polyline points="-30,20 0,-10 30,20" stroke-linejoin="round"/>
    <line x1="0" y1="-10" x2="0" y2="25"/>
  </g>

  <!-- Title text -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#fff" letter-spacing="1">
    學習動力
  </text>
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#e94560" opacity="0.8" letter-spacing="3">
    科學指南
  </text>
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f5f5f5" opacity="0.4" letter-spacing="2">
    從拖延到主動 · 建立持續學習系統
  </text>

  <!-- Corner decorations -->
  <g opacity="0.15" stroke="#e94560" stroke-width="1.5">
    <path d="M30,30 L30,15 L45,15" fill="none"/>
    <path d="M482,30 L482,15 L467,15" fill="none"/>
    <path d="M30,482 L30,497 L45,497" fill="none"/>
    <path d="M482,482 L482,497 L467,497" fill="none"/>
  </g>
</svg>
