<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="50%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8D48B"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="75" x2="800" y2="75" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="800" y2="225" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="375" x2="800" y2="375" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="450" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="450" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="450" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="450" stroke="#C9A84C" stroke-width="0.5"/>
  </g>

  <!-- Decorative glow circles -->
  <circle cx="650" cy="80" r="250" fill="#C9A84C" opacity="0.04"/>
  <circle cx="150" cy="380" r="200" fill="#3b82f6" opacity="0.03"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" fill="url(#gold)" font-family="system-ui, sans-serif" font-size="30" font-weight="bold" filter="url(#glow)">
    🏦 香港銀行高息存款攻略
  </text>
  <text x="400" y="78" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">
    活期 · 定期 · 貨幣基金 · 全面比較與配置策略
  </text>

  <!-- Main visualization card -->
  <rect x="50" y="95" width="700" height="260" rx="16" fill="#1a2744" opacity="0.6" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.2"/>
  <rect x="50" y="95" width="700" height="260" rx="16" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Three comparison cards -->
  
  <!-- Card 1: High-yield Savings (活期) -->
  <rect x="75" y="115" width="195" height="155" rx="12" fill="#0f1629" opacity="0.8" filter="url(#shadow)"/>
  <rect x="75" y="115" width="195" height="155" rx="12" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  
  <rect x="95" y="130" width="36" height="36" rx="18" fill="#3b82f6" opacity="0.15"/>
  <text x="113" y="154" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="18">⚡</text>
  
  <text x="165" y="152" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">高息活期</text>
  <text x="165" y="170" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">High-yield Savings</text>

  <text x="172" y="200" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">4.5%</text>
  <text x="172" y="218" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">最高年利率</text>

  <line x1="95" y1="228" x2="250" y2="228" stroke="#334155" stroke-width="0.5"/>
  
  <text x="95" y="246" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">流動性</text>
  <rect x="130" y="238" width="60" height="4" rx="2" fill="#1e293b"/>
  <rect x="130" y="238" width="58" height="4" rx="2" fill="#22c55e" opacity="0.8"/>

  <text x="95" y="262" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">最低門檻</text>
  <text x="155" y="262" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10">$0 - $10K</text>

  <!-- Card 2: Time Deposit (定期) -->
  <rect x="302" y="115" width="195" height="155" rx="12" fill="#0f1629" opacity="0.8" filter="url(#shadow)"/>
  <rect x="302" y="115" width="195" height="155" rx="12" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.3"/>
  
  <rect x="322" y="130" width="36" height="36" rx="18" fill="#C9A84C" opacity="0.15"/>
  <text x="340" y="154" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="18">🔒</text>
  
  <text x="392" y="152" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">定期存款</text>
  <text x="392" y="170" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Time Deposit</text>

  <text x="399" y="200" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">4.2%</text>
  <text x="399" y="218" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">最高年利率</text>

  <line x1="322" y1="228" x2="477" y2="228" stroke="#334155" stroke-width="0.5"/>
  
  <text x="322" y="246" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">流動性</text>
  <rect x="357" y="238" width="60" height="4" rx="2" fill="#1e293b"/>
  <rect x="357" y="238" width="20" height="4" rx="2" fill="#f59e0b" opacity="0.8"/>

  <text x="322" y="262" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">最低門檻</text>
  <text x="387" y="262" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10">$1K - $10K</text>

  <!-- Card 3: Money Market Fund (貨幣基金) -->
  <rect x="530" y="115" width="195" height="155" rx="12" fill="#0f1629" opacity="0.8" filter="url(#shadow)"/>
  <rect x="530" y="115" width="195" height="155" rx="12" fill="none" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.3"/>
  
  <rect x="550" y="130" width="36" height="36" rx="18" fill="#14b8a6" opacity="0.15"/>
  <text x="568" y="154" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="18">📊</text>
  
  <text x="620" y="152" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">貨幣基金</text>
  <text x="620" y="170" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Money Market Fund</text>

  <text x="627" y="200" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="28" font-weight="bold">3.85%</text>
  <text x="627" y="218" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">7日年化收益率</text>

  <line x1="550" y1="228" x2="705" y2="228" stroke="#334155" stroke-width="0.5"/>
  
  <text x="550" y="246" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">流動性</text>
  <rect x="585" y="238" width="60" height="4" rx="2" fill="#1e293b"/>
  <rect x="585" y="238" width="40" height="4" rx="2" fill="#14b8a6" opacity="0.8"/>

  <text x="550" y="262" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">最低門檻</text>
  <text x="615" y="262" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="10">$1 - $100K</text>

  <!-- Bottom section: Strategy comparison bar -->
  <rect x="75" y="285" width="650" height="55" rx="10" fill="#0f1629" opacity="0.6" stroke="#334155" stroke-width="0.5"/>

  <text x="95" y="310" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">策略</text>
  
  <!-- Ladder strategy -->
  <text x="155" y="310" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">階梯式定存</text>
  <rect x="155" y="319" width="120" height="4" rx="2" fill="#334155"/>
  <rect x="155" y="319" width="0" height="4" rx="2" fill="#C9A84C" opacity="0.6"/>
  <rect x="162" y="319" width="18" height="4" rx="2" fill="#C9A84C" opacity="0.5"/>
  <rect x="185" y="319" width="18" height="4" rx="2" fill="#C9A84C" opacity="0.5"/>
  <rect x="208" y="319" width="18" height="4" rx="2" fill="#C9A84C" opacity="0.5"/>
  <rect x="231" y="319" width="18" height="4" rx="2" fill="#C9A84C" opacity="0.5"/>
  <rect x="254" y="319" width="18" height="4" rx="2" fill="#C9A84C" opacity="0.5"/>

  <!-- Mix -->
  <text x="340" y="310" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">活期+貨幣基金</text>
  <rect x="340" y="319" width="130" height="4" rx="2" fill="#334155"/>
  <rect x="340" y="319" width="65" height="4" rx="2" fill="#3b82f6" opacity="0.7"/>
  <rect x="410" y="319" width="60" height="4" rx="2" fill="#14b8a6" opacity="0.7"/>

  <!-- USD HKD -->
  <text x="525" y="310" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">美金+港元配置</text>
  <rect x="525" y="319" width="80" height="4" rx="2" fill="#334155"/>
  <circle cx="535" cy="321" r="2" fill="#f59e0b" opacity="0.7"/>
  <circle cx="555" cy="321" r="2" fill="#C9A84C" opacity="0.7"/>
  <circle cx="575" cy="321" r="2" fill="#3b82f6" opacity="0.7"/>
  <circle cx="595" cy="321" r="2" fill="#22c55e" opacity="0.7"/>

  <!-- Bottom subtitle -->
  <text x="400" y="370" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">活期 2.5-4.5% · 定期 3.0-4.2% · 貨幣基金 3.0-4.0%</text>

  <!-- Footer checkboxes -->
  <rect x="50" y="390" width="700" height="42" rx="12" fill="#0f1629" opacity="0.5" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.15"/>

  <text x="75" y="415" fill="#22c55e" font-family="system-ui, sans-serif" font-size="12">✅</text>
  <text x="95" y="415" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">高息活期比較</text>

  <text x="220" y="415" fill="#22c55e" font-family="system-ui, sans-serif" font-size="12">✅</text>
  <text x="240" y="415" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">定存利率表</text>

  <text x="370" y="415" fill="#22c55e" font-family="system-ui, sans-serif" font-size="12">✅</text>
  <text x="390" y="415" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">貨幣基金數據</text>

  <text x="530" y="415" fill="#22c55e" font-family="system-ui, sans-serif" font-size="12">✅</text>
  <text x="550" y="415" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">現金配置策略</text>

  <text x="680" y="415" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">2026年6月更新</text>
</svg>
