<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
    <linearGradient id="gutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#40916c"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e76f51"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
    <linearGradient id="nerveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e76f51"/>
      <stop offset="50%" style="stop-color:#95d5b2"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
    <linearGradient id="microbeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8f3dc"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="serotoninGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a261"/>
      <stop offset="100%" style="stop-color:#e9c46a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- 背景節點光點（菌群象徵） -->
  <g opacity="0.15">
    <circle cx="80" cy="380" r="4" fill="#95d5b2"/>
    <circle cx="130" cy="400" r="2.5" fill="#95d5b2"/>
    <circle cx="160" cy="370" r="3" fill="#95d5b2"/>
    <circle cx="100" cy="430" r="2" fill="#95d5b2"/>
    <circle cx="190" cy="410" r="3.5" fill="#95d5b2"/>
    <circle cx="60" cy="410" r="2" fill="#95d5b2"/>
    <circle cx="50" cy="360" r="1.5" fill="#95d5b2"/>
    <circle cx="150" cy="440" r="2" fill="#95d5b2"/>
    <circle cx="210" cy="380" r="2" fill="#95d5b2"/>
  </g>

  <!-- 大腦（右上方） -->
  <g filter="url(#softGlow)">
    <ellipse cx="380" cy="120" rx="55" ry="40" fill="url(#brainGrad)" opacity="0.9"/>
    <!-- 大腦皺褶 -->
    <path d="M 345 105 Q 360 95 375 105 Q 390 92 405 105 Q 415 95 420 108" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.25"/>
    <path d="M 340 130 Q 355 120 370 130 Q 385 118 400 130 Q 410 125 420 135" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.2"/>
    <path d="M 350 150 Q 365 140 380 150 Q 395 138 410 148" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.15"/>
    <text x="380" y="110" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace" font-weight="bold" opacity="0.7">🧠</text>
  </g>

  <!-- 腸道（左下方） -->
  <g filter="url(#softGlow)">
    <path d="M 100 300 Q 140 280 180 300 Q 220 320 180 340 Q 140 360 100 340 Q 60 320 100 300 Z" fill="url(#gutGrad)" opacity="0.9"/>
    <!-- 腸道內壁絨毛 -->
    <g stroke="#95d5b2" stroke-width="1" opacity="0.4" fill="none">
      <path d="M 110 315 L 115 325 L 110 332"/>
      <path d="M 130 310 L 135 320 L 130 328"/>
      <path d="M 150 315 L 155 323 L 150 330"/>
      <path d="M 120 328 L 125 336 L 120 342"/>
      <path d="M 140 332 L 145 340 L 140 346"/>
      <path d="M 160 320 L 165 328 L 160 335"/>
    </g>
    <!-- 腸道菌群 -->
    <g fill="url(#microbeGrad)" opacity="0.8">
      <ellipse cx="115" cy="320" rx="5" ry="3" transform="rotate(-20 115 320)"/>
      <ellipse cx="145" cy="318" rx="4" ry="2.5" transform="rotate(15 145 318)"/>
      <circle cx="135" cy="330" r="3"/>
      <ellipse cx="160" cy="325" rx="3.5" ry="2" transform="rotate(-10 160 325)"/>
      <circle cx="170" cy="320" r="2.5"/>
      <ellipse cx="125" cy="335" rx="3" ry="2" transform="rotate(30 125 335)"/>
    </g>
  </g>

  <!-- 迷走神經（連接大腦和腸道） -->
  <g filter="url(#glow)">
    <path d="M 340 140 Q 280 200 220 280" stroke="url(#nerveGrad)" stroke-width="3" fill="none" opacity="0.7" stroke-dasharray="8,4"/>
    <!-- 神經脈衝 -->
    <circle r="4" fill="#e9c46a" opacity="0.8">
      <animate attributeName="cx" values="220;340" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="280;140" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#95d5b2" opacity="0.6">
      <animate attributeName="cx" values="340;220" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;280" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 血清素分子圖示 -->
  <g filter="url(#glow)">
    <circle cx="380" cy="180" r="6" fill="url(#serotoninGrad)" opacity="0.6"/>
    <text x="380" y="183" text-anchor="middle" fill="#fff" font-size="7" font-family="monospace" font-weight="bold">S</text>
    <!-- 化學標示 -->
    <text x="380" y="200" text-anchor="middle" fill="#e9c46a" font-size="7" font-family="monospace" opacity="0.6">90% 血清素</text>
    <!-- 箭頭從分子到下方 -->
    <line x1="380" y1="210" x2="380" y2="230" stroke="#e9c46a" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
  </g>

  <!-- 標題 -->
  <text x="256" y="440" text-anchor="middle" fill="#fff" font-size="22" font-family="system-ui, sans-serif" font-weight="bold" letter-spacing="1">腸腦軸科學</text>
  <text x="256" y="465" text-anchor="middle" fill="#95d5b2" font-size="12" font-family="monospace" letter-spacing="1" opacity="0.8">GUT-BRAIN AXIS · 2026</text>

  <!-- 底部裝飾線 -->
  <line x1="156" y1="480" x2="356" y2="480" stroke="#95d5b2" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="480" r="2" fill="#95d5b2" opacity="0.5"/>
</svg>
