<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="nodeConnected" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <linearGradient id="nodeUnconnected" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#18ffff"/>
    </linearGradient>
    <linearGradient id="brainGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Decorative gradient rings -->
  <circle cx="256" cy="220" r="150" fill="none" stroke="#e040fb" stroke-width="0.3" opacity="0.15"/>
  <circle cx="256" cy="220" r="110" fill="none" stroke="#7c4dff" stroke-width="0.3" opacity="0.1"/>

  <!-- Knowledge node network -->
  <!-- Connection lines between nodes -->
  <g opacity="0.35">
    <!-- Central cluster -->
    <line x1="200" y1="160" x2="310" y2="170" stroke="#e040fb" stroke-width="0.8"/>
    <line x1="310" y1="170" x2="350" y2="230" stroke="#e040fb" stroke-width="0.8"/>
    <line x1="350" y1="230" x2="280" y2="300" stroke="#7c4dff" stroke-width="0.8"/>
    <line x1="280" y1="300" x2="180" y2="290" stroke="#7c4dff" stroke-width="0.8"/>
    <line x1="180" y1="290" x2="160" y2="200" stroke="#e040fb" stroke-width="0.8"/>
    <line x1="160" y1="200" x2="200" y2="160" stroke="#e040fb" stroke-width="0.8"/>
    <!-- Outer connections -->
    <line x1="200" y1="160" x2="130" y2="120" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
    <line x1="310" y1="170" x2="390" y2="110" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
    <line x1="350" y1="230" x2="430" y2="280" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
    <line x1="280" y1="300" x2="360" y2="380" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
    <line x1="180" y1="290" x2="100" y2="360" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
    <line x1="160" y1="200" x2="80" y2="180" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
    <!-- Cross connections -->
    <line x1="130" y1="120" x2="390" y2="110" stroke="#00e5ff" stroke-width="0.4" opacity="0.3"/>
    <line x1="100" y1="360" x2="360" y2="380" stroke="#00e5ff" stroke-width="0.4" opacity="0.3"/>
  </g>

  <!-- Nodes - main cluster (knowledge) -->
  <g filter="url(#softGlow)">
    <circle cx="200" cy="160" r="8" fill="url(#nodeConnected)" opacity="0.9"/>
    <circle cx="310" cy="170" r="7" fill="url(#nodeConnected)" opacity="0.85"/>
    <circle cx="350" cy="230" r="6" fill="url(#nodeConnected)" opacity="0.8"/>
    <circle cx="280" cy="300" r="7" fill="url(#nodeConnected)" opacity="0.85"/>
    <circle cx="180" cy="290" r="6" fill="url(#nodeConnected)" opacity="0.8"/>
    <circle cx="160" cy="200" r="7" fill="url(#nodeConnected)" opacity="0.85"/>
  </g>

  <!-- Outer nodes (unconnected bits being drawn in) -->
  <g filter="url(#softGlow)">
    <circle cx="130" cy="120" r="4" fill="url(#nodeUnconnected)" opacity="0.5"/>
    <circle cx="390" cy="110" r="4" fill="url(#nodeUnconnected)" opacity="0.5"/>
    <circle cx="430" cy="280" r="4" fill="url(#nodeUnconnected)" opacity="0.5"/>
    <circle cx="360" cy="380" r="4" fill="url(#nodeUnconnected)" opacity="0.5"/>
    <circle cx="100" cy="360" r="4" fill="url(#nodeUnconnected)" opacity="0.5"/>
    <circle cx="80" cy="180" r="4" fill="url(#nodeUnconnected)" opacity="0.5"/>
  </g>

  <!-- Central brain/knowledge symbol -->
  <g transform="translate(256, 220)" filter="url(#strongGlow)">
    <!-- Brain shape - simplified -->
    <ellipse cx="0" cy="0" rx="40" ry="30" fill="url(#brainGlow)"/>
    <ellipse cx="0" cy="0" rx="30" ry="22" fill="url(#brainGlow)" opacity="0.5"/>
    <!-- Brain left hemisphere -->
    <path d="M-5,-20 C-20,-18 -35,-5 -30,10 C-28,16 -22,20 -15,18 C-10,16 -8,10 -5,5" 
          fill="none" stroke="#e040fb" stroke-width="1.5" opacity="0.6"/>
    <!-- Brain right hemisphere -->
    <path d="M5,-20 C20,-18 35,-5 30,10 C28,16 22,20 15,18 C10,16 8,10 5,5" 
          fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.6"/>
    <!-- Center line -->
    <path d="M0,-22 L0,20" stroke="#e040fb" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Small symbol: document/note icon (upper right) -->
  <g transform="translate(380, 140)" opacity="0.3">
    <rect x="0" y="0" width="18" height="22" rx="2" fill="none" stroke="#00e5ff" stroke-width="1"/>
    <line x1="4" y1="6" x2="14" y2="6" stroke="#00e5ff" stroke-width="0.8"/>
    <line x1="4" y1="11" x2="14" y2="11" stroke="#00e5ff" stroke-width="0.8"/>
    <line x1="4" y1="16" x2="10" y2="16" stroke="#00e5ff" stroke-width="0.8"/>
  </g>

  <!-- Small symbol: lightbulb (lower right) -->
  <g transform="translate(370, 340)" opacity="0.25">
    <path d="M8,0 C4,0 1,4 1,8 C1,13 5,16 6,18 L10,18 C11,16 15,13 15,8 C15,4 12,0 8,0Z" 
          fill="none" stroke="#e040fb" stroke-width="1"/>
    <line x1="5" y1="20" x2="11" y2="20" stroke="#e040fb" stroke-width="0.8"/>
  </g>

  <!-- Small symbol: book (lower left) -->
  <g transform="translate(100, 310)" opacity="0.25">
    <rect x="2" y="0" width="14" height="18" rx="1" fill="none" stroke="#00e5ff" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="18" rx="1" fill="none" stroke="#e040fb" stroke-width="0.8"/>
    <line x1="6" y1="5" x2="13" y2="5" stroke="#00e5ff" stroke-width="0.7"/>
    <line x1="6" y1="9" x2="13" y2="9" stroke="#00e5ff" stroke-width="0.7"/>
    <line x1="6" y1="13" x2="11" y2="13" stroke="#00e5ff" stroke-width="0.7"/>
  </g>

  <!-- Floating particles (knowledge bits) -->
  <g opacity="0.35">
    <circle cx="256" cy="100" r="1.5" fill="#e040fb">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="350" r="1" fill="#00e5ff">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="200" r="1" fill="#e040fb">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="220" r="1.5" fill="#00e5ff">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="370" r="1" fill="#e040fb">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Animated pulsing nodes -->
  <circle cx="200" cy="160" r="8" fill="none" stroke="#e040fb" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="8;14;8" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="300" r="7" fill="none" stroke="#7c4dff" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="7;13;7" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Title text -->
  <text x="256" y="472" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="#e040fb" letter-spacing="3" opacity="0.8" filter="url(#softGlow)">知識管理 · 學習閉環</text>
</svg>
