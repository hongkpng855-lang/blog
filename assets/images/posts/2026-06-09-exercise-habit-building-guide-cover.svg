<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="50%" stop-color="#1E3355"/>
      <stop offset="100%" stop-color="#162240"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3" flood-color="#000"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Abstract geometric pattern - subtle background -->
  <g opacity="0.06">
    <circle cx="450" cy="80" r="180" fill="#FFF"/>
    <circle cx="-20" cy="420" r="150" fill="#FFF"/>
    <rect x="200" y="300" width="200" height="200" rx="20" fill="none" stroke="#FFF" stroke-width="1" transform="rotate(30 300 400)"/>
  </g>

  <!-- Running figure silhouette - central focus -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <g transform="translate(180, 150) scale(1.1)">
      <!-- Head -->
      <circle cx="80" cy="30" r="22" fill="#C9A84C" opacity="0.9"/>
      <!-- Torso -->
      <path d="M65 55 L55 130 L95 130 L90 55 Z" fill="#C9A84C" opacity="0.85"/>
      <!-- Running arms -->
      <line x1="60" y1="70" x2="20" y2="40" stroke="#C9A84C" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
      <line x1="90" y1="80" x2="130" y2="55" stroke="#C9A84C" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
      <!-- Running legs -->
      <line x1="65" y1="130" x2="30" y2="195" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
      <line x1="85" y1="130" x2="120" y2="185" stroke="#C9A84C" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
      <!-- Feet -->
      <ellipse cx="22" cy="198" rx="14" ry="5" fill="#D4A843" opacity="0.8"/>
      <ellipse cx="128" cy="188" rx="14" ry="5" fill="#D4A843" opacity="0.8"/>
    </g>

    <!-- Motion lines -->
    <g stroke="#66BB6A" stroke-width="2" opacity="0.4">
      <line x1="290" y1="170" x2="340" y2="165"/>
      <line x1="295" y1="190" x2="355" y2="185"/>
      <line x1="290" y1="210" x2="345" y2="208"/>
    </g>
  </g>

  <!-- Heart rate / pulse line -->
  <g filter="url(#glow)">
    <polyline points="50,340 80,340 95,310 110,370 125,290 140,350 155,320 170,340 462,340"
              fill="none" stroke="#66BB6A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <polyline points="50,360 80,360 95,345 110,375 125,335 140,365 155,350 170,360 462,360"
              fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Data cards -->
  <g transform="translate(30, 420)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="100" height="50" rx="10" fill="#1E3355" stroke="#C9A84C" stroke-width="1" opacity="0.85"/>
    <text x="50" y="22" text-anchor="middle" fill="#C9A84C" font-family="system-ui" font-size="13" font-weight="bold">每星期</text>
    <text x="50" y="40" text-anchor="middle" fill="#66BB6A" font-family="system-ui" font-size="16" font-weight="bold">150 分鐘</text>

    <!-- Card 2 -->
    <rect x="115" y="0" width="100" height="50" rx="10" fill="#1E3355" stroke="#C9A84C" stroke-width="1" opacity="0.85"/>
    <text x="165" y="22" text-anchor="middle" fill="#C9A84C" font-family="system-ui" font-size="13" font-weight="bold">最低門檻</text>
    <text x="165" y="40" text-anchor="middle" fill="#66BB6A" font-family="system-ui" font-size="16" font-weight="bold">5 分鐘</text>

    <!-- Card 3 -->
    <rect x="230" y="0" width="100" height="50" rx="10" fill="#1E3355" stroke="#C9A84C" stroke-width="1" opacity="0.85"/>
    <text x="280" y="22" text-anchor="middle" fill="#C9A84C" font-family="system-ui" font-size="13" font-weight="bold">養成需時</text>
    <text x="280" y="40" text-anchor="middle" fill="#66BB6A" font-family="system-ui" font-size="16" font-weight="bold">66 日</text>

    <!-- Card 4 -->
    <rect x="345" y="0" width="100" height="50" rx="10" fill="#1E3355" stroke="#C9A84C" stroke-width="1" opacity="0.85"/>
    <text x="395" y="22" text-anchor="middle" fill="#C9A84C" font-family="system-ui" font-size="13" font-weight="bold">續行率</text>
    <text x="395" y="40" text-anchor="middle" fill="#66BB6A" font-family="system-ui" font-size="16" font-weight="bold">+42%</text>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.15">
    <!-- Dumbbell icon -->
    <rect x="405" y="55" width="35" height="8" rx="4" fill="#FFF"/>
    <rect x="400" y="48" width="10" height="22" rx="3" fill="#FFF"/>
    <rect x="435" y="48" width="10" height="22" rx="3" fill="#FFF"/>
    <!-- Water drop -->
    <path d="M365 95 Q365 80 375 65 Q385 80 385 95 Q385 105 375 105 Q365 105 365 95Z" fill="#FFF"/>
  </g>

  <!-- Main title area -->
  <g filter="url(#shadow)">
    <text x="256" y="385" text-anchor="middle" fill="#C9A84C" font-family="system-ui" font-size="14" opacity="0.8" letter-spacing="3">LIFE • 生活改造</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="80" y1="505" x2="432" y2="505" stroke="#C9A84C" stroke-width="1.5" opacity="0.3"/>
</svg>
