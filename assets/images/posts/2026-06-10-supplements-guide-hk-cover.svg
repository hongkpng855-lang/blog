  <!-- Warning note -->
  <text x="256" y="385" font-family="system-ui,sans-serif" font-size="10" fill="#5A7A9A" text-anchor="middle">⚠️ 唔係越貴越好 • 唔係越多越好 • 天然唔一定好過合成</text>

  <!-- Bottom money saver -->
  <rect x="60" y="405" width="390" height="70" rx="14" fill="url(#gold)" opacity="0.9"/>
  <text x="256" y="432" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#0B1926" text-anchor="middle">💰 每月低至 $50 就得</text>
  <text x="256" y="452" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1B2A4A" text-anchor="middle">入門：D3  |  標準：D3+魚油  |  進階：D3+魚油+鎂</text>
  <text x="256" y="468" font-family="system-ui,sans-serif" font-size="10" fill="#2A4A6A" text-anchor="middle">唔好嘥錢喺 miracle product 上面</text>
</svg>
