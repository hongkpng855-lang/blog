<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a3a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c86a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.3)" />
      <stop offset="100%" style="stop-color:rgba(201,168,76,0.05)" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="16"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="432" cy="432" r="160" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="400" r="80" fill="rgba(201,168,76,0.05)"/>

  <!-- Brain/head silhouette -->
  <ellipse cx="256" cy="200" rx="75" ry="85" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2.5"/>
  <!-- Brain wave lines -->
  <path d="M200,185 Q220,170 240,185 Q260,200 280,185 Q300,170 320,185" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="2" stroke-linecap="round"/>
  <path d="M195,200 Q220,188 245,200 Q270,212 295,200 Q320,188 345,200" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="2" stroke-linecap="round"/>

  <!-- Chart going up -->
  <polyline points="160,380 210,340 260,355 310,300 360,240" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="160,380 210,340 260,355 310,300 360,240" fill="url(#chart)" stroke="none"/>
  
  <!-- Up arrow -->
  <polygon points="355,225 370,260 340,260" fill="rgba(201,168,76,0.5)" stroke="none"/>

  <!-- Balance scale simplified -->
  <line x1="100" y1="300" x2="412" y2="300" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  
  <!-- Left side: fear icon (down arrow) -->
  <circle cx="180" cy="300" r="22" fill="none" stroke="rgba(255,100,100,0.3)" stroke-width="2"/>
  <line x1="180" y1="288" x2="180" y2="312" stroke="rgba(255,100,100,0.5)" stroke-width="2"/>
  <polygon points="180,318 174,310 186,310" fill="rgba(255,100,100,0.4)"/>
  
  <!-- Right side: greed icon (up arrow) -->
  <circle cx="332" cy="300" r="22" fill="none" stroke="rgba(100,255,100,0.3)" stroke-width="2"/>
  <line x1="332" y1="312" x2="332" y2="288" stroke="rgba(100,255,100,0.5)" stroke-width="2"/>
  <polygon points="332,282 326,290 338,290" fill="rgba(100,255,100,0.4)"/>

  <!-- Center: balanced mind icon -->
  <circle cx="256" cy="300" r="18" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="2.5"/>
  <text x="256" y="307" font-family="system-ui, sans-serif" font-size="18" fill="#c9a84c" text-anchor="middle">⚖</text>

  <!-- Connection lines between icons -->
  <line x1="202" y1="300" x2="238" y2="300" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="274" y1="300" x2="310" y2="300" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Bottom region: discipline symbol -->
  <rect x="216" y="350" width="80" height="4" rx="2" fill="rgba(201,168,76,0.5)"/>
  <rect x="236" y="360" width="40" height="4" rx="2" fill="rgba(201,168,76,0.3)"/>
  <rect x="226" y="370" width="60" height="4" rx="2" fill="rgba(201,168,76,0.2)"/>

  <!-- Sparkles -->
  <circle cx="120" cy="160" r="3" fill="#c9a84c" opacity="0.5"/>
  <circle cx="390" cy="170" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="160" cy="420" r="2" fill="#c9a84c" opacity="0.3"/>

  <!-- Title text -->
  <text x="256" y="445" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="2">🧠 投資心理學</text>
  <text x="256" y="478" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">克服人性弱點・建立贏家心態</text>
</svg>