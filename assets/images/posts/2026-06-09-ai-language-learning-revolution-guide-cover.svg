<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2A4A"/>
      <stop offset="50%" style="stop-color:#2C4A6E"/>
      <stop offset="100%" style="stop-color:#1B3A5A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E8D48B;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D48B"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34A853;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#34A853;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#EA4335;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Globe icon (left side) -->
  <g transform="translate(160, 180)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="80" fill="url(#globeGrad)" stroke="#C9A84C" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.15"/>
    <!-- Globe lines -->
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="#E8D48B" stroke-width="1.2" stroke-opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="#E8D48B" stroke-width="1.2" stroke-opacity="0.3" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="#E8D48B" stroke-width="1.2" stroke-opacity="0.3" transform="rotate(120)"/>
    <ellipse cx="0" cy="0" rx="20" ry="80" fill="none" stroke="#E8D48B" stroke-width="1.2" stroke-opacity="0.3"/>
    <!-- Chat bubble coming from globe -->
    <g transform="translate(70, -50)">
      <rect x="0" y="0" width="50" height="35" rx="8" fill="#C9A84C" fill-opacity="0.2" stroke="#C9A84C" stroke-width="1.5"/>
      <polygon points="5,35 15,35 10,45" fill="#C9A84C" fill-opacity="0.2" stroke="#C9A84C" stroke-width="1.5"/>
    </g>
  </g>

  <!-- AI Chat interface (center-right) -->
  <g transform="translate(650, 120)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="400" rx="16" fill="#1A2A44" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.2"/>
    <!-- Chat header -->
    <rect x="0" y="0" width="380" height="50" rx="16" fill="#C9A84C" fill-opacity="0.08"/>
    <rect x="0" y="25" width="380" height="25" fill="#C9A84C" fill-opacity="0.08"/>
    <circle cx="25" cy="25" r="10" fill="#34A853" opacity="0.8"/>
    <text x="45" y="30" fill="#E8D48B" font-family="system-ui" font-size="13" font-weight="600">AI Language Coach</text>
    <!-- Chat messages -->
    <!-- AI message -->
    <rect x="20" y="70" width="200" height="40" rx="12" fill="#2C4A6E" opacity="0.8"/>
    <text x="30" y="93" fill="#ffffff" font-family="system-ui" font-size="11" opacity="0.9">How was your weekend?</text>
    <!-- User message -->
    <rect x="160" y="125" width="200" height="55" rx="12" fill="#C9A84C" fill-opacity="0.15"/>
    <text x="175" y="148" fill="#E8D48B" font-family="system-ui" font-size="11">It was good. I go to</text>
    <text x="175" y="165" fill="#E8D48B" font-family="system-ui" font-size="11">the beach... with my... </text>
    <!-- AI correction -->
    <rect x="20" y="195" width="230" height="55" rx="12" fill="#2C4A6E" opacity="0.8"/>
    <text x="30" y="215" fill="#E8D48B" font-family="system-ui" font-size="11" font-weight="600">💡 Correction:</text>
    <text x="30" y="235" fill="#ffffff" font-family="system-ui" font-size="11" opacity="0.9">"I went to the beach..."</text>
    <!-- AI message 2 -->
    <rect x="20" y="265" width="160" height="40" rx="12" fill="#2C4A6E" opacity="0.8"/>
    <text x="30" y="288" fill="#ffffff" font-family="system-ui" font-size="11" opacity="0.9">Want to try again?</text>
    <!-- User typing -->
    <rect x="150" y="320" width="210" height="55" rx="12" fill="#C9A84C" fill-opacity="0.12"/>
    <text x="165" y="343" fill="#E8D48B" font-family="system-ui" font-size="11">Yes! I went to the</text>
    <text x="165" y="360" fill="#E8D48B" font-family="system-ui" font-size="11">beach with my family.</text>
    <!-- AI response -->
    <rect x="20" y="340" width="100" height="30" rx="12" fill="#34A853" fill-opacity="0.2"/>
    <text x="35" y="359" fill="#34A853" font-family="system-ui" font-size="12" font-weight="600">Great! ✅</text>
  </g>

  <!-- Speech bubbles around globe -->
  <g opacity="0.6">
    <rect x="80" y="340" width="100" height="28" rx="10" fill="none" stroke="#E8D48B" stroke-width="1" stroke-opacity="0.3"/>
    <text x="90" y="359" fill="#E8D48B" font-family="system-ui" font-size="11">こんにちは</text>
    <rect x="200" y="310" width="100" height="28" rx="10" fill="none" stroke="#E8D48B" stroke-width="1" stroke-opacity="0.3"/>
    <text x="210" y="329" fill="#E8D48B" font-family="system-ui" font-size="11">Bonjour!</text>
    <rect x="60" y="260" width="100" height="28" rx="10" fill="none" stroke="#E8D48B" stroke-width="1" stroke-opacity="0.3"/>
    <text x="70" y="279" fill="#E8D48B" font-family="system-ui" font-size="11">¡Hola!</text>
  </g>

  <!-- Headphone icon (bottom center) -->
  <g transform="translate(520, 490)">
    <path d="M0,-20 A25,25 0 0,0 -25,5 L-25,15 A10,10 0 0,0 -5,15 L-5,5 L-5,-5 A5,5 0 0,1 5,-5 L5,5 L5,15 A10,10 0 0,0 25,15 L25,5 A25,25 0 0,0 0,-20Z" fill="none" stroke="#C9A84C" stroke-width="2" stroke-opacity="0.5"/>
    <circle cx="-15" cy="10" r="4" fill="#C9A84C" opacity="0.5"/>
    <circle cx="15" cy="10" r="4" fill="#C9A84C" opacity="0.5"/>
  </g>

  <!-- Title area -->
  <g transform="translate(55, 50)">
    <!-- Category badge -->
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#C9A84C" fill-opacity="0.15" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.3"/>
    <text x="15" y="19" fill="#E8D48B" font-family="system-ui" font-size="12" font-weight="600">📚 學習類</text>

    <!-- Main title -->
    <text x="0" y="80" fill="#ffffff" font-family="system-ui" font-size="38" font-weight="800">
      <tspan x="0" dy="0">2026 AI 語言學習革命</tspan>
    </text>

    <!-- Subtitle -->
    <text x="0" y="130" fill="#C9A84C" font-family="system-ui" font-size="20" font-weight="600">
      <tspan x="0" dy="0">用人工智能掌握任何語言嘅完整實戰攻略</tspan>
    </text>

    <!-- Description -->
    <text x="0" y="175" fill="#ffffff" font-family="system-ui" font-size="14" opacity="0.7">
      <tspan x="0" dy="0">AI 口語練習 · 即時發音糾正 · 個人化學習路徑 · 沉浸式語言系統</tspan>
    </text>
  </g>

  <!-- Bottom decorative bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Floating dots decoration -->
  <g opacity="0.15">
    <circle cx="100" cy="500" r="3" fill="#E8D48B"/>
    <circle cx="250" cy="550" r="2" fill="#E8D48B"/>
    <circle cx="400" cy="480" r="4" fill="#E8D48B"/>
    <circle cx="800" cy="530" r="2" fill="#E8D48B"/>
    <circle cx="1050" cy="480" r="3" fill="#E8D48B"/>
    <circle cx="1100" cy="580" r="2" fill="#E8D48B"/>
    <circle cx="150" cy="130" r="2" fill="#E8D48B"/>
    <circle cx="500" cy="100" r="3" fill="#E8D48B"/>
  </g>
</svg>
