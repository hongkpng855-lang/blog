<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#2d4a5e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8c84c"/>
      <stop offset="100%" style="stop-color:#d4a83c"/>
    </linearGradient>
    <linearGradient id="clock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a8a7a"/>
      <stop offset="100%" style="stop-color:#3d6b5e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="80" r="60" fill="none" stroke="#e8c84c" stroke-width="0.5" opacity="0.15"/>
  <circle cx="100" cy="430" r="40" fill="none" stroke="#e8c84c" stroke-width="0.5" opacity="0.12"/>

  <!-- Clock face -->
  <circle cx="256" cy="205" r="95" fill="url(#clock)" opacity="0.85"/>
  <circle cx="256" cy="205" r="85" fill="none" stroke="#e8c84c" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="205" r="6" fill="#e8c84c"/>

  <!-- Clock hands - showing ~4:00 (16:00) to indicate 16:8 -->
  <line x1="256" y1="205" x2="256" y2="135" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="256" y1="205" x2="310" y2="230" stroke="#e8c84c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Hour markers -->
  <g fill="#e8c84c" font-family="sans-serif" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="256" y="130">12</text>
    <text x="316" y="155">3</text>
    <text x="316" y="260">6</text>
    <text x="200" y="260">9</text>
  </g>

  <!-- Fasting / Eating indicators -->
  <text x="190" y="320" fill="#7ac4a0" font-family="sans-serif" font-size="13" font-weight="bold">⏳ 禁食</text>
  <text x="280" y="320" fill="#e8c84c" font-family="sans-serif" font-size="13" font-weight="bold">🍽️ 進食</text>
  <line x1="185" y1="328" x2="240" y2="328" stroke="#7ac4a0" stroke-width="2.5" opacity="0.8"/>
  <line x1="275" y1="328" x2="330" y2="328" stroke="#e8c84c" stroke-width="2.5" opacity="0.8"/>

  <!-- Title -->
  <text x="256" y="380" fill="#ffffff" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="1">間歇性斷食</text>
  <text x="256" y="408" fill="#e8c84c" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="2">完全科學指南</text>

  <!-- Subtitle -->
  <text x="256" y="442" fill="#aabbcc" font-family="sans-serif" font-size="12" text-anchor="middle">168 斷食 · 52 輕斷食 · OMAD</text>

  <!-- Small tag -->
  <rect x="200" y="458" width="112" height="22" rx="11" fill="none" stroke="#5a8a7a" stroke-width="1"/>
  <text x="256" y="473" fill="#7ac4a0" font-family="sans-serif" font-size="10" text-anchor="middle">2026 最新科學實證</text>
</svg>
