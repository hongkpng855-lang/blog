<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.15"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2"/>
  <circle cx="1000" cy="450" r="100" fill="none" stroke="#533483" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1000" cy="450" r="60" fill="none" stroke="#533483" stroke-width="0.5" opacity="0.2"/>

  <!-- Centered lotus/mandala inspired circle -->
  <g transform="translate(600, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2"/>

    <!-- Inner glow -->
    <circle cx="0" cy="0" r="100" fill="url(#glow)" opacity="0.5"/>

    <!-- Person in meditation pose (simplified) -->
    <g filter="url(#softGlow)">
      <!-- Body -->
      <ellipse cx="0" cy="20" rx="30" ry="35" fill="#e94560" opacity="0.8"/>
      <!-- Head -->
      <circle cx="0" cy="-20" r="18" fill="#e94560" opacity="0.9"/>
      <!-- Cross legs -->
      <path d="M-20,35 Q-10,45 0,35 Q10,45 20,35" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.7"/>
      <path d="M-15,40 Q-5,50 0,40 Q5,50 15,40" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
      <!-- Energy waves -->
      <path d="M-45,20 Q-35,10 -25,20" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
      <path d="M-50,15 Q-40,5 -30,15" fill="none" stroke="#e94560" stroke-width="1" opacity="0.4"/>
      <path d="M25,20 Q35,10 45,20" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
      <path d="M30,15 Q40,5 50,15" fill="none" stroke="#e94560" stroke-width="1" opacity="0.4"/>
    </g>
  </g>

  <!-- Small floating dots -->
  <circle cx="300" cy="100" r="2" fill="#e94560" opacity="0.4"/>
  <circle cx="850" cy="120" r="1.5" fill="#e94560" opacity="0.3"/>
  <circle cx="400" cy="480" r="2" fill="#533483" opacity="0.4"/>
  <circle cx="750" cy="500" r="1.5" fill="#533483" opacity="0.3"/>
  <circle cx="550" cy="80" r="1" fill="#e94560" opacity="0.4"/>
  <circle cx="680" cy="540" r="1.5" fill="#533483" opacity="0.3"/>

  <!-- Title text -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" letter-spacing="2">
    日常冥想與正念生活指南
  </text>

  <!-- Subtitle -->
  <text x="600" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#a0a0b0" letter-spacing="1.5">
    從5分鐘開始・找回內心平靜的科學方法
  </text>
</svg>
