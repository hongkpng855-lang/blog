<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="20"/>
  <!-- Brain/head icon simplified -->
  <circle cx="256" cy="200" r="70" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.3"/>
  <circle cx="256" cy="200" r="60" fill="none" stroke="#e94560" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="200" r="50" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.5"/>
  <!-- Central node -->
  <circle cx="256" cy="200" r="12" fill="#f5a623" opacity="0.9"/>
  <!-- Output arrows outward from center -->
  <line x1="268" y1="190" x2="340" y2="120" stroke="#e94560" stroke-width="2" opacity="0.7"/>
  <line x1="268" y1="200" x2="380" y2="200" stroke="#f5a623" stroke-width="2" opacity="0.7"/>
  <line x1="268" y1="210" x2="340" y2="280" stroke="#e94560" stroke-width="2" opacity="0.7"/>
  <line x1="244" y1="190" x2="172" y2="120" stroke="#f5a623" stroke-width="2" opacity="0.7"/>
  <line x1="244" y1="200" x2="132" y2="200" stroke="#e94560" stroke-width="2" opacity="0.7"/>
  <line x1="244" y1="210" x2="172" y2="280" stroke="#f5a623" stroke-width="2" opacity="0.7"/>
  <!-- Arrowheads (triangles) -->
  <polygon points="340,120 332,118 336,126" fill="#e94560" opacity="0.7"/>
  <polygon points="380,200 372,196 372,204" fill="#f5a623" opacity="0.7"/>
  <polygon points="340,280 336,272 332,278" fill="#e94560" opacity="0.7"/>
  <polygon points="172,120 176,126 168,118" fill="#f5a623" opacity="0.7"/>
  <polygon points="132,200 140,196 140,204" fill="#e94560" opacity="0.7"/>
  <polygon points="172,280 176,272 168,278" fill="#f5a623" opacity="0.7"/>
  <!-- Output nodes -->
  <circle cx="360" cy="110" r="18" fill="#e94560" opacity="0.15"/>
  <text x="360" y="115" text-anchor="middle" fill="#e94560" font-size="16" font-family="sans-serif" opacity="0.9">📝</text>
  <circle cx="400" cy="200" r="18" fill="#f5a623" opacity="0.15"/>
  <text x="400" y="205" text-anchor="middle" fill="#f5a623" font-size="16" font-family="sans-serif" opacity="0.9">🎤</text>
  <circle cx="360" y="290" r="18" fill="#e94560" opacity="0.15"/>
  <text x="360" y="295" text-anchor="middle" fill="#e94560" font-size="16" font-family="sans-serif" opacity="0.9">🛠️</text>
  <circle cx="152" cy="110" r="18" fill="#f5a623" opacity="0.15"/>
  <text x="152" y="115" text-anchor="middle" fill="#f5a623" font-size="16" font-family="sans-serif" opacity="0.9">📖</text>
  <circle cx="112" cy="200" r="18" fill="#e94560" opacity="0.15"/>
  <text x="112" y="205" text-anchor="middle" fill="#e94560" font-size="16" font-family="sans-serif" opacity="0.9">🤝</text>
  <circle cx="152" cy="290" r="18" fill="#f5a623" opacity="0.15"/>
  <text x="152" y="295" text-anchor="middle" fill="#f5a623" font-size="16" font-family="sans-serif" opacity="0.9">💡</text>
  <!-- Labels -->
  <text x="256" y="140" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif" opacity="0.5">INPUT</text>
  <text x="256" y="270" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif" opacity="0.5">OUTPUT</text>
  <!-- Title text -->
  <text x="256" y="370" text-anchor="middle" fill="#ffffff" font-size="28" font-family="sans-serif" font-weight="bold" letter-spacing="1">輸出式學習法</text>
  <text x="256" y="400" text-anchor="middle" fill="#f5a623" font-size="16" font-family="sans-serif" opacity="0.9">創作 · 實作 · 內化</text>
  <text x="256" y="430" text-anchor="middle" fill="#aaaacc" font-size="12" font-family="sans-serif">七個科學策略加速知識成長</text>
</svg>
