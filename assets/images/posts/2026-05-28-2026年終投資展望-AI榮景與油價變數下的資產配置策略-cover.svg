<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#0f1b3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#b8922e"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#69f0ae;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 市場圖表抽象 -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="50,380 120,320 180,340 240,240 300,180 340,200 400,120 460,90" stroke="url(#green)" filter="url(#glow)"/>
    <polyline points="50,420 120,360 180,390 240,320 300,280 340,300 400,240 460,220" stroke="url(#gold)" filter="url(#glow)" opacity="0.6"/>
    <polyline points="50,370 120,390 180,350 240,400 300,360 340,380 400,340 460,350" stroke="url(#red)" opacity="0.4" stroke-width="1.5"/>
  </g>
  <!-- AI chip icon -->
  <g transform="translate(380, 100)">
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <rect x="-12" y="-12" width="24" height="24" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="6" fill="#00d4ff" opacity="0.3"/>
  </g>
  <!-- Oil drop icon -->
  <g transform="translate(100, 420)" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.5">
    <path d="M0,0 C-8,8 -12,16 -12,22 C-12,28.6 -6.6,34 0,34 C6.6,34 12,28.6 12,22 C12,16 8,8 0,0Z"/>
  </g>
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" filter="url(#glow)">2026 年中投資展望</text>
  <text x="256" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C9A84C">AI 榮景與油價變數下的資產配置策略</text>
</svg>
