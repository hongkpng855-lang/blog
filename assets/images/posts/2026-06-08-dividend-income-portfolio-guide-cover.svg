<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="50%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8D48B"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="50" x2="800" y2="50" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="450" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Chart / Growth Visualization -->
  <!-- Upward trend line -->
  <polyline points="120,320 220,290 320,240 420,200 520,140 620,100" fill="none" stroke="url(#green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Area under the line (gradient fill) -->
  <path d="M120,320 L120,320 L220,290 L320,240 L420,200 L520,140 L620,100 L620,350 L120,350 Z" fill="url(#green)" opacity="0.08"/>

  <!-- Data points -->
  <circle cx="120" cy="320" r="4" fill="#22c55e" opacity="0.8"/>
  <circle cx="220" cy="290" r="4" fill="#22c55e" opacity="0.8"/>
  <circle cx="320" cy="240" r="5" fill="#22c55e" opacity="0.9"/>
  <circle cx="420" cy="200" r="5" fill="#22c55e" opacity="0.9"/>
  <circle cx="520" cy="140" r="6" fill="#22c55e" opacity="1"/>
  <circle cx="620" cy="100" r="7" fill="#22c55e" filter="url(#glow)"/>

  <!-- X-axis line -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="350" x2="100" y2="80" stroke="white" stroke-width="1" opacity="0.2"/>

  <!-- X-axis labels -->
  <text x="120" y="375" fill="white" opacity="0.3" font-size="10" font-family="sans-serif" text-anchor="middle">2022</text>
  <text x="270" y="375" fill="white" opacity="0.3" font-size="10" font-family="sans-serif" text-anchor="middle">2023</text>
  <text x="420" y="375" fill="white" opacity="0.3" font-size="10" font-family="sans-serif" text-anchor="middle">2024</text>
  <text x="570" y="375" fill="white" opacity="0.3" font-size="10" font-family="sans-serif" text-anchor="middle">2025</text>
  <text x="700" y="375" fill="url(#gold)" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">2026</text>

  <!-- Coin / Money icons section -->

  <!-- Stack of coins (left side decorative) -->
  <g transform="translate(55, 180)" opacity="0.15">
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="#C9A84C"/>
    <rect x="-20" y="-30" width="40" height="30" rx="3" fill="#C9A84C"/>
    <ellipse cx="0" cy="-30" rx="20" ry="8" fill="#E8D48B"/>
    <rect x="-20" y="-60" width="40" height="30" rx="3" fill="#C9A84C" opacity="0.8"/>
    <ellipse cx="0" cy="-60" rx="20" ry="8" fill="#E8D48B" opacity="0.8"/>
    <text x="0" y="-20" fill="#1B2A4A" font-size="14" font-family="sans-serif" font-weight="bold" text-anchor="middle">$</text>
  </g>

  <!-- Floating coins -->
  <g opacity="0.12">
    <circle cx="150" cy="120" r="15" fill="#C9A84C" stroke="#E8D48B" stroke-width="1"/>
    <text x="150" y="125" fill="#1B2A4A" font-size="12" font-family="sans-serif" font-weight="bold" text-anchor="middle">$</text>
  </g>
  <g opacity="0.08">
    <circle cx="650" cy="200" r="12" fill="#C9A84C" stroke="#E8D48B" stroke-width="1"/>
    <text x="650" y="205" fill="#1B2A4A" font-size="10" font-family="sans-serif" font-weight="bold" text-anchor="middle">$</text>
  </g>

  <!-- Right side: Calendar/Income schedule representation -->
  <g transform="translate(640, 170)" opacity="0.12">
    <rect x="0" y="0" width="80" height="70" rx="4" fill="none" stroke="#22c55e" stroke-width="1"/>
    <text x="40" y="20" fill="#22c55e" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">收息</text>
    <text x="40" y="35" fill="#22c55e" font-size="10" font-family="sans-serif" text-anchor="middle">月月</text>
    <text x="40" y="50" fill="#22c55e" font-size="10" font-family="sans-serif" text-anchor="middle">有息</text>
    <text x="40" y="65" fill="#22c55e" font-size="8" font-family="sans-serif" text-anchor="middle">收 ✓</text>
  </g>

  <!-- Small coin stack bottom right -->
  <g transform="translate(680, 310)" opacity="0.08">
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="#C9A84C"/>
    <rect x="-8" y="-12" width="16" height="12" rx="2" fill="#C9A84C"/>
    <ellipse cx="0" cy="-12" rx="8" ry="3" fill="#E8D48B"/>
    <rect x="-8" y="-24" width="16" height="12" rx="2" fill="#C9A84C" opacity="0.6"/>
    <ellipse cx="0" cy="-24" rx="8" ry="3" fill="#E8D48B" opacity="0.6"/>
  </g>

  <!-- Divider line -->
  <line x1="80" y1="88" x2="720" y2="88" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>

  <!-- Title -->
  <text x="80" y="58" fill="#ffffff" font-size="28" font-family="sans-serif" font-weight="bold">
    港股收息組合重生指南
  </text>

  <!-- Subtitle -->
  <text x="80" y="78" fill="#C9A84C" font-size="14" font-family="sans-serif" opacity="0.9">
    建立月月有息收嘅股息現金流系統
  </text>

  <!-- Tags / Badges -->
  <g transform="translate(80, 405)">
    <rect x="0" y="0" width="90" height="24" rx="12" fill="#C9A84C" opacity="0.15"/>
    <text x="45" y="16" fill="#C9A84C" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">📈 被動收入</text>

    <rect x="100" y="0" width="80" height="24" rx="12" fill="#22c55e" opacity="0.12"/>
    <text x="140" y="16" fill="#22c55e" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">💎 股息</text>

    <rect x="190" y="0" width="100" height="24" rx="12" fill="#C9A84C" opacity="0.12"/>
    <text x="240" y="16" fill="#C9A84C" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">💰 現金流</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="448" width="800" height="2" fill="url(#gold)" opacity="0.4"/>
</svg>
