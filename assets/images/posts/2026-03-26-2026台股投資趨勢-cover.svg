<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Rising chart line -->
  <polyline points="100,450 200,400 350,420 500,350 650,300 800,250 950,200 1100,150" 
            fill="none" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="1100" cy="150" r="8" fill="#e94560"/>
  
  <!-- AI chip icon -->
  <g transform="translate(900, 280)">
    <rect x="0" y="0" width="100" height="100" rx="10" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <rect x="20" y="20" width="60" height="60" rx="5" fill="#16213e"/>
    <!-- Chip pins -->
    <line x1="30" y1="0" x2="30" y2="20" stroke="#e94560" stroke-width="3"/>
    <line x1="50" y1="0" x2="50" y2="20" stroke="#e94560" stroke-width="3"/>
    <line x1="70" y1="0" x2="70" y2="20" stroke="#e94560" stroke-width="3"/>
    <line x1="30" y1="80" x2="30" y2="100" stroke="#e94560" stroke-width="3"/>
    <line x1="50" y1="80" x2="50" y2="100" stroke="#e94560" stroke-width="3"/>
    <line x1="70" y1="80" x2="70" y2="100" stroke="#e94560" stroke-width="3"/>
    <line x1="0" y1="30" x2="20" y2="30" stroke="#e94560" stroke-width="3"/>
    <line x1="0" y1="50" x2="20" y2="50" stroke="#e94560" stroke-width="3"/>
    <line x1="0" y1="70" x2="20" y2="70" stroke="#e94560" stroke-width="3"/>
    <line x1="80" y1="30" x2="100" y2="30" stroke="#e94560" stroke-width="3"/>
    <line x1="80" y1="50" x2="100" y2="50" stroke="#e94560" stroke-width="3"/>
    <line x1="80" y1="70" x2="100" y2="70" stroke="#e94560" stroke-width="3"/>
    <text x="50" y="55" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">AI</text>
  </g>
  
  <!-- Title -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff">
    2026 台股投資趨勢
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="28" fill="#e94560">
    AI 概念股 × 高股息 ETF 布局指南
  </text>
  
  <!-- Keywords -->
  <g transform="translate(80, 550)">
    <rect x="0" y="0" width="120" height="35" rx="17" fill="#0f3460"/>
    <text x="60" y="24" text-anchor="middle" fill="#fff" font-size="14">台積電</text>
    
    <rect x="140" y="0" width="120" height="35" rx="17" fill="#0f3460"/>
    <text x="200" y="24" text-anchor="middle" fill="#fff" font-size="14">輝達供應鏈</text>
    
    <rect x="280" y="0" width="100" height="35" rx="17" fill="#0f3460"/>
    <text x="330" y="24" text-anchor="middle" fill="#fff" font-size="14">0056</text>
    
    <rect x="400" y="0" width="100" height="35" rx="17" fill="#0f3460"/>
    <text x="450" y="24" text-anchor="middle" fill="#fff" font-size="14">00878</text>
  </g>
  
  <!-- Year badge -->
  <g transform="translate(1050, 50)">
    <circle cx="50" cy="50" r="50" fill="#e94560" opacity="0.9"/>
    <text x="50" y="45" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">2026</text>
    <text x="50" y="70" text-anchor="middle" fill="#fff" font-size="14">投資指南</text>
  </g>
</svg>