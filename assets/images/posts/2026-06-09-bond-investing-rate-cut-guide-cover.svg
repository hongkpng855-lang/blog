<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#121b3d"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rateDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative hex pattern -->
  <g opacity="0.03">
    <polygon points="400,225 450,195 500,225 500,285 450,315 400,285" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <polygon points="350,195 400,165 450,195 450,255 400,285 350,255" fill="none" stroke="#C9A84C" stroke-width="0.6"/>
    <polygon points="450,255 500,285 450,315 400,345 350,315 400,285" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <polygon points="300,225 350,195 400,225 400,285 350,315 300,285" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    <polygon points="500,165 550,135 600,165 600,225 550,255 500,225" fill="none" stroke="#C9A84C" stroke-width="0.4"/>
    <polygon points="250,255 300,225 350,255 350,315 300,345 250,315" fill="none" stroke="#C9A84C" stroke-width="0.4"/>
    <polygon points="550,255 600,285 550,315 500,345 450,315 500,285" fill="none" stroke="#C9A84C" stroke-width="0.3"/>
  </g>

  <!-- ===== Bond Yield Curve Chart ===== -->
  <!-- Chart area: Yield curve going down (rate cuts) -->
  
  <!-- Axis -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="80" y1="340" x2="80" y2="80" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- Y-axis labels -->
  <text x="72" y="340" fill="white" opacity="0.2" font-size="9" font-family="sans-serif" text-anchor="end">0%</text>
  <text x="72" y="275" fill="white" opacity="0.2" font-size="9" font-family="sans-serif" text-anchor="end">2%</text>
  <text x="72" y="210" fill="white" opacity="0.2" font-size="9" font-family="sans-serif" text-anchor="end">4%</text>
  <text x="72" y="145" fill="white" opacity="0.2" font-size="9" font-family="sans-serif" text-anchor="end">6%</text>
  <text x="72" y="80" fill="white" opacity="0.2" font-size="9" font-family="sans-serif" text-anchor="end">8%</text>

  <!-- Grid lines -->
  <line x1="80" y1="275" x2="720" y2="275" stroke="white" stroke-width="0.3" opacity="0.06"/>
  <line x1="80" y1="210" x2="720" y2="210" stroke="white" stroke-width="0.3" opacity="0.06"/>
  <line x1="80" y1="145" x2="720" y2="145" stroke="white" stroke-width="0.3" opacity="0.06"/>

  <!-- ===== Stepping Down: Rate cuts visualization ===== -->
  
  <!-- Q1 2026 rate level -->
  <rect x="100" y="135" width="80" height="205" rx="4" fill="#ef4444" opacity="0.12"/>
  <rect x="100" y="135" width="80" height="205" rx="4" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <text x="140" y="130" fill="#ef4444" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.7">5.5%</text>
  <text x="140" y="358" fill="white" opacity="0.25" font-size="9" font-family="sans-serif" text-anchor="middle">Q1 2026</text>

  <!-- Q2 2026 rate level -->
  <rect x="220" y="155" width="80" height="185" rx="4" fill="#f97316" opacity="0.12"/>
  <rect x="220" y="155" width="80" height="185" rx="4" fill="none" stroke="#f97316" stroke-width="1" opacity="0.4"/>
  <text x="260" y="150" fill="#f97316" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.7">5.0%</text>
  <text x="260" y="358" fill="white" opacity="0.25" font-size="9" font-family="sans-serif" text-anchor="middle">Q2 2026</text>

  <!-- Q3 2026 rate level (predicted) -->
  <rect x="340" y="190" width="80" height="150" rx="4" fill="#C9A84C" opacity="0.12"/>
  <rect x="340" y="190" width="80" height="150" rx="4" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <text x="380" y="185" fill="#C9A84C" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.9">4.5%</text>
  <text x="380" y="358" fill="#C9A84C" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.5">Q3 2026</text>

  <!-- Q4 2026 rate level (predicted) -->
  <rect x="460" y="210" width="80" height="130" rx="4" fill="#22c55e" opacity="0.12"/>
  <rect x="460" y="210" width="80" height="130" rx="4" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <text x="500" y="205" fill="#22c55e" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.9">4.0%</text>
  <text x="500" y="358" fill="#22c55e" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.5">Q4 2026</text>

  <!-- Q1 2027 (predicted) -->
  <rect x="580" y="230" width="80" height="110" rx="4" fill="#06b6d4" opacity="0.12"/>
  <rect x="580" y="230" width="80" height="110" rx="4" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <text x="620" y="225" fill="#06b6d4" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.9">3.5%</text>
  <text x="620" y="358" fill="#06b6d4" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.5">Q1 2027</text>

  <!-- Trend arrow -->
  <g transform="translate(700, 100)" opacity="0.2">
    <polygon points="0,15 -10,0 10,0" fill="#22c55e"/>
    <rect x="-3" y="-5" width="6" height="20" rx="1" fill="#22c55e"/>
    <text x="0" y="-8" fill="#22c55e" font-size="10" font-family="sans-serif" text-anchor="middle">利率下降</text>
  </g>

  <!-- ===== Bond icon (left side decorative) ===== -->
  <g transform="translate(100, 120)" opacity="0.08">
    <rect x="-25" y="-18" width="50" height="36" rx="4" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="-15" y1="-8" x2="15" y2="-8" stroke="#C9A84C" stroke-width="1"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="-15" y1="8" x2="15" y2="8" stroke="#C9A84C" stroke-width="1"/>
    <rect x="-8" y="-12" width="16" height="24" rx="2" fill="#C9A84C" opacity="0.2"/>
    <!-- Perforation dots -->
    <circle cx="-15" cy="-6" r="1" fill="#C9A84C"/>
    <circle cx="-15" cy="2" r="1" fill="#C9A84C"/>
    <circle cx="-15" cy="10" r="1" fill="#C9A84C"/>
  </g>

  <!-- ===== Title Section ===== -->
  <!-- Divider -->
  <line x1="60" y1="82" x2="740" y2="82" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- Main Title -->
  <text x="60" y="50" fill="#ffffff" font-size="26" font-family="sans-serif" font-weight="bold">
    減息週期債券投資終極指南
  </text>

  <!-- Subtitle -->
  <text x="60" y="72" fill="#C9A84C" font-size="13" font-family="sans-serif" opacity="0.9">
    由零開始建立穩健收息組合 · 利率趨勢向下
  </text>

  <!-- ===== Info Cards ===== -->
  <!-- Card 1: Current yield -->
  <g transform="translate(60, 380)">
    <rect x="0" y="-5" width="120" height="26" rx="6" fill="#C9A84C" opacity="0.1"/>
    <rect x="0" y="-5" width="120" height="26" rx="6" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
    <text x="60" y="13" fill="#C9A84C" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">📈 債息 ~4.5%</text>
  </g>

  <!-- Card 2: Duration -->
  <g transform="translate(195, 380)">
    <rect x="0" y="-5" width="100" height="26" rx="6" fill="#06b6d4" opacity="0.1"/>
    <rect x="0" y="-5" width="100" height="26" rx="6" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
    <text x="50" y="13" fill="#06b6d4" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">⏳ Duration 5-7</text>
  </g>

  <!-- Card 3: Capital Gain -->
  <g transform="translate(310, 380)">
    <rect x="0" y="-5" width="120" height="26" rx="6" fill="#22c55e" opacity="0.1"/>
    <rect x="0" y="-5" width="120" height="26" rx="6" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="60" y="13" fill="#22c55e" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">💰 潛在資本增值</text>
  </g>

  <!-- Card 4: Risk -->
  <g transform="translate(445, 380)">
    <rect x="0" y="-5" width="100" height="26" rx="6" fill="#a855f7" opacity="0.1"/>
    <rect x="0" y="-5" width="100" height="26" rx="6" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <text x="50" y="13" fill="#a855f7" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="500">🛡️ 低波動防守</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="448" width="800" height="2" fill="url(#gold)" opacity="0.35"/>
</svg>