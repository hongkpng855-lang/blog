<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Noto Sans TC','system-ui',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="50%" stop-color="#243B6A"/>
      <stop offset="100%" stop-color="#1a2a45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C85A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative glow -->
  <circle cx="650" cy="100" r="300" fill="url(#glow)"/>

  <!-- MTR/subway line decoration -->
  <path d="M 50 380 Q 150 350 250 370 Q 350 390 400 360 Q 500 320 600 350 Q 700 380 750 340" 
        stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="150" cy="363" r="3" fill="#C9A84C" opacity="0.5"/>
  <circle cx="300" cy="377" r="3" fill="#C9A84C" opacity="0.5"/>
  <circle cx="450" cy="365" r="3" fill="#C9A84C" opacity="0.5"/>
  <circle cx="600" cy="350" r="3" fill="#C9A84C" opacity="0.5"/>

  <!-- Central icon: Clock + Book + Headphones + Phone -->
  <!-- Outer circle -->
  <circle cx="400" cy="185" r="92" fill="#1B2A4A" stroke="#C9A84C" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Clock face -->
  <circle cx="400" cy="185" r="65" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <circle cx="400" cy="185" r="3" fill="#C9A84C"/>
  <!-- Clock hands -->
  <line x1="400" y1="185" x2="400" y2="145" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="400" y1="185" x2="430" y2="185" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Hour markers -->
  <g fill="white" opacity="0.4" font-size="7">
    <text x="400" y="128" text-anchor="middle">12</text>
    <text x="460" y="189" text-anchor="middle">3</text>
    <text x="400" y="252" text-anchor="middle">6</text>
    <text x="340" y="189" text-anchor="middle">9</text>
  </g>

  <!-- Book left of clock -->
  <g transform="translate(270, 155) rotate(-15)">
    <rect x="0" y="0" width="40" height="55" rx="3" fill="white" opacity="0.9"/>
    <rect x="3" y="0" width="34" height="55" rx="2" fill="#f0f0f0"/>
    <line x1="8" y1="12" x2="32" y2="12" stroke="#1B2A4A" stroke-width="1" opacity="0.3"/>
    <line x1="8" y1="18" x2="28" y2="18" stroke="#1B2A4A" stroke-width="1" opacity="0.2"/>
    <line x1="8" y1="24" x2="30" y2="24" stroke="#1B2A4A" stroke-width="1" opacity="0.2"/>
    <line x1="8" y1="30" x2="26" y2="30" stroke="#1B2A4A" stroke-width="1" opacity="0.2"/>
    <line x1="8" y1="36" x2="30" y2="36" stroke="#1B2A4A" stroke-width="1" opacity="0.2"/>
    <line x1="8" y1="42" x2="22" y2="42" stroke="#1B2A4A" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Headphones right of clock -->
  <g transform="translate(495, 155)">
    <path d="M0 30 Q 0 10 15 10 Q 30 10 30 30 L30 45 Q 30 52 24 52 Q 18 52 18 45 L18 30" 
          stroke="white" stroke-width="2.5" fill="none" opacity="0.9"/>
    <path d="M0 30 Q 0 10 15 10 Q 30 10 30 30" 
          stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Sound waves -->
    <path d="M38 25 Q 44 30 38 35" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M44 20 Q 52 30 44 40" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Phone bottom right -->
  <g transform="translate(460, 245)">
    <rect x="0" y="0" width="22" height="36" rx="3" fill="white" opacity="0.8" transform="rotate(20)"/>
    <rect x="2" y="3" width="18" height="28" rx="2" fill="#1B2A4A" opacity="0.6" transform="rotate(20)"/>
    <circle cx="11" cy="8" r="1.5" fill="#C9A84C" transform="rotate(20)"/>
  </g>

  <!-- Coffee cup bottom left -->
  <g transform="translate(310, 240)">
    <rect x="0" y="5" width="22" height="25" rx="2" fill="white" opacity="0.7"/>
    <path d="M22 10 Q 30 12 30 20 Q 30 28 22 30" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
    <ellipse cx="11" cy="5" rx="11" ry="3" fill="white" opacity="0.4"/>
    <!-- Steam -->
    <path d="M7 2 Q 5 -3 8 -7" stroke="white" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M14 2 Q 16 -4 13 -8" stroke="white" stroke-width="1" fill="none" opacity="0.25"/>
  </g>

  <!-- Title text -->
  <text x="400" y="340" text-anchor="middle" fill="white" font-size="24" font-weight="700" filter="url(#shadow)">
    通勤時間活用術
  </text>
  <text x="400" y="370" text-anchor="middle" fill="#C9A84C" font-size="14" font-weight="400" opacity="0.9">
    將日常搭車時間變成自我增值嘅黃金時段
  </text>

  <!-- Bottom decoration line -->
  <line x1="320" y1="390" x2="480" y2="390" stroke="url(#accent)" stroke-width="2.5" opacity="0.6"/>

  <!-- Small icons row at bottom -->
  <g opacity="0.5">
    <!-- Podcast icon -->
    <rect x="100" y="405" width="12" height="12" rx="2" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="106" cy="411" r="3" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <!-- Article icon -->
    <rect x="140" y="405" width="12" height="12" rx="1" fill="none" stroke="white" stroke-width="1"/>
    <line x1="143" y1="409" x2="149" y2="409" stroke="white" stroke-width="0.8"/>
    <line x1="143" y1="412" x2="149" y2="412" stroke="white" stroke-width="0.8"/>
    <!-- Learn icon -->
    <text x="180" y="415" text-anchor="middle" fill="white" font-size="10">🎧</text>
    <!-- Plan icon -->
    <text x="220" y="415" text-anchor="middle" fill="white" font-size="10">📝</text>
  </g>
</svg>
