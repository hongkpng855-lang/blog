<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2A4A"/>
      <stop offset="50%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f1e38"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12"/>
      <stop offset="100%" style="stop-color:#E67E22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00B4D8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="80" r="180" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.12"/>
  <circle cx="100" cy="420" r="140" fill="none" stroke="#00B4D8" stroke-width="0.5" opacity="0.10"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>

  <!-- Server / NAS icon -->
  <g transform="translate(256, 160)" filter="url(#glow)">
    <!-- Base unit -->
    <rect x="-40" y="-30" width="80" height="60" rx="6" fill="#1a3a5c" stroke="#C9A84C" stroke-width="1.5" opacity="0.95"/>
    <!-- Drive slots -->
    <rect x="-32" y="-20" width="64" height="8" rx="2" fill="#0f1e38" stroke="#2a4a6c" stroke-width="0.8"/>
    <rect x="-32" y="-8" width="64" height="8" rx="2" fill="#0f1e38" stroke="#2a4a6c" stroke-width="0.8"/>
    <rect x="-32" y="4" width="64" height="8" rx="2" fill="#0f1e38" stroke="#2a4a6c" stroke-width="0.8"/>
    <!-- LED dot -->
    <circle cx="32" cy="22" r="3" fill="#2ECC71"/>
    <!-- Blinking LED -->
    <circle cx="26" cy="22" r="2" fill="#C9A84C" opacity="0.8"/>
    <!-- Top label -->
    <rect x="-8" y="-36" width="16" height="4" rx="2" fill="#C9A84C" opacity="0.6"/>
  </g>

  <!-- Cloud connection arrows -->
  <g opacity="0.5" stroke="#00B4D8" stroke-width="1.5" fill="none">
    <!-- Phone to NAS -->
    <path d="M 120,250 Q 160,200 210,180"/>
    <polygon points="210,180 200,188 206,176" fill="#00B4D8"/>
    <!-- NAS to Laptop -->
    <path d="M 300,180 Q 340,200 380,250"/>
    <polygon points="380,250 370,244 372,256" fill="#00B4D8"/>
    <!-- NAS to TV -->
    <path d="M 310,190 Q 360,240 400,310"/>
    <polygon points="400,310 390,304 392,316" fill="#00B4D8"/>
  </g>

  <!-- Device icons -->
  <!-- Phone -->
  <g transform="translate(80, 260)">
    <rect x="-10" y="-18" width="20" height="36" rx="4" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
    <circle cx="0" cy="13" r="2" fill="#C9A84C" opacity="0.7"/>
  </g>
  <!-- Laptop -->
  <g transform="translate(400, 260)">
    <rect x="-16" y="-16" width="32" height="22" rx="3" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
    <path d="M -18,6 L 18,6 L 22,16 L -22,16 Z" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
  </g>
  <!-- TV -->
  <g transform="translate(270, 350)">
    <rect x="-18" y="-14" width="36" height="24" rx="3" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
    <rect x="-4" y="10" width="8" height="6" rx="1" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
  </g>

  <!-- Info cards -->
  <!-- Card 1: Photo Backup -->
  <g transform="translate(50, 295)">
    <rect x="0" y="0" width="105" height="70" rx="8" fill="#0f1e38" stroke="#00B4D8" stroke-width="0.8" opacity="0.9" filter="url(#shadow)"/>
    <!-- Camera icon -->
    <circle cx="20" cy="18" r="7" fill="none" stroke="#00B4D8" stroke-width="1.2"/>
    <circle cx="20" cy="18" r="3" fill="#00B4D8" opacity="0.6"/>
    <text x="52" y="22" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">📸 Photo</text>
    <text x="52" y="52" text-anchor="middle" fill="#88aacc" font-family="system-ui, sans-serif" font-size="8">Auto Backup</text>
    <text x="52" y="64" text-anchor="middle" fill="#667788" font-family="system-ui, sans-serif" font-size="7">原畫質保留</text>
  </g>

  <!-- Card 2: Media Streaming -->
  <g transform="translate(165, 295)">
    <rect x="0" y="0" width="105" height="70" rx="8" fill="#0f1e38" stroke="#C9A84C" stroke-width="0.8" opacity="0.9" filter="url(#shadow)"/>
    <!-- Play icon -->
    <polygon points="14,12 14,26 26,19" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
    <text x="52" y="22" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">🎬 Media</text>
    <text x="52" y="52" text-anchor="middle" fill="#88aacc" font-family="system-ui, sans-serif" font-size="8">Plex / Jellyfin</text>
    <text x="52" y="64" text-anchor="middle" fill="#667788" font-family="system-ui, sans-serif" font-size="7">電視·平板隨時播</text>
  </g>

  <!-- Card 3: File Sync -->
  <g transform="translate(280, 295)">
    <rect x="0" y="0" width="105" height="70" rx="8" fill="#0f1e38" stroke="#2ECC71" stroke-width="0.8" opacity="0.9" filter="url(#shadow)"/>
    <!-- Sync arrows -->
    <path d="M 12,14 A 8,8 0 0,1 26,14" fill="none" stroke="#2ECC71" stroke-width="1.2"/>
    <polygon points="26,14 22,10 22,18" fill="#2ECC71"/>
    <path d="M 26,24 A 8,8 0 0,1 12,24" fill="none" stroke="#2ECC71" stroke-width="1.2" opacity="0.6"/>
    <polygon points="12,24 16,20 16,28" fill="#2ECC71" opacity="0.6"/>
    <text x="52" y="22" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">📁 Sync</text>
    <text x="52" y="52" text-anchor="middle" fill="#88aacc" font-family="system-ui, sans-serif" font-size="8">檔案同步+版控</text>
    <text x="52" y="64" text-anchor="middle" fill="#667788" font-family="system-ui, sans-serif" font-size="7">公司·屋企自動sync</text>
  </g>

  <!-- Stats bar at bottom -->
  <g transform="translate(50, 395)">
    <rect x="0" y="0" width="420" height="42" rx="8" fill="#0f1e38" stroke="url(#gold)" stroke-width="0.5" opacity="0.85"/>
    <!-- Stat 1: One-time cost -->
    <text x="70" y="20" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">$3,560</text>
    <text x="70" y="32" text-anchor="middle" fill="#667788" font-family="system-ui, sans-serif" font-size="7">一次性硬件</text>
    <line x1="140" y1="8" x2="140" y2="34" stroke="#2a4a6c" stroke-width="0.5"/>

    <!-- Stat 2: Zero monthly -->
    <text x="210" y="20" text-anchor="middle" fill="#2ECC71" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">$0/月</text>
    <text x="210" y="32" text-anchor="middle" fill="#667788" font-family="system-ui, sans-serif" font-size="7">無月費</text>
    <line x1="280" y1="8" x2="280" y2="34" stroke="#2a4a6c" stroke-width="0.5"/>

    <!-- Stat 3: 5 year ROI -->
    <text x="350" y="20" text-anchor="middle" fill="#00B4D8" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">5年回本</text>
    <text x="350" y="32" text-anchor="middle" fill="#667788" font-family="system-ui, sans-serif" font-size="7">vs Cloud月費</text>
  </g>

  <!-- Title -->
  <text x="256" y="460" text-anchor="middle" fill="#C9A84C" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">私有雲端 · 一勞永逸</text>
  <text x="256" y="482" text-anchor="middle" fill="#8899aa" font-family="system-ui, sans-serif" font-size="8">NAS 自建 Photo Backup · 媒體串流 · 檔案同步</text>

  <!-- Bottom decorative line -->
  <line x1="156" y1="495" x2="356" y2="495" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="495" r="3" fill="#C9A84C" opacity="0.7"/>
</svg>
