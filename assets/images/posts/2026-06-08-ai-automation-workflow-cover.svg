<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#0f1a2e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="connector" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="output" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 格線背景 -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 左上角裝飾 -->
  <circle cx="80" cy="80" r="140" fill="url(#accent1)" opacity="0.06"/>
  <circle cx="100" cy="100" r="50" fill="url(#accent2)" opacity="0.05"/>

  <!-- 右下角裝飾 -->
  <circle cx="1120" cy="550" r="160" fill="url(#accent2)" opacity="0.05"/>
  <circle cx="1080" cy="520" r="70" fill="url(#accent1)" opacity="0.04"/>

  <!-- ═══ 中央 Automation Pipeline 視覺化 ═══ -->

  <!-- 標題上方節點裝飾 -->
  <g transform="translate(100, 130)">
    <text x="500" y="0" fill="#64748b" font-family="system-ui, sans-serif" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="3">AUTOMATION PIPELINE</text>
  </g>

  <!-- Step Nodes Row -->
  <g transform="translate(0, 160)">

    <!-- Node 1: Trigger (Inbox/Gmail icon) -->
    <g transform="translate(75, 0)">
      <rect x="0" y="0" width="160" height="140" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
      <rect x="0" y="0" width="160" height="140" rx="16" fill="url(#step1)" opacity="0.08"/>
      <!-- Envelope icon -->
      <rect x="60" y="20" width="40" height="30" rx="4" fill="none" stroke="#818cf8" stroke-width="2.5"/>
      <polyline points="60,25 80,40 100,25" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
      <text x="80" y="82" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Trigger</text>
      <text x="80" y="102" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Email / Schedule</text>
    </g>

    <!-- Arrow 1 → 2 -->
    <line x1="235" y1="70" x2="295" y2="70" stroke="#818cf8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>

    <!-- Node 2: AI Processing -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="180" height="140" rx="16" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5"/>
      <rect x="0" y="0" width="180" height="140" rx="16" fill="url(#step2)" opacity="0.08"/>
      <!-- AI chip icon -->
      <rect x="65" y="18" width="50" height="34" rx="6" fill="none" stroke="#67e8f9" stroke-width="2"/>
      <text x="76" y="42" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="11" font-weight="700">AI</text>
      <!-- Circuit lines -->
      <line x1="70" y1="55" x2="110" y2="55" stroke="#67e8f9" stroke-width="1" opacity="0.5"/>
      <circle cx="70" cy="55" r="2" fill="#67e8f9" opacity="0.5"/>
      <circle cx="110" cy="55" r="2" fill="#67e8f9" opacity="0.5"/>
      <text x="90" y="84" fill="#5eead4" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">AI Processing</text>
      <text x="90" y="102" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Classify / Analyze</text>
    </g>

    <!-- Arrow 2 → 3 -->
    <line x1="480" y1="70" x2="540" y2="70" stroke="#67e8f9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>

    <!-- Node 3: Workflow Engine -->
    <g transform="translate(545, 0)">
      <rect x="0" y="0" width="180" height="140" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
      <rect x="0" y="0" width="180" height="140" rx="16" fill="url(#step3)" opacity="0.08"/>
      <!-- Flow diagram icon -->
      <g transform="translate(65, 20)">
        <rect x="0" y="0" width="18" height="18" rx="3" fill="#fcd34d" opacity="0.3"/>
        <rect x="28" y="0" width="18" height="18" rx="3" fill="#fcd34d" opacity="0.3"/>
        <rect x="14" y="26" width="18" height="18" rx="3" fill="#fcd34d" opacity="0.3"/>
        <line x1="18" y1="9" x2="28" y2="9" stroke="#fcd34d" stroke-width="1.5"/>
        <line x1="23" y1="18" x2="23" y2="26" stroke="#fcd34d" stroke-width="1.5"/>
      </g>
      <text x="90" y="84" fill="#fde68a" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Workflow Engine</text>
      <text x="90" y="102" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">n8n / Make / Zapier</text>
    </g>

    <!-- Arrow 3 → 4 -->
    <line x1="725" y1="70" x2="785" y2="70" stroke="#fcd34d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>

    <!-- Node 4: Output -->
    <g transform="translate(790, 0)">
      <rect x="0" y="0" width="180" height="140" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
      <rect x="0" y="0" width="180" height="140" rx="16" fill="url(#output)" opacity="0.08"/>
      <!-- Check / output icon -->
      <circle cx="90" cy="38" r="20" fill="none" stroke="#6ee7b7" stroke-width="2.5"/>
      <polyline points="78,38 86,46 102,30" fill="none" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
      <text x="90" y="84" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Output</text>
      <text x="90" y="102" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Report / Notification</text>
    </g>

    <!-- 節點下方工具標籤 -->
    <g transform="translate(75, 150)">
      <rect x="15" y="0" width="130" height="24" rx="12" fill="#312e81" opacity="0.6"/>
      <text x="80" y="16" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">📩 Gmail Trigger</text>
    </g>
    <g transform="translate(300, 150)">
      <rect x="25" y="0" width="130" height="24" rx="12" fill="#164e63" opacity="0.6"/>
      <text x="90" y="16" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">🤖 Claude AI</text>
    </g>
    <g transform="translate(545, 150)">
      <rect x="20" y="0" width="140" height="24" rx="12" fill="#451a03" opacity="0.6"/>
      <text x="90" y="16" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">⚙️ Automation Flow</text>
    </g>
    <g transform="translate(790, 150)">
      <rect x="20" y="0" width="140" height="24" rx="12" fill="#064e3b" opacity="0.6"/>
      <text x="90" y="16" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">✅ Telegram / Email</text>
    </g>
  </g>

  <!-- 兩側效率數字 -->
  <g transform="translate(40, 400)">
    <text x="0" y="0" fill="#818cf8" font-family="system-ui, sans-serif" font-size="36" font-weight="800">80%</text>
    <text x="0" y="25" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">重複工作</text>
    <text x="0" y="42" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">可自動化</text>
  </g>
  <g transform="translate(1060, 400)">
    <text x="100" y="0" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="36" font-weight="800" text-anchor="end">20h+</text>
    <text x="100" y="25" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" text-anchor="end">每星期慳返</text>
    <text x="100" y="42" fill="#64748b" font-family="system-ui, sans-serif" font-size="12" text-anchor="end">專注真正重要嘅事</text>
  </g>

  <!-- 底部主標題區域 -->
  <g transform="translate(0, 460)">
    <rect x="0" y="0" width="1200" height="170" fill="#ffffff" fill-opacity="0.02"/>

    <!-- 分類標籤 -->
    <rect x="522" y="15" width="156" height="28" rx="14" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <text x="600" y="34" fill="#818cf8" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">💻 科技效率類</text>

    <!-- 主標題 -->
    <text x="600" y="85" fill="#ffffff" font-family="system-ui, sans-serif" font-size="40" font-weight="800" text-anchor="middle" letter-spacing="1" filter="url(#glowStrong)">AI 自動化工作流實戰指南</text>
    <text x="600" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="17" text-anchor="middle" letter-spacing="0.5">香港打工仔慳時間慳力必學技巧</text>

    <!-- 分隔線 -->
    <line x1="400" y1="140" x2="800" y2="140" stroke="url(#connector)" stroke-width="2" opacity="0.6"/>

    <!-- Footer details -->
    <text x="600" y="160" fill="#475569" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">GovFlow · 2026 必備生產力技能 · Email管理 · 報告自動化 · 社交媒體排程</text>
  </g>
</svg>
