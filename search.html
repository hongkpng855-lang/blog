---
layout: default
title: 搜尋文章
permalink: /search/
---

<div class="container">
  <div class="row">
    <div class="col-lg-8">
      <div class="card mb-4">
        <div class="card-header bg-primary text-white">
          <h1 class="h4 mb-0"><i class="fas fa-search me-2"></i>搜尋文章</h1>
        </div>
        <div class="card-body">
          <form id="search-form" class="mb-4">
            <div class="input-group">
              <input type="text" id="search-input" class="form-control form-control-lg" placeholder="輸入關鍵字搜尋...">
              <button class="btn btn-primary" type="submit">
                <i class="fas fa-search"></i> 搜尋
              </button>
            </div>
          </form>
          
          <div id="search-results"></div>
          
          <div id="initial-content">
            <h5>熱門搜尋</h5>
            <div class="d-flex flex-wrap gap-2 mb-4">
              <a href="?q=效率" class="tag-item">效率</a>
              <a href="?q=投資" class="tag-item">投資</a>
              <a href="?q=健康" class="tag-item">健康</a>
              <a href="?q=科技" class="tag-item">科技</a>
            </div>
            
            <h5>依分類瀏覽</h5>
            <div class="row">
              <div class="col-md-6 mb-3">
                <a href="{{ '/categories/技術/' | relative_url }}" class="card d-block text-decoration-none">
                  <div class="card-body">
                    <i class="fas fa-code fa-2x text-primary mb-2"></i>
                    <h5>技術</h5>
                    <p class="text-muted mb-0">程式開發、工具介紹</p>
                  </div>
                </a>
              </div>
              <div class="col-md-6 mb-3">
                <a href="{{ '/categories/投資/' | relative_url }}" class="card d-block text-decoration-none">
                  <div class="card-body">
                    <i class="fas fa-chart-line fa-2x text-success mb-2"></i>
                    <h5>投資</h5>
                    <p class="text-muted mb-0">理財、股票、基金</p>
                  </div>
                </a>
              </div>
              <div class="col-md-6 mb-3">
                <a href="{{ '/categories/生活/' | relative_url }}" class="card d-block text-decoration-none">
                  <div class="card-body">
                    <i class="fas fa-heart fa-2x text-danger mb-2"></i>
                    <h5>生活</h5>
                    <p class="text-muted mb-0">生活品質、效率提升</p>
                  </div>
                </a>
              </div>
              <div class="col-md-6 mb-3">
                <a href="{{ '/categories/健康/' | relative_url }}" class="card d-block text-decoration-none">
                  <div class="card-body">
                    <i class="fas fa-medkit fa-2x text-info mb-2"></i>
                    <h5>健康</h5>
                    <p class="text-muted mb-0">健康知識、運動</p>
                  </div>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-lg-4">
      <div class="card mb-4">
        <div class="card-header bg-primary text-white">
          <i class="fas fa-tags me-2"></i>所有標籤
        </div>
        <div class="card-body">
          <div class="tag-cloud">
            {% for tag in site.tags %}
              <a href="{{ '/tags/' | append: tag[0] | relative_url }}" class="tag-item">{{ tag[0] }}</a>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // 文章數據（Jekyll 生成）
  var posts = [
    {% for post in site.posts %}
    {
      title: "{{ post.title | escape }}",
      url: "{{ post.url | relative_url }}",
      date: "{{ post.date | date: '%Y-%m-%d' }}",
      categories: [{% for cat in post.categories %}"{{ cat }}"{% unless forloop.last %},{% endunless %}{% endfor %}],
      tags: [{% for tag in post.tags %}"{{ tag }}"{% unless forloop.last %},{% endunless %}{% endfor %}],
      excerpt: "{{ post.excerpt | strip_html | escape | truncate: 150 }}",
      {% if post.image %}image: "{{ post.image | relative_url }}"{% endif %}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  
  // 搜尋函數
  function searchPosts(query) {
    if (!query || query.trim() === '') return [];
    
    query = query.toLowerCase().trim();
    var results = [];
    
    posts.forEach(function(post) {
      var titleMatch = post.title.toLowerCase().indexOf(query) !== -1;
      var excerptMatch = post.excerpt.toLowerCase().indexOf(query) !== -1;
      var tagMatch = post.tags.some(function(tag) {
        return tag.toLowerCase().indexOf(query) !== -1;
      });
      var catMatch = post.categories.some(function(cat) {
        return cat.toLowerCase().indexOf(query) !== -1;
      });
      
      if (titleMatch || excerptMatch || tagMatch || catMatch) {
        results.push(post);
      }
    });
    
    return results;
  }
  
  // 顯示結果
  function displayResults(results) {
    var container = document.getElementById('search-results');
    var initial = document.getElementById('initial-content');
    
    if (results.length === 0) {
      initial.style.display = 'block';
      container.innerHTML = '';
      return;
    }
    
    initial.style.display = 'none';
    
    var html = '<h5 class="mb-3">找到 ' + results.length + ' 篇相關文章</h5>';
    html += '<div class="list-group">';
    
    results.forEach(function(post) {
      html += '<a href="' + post.url + '" class="list-group-item list-group-item-action">';
      html += '<div class="d-flex w-100 justify-content-between">';
      html += '<h5 class="mb-1">' + post.title + '</h5>';
      html += '<small class="text-muted">' + post.date + '</small>';
      html += '</div>';
      html += '<p class="mb-1 text-muted">' + post.excerpt + '</p>';
      html += '<small>';
      post.categories.forEach(function(cat) {
        html += '<span class="badge bg-secondary me-1">' + cat + '</span>';
      });
      post.tags.forEach(function(tag) {
        html += '<span class="badge bg-light text-dark me-1">' + tag + '</span>';
      });
      html += '</small>';
      html += '</a>';
    });
    
    html += '</div>';
    container.innerHTML = html;
  }
  
  // 處理 URL 參數
  function getQueryParam(param) {
    var urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }
  
  // 初始化
  var form = document.getElementById('search-form');
  var input = document.getElementById('search-input');
  
  // 從 URL 獲取搜尋詞
  var urlQuery = getQueryParam('q');
  if (urlQuery) {
    input.value = decodeURIComponent(urlQuery);
    var results = searchPosts(urlQuery);
    displayResults(results);
  }
  
  // 表單提交
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var query = input.value;
    var results = searchPosts(query);
    displayResults(results);
    
    // 更新 URL
    if (query) {
      history.pushState(null, '', '?q=' + encodeURIComponent(query));
    } else {
      history.pushState(null, '', window.location.pathname);
    }
  });
})();
</script>
