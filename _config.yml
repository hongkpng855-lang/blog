title: "Sun ny 的部落格"
description: "分享生活、技術、健康、學習與投資的心得"
author: "Sun ny"
email: "" 
baseurl: "/blog"
url: "https://hongkpng855-lang.github.io"
timezone: "Asia/Taipei"

# GitHub Pages 相容設定
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

paginate: 10
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Sun ny"
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .gitignore
