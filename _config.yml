# 網站基本設定
title: 我的部落格
description: 分享知識與見解的個人空間
baseurl: "/blog"
url: "https://hongkpng855-lang.github.io"

# SEO 設定
twitter:
  username: yourtwitterhandle
  card: summary_large_image

# 分析與追蹤
google_analytics: UA-XXXXXXXX-X
disqus:
  shortname: your-disqus-shortname

# 建構設定
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/
# 分頁設定 (jekyll-paginate-v2)
pagination:
  enabled: true
  per_page: 6
  permalink: '/page/:num/'
  title: '(:num) - 我的部落格'
  limit: 0
  sort_field: 'updated'
  sort_reverse: true

# 插件
plugins:
  - jekyll-paginate-v2
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
